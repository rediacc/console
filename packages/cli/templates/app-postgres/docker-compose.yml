services:
  app:
    image: node:20.20.2-alpine
    container_name: app
    working_dir: /app
    command: sh -c "npm install --production 2>/dev/null; node server.mjs"
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_IP}:5432/${POSTGRES_DB}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./app:/app
    labels:
      - "rediacc.service_name=app"
      # Auto-route URL: https://{serviceName}.{repoName}.{machineName}.{baseDomain}
      # Example: rdc repo create --name myrepo -m server-1 → https://app.myrepo.server-1.example.com
      - "rediacc.service_port=3000"

  db:
    image: postgres:16.14-alpine
    container_name: db
    command: -c listen_addresses=*
    env_file: .env
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "rediacc.service_name=db"
