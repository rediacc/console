services:
  db:
    container_name: heartbeat_db
    network_mode: "${REPOSITORY_NETWORK_MODE:-bridge}"
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      - POSTGRES_PASSWORD=${PGPASSWORD}
      - POSTGRES_USER=${POSTGRES_USER:-heartbeat}
      - POSTGRES_DB=${POSTGRES_DB:-heartbeat}
      - PGDATA=/pgdata
    ports:
      - "5432"
    volumes:
      - ./data:/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-heartbeat}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  heartbeat:
    container_name: heartbeat_app
    network_mode: "service:db"
    image: node:20-alpine
    working_dir: /app
    command: ["sh", "-c", "npm install --production && node heartbeat.mjs"]
    env_file:
      - .env
    environment:
      - DB_HOST=127.0.0.1
      - DB_PORT=5432
    volumes:
      - ./app:/app
    depends_on:
      db:
        condition: service_healthy
