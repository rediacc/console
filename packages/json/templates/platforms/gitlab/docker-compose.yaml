services:
  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: ${CONTAINER_NAME}
    restart: always
    hostname: ${GITLAB_HOSTNAME}
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://${GITLAB_HOSTNAME}:${GITLAB_HTTP_PORT}'
        gitlab_rails['gitlab_shell_ssh_port'] = ${GITLAB_SSH_PORT}
        nginx['listen_addresses'] = ['${SERVICE_IP}'] if ENV['SERVICE_IP']
        openssh_server['listen_address'] = '${SERVICE_IP}' if ENV['SERVICE_IP']
        openssh_server['port'] = 2222 if ENV['SERVICE_IP']
        ${GITLAB_OMNIBUS_CONFIG}
    volumes:
      - ./config:/etc/gitlab
      - ./logs:/var/log/gitlab
      - ./data:/var/opt/gitlab
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null -w '%{http_code}' http://$${SERVICE_IP:-localhost}/users/sign_in | grep -q 200"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 180s
