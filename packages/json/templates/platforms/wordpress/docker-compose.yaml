services:

  wordpress:
    image: wordpress
    restart: always
    labels:
      - "rediacc.service_port=80"
    command: ["sh", "-c", "sed -i \"s/Listen 80$/Listen $${SERVICE_IP:-0.0.0.0}:80/\" /etc/apache2/ports.conf && exec docker-php-entrypoint apache2-foreground"]
    environment:
      WORDPRESS_DB_HOST: ${DB_IP}
      WORDPRESS_DB_USER: exampleuser
      WORDPRESS_DB_PASSWORD: examplepass
      WORDPRESS_DB_NAME: exampledb
    volumes:
      - ./wordpress:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://$${SERVICE_IP:-localhost}:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: mysql:8.0
    restart: always
    command: ["sh", "-c", "exec docker-entrypoint.sh mysqld --bind-address=$${SERVICE_IP:-0.0.0.0}"]
    environment:
      MYSQL_DATABASE: exampledb
      MYSQL_USER: exampleuser
      MYSQL_PASSWORD: examplepass
      MYSQL_RANDOM_ROOT_PASSWORD: '1'
    volumes:
      - ./db:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h $${SERVICE_IP:-localhost} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
