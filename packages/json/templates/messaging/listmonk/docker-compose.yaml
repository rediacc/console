services:

  listmonk:
    image: listmonk/listmonk:latest
    container_name: listmonk
    restart: always
    labels:
      - "rediacc.service_port=9000"
    command: sh -c "./listmonk --install --idempotent --yes && ./listmonk"
    environment:
      - TZ=${TZ:-Etc/UTC}
      - LISTMONK_app__address=${SERVICE_IP:-0.0.0.0}:9000
      - LISTMONK_db__host=${LISTMONK_DB_IP}
      - LISTMONK_db__port=5432
      - LISTMONK_db__user=${POSTGRES_USER:-listmonk}
      - LISTMONK_db__password=${POSTGRES_PASSWORD:-listmonk}
      - LISTMONK_db__database=${POSTGRES_DB:-listmonk}
      - LISTMONK_db__ssl_mode=disable
      - LISTMONK_db__max_open=25
      - LISTMONK_db__max_idle=25
      - LISTMONK_db__max_lifetime=300s
    volumes:
      - ./uploads:/listmonk/uploads
    depends_on:
      listmonk_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://$${SERVICE_IP:-localhost}:9000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  listmonk_db:
    image: postgres:17-alpine
    container_name: listmonk_db
    restart: always
    command: ["sh", "-c", "exec docker-entrypoint.sh postgres -c listen_addresses=$${SERVICE_IP:-0.0.0.0}"]
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-listmonk}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-listmonk}
      - POSTGRES_DB=${POSTGRES_DB:-listmonk}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-listmonk} -h $${SERVICE_IP:-localhost}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
