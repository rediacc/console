services:
  rethinkdb:
    image: rethinkdb:latest
    container_name: ${CONTAINER_NAME}
    command: ["sh", "-c", "exec rethinkdb --bind $${SERVICE_IP:-all} --cache-size ${RETHINKDB_CACHE_SIZE}"]
    labels:
      - "rediacc.service_port=8080"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://$${SERVICE_IP:-localhost}:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
