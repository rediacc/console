services:
  couchdb:
    image: couchdb:3
    container_name: ${CONTAINER_NAME}
    restart: always
    labels:
      - "rediacc.service_port=5984"
    environment:
      COUCHDB_USER: ${COUCHDB_USER}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD}
      COUCHDB_SECRET: ${COUCHDB_SECRET}
      COUCHDB_BIND_ADDRESS: ${SERVICE_IP:-0.0.0.0}
    volumes:
      - ./data:/opt/couchdb/data
      - ./etc/local.d:/opt/couchdb/etc/local.d
    healthcheck:
      test: ["CMD", "curl", "-f", "http://$${SERVICE_IP:-localhost}:5984/_up"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
