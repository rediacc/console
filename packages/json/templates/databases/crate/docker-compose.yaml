services:
  cratedb:
    image: crate:latest
    container_name: ${CONTAINER_NAME}
    command: ["sh", "-c", "exec crate -Cnetwork.host=$${SERVICE_IP:-0.0.0.0} -Cdiscovery.type=single-node -Ccluster.name=${CLUSTER_NAME}"]
    environment:
      CRATE_HEAP_SIZE: ${CRATE_HEAP_SIZE}
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://$${SERVICE_IP:-localhost}:4200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
