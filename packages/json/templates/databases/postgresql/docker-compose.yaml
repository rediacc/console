services:
  db:
    container_name: postgres_sysbench_template
    env_file:
      - .env
    environment:
      - POSTGRES_PASSWORD=${PGPASSWORD}
      - PGDATA=/pgdata
    volumes:
      - ./data:/pgdata
    tmpfs:
      - /var/lib/postgresql
    image: postgres
    command: ["sh", "-c", "exec docker-entrypoint.sh postgres -c listen_addresses=$${SERVICE_IP:-0.0.0.0}"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -h $${SERVICE_IP:-localhost}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
