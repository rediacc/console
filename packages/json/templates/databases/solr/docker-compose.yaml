services:
  solr:
    image: solr:9-slim
    container_name: ${CONTAINER_NAME}
    restart: always
    environment:
      SOLR_HEAP: ${SOLR_HEAP}
      SOLR_JAVA_MEM: ${SOLR_JAVA_MEM}
      SOLR_JETTY_HOST: ${SERVICE_IP:-0.0.0.0}
    volumes:
      - ./data:/var/solr
    command: solr-precreate ${SOLR_CORE_NAME}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://$${SERVICE_IP:-localhost}:8983/solr/${SOLR_CORE_NAME}/admin/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
