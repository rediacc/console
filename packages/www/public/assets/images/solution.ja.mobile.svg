<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 600" width="390" height="600" role="img" aria-label="A green live system box is copied into a ready-to-use sandbox in under a minute." font-family="'Hiragino Sans', 'Yu Gothic', 'Meiryo', 'Noto Sans CJK JP', sans-serif">
  <title>A green live system box is copied into a ready-to-use sandbox in under a minute.</title>

  
  <rect x="0" y="0" width="390" height="600" fill="#f5f5f5" />

  
  <rect x="85" y="35" width="220" height="130" rx="10" fill="#4a7c3f" stroke="#2d5227" stroke-width="3" />
  
  <rect x="103" y="53" width="184" height="94" rx="4" fill="#2d5227" />
  
