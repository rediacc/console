  <text x="195" y="192" font-family="'Hiragino Sans', 'Yu Gothic', 'Meiryo', 'Noto Sans CJK JP', sans-serif" font-size="26" font-weight="700" fill="#1a1a1a" text-anchor="middle">本番環境</text>

  
  
  <rect x="111" y="206" width="12" height="10" rx="2" fill="#2d2d2d" />
  
  <circle cx="117" cy="240" r="24" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="3" />
  
  <line x1="117" y1="220" x2="117" y2="226" stroke="#f5f5f5" stroke-width="3" stroke-linecap="round" />
  
  <line x1="117" y1="240" x2="117" y2="226" stroke="#f5f5f5" stroke-width="3" stroke-linecap="round" />
  <line x1="117" y1="240" x2="130" y2="246" stroke="#f5f5f5" stroke-width="3" stroke-linecap="round" />

  <text x="150" y="250" font-family="'Hiragino Sans', 'Yu Gothic', 'Meiryo', 'Noto Sans CJK JP', sans-serif" font-size="22" font-weight="700" fill="#1a1a1a" text-anchor="start">1分以内</text>

  
  <rect x="180" y="275" width="30" height="80" fill="#4a7c3f" />
  <polygon points="160,355 230,355 195,390" fill="#4a7c3f" />

  
  <text x="195" y="415" font-family="'Hiragino Sans', 'Yu Gothic', 'Meiryo', 'Noto Sans CJK JP', sans-serif" font-size="22" fill="#1a1a1a" text-anchor="middle">同一の実データ</text>

  
