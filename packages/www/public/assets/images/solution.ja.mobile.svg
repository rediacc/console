  <polyline points="287,443 295,452 311,435" fill="none" stroke="#4a7c3f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />

  
  <text x="195" y="588" font-family="'Hiragino Sans', 'Yu Gothic', 'Meiryo', 'Noto Sans CJK JP', sans-serif" font-size="26" font-weight="700" fill="#1a1a1a" text-anchor="middle">テスト準備完了</text>
