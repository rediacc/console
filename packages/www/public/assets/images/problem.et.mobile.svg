<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 600" width="390" height="600" role="img" aria-label="A 30-day-old test copy and a stuck developer lead the team to test on the live customer site, which is now broken." font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif">
<title>A 30-day-old test copy and a stuck developer lead the team to test on the live customer site, which is now broken.</title>

