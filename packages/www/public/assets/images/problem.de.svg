<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="A 30-day-old test copy and a stuck developer lead the team to test on the live customer site, which is now broken." font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif">
<title>A 30-day-old test copy and a stuck developer lead the team to test on the live customer site, which is now broken.</title>

<rect width="800" height="450" fill="#f5f5f5" />


<g id="hp-stale-box">
  <rect x="40" y="170" width="140" height="130" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="3" />
  <rect x="58" y="186" width="104" height="98" fill="#f5f5f5" stroke="#1a1a1a" stroke-width="2.5" />
  <rect x="58" y="186" width="104" height="20" fill="#1a1a1a" />
  <line x1="78" y1="180" x2="78" y2="196" stroke="#1a1a1a" stroke-width="3" />
  <line x1="142" y1="180" x2="142" y2="196" stroke="#1a1a1a" stroke-width="3" />
  <text x="110" y="262" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="44" font-weight="bold" fill="#1a1a1a">30</text>
  
  <path d="M 40 170 L 70 170 M 40 170 L 40 200 M 40 170 L 65 195" stroke="#1a1a1a" stroke-width="2.5" fill="none" />
</g>
<text x="110" y="340" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="28" font-weight="bold" fill="#1a1a1a">30 Tage alt</text>


<g id="hp-developer">
  
  <circle cx="335" cy="150" r="30" fill="#f5f5f5" stroke="#1a1a1a" stroke-width="3" />
  <line x1="335" y1="150" x2="335" y2="128" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" />
  <line x1="335" y1="150" x2="352" y2="158" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" />
  <circle cx="335" cy="150" r="3" fill="#1a1a1a" />

  
  <rect x="240" y="278" width="200" height="12" fill="#2d2d2d" />
  <rect x="248" y="290" width="10" height="30" fill="#2d2d2d" />
  <rect x="422" y="290" width="10" height="30" fill="#2d2d2d" />

  
  <path d="M 290 278 Q 295 230 320 220 L 360 230 Q 385 245 388 278 Z" fill="#2d2d2d" />
  
  <circle cx="310" cy="248" r="24" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="2.5" />
  
  <path d="M 360 240 Q 410 250 415 275" stroke="#2d2d2d" stroke-width="14" fill="none" stroke-linecap="round" />
</g>
<text x="335" y="340" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="28" font-weight="bold" fill="#1a1a1a">Blockiert</text>


<g id="hp-arrow">
  <path d="M 440 215 Q 475 195 495 210" stroke="#8b0000" stroke-width="8" fill="none" stroke-linecap="round" />
  <polygon points="488,195 515,212 488,228" fill="#8b0000" stroke="#1a1a1a" stroke-width="2.5" />
</g>


<g id="hp-server">
  <rect x="510" y="170" width="230" height="220" fill="#8b0000" stroke="#1a1a1a" stroke-width="3" />
  
  <line x1="525" y1="190" x2="725" y2="190" stroke="#1a1a1a" stroke-width="2.5" />
  <line x1="525" y1="200" x2="725" y2="200" stroke="#1a1a1a" stroke-width="2.5" />

  
  <polyline points="510,235 575,275 555,320 620,355 600,390" stroke="#1a1a1a" stroke-width="5" fill="none" stroke-linejoin="miter" />
  <polyline points="740,250 680,285 700,330 660,365" stroke="#1a1a1a" stroke-width="5" fill="none" stroke-linejoin="miter" />
  <polyline points="625,170 640,220 615,260 645,300" stroke="#1a1a1a" stroke-width="5" fill="none" stroke-linejoin="miter" />

  
  <polygon points="555,165 565,140 575,165 570,170 560,170" fill="#8b0000" stroke="#1a1a1a" stroke-width="2.5" />
  <polygon points="625,160 635,130 648,160 640,168 630,168" fill="#8b0000" stroke="#1a1a1a" stroke-width="2.5" />
  <polygon points="705,162 715,135 727,162 720,170 710,170" fill="#8b0000" stroke="#1a1a1a" stroke-width="2.5" />
</g>


<text x="620" y="120" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="28" font-weight="bold" fill="#1a1a1a">Live getestet</text>
<text x="620" y="425" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="28" font-weight="bold" fill="#1a1a1a">Jetzt kaputt</text>

