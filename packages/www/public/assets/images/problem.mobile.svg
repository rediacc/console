<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 600" width="390" height="600" role="img" aria-label="A 30-day-old test copy and a stuck developer lead the team to test on the live customer site, which is now broken.">
<title>A 30-day-old test copy and a stuck developer lead the team to test on the live customer site, which is now broken.</title>

<rect width="390" height="600" fill="#f5f5f5"/>

<!-- Stale test box at top: dusty calendar -->
<g id="hpm-stale-box">
  <rect x="135" y="20" width="120" height="100" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="3"/>
  <rect x="150" y="36" width="90" height="76" fill="#f5f5f5" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="150" y="36" width="90" height="16" fill="#1a1a1a"/>
  <line x1="168" y1="30" x2="168" y2="46" stroke="#1a1a1a" stroke-width="2.5"/>
  <line x1="222" y1="30" x2="222" y2="46" stroke="#1a1a1a" stroke-width="2.5"/>
  <text x="195" y="100" text-anchor="middle" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="40" font-weight="bold" fill="#1a1a1a">30</text>
  <!-- Cobweb in corner -->
  <path d="M 135 20 L 160 20 M 135 20 L 135 45 M 135 20 L 158 43" stroke="#1a1a1a" stroke-width="2.5" fill="none"/>
</g>
<text x="195" y="148" text-anchor="middle" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="22" font-weight="bold" fill="#1a1a1a">30 days old</text>

<!-- Tired developer with wait clock -->
<g id="hpm-developer">
  <!-- Wait clock -->
  <circle cx="265" cy="200" r="22" fill="#f5f5f5" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="265" y1="200" x2="265" y2="184" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="265" y1="200" x2="277" y2="207" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <circle cx="265" cy="200" r="2.5" fill="#1a1a1a"/>

  <!-- Desk -->
  <rect x="100" y="278" width="160" height="12" fill="#2d2d2d"/>
  <rect x="108" y="290" width="10" height="22" fill="#2d2d2d"/>
  <rect x="242" y="290" width="10" height="22" fill="#2d2d2d"/>

  <!-- Slumped body -->
  <path d="M 150 278 Q 153 230 175 218 L 215 230 Q 235 245 238 278 Z" fill="#2d2d2d"/>
  <!-- Head bowed onto desk -->
  <circle cx="170" cy="248" r="22" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Arm draped on desk -->
  <path d="M 215 240 Q 250 248 252 275" stroke="#2d2d2d" stroke-width="12" fill="none" stroke-linecap="round"/>
</g>
<text x="195" y="338" text-anchor="middle" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="22" font-weight="bold" fill="#1a1a1a">Stuck waiting</text>

<!-- Red shortcut arrow pointing down -->
<g id="hpm-arrow">
  <line x1="195" y1="352" x2="195" y2="388" stroke="#8b0000" stroke-width="8" stroke-linecap="round"/>
  <polygon points="178,382 195,408 212,382" fill="#8b0000" stroke="#1a1a1a" stroke-width="2.5"/>
</g>

<!-- Cracked production server filling the bottom -->
<g id="hpm-server">
  <rect x="30" y="430" width="330" height="140" fill="#8b0000" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Rack vents -->
  <line x1="48" y1="446" x2="342" y2="446" stroke="#1a1a1a" stroke-width="2.5"/>
  <line x1="48" y1="456" x2="342" y2="456" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- Cracks across the body -->
  <polyline points="30,490 100,510 80,535 160,555 140,570" stroke="#1a1a1a" stroke-width="5" fill="none"/>
  <polyline points="360,495 290,515 310,540 250,565" stroke="#1a1a1a" stroke-width="5" fill="none"/>
  <polyline points="200,430 220,470 195,505 230,540" stroke="#1a1a1a" stroke-width="5" fill="none"/>

  <!-- Warning sparks above the server top edge -->
  <polygon points="80,425 90,400 100,425 95,432 85,432" fill="#8b0000" stroke="#1a1a1a" stroke-width="2.5"/>
  <polygon points="195,422 207,395 219,422 212,430 202,430" fill="#8b0000" stroke="#1a1a1a" stroke-width="2.5"/>
  <polygon points="295,425 305,400 315,425 310,432 300,432" fill="#8b0000" stroke="#1a1a1a" stroke-width="2.5"/>
</g>

<!-- Server labels -->
<text x="195" y="418" text-anchor="middle" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="22" font-weight="bold" fill="#1a1a1a">Tested on live site</text>
<text x="195" y="594" text-anchor="middle" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="22" font-weight="bold" fill="#1a1a1a">Now broken</text>

</svg>
