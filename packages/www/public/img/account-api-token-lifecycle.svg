<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#556b2f"/>
    </marker>
  </defs>

  <rect width="800" height="200" fill="#f5f5f5"/>

  <!-- Step 1: Create Token -->
  <!-- Key with plus sign -->
  <g transform="translate(80, 20)">
    <circle cx="-6" cy="0" r="6" fill="none" stroke="#556b2f" stroke-width="1.5"/>
    <circle cx="-7" cy="0" r="2" fill="#556b2f"/>
    <line x1="0" y1="0" x2="12" y2="0" stroke="#556b2f" stroke-width="1.5"/>
    <line x1="8" y1="0" x2="8" y2="3" stroke="#556b2f" stroke-width="1.5"/>
    <line x1="12" y1="0" x2="12" y2="3" stroke="#556b2f" stroke-width="1.5"/>
    <!-- Plus sign -->
    <line x1="16" y1="-3" x2="16" y2="5" stroke="#556b2f" stroke-width="2"/>
    <line x1="12" y1="1" x2="20" y2="1" stroke="#556b2f" stroke-width="2"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="18" y="38" width="125" height="60" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <text x="80" y="62" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#1a1a1a">Create Token</text>
  <text x="80" y="78" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#999999">Scopes + Team</text>

  <!-- Arrow 1 -->
  <line x1="143" y1="68" x2="168" y2="68" stroke="#556b2f" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: First Request -->
  <!-- Globe with arrow icon -->
  <g transform="translate(240, 20)">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#556b2f" stroke-width="1.2"/>
    <ellipse cx="0" cy="0" rx="4" ry="8" fill="none" stroke="#556b2f" stroke-width="0.8"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#556b2f" stroke-width="0.8"/>
    <!-- Arrow pointing at globe -->
    <line x1="12" y1="-4" x2="9" y2="0" stroke="#556b2f" stroke-width="1.5"/>
    <polygon points="9,0 12,2 13,-2" fill="#556b2f"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="178" y="38" width="125" height="60" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <text x="240" y="62" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#1a1a1a">First Request</text>
  <text x="240" y="78" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#999999">Binds to client IP</text>

  <!-- Arrow 2 -->
  <line x1="303" y1="68" x2="338" y2="68" stroke="#556b2f" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: IP Bound -->
  <!-- Closed padlock icon -->
  <g transform="translate(400, 20)">
    <rect x="-8" y="-2" width="16" height="12" rx="2" fill="none" stroke="#556b2f" stroke-width="1.5"/>
    <path d="M -5,-2 L -5,-6 A 5,5 0 0,1 5,-6 L 5,-2" fill="none" stroke="#556b2f" stroke-width="1.5"/>
    <circle cx="0" cy="4" r="2" fill="#556b2f"/>
    <line x1="0" y1="5" x2="0" y2="8" stroke="#556b2f" stroke-width="1.5"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="348" y="38" width="105" height="60" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <text x="400" y="62" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#1a1a1a">IP Bound</text>
  <text x="400" y="78" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#999999">Locked to IP</text>

  <!-- Arrow 3 -->
  <line x1="453" y1="68" x2="488" y2="68" stroke="#556b2f" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: Use -->
  <!-- Checkmark in circle icon -->
  <g transform="translate(568, 20)">
    <circle cx="0" cy="0" r="9" fill="none" stroke="#556b2f" stroke-width="1.5"/>
    <polyline points="-4,0 -1,4 5,-4" fill="none" stroke="#556b2f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="498" y="38" width="140" height="60" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <text x="568" y="62" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#1a1a1a">Use</text>
  <text x="568" y="78" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#999999">Validates scope + IP</text>

  <!-- Arrow 4 -->
  <line x1="638" y1="68" x2="668" y2="68" stroke="#556b2f" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5: Revoke -->
  <!-- X in circle icon (red-tinted) -->
  <g transform="translate(730, 20)">
    <circle cx="0" cy="0" r="9" fill="none" stroke="#c0392b" stroke-width="1.5"/>
    <line x1="-4" y1="-4" x2="4" y2="4" stroke="#c0392b" stroke-width="2" stroke-linecap="round"/>
    <line x1="4" y1="-4" x2="-4" y2="4" stroke="#c0392b" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="678" y="38" width="105" height="60" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <text x="730" y="62" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#1a1a1a">Revoke</text>
  <text x="730" y="76" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#999999">Manual or</text>
  <text x="730" y="88" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#999999">on removal</text>

  <!-- Bottom badge -->
  <g filter="url(#shadow)">
    <rect x="110" y="134" width="580" height="46" rx="23" fill="#556b2f"/>
    <text x="400" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Create --> IP Binding --> Validate --> Revoke</text>
  </g>
</svg>