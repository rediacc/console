<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#556b2f"/>
    </marker>
  </defs>

  <rect width="600" height="360" fill="#f5f5f5"/>

  <!-- Owner row -->
  <g filter="url(#shadow)">
    <rect x="40" y="20" width="240" height="70" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="3"/>
  </g>
  <!-- Owner person icon with crown -->
  <polygon points="72,28 75,20 78,28 82,20 85,28 88,20 91,28" fill="#556b2f"/>
  <circle cx="82" cy="38" r="8" fill="#556b2f"/>
  <path d="M 70,60 Q 70,48 82,48 Q 94,48 94,60" fill="#556b2f"/>
  <!-- Owner label -->
  <text x="140" y="48" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1a1a1a">Owner</text>
  <text x="140" y="66" font-family="Arial, sans-serif" font-size="10" fill="#999999">Full control</text>
  <!-- Owner annotations -->
  <text x="310" y="42" font-family="Arial, sans-serif" font-size="11" fill="#999999">Billing, Transfer Ownership,</text>
  <text x="310" y="56" font-family="Arial, sans-serif" font-size="11" fill="#999999">Manage All</text>

  <!-- Arrow Owner -> Admin -->
  <line x1="160" y1="90" x2="160" y2="115" stroke="#556b2f" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Admin row -->
  <g filter="url(#shadow)">
    <rect x="55" y="125" width="210" height="70" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <!-- Admin person icon with shield -->
  <circle cx="97" cy="143" r="8" fill="#6f8243"/>
  <path d="M 85,165 Q 85,153 97,153 Q 109,153 109,165" fill="#6f8243"/>
  <!-- Shield on chest -->
  <path d="M 93,153 L 97,147 L 101,153 Q 97,157 93,153" fill="#556b2f"/>
  <!-- Admin label -->
  <text x="150" y="153" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1a1a1a">Admin</text>
  <text x="150" y="171" font-family="Arial, sans-serif" font-size="10" fill="#999999">Team manager</text>
  <!-- Admin annotations -->
  <text x="295" y="147" font-family="Arial, sans-serif" font-size="11" fill="#999999">Invite/Remove Members,</text>
  <text x="295" y="161" font-family="Arial, sans-serif" font-size="11" fill="#999999">Manage Teams</text>

  <!-- Arrow Admin -> Member -->
  <line x1="160" y1="195" x2="160" y2="220" stroke="#556b2f" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Member row -->
  <g filter="url(#shadow)">
    <rect x="55" y="230" width="210" height="70" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <!-- Member person icon with badge -->
  <circle cx="97" cy="248" r="8" fill="#999999"/>
  <path d="M 85,270 Q 85,258 97,258 Q 109,258 109,270" fill="#999999"/>
  <!-- ID badge on chest -->
  <rect x="94" y="257" width="6" height="8" rx="1" fill="#cccccc" stroke="#999999" stroke-width="0.5"/>
  <!-- Member label -->
  <text x="150" y="258" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1a1a1a">Member</text>
  <text x="150" y="276" font-family="Arial, sans-serif" font-size="10" fill="#999999">Standard access</text>
  <!-- Member annotations -->
  <text x="295" y="252" font-family="Arial, sans-serif" font-size="11" fill="#999999">View Data, Create API Tokens,</text>
  <text x="295" y="266" font-family="Arial, sans-serif" font-size="11" fill="#999999">Team Access</text>

  <!-- Bottom badge -->
  <g filter="url(#shadow)">
    <rect x="120" y="310" width="360" height="40" rx="20" fill="#556b2f"/>
    <text x="300" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Owner > Admin > Member</text>
  </g>
</svg>