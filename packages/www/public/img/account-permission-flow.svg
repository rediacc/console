<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#556b2f"/>
    </marker>
  </defs>

  <rect width="800" height="400" fill="#f5f5f5"/>

  <!-- Step 1: HTTP Request -->
  <!-- Arrow pointing right into a circle icon -->
  <g transform="translate(195, 30)">
    <circle cx="6" cy="0" r="8" fill="none" stroke="#556b2f" stroke-width="1.5"/>
    <line x1="-10" y1="0" x2="0" y2="0" stroke="#556b2f" stroke-width="2"/>
    <polygon points="0,0 -4,-3 -4,3" fill="#556b2f"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="230" y="15" width="180" height="40" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <text x="320" y="40" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#1a1a1a">HTTP Request</text>

  <!-- Arrow 1 -->
  <line x1="320" y1="55" x2="320" y2="75" stroke="#556b2f" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Session Auth -->
  <!-- Key/lock icon -->
  <g transform="translate(198, 100)">
    <circle cx="0" cy="0" r="5" fill="none" stroke="#556b2f" stroke-width="1.2"/>
    <line x1="5" y1="0" x2="14" y2="0" stroke="#556b2f" stroke-width="1.2"/>
    <line x1="11" y1="0" x2="11" y2="3" stroke="#556b2f" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="1.5" fill="#556b2f"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="230" y="85" width="180" height="40" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <text x="320" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#1a1a1a">Session Auth</text>
  <!-- Annotation -->
  <line x1="410" y1="105" x2="435" y2="105" stroke="#e0e0e0" stroke-width="1"/>
  <text x="440" y="110" font-family="Arial, sans-serif" font-size="11" fill="#999999">Validates JWT, extracts user</text>

  <!-- Arrow 2 -->
  <line x1="320" y1="125" x2="320" y2="145" stroke="#556b2f" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Org Membership -->
  <!-- Building + checkmark icon -->
  <g transform="translate(195, 170)">
    <rect x="-6" y="-8" width="12" height="14" rx="1" fill="none" stroke="#556b2f" stroke-width="1.2"/>
    <rect x="-3" y="-5" width="3" height="3" fill="#556b2f"/>
    <rect x="2" y="-5" width="3" height="3" fill="#556b2f"/>
    <rect x="-3" y="0" width="3" height="3" fill="#556b2f"/>
    <!-- Checkmark -->
    <polyline points="8,-2 10,2 14,-4" fill="none" stroke="#556b2f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="230" y="155" width="180" height="40" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <text x="320" y="180" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#1a1a1a">Org Membership</text>
  <!-- Annotation -->
  <line x1="410" y1="175" x2="435" y2="175" stroke="#e0e0e0" stroke-width="1"/>
  <text x="440" y="180" font-family="Arial, sans-serif" font-size="11" fill="#999999">Verifies user belongs to org</text>

  <!-- Arrow 3 -->
  <line x1="320" y1="195" x2="320" y2="215" stroke="#556b2f" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: Role Check -->
  <!-- Shield with levels icon -->
  <g transform="translate(198, 240)">
    <path d="M -8,4 L 0,-8 L 8,4 Q 0,12 -8,4" fill="none" stroke="#556b2f" stroke-width="1.5"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#556b2f" stroke-width="1"/>
    <line x1="-3" y1="3" x2="3" y2="3" stroke="#556b2f" stroke-width="1"/>
    <line x1="-5" y1="-3" x2="5" y2="-3" stroke="#556b2f" stroke-width="1"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="230" y="225" width="180" height="40" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <text x="320" y="250" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#1a1a1a">Role Check</text>
  <!-- Annotation -->
  <line x1="410" y1="245" x2="435" y2="245" stroke="#e0e0e0" stroke-width="1"/>
  <text x="440" y="250" font-family="Arial, sans-serif" font-size="11" fill="#999999">Checks owner/admin/member</text>

  <!-- Arrow 4 -->
  <line x1="320" y1="265" x2="320" y2="280" stroke="#556b2f" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5: Action Executes -->
  <!-- Gear/cog icon -->
  <g transform="translate(198, 305)">
    <circle cx="0" cy="0" r="5" fill="none" stroke="#556b2f" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="2" fill="#556b2f"/>
    <!-- Cog teeth -->
    <line x1="0" y1="-7" x2="0" y2="-9" stroke="#556b2f" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="7" x2="0" y2="9" stroke="#556b2f" stroke-width="2" stroke-linecap="round"/>
    <line x1="-7" y1="0" x2="-9" y2="0" stroke="#556b2f" stroke-width="2" stroke-linecap="round"/>
    <line x1="7" y1="0" x2="9" y2="0" stroke="#556b2f" stroke-width="2" stroke-linecap="round"/>
    <line x1="-5" y1="-5" x2="-6.5" y2="-6.5" stroke="#556b2f" stroke-width="2" stroke-linecap="round"/>
    <line x1="5" y1="-5" x2="6.5" y2="-6.5" stroke="#556b2f" stroke-width="2" stroke-linecap="round"/>
    <line x1="-5" y1="5" x2="-6.5" y2="6.5" stroke="#556b2f" stroke-width="2" stroke-linecap="round"/>
    <line x1="5" y1="5" x2="6.5" y2="6.5" stroke="#556b2f" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="230" y="290" width="180" height="40" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <text x="320" y="315" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#1a1a1a">Action Executes</text>

  <!-- Bottom badge -->
  <g filter="url(#shadow)">
    <rect x="80" y="345" width="640" height="46" rx="23" fill="#556b2f"/>
    <text x="400" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Request --> Auth --> Membership --> Role --> Action</text>
  </g>
</svg>