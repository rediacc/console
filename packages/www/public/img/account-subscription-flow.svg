<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#556b2f"/>
    </marker>
  </defs>

  <rect width="800" height="200" fill="#f5f5f5"/>

  <!-- Step 1: Register -->
  <!-- Person with plus sign icon -->
  <g transform="translate(80, 20)">
    <circle cx="0" cy="0" r="6" fill="#556b2f"/>
    <path d="M -8,14 Q -8,8 0,8 Q 8,8 8,14" fill="#556b2f"/>
    <line x1="12" y1="0" x2="12" y2="10" stroke="#556b2f" stroke-width="2"/>
    <line x1="7" y1="5" x2="17" y2="5" stroke="#556b2f" stroke-width="2"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="18" y="42" width="125" height="60" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <text x="80" y="66" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#1a1a1a">Register</text>
  <text x="80" y="82" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#999999">Create account</text>

  <!-- Arrow 1 -->
  <line x1="143" y1="72" x2="168" y2="72" stroke="#556b2f" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: COMMUNITY -->
  <!-- Price tag icon with $0 -->
  <g transform="translate(240, 20)">
    <path d="M -10,0 L 0,-10 L 10,-3 L 10,7 L 0,14 L -10,7 Z" fill="none" stroke="#556b2f" stroke-width="1.5"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="8" font-weight="700" text-anchor="middle" fill="#556b2f">$0</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="178" y="42" width="125" height="60" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <text x="240" y="66" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#1a1a1a">COMMUNITY</text>
  <text x="240" y="82" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#999999">Free plan</text>

  <!-- Arrow 2 -->
  <line x1="303" y1="72" x2="328" y2="72" stroke="#556b2f" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Checkout -->
  <!-- Credit card icon -->
  <g transform="translate(400, 20)">
    <rect x="-14" y="-8" width="28" height="18" rx="3" fill="none" stroke="#556b2f" stroke-width="1.5"/>
    <line x1="-14" y1="-3" x2="14" y2="-3" stroke="#556b2f" stroke-width="2"/>
    <rect x="-10" y="2" width="8" height="3" rx="1" fill="#556b2f"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="338" y="42" width="125" height="60" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <text x="400" y="66" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#1a1a1a">Checkout</text>
  <text x="400" y="82" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#999999">Stripe payment</text>

  <!-- Arrow 3 -->
  <line x1="463" y1="72" x2="488" y2="72" stroke="#556b2f" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: PROFESSIONAL -->
  <!-- Star/badge icon -->
  <g transform="translate(568, 20)">
    <polygon points="0,-10 3,-4 10,-3 5,2 6,9 0,6 -6,9 -5,2 -10,-3 -3,-4" fill="none" stroke="#556b2f" stroke-width="1.2"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="498" y="42" width="140" height="60" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <text x="568" y="66" font-family="Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#1a1a1a">PROFESSIONAL</text>
  <text x="568" y="82" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#999999">Paid plan</text>

  <!-- Arrow 4 -->
  <line x1="638" y1="72" x2="658" y2="72" stroke="#556b2f" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5: Activate -->
  <!-- Server/machine icon with LED dots -->
  <g transform="translate(725, 20)">
    <rect x="-14" y="-8" width="28" height="18" rx="2" fill="none" stroke="#556b2f" stroke-width="1.5"/>
    <line x1="-14" y1="2" x2="14" y2="2" stroke="#556b2f" stroke-width="1"/>
    <circle cx="-8" cy="-3" r="2" fill="#556b2f"/>
    <circle cx="-2" cy="-3" r="2" fill="#6f8243"/>
    <rect x="4" y="-4" width="8" height="2" rx="1" fill="#999999"/>
    <circle cx="-8" cy="6" r="1.5" fill="#999999"/>
    <circle cx="-2" cy="6" r="1.5" fill="#999999"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="668" y="42" width="115" height="60" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <text x="725" y="62" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#1a1a1a">Activate</text>
  <text x="725" y="78" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#999999">rdc license</text>
  <text x="725" y="90" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#999999">activate</text>

  <!-- Bottom badge -->
  <g filter="url(#shadow)">
    <rect x="80" y="138" width="640" height="46" rx="23" fill="#556b2f"/>
    <text x="400" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Register --> Free Plan --> Upgrade --> Activate Machines</text>
  </g>
</svg>