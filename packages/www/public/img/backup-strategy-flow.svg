<svg viewBox="0 0 800 500" width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="serverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="#f5f5f5"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1a1a1a">Backup Strategy Architecture</text>

  <!-- Left: Config -->
  <g filter="url(#ds)">
    <rect x="30" y="55" width="200" height="180" rx="10" fill="#ffffff" stroke="#3d3d3d" stroke-width="1.5"/>
  </g>
  <text x="130" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1a1a1a">rediacc.json</text>

  <!-- Strategy 1: hourly-hot -->
  <rect x="45" y="90" width="170" height="55" rx="6" fill="#fafafa" stroke="#556b2f" stroke-width="1.5"/>
  <text x="55" y="107" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#556b2f">hourly-hot</text>
  <text x="55" y="122" font-family="Arial, sans-serif" font-size="10" fill="#666">schedule: 0 * * * *</text>
  <text x="55" y="135" font-family="Arial, sans-serif" font-size="10" fill="#666">mode: hot | bwlimit: 6M</text>

  <!-- Strategy 2: nightly-cold -->
  <rect x="45" y="155" width="170" height="55" rx="6" fill="#fafafa" stroke="#999" stroke-width="1.5"/>
  <text x="55" y="172" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#3d3d3d">nightly-cold</text>
  <text x="55" y="187" font-family="Arial, sans-serif" font-size="10" fill="#666">schedule: 0 3 * * *</text>
  <text x="55" y="200" font-family="Arial, sans-serif" font-size="10" fill="#666">mode: cold | exclude: gitlab</text>

  <!-- Center: Machine -->
  <g filter="url(#ds)">
    <rect x="280" y="55" width="220" height="180" rx="10" fill="#ffffff" stroke="#3d3d3d" stroke-width="1.5"/>
  </g>
  <!-- Server icon -->
  <rect x="365" y="62" width="50" height="18" rx="4" fill="url(#serverGrad)" stroke="#3d3d3d"/>
  <circle cx="407" cy="71" r="2" fill="#556b2f"/>
  <text x="390" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1a1a1a">prod-1</text>

  <!-- Repos inside machine -->
  <rect x="295" y="110" width="58" height="28" rx="5" fill="#556b2f"/>
  <text x="324" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">mail</text>

  <rect x="361" y="110" width="58" height="28" rx="5" fill="#556b2f"/>
  <text x="390" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">nextcloud</text>

  <rect x="427" y="110" width="58" height="28" rx="5" fill="#556b2f"/>
  <text x="456" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">sonarqube</text>

  <!-- Excluded repo -->
  <rect x="295" y="148" width="58" height="28" rx="5" fill="#e0e0e0" stroke="#999"/>
  <text x="324" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#999">gitlab</text>
  <line x1="300" y1="152" x2="348" y2="172" stroke="#cc3333" stroke-width="2"/>
  <line x1="348" y1="152" x2="300" y2="172" stroke="#cc3333" stroke-width="2"/>

  <rect x="361" y="148" width="58" height="28" rx="5" fill="#6f8243"/>
  <text x="390" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">marketing</text>

  <text x="390" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#999">BTRFS Datastore</text>

  <!-- Binding arrows: config to machine -->
  <line x1="230" y1="117" x2="278" y2="117" stroke="#556b2f" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="278,113 286,117 278,121" fill="#556b2f"/>
  <line x1="230" y1="182" x2="278" y2="162" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="278,158 286,162 278,166" fill="#999"/>

  <!-- HOT path (top right) -->
  <g filter="url(#ds)">
    <rect x="555" y="55" width="220" height="95" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="1.5"/>
  </g>
  <text x="665" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#556b2f">Hot Backup</text>
  <text x="665" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a1a">BTRFS snapshot while running</text>
  <text x="665" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Zero downtime, crash-consistent</text>
  <circle cx="743" cy="78" r="6" fill="#556b2f"/>
  <text x="743" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">H</text>

  <!-- Arrow: machine to hot -->
  <line x1="500" y1="100" x2="553" y2="100" stroke="#556b2f" stroke-width="2"/>
  <polygon points="553,96 561,100 553,104" fill="#556b2f"/>

  <!-- COLD path (bottom right) -->
  <g filter="url(#ds)">
    <rect x="555" y="165" width="220" height="95" rx="10" fill="#ffffff" stroke="#999" stroke-width="1.5"/>
  </g>
  <text x="665" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#3d3d3d">Cold Backup</text>
  <text x="665" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a1a">Stop, snapshot, restart, upload</text>
  <text x="665" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Brief downtime, app-consistent</text>
  <circle cx="743" cy="188" r="6" fill="#999"/>
  <text x="743" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">C</text>

  <!-- Arrow: machine to cold -->
  <line x1="500" y1="170" x2="553" y2="210" stroke="#999" stroke-width="2"/>
  <polygon points="551,206 559,212 553,215" fill="#999"/>

  <!-- Cloud destination -->
  <g filter="url(#ds)">
    <rect x="555" y="280" width="220" height="50" rx="10" fill="#fafafa" stroke="#3d3d3d" stroke-width="1"/>
  </g>
  <text x="665" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#1a1a1a">Destination</text>
  <text x="665" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Cloud (S3, OneDrive) or Machine</text>

  <!-- Arrow: hot to cloud (right side, avoids overlap) -->
  <path d="M 775 102 L 785 102 L 785 295 L 775 295" fill="none" stroke="#556b2f" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="775,291 775,299 769,295" fill="#556b2f"/>
  <!-- Arrow: cold to cloud -->
  <path d="M 775 212 L 790 212 L 790 305 L 775 305" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="775,301 775,309 769,305" fill="#999"/>

  <!-- Cold flow description -->
  <g filter="url(#ds)">
    <rect x="30" y="280" width="470" height="50" rx="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  </g>
  <text x="265" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#1a1a1a">Cold Backup Sequence</text>
  <text x="265" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Stop  ->  Snapshot  ->  Restart immediately  ->  Upload from snapshot</text>

  <!-- Decorative corner circles -->
  <circle cx="42" cy="462" r="28" fill="#e0e0e0"/>
  <circle cx="758" cy="462" r="28" fill="#e0e0e0"/>

  <!-- Bottom badge -->
  <g filter="url(#ds)">
    <rect x="100" y="370" width="600" height="46" rx="23" fill="#556b2f"/>
    <text x="400" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">
      Named Strategies | Hot/Cold Modes | Machine Binding | Include/Exclude
    </text>
  </g>
</svg>
