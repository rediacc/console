<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#556b2f"/>
    </marker>
  </defs>

  <rect width="800" height="200" fill="#f5f5f5"/>

  <!-- Step 1: Register -->
  <!-- Envelope icon -->
  <g transform="translate(107, 22)">
    <rect x="-14" y="-6" width="28" height="18" rx="2" fill="none" stroke="#556b2f" stroke-width="1.5"/>
    <polyline points="-14,-6 0,6 14,-6" fill="none" stroke="#556b2f" stroke-width="1.5"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="30" y="44" width="155" height="60" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <text x="107" y="68" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#1a1a1a">Register</text>
  <text x="107" y="84" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#999999">Email + Password</text>
  <text x="107" y="96" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#999999">or Magic Link</text>

  <!-- Arrow 1 -->
  <line x1="185" y1="74" x2="215" y2="74" stroke="#556b2f" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Organization Created -->
  <!-- Building icon -->
  <g transform="translate(302, 22)">
    <rect x="-12" y="-8" width="24" height="20" rx="1" fill="none" stroke="#556b2f" stroke-width="1.5"/>
    <rect x="-8" y="-4" width="5" height="4" fill="#556b2f"/>
    <rect x="3" y="-4" width="5" height="4" fill="#556b2f"/>
    <rect x="-8" y="3" width="5" height="4" fill="#556b2f"/>
    <rect x="3" y="3" width="5" height="4" fill="#556b2f"/>
    <rect x="-3" y="6" width="6" height="6" fill="#556b2f"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="225" y="44" width="155" height="60" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <text x="302" y="68" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#1a1a1a">Organization Created</text>
  <text x="302" y="84" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#999999">Named after</text>
  <text x="302" y="96" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#999999">your email</text>

  <!-- Arrow 2 -->
  <line x1="380" y1="74" x2="410" y2="74" stroke="#556b2f" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: COMMUNITY Plan -->
  <!-- Gift/tag icon (circle with ribbon) -->
  <g transform="translate(497, 22)">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#556b2f" stroke-width="1.5"/>
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#556b2f" stroke-width="1"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#556b2f" stroke-width="1"/>
    <path d="M -3,-8 Q -6,-12 -2,-12 Q 0,-12 0,-8" fill="none" stroke="#556b2f" stroke-width="1"/>
    <path d="M 3,-8 Q 6,-12 2,-12 Q 0,-12 0,-8" fill="none" stroke="#556b2f" stroke-width="1"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="420" y="44" width="155" height="60" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <text x="497" y="68" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#1a1a1a">COMMUNITY Plan</text>
  <text x="497" y="84" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#999999">Free, 2 machine slots</text>

  <!-- Arrow 3 -->
  <line x1="575" y1="74" x2="605" y2="74" stroke="#556b2f" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: Default Team -->
  <!-- Three overlapping person silhouettes -->
  <g transform="translate(692, 22)">
    <!-- Back person -->
    <circle cx="-10" cy="-4" r="5" fill="#cccccc"/>
    <path d="M -17,8 Q -17,2 -10,2 Q -3,2 -3,8" fill="#cccccc"/>
    <!-- Middle person -->
    <circle cx="0" cy="-4" r="5" fill="#999999"/>
    <path d="M -7,8 Q -7,2 0,2 Q 7,2 7,8" fill="#999999"/>
    <!-- Front person -->
    <circle cx="10" cy="-4" r="5" fill="#556b2f"/>
    <path d="M 3,8 Q 3,2 10,2 Q 17,2 17,8" fill="#556b2f"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="615" y="44" width="155" height="60" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <text x="692" y="68" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#1a1a1a">Default Team</text>
  <text x="692" y="84" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#999999">All members</text>
  <text x="692" y="96" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#999999">auto-joined</text>

  <!-- Bottom badge -->
  <g filter="url(#shadow)">
    <rect x="130" y="140" width="540" height="46" rx="23" fill="#556b2f"/>
    <text x="400" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Register --> Organization --> Plan --> Team</text>
  </g>
</svg>