<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" width="700" height="300">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#556b2f"/>
    </marker>
  </defs>

  <rect width="700" height="300" fill="#f5f5f5"/>

  <!-- Organization box with building icon -->
  <g filter="url(#shadow)">
    <rect x="240" y="15" width="220" height="50" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <!-- Building icon -->
  <rect x="270" y="27" width="18" height="24" rx="1" fill="none" stroke="#556b2f" stroke-width="1.5"/>
  <rect x="274" y="31" width="4" height="3" fill="#556b2f"/>
  <rect x="280" y="31" width="4" height="3" fill="#556b2f"/>
  <rect x="274" y="37" width="4" height="3" fill="#556b2f"/>
  <rect x="280" y="37" width="4" height="3" fill="#556b2f"/>
  <rect x="276" y="43" width="5" height="8" fill="#556b2f"/>
  <text x="370" y="45" font-family="Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#1a1a1a">Organization</text>

  <!-- Branch lines from Organization -->
  <line x1="290" y1="65" x2="175" y2="95" stroke="#556b2f" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="410" y1="65" x2="525" y2="95" stroke="#556b2f" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Team Alpha box with folder icon -->
  <g filter="url(#shadow)">
    <rect x="55" y="100" width="240" height="50" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <!-- Folder icon -->
  <path d="M 75,112 L 75,108 L 82,108 L 85,112 L 95,112 L 95,128 L 75,128 Z" fill="none" stroke="#556b2f" stroke-width="1.5"/>
  <text x="190" y="130" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#1a1a1a">Team Alpha</text>

  <!-- Team Alpha members -->
  <!-- Owner person with olive dot -->
  <g transform="translate(95, 175)">
    <circle cx="0" cy="0" r="6" fill="#556b2f"/>
    <path d="M -9,16 Q -9,8 0,8 Q 9,8 9,16" fill="#556b2f"/>
    <circle cx="8" cy="-4" r="3" fill="#556b2f" stroke="#ffffff" stroke-width="1"/>
  </g>
  <text x="95" y="200" font-family="Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle" fill="#556b2f">owner</text>

  <!-- Admin person with green dot -->
  <g transform="translate(165, 175)">
    <circle cx="0" cy="0" r="6" fill="#6f8243"/>
    <path d="M -9,16 Q -9,8 0,8 Q 9,8 9,16" fill="#6f8243"/>
    <circle cx="8" cy="-4" r="3" fill="#6f8243" stroke="#ffffff" stroke-width="1"/>
  </g>
  <text x="165" y="200" font-family="Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle" fill="#6f8243">admin</text>

  <!-- Member person with gray dot -->
  <g transform="translate(235, 175)">
    <circle cx="0" cy="0" r="6" fill="#999999"/>
    <path d="M -9,16 Q -9,8 0,8 Q 9,8 9,16" fill="#999999"/>
    <circle cx="8" cy="-4" r="3" fill="#999999" stroke="#ffffff" stroke-width="1"/>
  </g>
  <text x="235" y="200" font-family="Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle" fill="#999999">member</text>

  <!-- Team Beta box with folder icon -->
  <g filter="url(#shadow)">
    <rect x="405" y="100" width="240" height="50" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <!-- Folder icon -->
  <path d="M 425,112 L 425,108 L 432,108 L 435,112 L 445,112 L 445,128 L 425,128 Z" fill="none" stroke="#556b2f" stroke-width="1.5"/>
  <text x="540" y="130" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#1a1a1a">Team Beta</text>

  <!-- Team Beta members -->
  <!-- Admin person with green dot -->
  <g transform="translate(455, 175)">
    <circle cx="0" cy="0" r="6" fill="#6f8243"/>
    <path d="M -9,16 Q -9,8 0,8 Q 9,8 9,16" fill="#6f8243"/>
    <circle cx="8" cy="-4" r="3" fill="#6f8243" stroke="#ffffff" stroke-width="1"/>
  </g>
  <text x="455" y="200" font-family="Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle" fill="#6f8243">admin</text>

  <!-- Member1 person with gray dot -->
  <g transform="translate(525, 175)">
    <circle cx="0" cy="0" r="6" fill="#999999"/>
    <path d="M -9,16 Q -9,8 0,8 Q 9,8 9,16" fill="#999999"/>
    <circle cx="8" cy="-4" r="3" fill="#999999" stroke="#ffffff" stroke-width="1"/>
  </g>
  <text x="525" y="200" font-family="Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle" fill="#999999">member</text>

  <!-- Member2 person with gray dot -->
  <g transform="translate(595, 175)">
    <circle cx="0" cy="0" r="6" fill="#999999"/>
    <path d="M -9,16 Q -9,8 0,8 Q 9,8 9,16" fill="#999999"/>
    <circle cx="8" cy="-4" r="3" fill="#999999" stroke="#ffffff" stroke-width="1"/>
  </g>
  <text x="595" y="200" font-family="Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle" fill="#999999">member</text>

  <!-- Bottom badge -->
  <g filter="url(#shadow)">
    <rect x="100" y="240" width="500" height="46" rx="23" fill="#556b2f"/>
    <text x="350" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Organization --> Teams --> Members</text>
  </g>
</svg>