<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Background -->
  <rect width="800" height="500" fill="#f5f5f5"/>

  <defs>
    <linearGradient id="serverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="hubGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#556b2f"/>
      <stop offset="100%" stop-color="#3d4f22"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#556b2f"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999999"/>
    </marker>
  </defs>

  <!-- ============================================= -->
  <!-- LEFT: Users + OAuth Provider                  -->
  <!-- ============================================= -->

  <!-- User section background -->
  <rect x="20" y="20" width="140" height="290" rx="8" fill="#e0e0e0" opacity="0.25"/>
  <text x="90" y="45" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Users</text>

  <!-- User 1: Alice -->
  <g transform="translate(50, 60)">
    <circle cx="40" cy="18" r="14" fill="#e0e0e0" stroke="#999999" stroke-width="1.5"/>
    <circle cx="40" cy="14" r="5" fill="#999999"/>
    <path d="M28 28 C28 22 52 22 52 28" stroke="#999999" stroke-width="1.5" fill="none"/>
    <text x="40" y="45" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#3d3d3d" font-weight="bold">Alice</text>
  </g>

  <!-- User 2: Bob -->
  <g transform="translate(50, 145)">
    <circle cx="40" cy="18" r="14" fill="#e0e0e0" stroke="#999999" stroke-width="1.5"/>
    <circle cx="40" cy="14" r="5" fill="#999999"/>
    <path d="M28 28 C28 22 52 22 52 28" stroke="#999999" stroke-width="1.5" fill="none"/>
    <text x="40" y="45" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#3d3d3d" font-weight="bold">Bob</text>
  </g>

  <!-- User 3: Carol -->
  <g transform="translate(50, 230)">
    <circle cx="40" cy="18" r="14" fill="#e0e0e0" stroke="#999999" stroke-width="1.5"/>
    <circle cx="40" cy="14" r="5" fill="#999999"/>
    <path d="M28 28 C28 22 52 22 52 28" stroke="#999999" stroke-width="1.5" fill="none"/>
    <text x="40" y="45" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#3d3d3d" font-weight="bold">Carol</text>
  </g>

  <!-- ============================================= -->
  <!-- CENTER: Hub                                   -->
  <!-- ============================================= -->

  <!-- Hub box -->
  <g transform="translate(260, 55)" filter="url(#shadow)">
    <rect width="180" height="200" rx="8" fill="url(#hubGrad)"/>
    <!-- Hub label -->
    <text x="90" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#ffffff">Hub</text>
    <line x1="20" y1="42" x2="160" y2="42" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>

    <!-- Feature list -->
    <text x="90" y="65" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#ffffff" opacity="0.9">OAuth Authentication</text>
    <text x="90" y="85" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#ffffff" opacity="0.9">Per-User Routing</text>
    <text x="90" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#ffffff" opacity="0.9">Container Lifecycle</text>
    <text x="90" y="125" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#ffffff" opacity="0.9">Checkpoint / Restore</text>
    <text x="90" y="145" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#ffffff" opacity="0.9">Idle Reaping</text>

    <!-- Dashboard pill -->
    <rect x="30" y="162" width="120" height="22" rx="11" fill="#ffffff" opacity="0.15"/>
    <text x="90" y="177" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#ffffff" font-weight="bold">/_hub/dashboard</text>
  </g>

  <!-- OAuth Provider box (below hub) -->
  <g transform="translate(290, 290)" filter="url(#shadow)">
    <rect width="120" height="55" rx="6" fill="url(#serverGrad)"/>
    <!-- Lock icon -->
    <rect x="48" y="10" width="24" height="16" rx="3" fill="none" stroke="#999999" stroke-width="1.5"/>
    <path d="M52 10 V6 C52 0 68 0 68 6 V10" stroke="#999999" stroke-width="1.5" fill="none"/>
    <text x="60" y="42" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#999999" font-weight="bold">OAuth2 Provider</text>
  </g>

  <!-- Arrow: Hub -> OAuth (down) -->
  <line x1="350" y1="258" x2="350" y2="287" stroke="#999999" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>
  <text x="370" y="278" font-family="Arial, sans-serif" font-size="8" fill="#999999">verify</text>

  <!-- ============================================= -->
  <!-- Arrows: Users -> Hub                          -->
  <!-- ============================================= -->

  <!-- Alice -> Hub -->
  <path d="M140 95 C200 95, 220 110, 258 120" stroke="#556b2f" stroke-width="1.8" fill="none" stroke-dasharray="6,4" marker-end="url(#arrowGreen)"/>

  <!-- Bob -> Hub -->
  <line x1="140" y1="180" x2="258" y2="160" stroke="#556b2f" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arrowGreen)"/>

  <!-- Carol -> Hub -->
  <path d="M140 265 C200 265, 220 210, 258 200" stroke="#556b2f" stroke-width="1.8" fill="none" stroke-dasharray="6,4" marker-end="url(#arrowGreen)"/>

  <!-- Single URL badge -->
  <rect x="168" y="148" width="80" height="22" rx="11" fill="#556b2f" filter="url(#shadow)"/>
  <text x="208" y="163" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="#ffffff">Single URL</text>

  <!-- ============================================= -->
  <!-- RIGHT: Per-User Containers                    -->
  <!-- ============================================= -->

  <!-- Container section background -->
  <rect x="500" y="20" width="280" height="310" rx="8" fill="#e0e0e0" opacity="0.15"/>
  <text x="640" y="45" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Per-User Containers</text>

  <!-- Arrows: Hub -> Containers -->
  <path d="M442 110 C470 110, 490 80, 505 80" stroke="#556b2f" stroke-width="1.8" fill="none" stroke-dasharray="6,4" marker-end="url(#arrowGreen)"/>
  <path d="M442 155 C470 155, 490 165, 505 165" stroke="#556b2f" stroke-width="1.8" fill="none" stroke-dasharray="6,4" marker-end="url(#arrowGreen)"/>
  <path d="M442 200 C470 200, 490 250, 505 250" stroke="#556b2f" stroke-width="1.8" fill="none" stroke-dasharray="6,4" marker-end="url(#arrowGreen)"/>

  <!-- Container 1: Alice -->
  <g transform="translate(510, 55)" filter="url(#shadow)">
    <rect width="250" height="60" rx="6" fill="none" stroke="#556b2f" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="10" y="18" font-family="Arial, sans-serif" font-size="10" fill="#3d3d3d" font-weight="bold">Alice</text>
    <!-- Service pills -->
    <rect x="10" y="28" width="55" height="20" rx="4" fill="rgba(85,107,47,0.12)" stroke="#556b2f" stroke-width="1"/>
    <text x="37" y="42" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#556b2f" font-weight="bold">:8080 code</text>
    <rect x="72" y="28" width="55" height="20" rx="4" fill="rgba(85,107,47,0.12)" stroke="#556b2f" stroke-width="1"/>
    <text x="99" y="42" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#556b2f" font-weight="bold">:7681 term</text>
    <rect x="134" y="28" width="65" height="20" rx="4" fill="rgba(85,107,47,0.12)" stroke="#556b2f" stroke-width="1"/>
    <text x="166" y="42" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#556b2f" font-weight="bold">:6080 desktop</text>
    <!-- Status LED -->
    <circle cx="235" cy="15" r="4" fill="#556b2f" opacity="0.9"/>
  </g>

  <!-- Container 2: Bob -->
  <g transform="translate(510, 140)" filter="url(#shadow)">
    <rect width="250" height="60" rx="6" fill="none" stroke="#556b2f" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="10" y="18" font-family="Arial, sans-serif" font-size="10" fill="#3d3d3d" font-weight="bold">Bob</text>
    <rect x="10" y="28" width="55" height="20" rx="4" fill="rgba(85,107,47,0.12)" stroke="#556b2f" stroke-width="1"/>
    <text x="37" y="42" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#556b2f" font-weight="bold">:8080 code</text>
    <rect x="72" y="28" width="55" height="20" rx="4" fill="rgba(85,107,47,0.12)" stroke="#556b2f" stroke-width="1"/>
    <text x="99" y="42" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#556b2f" font-weight="bold">:7681 term</text>
    <rect x="134" y="28" width="65" height="20" rx="4" fill="rgba(85,107,47,0.12)" stroke="#556b2f" stroke-width="1"/>
    <text x="166" y="42" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#556b2f" font-weight="bold">:6080 desktop</text>
    <circle cx="235" cy="15" r="4" fill="#556b2f" opacity="0.9"/>
  </g>

  <!-- Container 3: Carol -->
  <g transform="translate(510, 225)" filter="url(#shadow)">
    <rect width="250" height="60" rx="6" fill="none" stroke="#556b2f" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="10" y="18" font-family="Arial, sans-serif" font-size="10" fill="#3d3d3d" font-weight="bold">Carol</text>
    <rect x="10" y="28" width="55" height="20" rx="4" fill="rgba(85,107,47,0.12)" stroke="#556b2f" stroke-width="1"/>
    <text x="37" y="42" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#556b2f" font-weight="bold">:8080 code</text>
    <rect x="72" y="28" width="55" height="20" rx="4" fill="rgba(85,107,47,0.12)" stroke="#556b2f" stroke-width="1"/>
    <text x="99" y="42" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#556b2f" font-weight="bold">:7681 term</text>
    <rect x="134" y="28" width="65" height="20" rx="4" fill="rgba(85,107,47,0.12)" stroke="#556b2f" stroke-width="1"/>
    <text x="166" y="42" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#556b2f" font-weight="bold">:6080 desktop</text>
    <circle cx="235" cy="15" r="4" fill="#556b2f" opacity="0.6"/>
  </g>

  <!-- On-Demand badge -->
  <rect x="578" y="300" width="100" height="22" rx="11" fill="#556b2f" filter="url(#shadow)"/>
  <text x="628" y="315" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff">On-Demand</text>

  <!-- ============================================= -->
  <!-- BOTTOM: Feature badges                        -->
  <!-- ============================================= -->

  <rect x="60" y="370" width="680" height="36" rx="18" fill="#556b2f" filter="url(#shadow)"/>
  <text x="400" y="393" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">Any OAuth2 Provider  |  Label-Driven Config  |  CRIU Checkpoint  |  Self-Service Dashboard</text>

  <!-- Flow description -->
  <text x="400" y="430" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#999999">Users visit a single URL. The Hub authenticates via OAuth, detects the user, and routes to their personal container.</text>
  <text x="400" y="445" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#999999">Idle containers are checkpointed for instant resume. All configuration lives in docker-compose labels.</text>

  <!-- Decorative circles -->
  <circle cx="35" cy="485" r="16" fill="#e0e0e0" opacity="0.3"/>
  <circle cx="75" cy="490" r="10" fill="#556b2f" opacity="0.1"/>
  <circle cx="750" cy="488" r="14" fill="#e0e0e0" opacity="0.25"/>
  <circle cx="775" cy="492" r="8" fill="#556b2f" opacity="0.1"/>

</svg>
