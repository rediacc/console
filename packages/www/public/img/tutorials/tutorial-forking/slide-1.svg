<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title">
  <title id="title">A parent repository fans out into independent forks; each fork is its own clone</title>
  <style>
    .bg { fill: #f7f7f6; }
    .parent { fill: #eef2e6; stroke: #556b2f; stroke-width: 2.5; rx: 12; ry: 12; }
    .clone { fill: #ffffff; stroke: #cdcdcd; stroke-width: 2; rx: 12; ry: 12; }
    .title { fill: #1a1a1a; font-weight: 700; font-size: 22px; font-family: JetBrainsMono, "JetBrains Mono", monospace; text-anchor: middle; }
    .label { fill: #5e5e5e; font-weight: 400; font-size: 14px; font-family: Inter, system-ui, sans-serif; text-anchor: middle; letter-spacing: 0.05em; text-transform: uppercase; }
    .edge { stroke: #556b2f; stroke-width: 2.5; fill: none; }
  </style>
  <rect class="bg" width="960" height="540"/>

  <text class="label" x="480" y="100">parent</text>
  <rect class="parent" x="380" y="120" width="200" height="80"/>
  <text class="title" x="480" y="167">my-app</text>

  <!-- edges -->
  <path class="edge" d="M 480 200 V 240 H 200 V 320" marker-end="url(#fa)"/>
  <path class="edge" d="M 480 200 V 320" marker-end="url(#fa)"/>
  <path class="edge" d="M 480 200 V 240 H 760 V 320" marker-end="url(#fa)"/>

  <text class="label" x="480" y="380">forks</text>
  <rect class="clone" x="100" y="320" width="200" height="80"/>
  <text class="title" x="200" y="367">my-app:a</text>
  <rect class="clone" x="380" y="320" width="200" height="80"/>
  <text class="title" x="480" y="367">my-app:b</text>
  <rect class="clone" x="660" y="320" width="200" height="80"/>
  <text class="title" x="760" y="367">my-app:c</text>

  <text x="480" y="460" fill="#556b2f" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" text-anchor="middle">independent · isolated · instant</text>

  <defs>
    <marker id="fa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#556b2f"/>
    </marker>
  </defs>
</svg>
