<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title">
  <title id="title">Five forks of a 100 GB repository still cost about 100 GB total — you only pay for what changes</title>
  <style>
    .bg { fill: #f7f7f6; }
    .axis { stroke: #cdcdcd; stroke-width: 1.5; }
    .bar-base { fill: #556b2f; }
    .bar-delta { fill: #b9c7a3; stroke: #556b2f; stroke-width: 1.5; stroke-dasharray: 4 3; }
    .bar-label { fill: #1a1a1a; font-weight: 700; font-size: 16px; font-family: JetBrainsMono, "JetBrains Mono", monospace; text-anchor: middle; }
    .row-label { fill: #1a1a1a; font-weight: 600; font-size: 18px; font-family: Inter, system-ui, sans-serif; text-anchor: end; }
    .x-label { fill: #5e5e5e; font-weight: 400; font-size: 14px; font-family: Inter, system-ui, sans-serif; text-anchor: middle; }
    .closer { fill: #556b2f; font-weight: 600; font-size: 22px; font-family: Inter, system-ui, sans-serif; text-anchor: middle; }
  </style>
  <rect class="bg" width="960" height="540"/>

  <text class="row-label" x="240" y="116">parent</text>
  <text class="row-label" x="240" y="172">+ fork 1</text>
  <text class="row-label" x="240" y="228">+ fork 2</text>
  <text class="row-label" x="240" y="284">+ fork 3</text>
  <text class="row-label" x="240" y="340">+ fork 4</text>
  <text class="row-label" x="240" y="396">+ fork 5</text>

  <!-- Bars: parent is full; each fork adds tiny delta -->
  <rect class="bar-base" x="270" y="98" width="320" height="28" rx="4"/>
  <text class="bar-label" x="430" y="118" fill="#fff">100 GB</text>

  <rect class="bar-base" x="270" y="154" width="320" height="28" rx="4"/>
  <rect class="bar-delta" x="590" y="154" width="14" height="28" rx="2"/>
  <text class="bar-label" x="430" y="174" fill="#fff">100 GB</text>
  <text class="bar-label" x="624" y="174">+0.5</text>

  <rect class="bar-base" x="270" y="210" width="320" height="28" rx="4"/>
  <rect class="bar-delta" x="590" y="210" width="22" height="28" rx="2"/>
  <text class="bar-label" x="430" y="230" fill="#fff">100 GB</text>
  <text class="bar-label" x="638" y="230">+0.8</text>

  <rect class="bar-base" x="270" y="266" width="320" height="28" rx="4"/>
  <rect class="bar-delta" x="590" y="266" width="14" height="28" rx="2"/>
  <text class="bar-label" x="430" y="286" fill="#fff">100 GB</text>
  <text class="bar-label" x="624" y="286">+0.5</text>

  <rect class="bar-base" x="270" y="322" width="320" height="28" rx="4"/>
  <rect class="bar-delta" x="590" y="322" width="18" height="28" rx="2"/>
  <text class="bar-label" x="430" y="342" fill="#fff">100 GB</text>
  <text class="bar-label" x="630" y="342">+0.7</text>

  <rect class="bar-base" x="270" y="378" width="320" height="28" rx="4"/>
  <rect class="bar-delta" x="590" y="378" width="10" height="28" rx="2"/>
  <text class="bar-label" x="430" y="398" fill="#fff">100 GB</text>
  <text class="bar-label" x="618" y="398">+0.3</text>

  <line class="axis" x1="270" y1="426" x2="700" y2="426"/>
  <text class="x-label" x="270" y="452">0</text>
  <text class="x-label" x="700" y="452">disk</text>

  <text class="closer" x="480" y="500">your disk won't even notice</text>
</svg>
