<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title">
  <title id="title">VS Code runs inside the repo sandbox: the editor, its terminal, and every child process stop at the repo's walls</title>
  <style>
    .bg { fill: #f7f7f6; }
    .machine { fill: #ffffff; stroke: #cdcdcd; stroke-width: 2; rx: 10; ry: 10; }
    .sandbox { fill: #eef3fb; stroke: #2b5fb8; stroke-width: 2.5; rx: 8; ry: 8; stroke-dasharray: 7 5; }
    .editor { fill: #ffffff; stroke: #2b5fb8; stroke-width: 2; rx: 4; ry: 4; }
    .label { fill: #1a1a1a; font-weight: 700; font-size: 18px; font-family: JetBrainsMono, "JetBrains Mono", monospace; text-anchor: middle; }
    .small { fill: #1a1a1a; font-weight: 600; font-size: 13px; font-family: JetBrainsMono, "JetBrains Mono", monospace; }
    .denied { fill: #b3372d; font-weight: 600; font-size: 13px; font-family: JetBrainsMono, "JetBrains Mono", monospace; }
    .desc { fill: #5e5e5e; font-weight: 400; font-size: 14px; font-family: Inter, system-ui, sans-serif; text-anchor: middle; }
    .arrow { stroke: #2b5fb8; stroke-width: 2.5; fill: none; }
    .arrow-label { fill: #2b5fb8; font-weight: 600; font-size: 15px; font-family: Inter, system-ui, sans-serif; text-anchor: middle; }
    .closer { fill: #1a1a1a; font-weight: 600; font-size: 22px; font-family: Inter, system-ui, sans-serif; text-anchor: middle; }
  </style>
  <rect class="bg" width="960" height="540"/>

  <!-- Browser on the left -->
  <rect class="machine" x="60" y="150" width="220" height="150"/>
  <text class="label" x="170" y="180">your browser</text>
  <text class="desc" x="170" y="210">any OS — nothing to install</text>
  <text class="desc" x="170" y="232">localhost, over SSH</text>

  <!-- Tunnel arrow -->
  <path class="arrow" d="M 290 225 L 380 225"/>
  <path class="arrow" d="M 370 218 L 380 225 L 370 232"/>
  <text class="arrow-label" x="335" y="208">tunnel</text>

  <!-- Machine with sandbox -->
  <rect class="machine" x="395" y="80" width="500" height="330"/>
  <text class="label" x="645" y="110">server</text>

  <rect class="sandbox" x="425" y="130" width="440" height="220"/>
  <text class="small" x="445" y="158">repo sandbox (kernel-enforced)</text>

  <rect class="editor" x="445" y="175" width="400" height="120"/>
  <text class="small" x="465" y="200">VS Code · file tree = repo only</text>
  <text class="small" x="465" y="226">$ pwd &amp;&amp; ls   ✓ repo files</text>
  <text class="denied" x="465" y="252">$ ls /        ✗ Permission denied</text>
  <text class="denied" x="465" y="278">$ ls /home    ✗ Permission denied</text>

  <text class="desc" x="645" y="378">other repos and the host stay invisible</text>

  <text class="closer" x="480" y="470">The editor gets exactly what the repo gets. Nothing more.</text>
</svg>
