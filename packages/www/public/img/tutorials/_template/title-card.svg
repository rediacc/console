<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1a2740"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect x="0" y="1010" width="1920" height="6" fill="#00d68f"/>
  <g opacity="{{HEADER_OPACITY}}">
    <text x="160" y="200" font-family="JetBrains Mono, monospace" font-size="36" fill="#00d68f" letter-spacing="6">REDIACC TUTORIAL</text>
    <text x="160" y="340" font-family="Inter, sans-serif" font-size="96" font-weight="700" fill="#ffffff">{{TITLE}}</text>
    <text x="160" y="400" font-family="Inter, sans-serif" font-size="32" fill="#8aa0c2">{{SUBTITLE}}</text>
  </g>

  <g opacity="{{ITEM_1_OPACITY}}">
    <text x="160" y="510" font-family="JetBrains Mono, monospace" font-size="34" fill="#00d68f">{{ITEM_1_LABEL}}</text>
    <text x="640" y="510" font-family="JetBrains Mono, monospace" font-size="34" fill="#ffffff">{{ITEM_1_COMMAND}}</text>
  </g>
