<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title">
  <title id="title">After fork, the secrets list on the fork is empty — credentials don't follow the fork</title>
  <style>
    .bg { fill: #f7f7f6; }
    .repo { fill: #ffffff; stroke: #cdcdcd; stroke-width: 2; rx: 10; ry: 10; }
    .vault-fill { fill: #eef2e6; stroke: #556b2f; stroke-width: 2; rx: 4; ry: 4; }
    .vault-empty { fill: #ffffff; stroke: #556b2f; stroke-width: 2; stroke-dasharray: 6 4; rx: 4; ry: 4; }
    .label { fill: #1a1a1a; font-weight: 700; font-size: 18px; font-family: JetBrainsMono, "JetBrains Mono", monospace; text-anchor: middle; }
    .secret { fill: #556b2f; font-weight: 600; font-size: 13px; font-family: JetBrainsMono, "JetBrains Mono", monospace; }
    .desc { fill: #5e5e5e; font-weight: 400; font-size: 14px; font-family: Inter, system-ui, sans-serif; text-anchor: middle; }
    .empty { fill: #5e5e5e; font-weight: 400; font-size: 16px; font-family: Inter, system-ui, sans-serif; text-anchor: middle; font-style: italic; }
    .arrow { stroke: #556b2f; stroke-width: 2.5; fill: none; }
    .closer { fill: #556b2f; font-weight: 600; font-size: 22px; font-family: Inter, system-ui, sans-serif; text-anchor: middle; }
  </style>
  <rect class="bg" width="960" height="540"/>

  <!-- Parent repo with secrets -->
  <rect class="repo" x="80" y="120" width="240" height="220"/>
  <text class="label" x="200" y="148">my-app</text>
  <rect class="vault-fill" x="100" y="170" width="200" height="140"/>
  <text class="secret" x="118" y="194">DB_HOST</text>
  <text class="secret" x="118" y="216">STRIPE_KEY</text>
  <text class="secret" x="118" y="238">API_TOKEN</text>
  <text class="desc" x="200" y="290" fill="#556b2f">3 secrets</text>
  <text class="desc" x="200" y="358">parent</text>

  <!-- Fork repo with empty vault -->
  <rect class="repo" x="640" y="120" width="240" height="220"/>
  <text class="label" x="760" y="148">my-app:test</text>
  <rect class="vault-empty" x="660" y="170" width="200" height="140"/>
  <text class="empty" x="760" y="244">empty</text>
  <text class="desc" x="760" y="358">fork</text>

  <!-- Fork arrow -->
  <path class="arrow" d="M 320 220 L 640 220" marker-end="url(#ax)"/>
  <text class="label" x="480" y="208" fill="#556b2f">fork</text>

  <text class="closer" x="480" y="448">the fork can't pretend to be you</text>

  <defs>
    <marker id="ax" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#556b2f"/>
    </marker>
  </defs>
</svg>
