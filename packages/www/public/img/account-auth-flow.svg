<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#556b2f"/>
    </marker>
  </defs>

  <rect width="800" height="300" fill="#f5f5f5"/>

  <!-- Step 1: Login -->
  <!-- Key icon -->
  <g transform="translate(68, 32)">
    <circle cx="0" cy="0" r="7" fill="none" stroke="#556b2f" stroke-width="1.5"/>
    <line x1="7" y1="0" x2="20" y2="0" stroke="#556b2f" stroke-width="1.5"/>
    <line x1="16" y1="0" x2="16" y2="4" stroke="#556b2f" stroke-width="1.5"/>
    <line x1="20" y1="0" x2="20" y2="4" stroke="#556b2f" stroke-width="1.5"/>
    <circle cx="-2" cy="0" r="2" fill="#556b2f"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="40" y="50" width="120" height="45" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <text x="100" y="78" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#1a1a1a">Login</text>

  <!-- Arrow Login -> Decision -->
  <line x1="160" y1="72" x2="218" y2="72" stroke="#556b2f" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Decision diamond: 2FA Enabled? with shield + question mark -->
  <g filter="url(#shadow)">
    <polygon points="310,35 400,72 310,110 220,72" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <!-- Shield with question mark inside diamond -->
  <path d="M 305,58 L 310,52 L 315,58 Q 310,66 305,58" fill="none" stroke="#556b2f" stroke-width="1.2"/>
  <text x="310" y="63" font-family="Arial, sans-serif" font-size="6" font-weight="700" text-anchor="middle" fill="#556b2f">?</text>
  <text x="310" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#1a1a1a">2FA</text>
  <text x="310" y="90" font-family="Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#1a1a1a">Enabled?</text>

  <!-- "yes" branch: down -->
  <line x1="310" y1="110" x2="310" y2="140" stroke="#556b2f" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="325" y="130" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#556b2f">yes</text>

  <!-- "no" branch: right -->
  <line x1="400" y1="72" x2="490" y2="72" stroke="#556b2f" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="445" y="64" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#556b2f">no</text>

  <!-- Enter Code box (below decision) -->
  <!-- Phone/device icon with digit boxes -->
  <g transform="translate(278, 137)">
    <rect x="-10" y="-8" width="20" height="14" rx="2" fill="none" stroke="#556b2f" stroke-width="1.2"/>
    <rect x="-7" y="-5" width="4" height="5" rx="1" fill="#556b2f" opacity="0.3"/>
    <rect x="-1" y="-5" width="4" height="5" rx="1" fill="#556b2f" opacity="0.3"/>
    <rect x="5" y="-5" width="4" height="5" rx="1" fill="#556b2f" opacity="0.3"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="240" y="150" width="140" height="45" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <text x="310" y="178" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#1a1a1a">Enter Code</text>

  <!-- Arrow from Enter Code -> JWT -->
  <line x1="380" y1="172" x2="490" y2="125" stroke="#556b2f" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- JWT + Refresh Token box -->
  <!-- Ticket/token icon with perforated edge -->
  <g transform="translate(548, 50)">
    <rect x="-16" y="-8" width="32" height="16" rx="3" fill="none" stroke="#556b2f" stroke-width="1.2"/>
    <line x1="-4" y1="-8" x2="-4" y2="8" stroke="#556b2f" stroke-width="1" stroke-dasharray="2,2"/>
    <circle cx="6" cy="0" r="3" fill="none" stroke="#556b2f" stroke-width="1"/>
    <text x="6" y="2" font-family="Arial, sans-serif" font-size="4" font-weight="700" text-anchor="middle" fill="#556b2f">J</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="500" y="50" width="180" height="45" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <text x="590" y="78" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#1a1a1a">JWT + Refresh Token</text>

  <!-- Arrow JWT -> Auto-refresh -->
  <line x1="590" y1="95" x2="590" y2="140" stroke="#556b2f" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Auto-refresh box -->
  <!-- Circular arrow icon -->
  <g transform="translate(508, 148)">
    <path d="M 4,-8 A 8,8 0 1,1 -4,-8" fill="none" stroke="#556b2f" stroke-width="1.5"/>
    <polygon points="-4,-8 -1,-12 -7,-10" fill="#556b2f"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="480" y="150" width="220" height="45" rx="10" fill="#ffffff" stroke="#556b2f" stroke-width="2"/>
  </g>
  <text x="590" y="172" font-family="Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#1a1a1a">Auto-refresh every 15 min</text>

  <!-- Bottom badge -->
  <g filter="url(#shadow)">
    <rect x="70" y="238" width="660" height="46" rx="23" fill="#556b2f"/>
    <text x="400" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Login --> 2FA Verification --> Token Issued --> Auto-Refresh</text>
  </g>
</svg>
