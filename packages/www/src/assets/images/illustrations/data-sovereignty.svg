<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="A US court order pulls red files out of the back of your dark data box while you stand facing away and are never told.">
  <title>A US court order pulls red files out of the back of your dark data box while you stand facing away and are never told.</title>

  <rect width="800" height="450" fill="#f5f5f5"/>

  <!-- You are not told label + leader to customer head -->
  <text x="155" y="118" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="28" font-weight="700" fill="#1a1a1a" text-anchor="middle">You are not told</text>
  <line x1="145" y1="130" x2="125" y2="188" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- Customer figure (back turned, on left) -->
  <circle cx="125" cy="218" r="30" fill="#2d2d2d"/>
  <path d="M 80 248 L 170 248 L 188 370 L 62 370 Z" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- Data box (center) -->
  <rect x="240" y="180" width="220" height="200" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Open back panel: red gap showing the box is being emptied -->
  <rect x="455" y="200" width="10" height="160" fill="#8b0000" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- Your data label on the box -->
  <text x="350" y="295" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="32" font-weight="700" fill="#f5f5f5" text-anchor="middle">Your data</text>

  <!-- File stream arrow from box back curving up to gavel -->
  <path d="M 470 270 Q 510 220 555 222" fill="none" stroke="#8b0000" stroke-width="4" stroke-dasharray="8,5"/>
  <polygon points="568,222 552,214 552,232" fill="#8b0000"/>

  <!-- Files along the trail -->
  <g transform="translate(495, 252)">
    <path d="M -14 -18 L 6 -18 L 16 -8 L 16 18 L -14 18 Z" fill="#8b0000" stroke="#1a1a1a" stroke-width="2.5"/>
    <path d="M 6 -18 L 6 -8 L 16 -8" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
    <line x1="-8" y1="-2" x2="10" y2="-2" stroke="#f5f5f5" stroke-width="2.5"/>
    <line x1="-8" y1="7" x2="6" y2="7" stroke="#f5f5f5" stroke-width="2.5"/>
  </g>
  <g transform="translate(528, 232)">
    <path d="M -14 -18 L 6 -18 L 16 -8 L 16 18 L -14 18 Z" fill="#8b0000" stroke="#1a1a1a" stroke-width="2.5"/>
    <path d="M 6 -18 L 6 -8 L 16 -8" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
    <line x1="-8" y1="-2" x2="10" y2="-2" stroke="#f5f5f5" stroke-width="2.5"/>
    <line x1="-8" y1="7" x2="6" y2="7" stroke="#f5f5f5" stroke-width="2.5"/>
  </g>

  <!-- Court paper (under gavel, drawn as a clear document) -->
  <rect x="520" y="280" width="260" height="130" fill="#f5f5f5" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Red header banner -->
  <rect x="520" y="280" width="260" height="34" fill="#8b0000" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Folded top-right corner -->
  <path d="M 760 280 L 780 280 L 780 300 Z" fill="#1a1a1a"/>
  <!-- Decorative content lines on paper -->
  <line x1="540" y1="338" x2="760" y2="338" stroke="#1a1a1a" stroke-width="2.5"/>
  <line x1="540" y1="356" x2="710" y2="356" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- US court order label on the paper -->
  <text x="650" y="392" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="30" font-weight="700" fill="#1a1a1a" text-anchor="middle">US court order</text>

  <!-- Gavel handle -->
  <rect x="555" y="212" width="100" height="22" fill="#8b0000" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Gavel head -->
  <rect x="640" y="185" width="100" height="80" fill="#8b0000" stroke="#1a1a1a" stroke-width="2.5" rx="6"/>
  <!-- Head bands -->
  <line x1="660" y1="185" x2="660" y2="265" stroke="#1a1a1a" stroke-width="2.5"/>
  <line x1="720" y1="185" x2="720" y2="265" stroke="#1a1a1a" stroke-width="2.5"/>
</svg>
