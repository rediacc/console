<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3d3d3d;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#f5f5f5"/>

  <!-- VS divider -->
  <line x1="400" y1="40" x2="400" y2="410" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ============================ -->
  <!-- LEFT: CLOUD Act exposed      -->
  <!-- ============================ -->
  <g transform="translate(80, 60)" filter="url(#shadow)">
    <rect width="240" height="320" rx="10" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
    <rect x="0" y="0" width="240" height="32" rx="10" fill="#1a1a1a"/>
    <rect x="0" y="20" width="240" height="12" fill="#1a1a1a"/>
    <text x="120" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#f5f5f5" font-weight="bold">US-JURISDICTIONAL CLOUD</text>
  </g>

  <!-- Cloud shape with stripes (US flag motif) -->
  <g transform="translate(110, 120)">
    <path d="M30 50 C10 50 0 35 15 25 C10 5 35 0 50 12 C60 0 90 0 100 15 C125 5 145 25 130 45 C150 50 145 70 130 70 L30 70 Z"
          fill="url(#cloudGrad)" stroke="#1a1a1a" stroke-width="1"/>
    <!-- Stripes on cloud (US flag hint) -->
    <line x1="20" y1="55" x2="140" y2="55" stroke="#999" stroke-width="1.5" opacity="0.4"/>
    <line x1="20" y1="60" x2="140" y2="60" stroke="#e0e0e0" stroke-width="1.5" opacity="0.4"/>
    <line x1="20" y1="65" x2="140" y2="65" stroke="#999" stroke-width="1.5" opacity="0.4"/>
    <!-- Star block (top-left of cloud) -->
    <rect x="22" y="32" width="36" height="20" fill="#3d3d3d"/>
    <g fill="#e0e0e0">
      <circle cx="28" cy="38" r="1.3"/>
      <circle cx="36" cy="38" r="1.3"/>
      <circle cx="44" cy="38" r="1.3"/>
      <circle cx="52" cy="38" r="1.3"/>
      <circle cx="32" cy="44" r="1.3"/>
      <circle cx="40" cy="44" r="1.3"/>
      <circle cx="48" cy="44" r="1.3"/>
    </g>
  </g>

  <!-- Customer data inside the cloud (visible, accessible) -->
  <g transform="translate(130, 215)">
    <rect width="100" height="60" rx="4" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
    <text x="50" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1a1a1a" font-weight="bold">CUSTOMER DATA</text>
    <rect x="8" y="22" width="60" height="4" rx="1" fill="#556b2f" opacity="0.5"/>
    <rect x="8" y="30" width="48" height="4" rx="1" fill="#556b2f" opacity="0.5"/>
    <rect x="8" y="38" width="68" height="4" rx="1" fill="#556b2f" opacity="0.5"/>
    <rect x="8" y="46" width="42" height="4" rx="1" fill="#556b2f" opacity="0.5"/>
    <!-- Eye = visible -->
    <ellipse cx="86" cy="38" rx="8" ry="5" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
    <circle cx="86" cy="38" r="2" fill="#1a1a1a"/>
  </g>

  <!-- CLOUD Act subpoena (compact, placed in upper-right of the card, NOT overlapping
       the card header or the cloud body — the piercing motion is shown by the arrow only) -->
  <g transform="translate(248, 96) rotate(10)">
    <rect width="60" height="64" rx="2" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="30" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#1a1a1a" font-weight="bold">CLOUD ACT</text>
    <text x="30" y="23" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#1a1a1a">SUBPOENA</text>
    <line x1="8" y1="30" x2="52" y2="30" stroke="#999" stroke-width="0.7"/>
    <line x1="8" y1="36" x2="46" y2="36" stroke="#999" stroke-width="0.7"/>
    <line x1="8" y1="42" x2="50" y2="42" stroke="#999" stroke-width="0.7"/>
    <!-- Seal -->
    <circle cx="30" cy="54" r="5" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
    <circle cx="30" cy="54" r="2.4" fill="#1a1a1a"/>
  </g>

  <!-- Subpoena arrow piercing through cloud boundary into customer data -->
  <g stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="4,3" fill="none" opacity="0.7">
    <line x1="270" y1="170" x2="220" y2="222"/>
    <polyline points="215,215 220,222 227,221" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Open / broken padlock at bottom of left card -->
  <g transform="translate(168, 320)">
    <rect x="0" y="14" width="28" height="22" rx="3" fill="#3d3d3d"/>
    <!-- Broken shackle: left half down, right half tilted -->
    <path d="M4 14 L4 8 C4 1 12 -1 16 2" fill="none" stroke="#3d3d3d" stroke-width="3"/>
    <path d="M30 4 L36 -2" fill="none" stroke="#3d3d3d" stroke-width="3" stroke-linecap="round"/>
    <!-- crack mark on body -->
    <polyline points="10,20 14,25 12,30 16,33" fill="none" stroke="#999" stroke-width="1.2"/>
  </g>

  <!-- Bottom label -->
  <text x="200" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a1a">Provider holds the keys</text>
  <text x="200" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#999">CLOUD Act compulsion reaches in</text>

  <!-- ============================ -->
  <!-- RIGHT: Rediacc EU sovereign  -->
  <!-- ============================ -->
  <g transform="translate(480, 60)" filter="url(#shadow)">
    <rect width="240" height="320" rx="10" fill="#fff" stroke="#556b2f" stroke-width="2"/>
    <rect x="0" y="0" width="240" height="32" rx="10" fill="#556b2f"/>
    <rect x="0" y="20" width="240" height="12" fill="#556b2f"/>
    <text x="120" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#f5f5f5" font-weight="bold">SOVEREIGN BY ARCHITECTURE</text>
  </g>

  <!-- EU flag ring (12 stars in a circle around the server) -->
  <!-- Star geometry copied from public/assets/images/flags/eu.svg so it matches the EU flag used by RegionPickerModal -->
  <defs>
    <g id="eu-star">
      <g id="eu-star-b">
        <path id="eu-star-a" d="M0 0v1h.5z" transform="rotate(18 3.157 -.5)"/>
        <use href="#eu-star-a" transform="scale(-1 1)"/>
      </g>
      <g id="eu-star-c">
        <use href="#eu-star-b" transform="rotate(72)"/>
        <use href="#eu-star-b" transform="rotate(144)"/>
      </g>
      <use href="#eu-star-c" transform="scale(-1 1)"/>
    </g>
  </defs>
  <g transform="translate(600, 195)" fill="#556b2f">
    <circle r="62" fill="none" stroke="#556b2f" stroke-width="1.5" stroke-dasharray="2,3" opacity="0.6"/>
    <use href="#eu-star" transform="translate(0,-58)     scale(4)"/>
    <use href="#eu-star" transform="translate(29,-50.2)  scale(4)"/>
    <use href="#eu-star" transform="translate(50.2,-29)  scale(4)"/>
    <use href="#eu-star" transform="translate(58,0)      scale(4)"/>
    <use href="#eu-star" transform="translate(50.2,29)   scale(4)"/>
    <use href="#eu-star" transform="translate(29,50.2)   scale(4)"/>
    <use href="#eu-star" transform="translate(0,58)      scale(4)"/>
    <use href="#eu-star" transform="translate(-29,50.2)  scale(4)"/>
    <use href="#eu-star" transform="translate(-50.2,29)  scale(4)"/>
    <use href="#eu-star" transform="translate(-58,0)     scale(4)"/>
    <use href="#eu-star" transform="translate(-50.2,-29) scale(4)"/>
    <use href="#eu-star" transform="translate(-29,-50.2) scale(4)"/>
  </g>

  <!-- Server (self-hosted) inside the EU ring -->
  <g transform="translate(574, 167)">
    <rect width="52" height="58" rx="4" fill="url(#serverGrad)" stroke="#1a1a1a" stroke-width="1"/>
    <!-- Rack slots -->
    <line x1="4" y1="14" x2="48" y2="14" stroke="#556b2f" stroke-width="0.8"/>
    <circle cx="44" cy="11" r="1.3" fill="#556b2f"/>
    <line x1="4" y1="28" x2="48" y2="28" stroke="#556b2f" stroke-width="0.8"/>
    <circle cx="44" cy="25" r="1.3" fill="#556b2f"/>
    <line x1="4" y1="42" x2="48" y2="42" stroke="#556b2f" stroke-width="0.8"/>
    <circle cx="44" cy="39" r="1.3" fill="#556b2f"/>
    <!-- Vents -->
    <line x1="6" y1="50" x2="46" y2="50" stroke="#999" stroke-width="0.6"/>
    <line x1="6" y1="53" x2="46" y2="53" stroke="#999" stroke-width="0.6"/>
  </g>

  <!-- Customer figure holding the key (outside the server, key in hand) -->
  <g transform="translate(498, 200)">
    <!-- Head -->
    <circle cx="14" cy="6" r="6" fill="#556b2f"/>
    <!-- Body -->
    <path d="M2 30 C2 18 26 18 26 30 L26 40 L2 40 Z" fill="#556b2f"/>
    <!-- Arm reaching toward key -->
    <path d="M22 22 L40 24" stroke="#556b2f" stroke-width="4" stroke-linecap="round" fill="none"/>
    <!-- Key in hand -->
    <g transform="translate(40, 18)">
      <circle cx="6" cy="6" r="5" fill="none" stroke="#556b2f" stroke-width="2"/>
      <line x1="11" y1="6" x2="22" y2="6" stroke="#556b2f" stroke-width="2"/>
      <line x1="18" y1="6" x2="18" y2="10" stroke="#556b2f" stroke-width="2"/>
      <line x1="21" y1="6" x2="21" y2="9" stroke="#556b2f" stroke-width="2"/>
    </g>
    <text x="14" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#556b2f">YOU</text>
  </g>

  <!-- "Sovereignty status" badge in the upper area of the right card,
       sitting ABOVE the EU ring with no overlap. Replaces the floating
       subpoena document which previously extended above the card header. -->
  <g transform="translate(515, 100)">
    <rect x="0" y="0" width="170" height="22" rx="11" fill="#556b2f"/>
    <circle cx="14" cy="11" r="5.5" fill="#f5f5f5"/>
    <polyline points="10.5,11 13,13.5 17.5,8.5" fill="none" stroke="#556b2f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="92" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f5f5f5" font-weight="bold">CLOUD ACT: BLOCKED</text>
  </g>

  <!-- Closed padlock at bottom of right card -->
  <g transform="translate(586, 320)">
    <rect x="0" y="14" width="28" height="22" rx="3" fill="#556b2f"/>
    <path d="M4 14 L4 8 C4 -2 24 -2 24 8 L24 14" fill="none" stroke="#556b2f" stroke-width="3"/>
    <circle cx="14" cy="24" r="2.5" fill="#f5f5f5"/>
    <line x1="14" y1="26.5" x2="14" y2="31" stroke="#f5f5f5" stroke-width="1.5"/>
  </g>

  <!-- Bottom label -->
  <text x="600" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#556b2f" font-weight="bold">You hold the keys</text>
  <text x="600" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#556b2f" opacity="0.8">Subpoena deflects. EU law applies.</text>

  <!-- Decorative bottom circles -->
  <circle cx="80" cy="430" r="35" fill="#e0e0e0" opacity="0.3"/>
  <circle cx="720" cy="430" r="40" fill="#556b2f" opacity="0.15"/>
</svg>
