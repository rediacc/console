<svg xmlns="http://www.w3.org/2000/svg" width="390" height="600" viewBox="0 0 390 600" role="img" aria-label="A calendar with a green check on every day, above a magnifying glass finding a small red crack on a fresh copy of your systems." font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif">
  <title>A calendar with a green check on every day, above a magnifying glass finding a small red crack on a fresh copy of your systems.</title>
  <rect x="0" y="0" width="390" height="600" fill="#f5f5f5" />

  
  <text x="195" y="44" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="26" font-weight="bold" fill="#1a1a1a">Verifica costante</text>
  <g>
    <rect x="70" y="62" width="250" height="180" rx="10" fill="#2d2d2d" />
    <rect x="70" y="62" width="250" height="34" rx="10" fill="#2d5227" />
    <g stroke="#4a7c3f" stroke-width="5" stroke-linecap="round" fill="none">
      
      <g><rect x="88" y="108" width="50" height="44" rx="6" fill="#1a1a1a" stroke="none" /><polyline points="100,130 109,140 126,120" /></g>
      <g><rect x="170" y="108" width="50" height="44" rx="6" fill="#1a1a1a" stroke="none" /><polyline points="182,130 191,140 208,120" /></g>
      <g><rect x="252" y="108" width="50" height="44" rx="6" fill="#1a1a1a" stroke="none" /><polyline points="264,130 273,140 290,120" /></g>
      
      <g><rect x="88" y="168" width="50" height="44" rx="6" fill="#1a1a1a" stroke="none" /><polyline points="100,190 109,200 126,180" /></g>
      <g><rect x="170" y="168" width="50" height="44" rx="6" fill="#1a1a1a" stroke="none" /><polyline points="182,190 191,200 208,180" /></g>
      <g><rect x="252" y="168" width="50" height="44" rx="6" fill="#1a1a1a" stroke="none" /><polyline points="264,190 273,200 290,180" /></g>
    </g>
  </g>

  
  <g>
    <rect x="100" y="300" width="190" height="170" rx="10" fill="#2d2d2d" />
    <rect x="120" y="322" width="150" height="26" rx="4" fill="#556b2f" />
    <rect x="120" y="360" width="150" height="26" rx="4" fill="#556b2f" />
    <rect x="120" y="398" width="150" height="26" rx="4" fill="#556b2f" />

    
    <polyline points="232,368 246,384 236,396 252,412" fill="none" stroke="#8b0000" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />

    
    <circle cx="232" cy="384" r="60" fill="none" stroke="#1a1a1a" stroke-width="9" />
    <line x1="276" y1="428" x2="320" y2="472" stroke="#1a1a1a" stroke-width="13" stroke-linecap="round" />

    <text x="120" y="290" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="22" fill="#1a1a1a">Copia aggiornata</text>
  </g>

  
  <text x="195" y="540" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="26" font-weight="bold" fill="#8b0000">Falla trovata</text>
</svg>
