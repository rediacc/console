<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 600" width="390" height="600" role="img" aria-label="During a server move the lock pops open and files spill out where a hand can grab them." font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif">
