<svg xmlns="http://www.w3.org/2000/svg" width="390" height="600" viewBox="0 0 390 600" role="img" aria-label="Salvestatud varukoopia kontrollitakse automaatselt ja see saab suure rohelise linnukese, mis tõendab selle toimimist." font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif">
  <title>Salvestatud varukoopia kontrollitakse automaatselt ja see saab suure rohelise linnukese, mis tõendab selle toimimist.</title>
  <rect x="0" y="0" width="390" height="600" fill="#f5f5f5" />

  
  <g>
    <rect x="150" y="50" width="110" height="125" rx="8" fill="#2d5227" />
    <rect x="138" y="38" width="110" height="125" rx="8" fill="#4a7c3f" stroke="#1a1a1a" stroke-width="2.5" />
    <line x1="158" y1="70" x2="228" y2="70" stroke="#f5f5f5" stroke-width="2.5" />
    <line x1="158" y1="95" x2="228" y2="95" stroke="#f5f5f5" stroke-width="2.5" />
    <line x1="158" y1="120" x2="205" y2="120" stroke="#f5f5f5" stroke-width="2.5" />
  </g>
  <text x="195" y="200" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Varukoopia</text>

  
  <g>
    <circle cx="195" cy="290" r="48" fill="#f5f5f5" />
    <circle cx="195" cy="290" r="48" fill="none" stroke="#2d2d2d" stroke-width="8" />
    <line x1="195" y1="270" x2="195" y2="310" stroke="#2d5227" stroke-width="7" stroke-linecap="round" />
    <line x1="175" y1="290" x2="215" y2="290" stroke="#2d5227" stroke-width="7" stroke-linecap="round" />
    <line x1="230" y1="325" x2="266" y2="361" stroke="#2d2d2d" stroke-width="12" stroke-linecap="round" />
  </g>
  <text x="195" y="415" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Kontrollitud</text>

  
  <g>
    <circle cx="195" cy="500" r="62" fill="#4a7c3f" stroke="#2d5227" stroke-width="2.5" />
    <path d="M164 502 L187 526 L228 478" fill="none" stroke="#f5f5f5" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  <text x="195" y="588" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Tõestatud toimiv</text>
</svg>
