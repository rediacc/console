<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Duas caixas verdes idênticas unidas por um check verde, mostrando que o ambiente de teste é uma cópia exata do que os usuários reais usam." font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif">
  <title>Duas caixas verdes idênticas unidas por um check verde, mostrando que o ambiente de teste é uma cópia exata do que os usuários reais usam.</title>
  <rect x="0" y="0" width="800" height="450" fill="#f5f5f5" />

  
  <rect x="80" y="150" width="200" height="150" rx="14" fill="#4a7c3f" stroke="#2d5227" stroke-width="4" />
  <rect x="102" y="178" width="156" height="18" rx="6" fill="#f5f5f5" />
  <rect x="102" y="210" width="156" height="18" rx="6" fill="#f5f5f5" />
  <rect x="102" y="242" width="100" height="18" rx="6" fill="#f5f5f5" />

  
  <rect x="520" y="150" width="200" height="150" rx="14" fill="#4a7c3f" stroke="#2d5227" stroke-width="4" />
  <rect x="542" y="178" width="156" height="18" rx="6" fill="#f5f5f5" />
  <rect x="542" y="210" width="156" height="18" rx="6" fill="#f5f5f5" />
  <rect x="542" y="242" width="100" height="18" rx="6" fill="#f5f5f5" />

  
  <circle cx="400" cy="225" r="64" fill="#2d5227" />
  <path d="M368 226 L392 252 L436 198" fill="none" stroke="#f5f5f5" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />

  
  <text x="400" y="118" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="32" font-weight="bold" fill="#2d5227">Cópia exata</text>

  
  <text x="180" y="350" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="29" font-weight="bold" fill="#1a1a1a">Setup de teste</text>
  <text x="620" y="350" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="28" font-weight="bold" fill="#1a1a1a">Uso real</text>

  
  <text x="400" y="408" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="30" font-weight="bold" fill="#4a7c3f">Código funciona</text>
</svg>
