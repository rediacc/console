<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-label="A log of records with a red empty gap where the answer should be, a magnifying glass finding nothing, and an auditor pointing for proof." font-family="'Segoe UI', Tahoma, 'Geeza Pro', 'Noto Naskh Arabic', sans-serif" direction="rtl">
  <title>A log of records with a red empty gap where the answer should be, a magnifying glass finding nothing, and an auditor pointing for proof.</title>

  <rect x="0" y="0" width="800" height="450" fill="#f5f5f5" />

  
  <text x="360" y="86" font-family="'Segoe UI', Tahoma, 'Geeza Pro', 'Noto Naskh Arabic', sans-serif" font-size="46" font-weight="bold" fill="#8b0000" text-anchor="middle" direction="rtl">?</text>
  <text x="230" y="56" font-family="'Segoe UI', Tahoma, 'Geeza Pro', 'Noto Naskh Arabic', sans-serif" font-size="32" font-weight="bold" fill="#1a1a1a" text-anchor="middle" direction="rtl">ماذا حدث؟</text>

  
  <rect x="50" y="100" width="360" height="300" rx="10" fill="#f5f5f5" stroke="#1a1a1a" stroke-width="3" />

  
  <rect x="72" y="124" width="240" height="16" rx="3" fill="#2d2d2d" />
  <rect x="72" y="160" width="200" height="16" rx="3" fill="#2d2d2d" />
  
  <rect x="68" y="200" width="248" height="50" rx="4" fill="#f5f5f5" stroke="#8b0000" stroke-width="4" stroke-dasharray="10 7" />
  <text x="178" y="234" font-family="'Segoe UI', Tahoma, 'Geeza Pro', 'Noto Naskh Arabic', sans-serif" font-size="30" font-weight="bold" fill="#8b0000" text-anchor="middle" direction="rtl">لا سجل</text>
  <rect x="72" y="284" width="220" height="16" rx="3" fill="#2d2d2d" />
  <rect x="72" y="320" width="180" height="16" rx="3" fill="#2d2d2d" />

  
  <circle cx="330" cy="224" r="26" fill="none" stroke="#2d2d2d" stroke-width="5" />
  <line x1="349" y1="243" x2="378" y2="272" stroke="#2d2d2d" stroke-width="8" stroke-linecap="round" />

  <text x="300" y="426" font-family="'Segoe UI', Tahoma, 'Geeza Pro', 'Noto Naskh Arabic', sans-serif" font-size="28" font-weight="bold" fill="#1a1a1a" text-anchor="middle" direction="rtl">مجرد تخمين</text>

  
  <circle cx="625" cy="150" r="27" fill="#2d2d2d" />
  <polygon points="588,330 662,330 672,200 578,200" fill="#2d2d2d" />
  <line x1="592" y1="216" x2="470" y2="236" stroke="#2d2d2d" stroke-width="9" stroke-linecap="round" />
  <text x="640" y="392" font-family="'Segoe UI', Tahoma, 'Geeza Pro', 'Noto Naskh Arabic', sans-serif" font-size="32" font-weight="bold" fill="#1a1a1a" text-anchor="middle" direction="rtl">أثبت ذلك</text>
</svg>
