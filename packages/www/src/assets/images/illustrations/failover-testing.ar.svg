<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-label="An untested recovery plan with a red question mark, beside a crashed red server and a clock reading 3 AM." font-family="'Segoe UI', Tahoma, 'Geeza Pro', 'Noto Naskh Arabic', sans-serif" direction="rtl">
  <title>An untested recovery plan with a red question mark, beside a crashed red server and a clock reading 3 AM.</title>
  <rect x="0" y="0" width="800" height="450" fill="#f5f5f5" />

  
  <text x="180" y="72" text-anchor="middle" font-family="'Segoe UI', Tahoma, 'Geeza Pro', 'Noto Naskh Arabic', sans-serif" font-size="30" font-weight="bold" fill="#1a1a1a" direction="rtl">خطة الاسترداد</text>

  <rect x="60" y="95" width="240" height="250" rx="6" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="3" />
  <rect x="84" y="120" width="150" height="10" rx="4" fill="#f5f5f5" />
  <rect x="84" y="142" width="120" height="10" rx="4" fill="#f5f5f5" />

  
  <path d="M 142 150 C 142 118, 222 118, 222 162 C 222 198, 180 198, 180 232" fill="none" stroke="#8b0000" stroke-width="18" stroke-linecap="round" />
  <circle cx="180" cy="262" r="11" fill="#8b0000" />

  <text x="180" y="388" text-anchor="middle" font-family="'Segoe UI', Tahoma, 'Geeza Pro', 'Noto Naskh Arabic', sans-serif" font-size="30" font-weight="bold" fill="#8b0000" direction="rtl">لم يُختبر</text>

  
  <circle cx="600" cy="130" r="52" fill="#8b0000" stroke="#1a1a1a" stroke-width="3" />
  <line x1="600" y1="130" x2="638" y2="130" stroke="#f5f5f5" stroke-width="6" stroke-linecap="round" />
  <line x1="600" y1="130" x2="600" y2="92" stroke="#f5f5f5" stroke-width="6" stroke-linecap="round" />
  <circle cx="600" cy="130" r="6" fill="#f5f5f5" />
  <text x="600" y="218" text-anchor="middle" font-family="'Segoe UI', Tahoma, 'Geeza Pro', 'Noto Naskh Arabic', sans-serif" font-size="30" font-weight="bold" fill="#8b0000" direction="rtl">٣ صباحًا</text>

  
  <g transform="rotate(-14 610 300)">
    <rect x="525" y="252" width="170" height="100" rx="6" fill="#8b0000" stroke="#1a1a1a" stroke-width="3" />
    <rect x="545" y="272" width="130" height="14" rx="3" fill="#1a1a1a" />
    <rect x="545" y="298" width="130" height="14" rx="3" fill="#1a1a1a" />
    <rect x="545" y="324" width="130" height="14" rx="3" fill="#1a1a1a" />
  </g>

  <text x="610" y="400" text-anchor="middle" font-family="'Segoe UI', Tahoma, 'Geeza Pro', 'Noto Naskh Arabic', sans-serif" font-size="30" font-weight="bold" fill="#1a1a1a" direction="rtl">الخادم معطّل</text>
</svg>
