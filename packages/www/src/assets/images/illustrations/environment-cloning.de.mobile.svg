<svg xmlns="http://www.w3.org/2000/svg" width="390" height="600" viewBox="0 0 390 600" role="img" aria-label="A dark live system is copied downward by a green arrow into an identical green exact copy, ready in 60 seconds with no waiting." font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif">
  <title>A dark live system is copied downward by a green arrow into an identical green exact copy, ready in 60 seconds with no waiting.</title>

  <rect x="0" y="0" width="390" height="600" fill="#f5f5f5" />

  
  <g>
    <rect x="130" y="40" width="130" height="115" rx="10" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="3" />
    <rect x="148" y="58" width="94" height="22" rx="4" fill="#f5f5f5" />
    <rect x="148" y="90" width="94" height="22" rx="4" fill="#f5f5f5" />
    <rect x="148" y="122" width="94" height="22" rx="4" fill="#f5f5f5" />
  </g>
  <text x="195" y="185" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#1a1a1a">Ihr Live-System</text>

  
  <path d="M 180 205 L 210 205 L 210 285 L 235 285 L 195 335 L 155 285 L 180 285 Z" fill="#4a7c3f" stroke="#2d5227" stroke-width="3" />

  
  <g>
    <circle cx="90" cy="255" r="32" fill="#4a7c3f" stroke="#2d5227" stroke-width="3" />
    <rect x="80" y="217" width="20" height="8" rx="3" fill="#2d5227" />
    <line x1="90" y1="255" x2="90" y2="234" stroke="#f5f5f5" stroke-width="4" stroke-linecap="round" />
    <line x1="90" y1="255" x2="108" y2="255" stroke="#f5f5f5" stroke-width="4" stroke-linecap="round" />
  </g>
  <text x="195" y="375" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#2d5227">Bereit in 60 Sek.</text>

  
  <g>
    <rect x="130" y="400" width="130" height="115" rx="10" fill="#2d5227" stroke="#1a1a1a" stroke-width="3" />
    <rect x="148" y="418" width="94" height="22" rx="4" fill="#f5f5f5" />
    <rect x="148" y="450" width="94" height="22" rx="4" fill="#f5f5f5" />
    <rect x="148" y="482" width="94" height="22" rx="4" fill="#f5f5f5" />
  </g>
  <text x="195" y="548" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#2d5227">Exakte Kopie</text>
  <text x="195" y="582" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#4a7c3f">Kein Warten</text>
</svg>
