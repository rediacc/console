  <circle cx="197" cy="345" r="9" fill="#8b0000" />

  <text x="195" y="395" text-anchor="middle" font-family="'Segoe UI', Tahoma, 'Geeza Pro', 'Noto Naskh Arabic', sans-serif" font-size="22" font-weight="bold" fill="#8b0000" direction="rtl">لم يُختبر</text>

  
