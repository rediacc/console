<svg xmlns="http://www.w3.org/2000/svg" width="390" height="600" viewBox="0 0 390 600" role="img" aria-label="A clock reading 3 AM above an untested recovery plan with a red question mark, above a crashed red server." font-family="'Segoe UI', Tahoma, 'Geeza Pro', 'Noto Naskh Arabic', sans-serif" direction="rtl">
  <title>A clock reading 3 AM above an untested recovery plan with a red question mark, above a crashed red server.</title>
  <rect x="0" y="0" width="390" height="600" fill="#f5f5f5" />

  
  <circle cx="195" cy="80" r="52" fill="#8b0000" stroke="#1a1a1a" stroke-width="3" />
  <line x1="195" y1="80" x2="233" y2="80" stroke="#f5f5f5" stroke-width="6" stroke-linecap="round" />
