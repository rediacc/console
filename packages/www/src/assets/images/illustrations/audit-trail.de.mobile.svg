<svg xmlns="http://www.w3.org/2000/svg" width="390" height="600" viewBox="0 0 390 600" role="img" aria-label="A log of records with a red empty gap where the answer should be, a magnifying glass finding nothing, and an auditor pointing up for proof." font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif">
  <title>A log of records with a red empty gap where the answer should be, a magnifying glass finding nothing, and an auditor pointing up for proof.</title>

  <rect x="0" y="0" width="390" height="600" fill="#f5f5f5" />

  
  <text x="195" y="44" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="30" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Was passierte?</text>
  <text x="195" y="98" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="42" font-weight="bold" fill="#8b0000" text-anchor="middle">?</text>

  
  <rect x="50" y="120" width="290" height="270" rx="10" fill="#f5f5f5" stroke="#1a1a1a" stroke-width="3" />

  <rect x="70" y="146" width="200" height="16" rx="3" fill="#2d2d2d" />
  <rect x="70" y="182" width="160" height="16" rx="3" fill="#2d2d2d" />
  
  <rect x="66" y="222" width="208" height="50" rx="4" fill="#f5f5f5" stroke="#8b0000" stroke-width="4" stroke-dasharray="10 7" />
  <text x="158" y="256" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="26" font-weight="bold" fill="#8b0000" text-anchor="middle">Kein Nachweis</text>
  <rect x="70" y="306" width="180" height="16" rx="3" fill="#2d2d2d" />
  <rect x="70" y="342" width="140" height="16" rx="3" fill="#2d2d2d" />

  
  <circle cx="296" cy="247" r="22" fill="none" stroke="#2d2d2d" stroke-width="5" />
  <line x1="312" y1="263" x2="334" y2="285" stroke="#2d2d2d" stroke-width="7" stroke-linecap="round" />

  
  <text x="195" y="418" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Nur geraten</text>

  
  <circle cx="225" cy="480" r="26" fill="#2d2d2d" />
  <polygon points="190,575 262,575 270,512 198,512" fill="#2d2d2d" />
  <line x1="208" y1="522" x2="178" y2="458" stroke="#2d2d2d" stroke-width="9" stroke-linecap="round" />
  <text x="110" y="500" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="28" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Beweise es</text>
</svg>
