<svg xmlns="http://www.w3.org/2000/svg" width="390" height="600" viewBox="0 0 390 600" role="img" aria-label="A stranger's red hand turns a red key in the lock of a dark vault holding your data, opening it.">
  <title>A stranger's red hand turns a red key in the lock of a dark vault holding your data, opening it.</title>

  <rect x="0" y="0" width="390" height="600" fill="#f5f5f5"/>

  <!-- label: your data -->
  <text x="195" y="50" text-anchor="middle" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="26" font-weight="bold" fill="#1a1a1a">Your data</text>

  <!-- VAULT at top -->
  <rect x="100" y="68" width="190" height="170" rx="14" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="4"/>
  <rect x="118" y="86" width="154" height="134" rx="9" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="3"/>
  <!-- dial -->
  <circle cx="195" cy="138" r="26" fill="#1a1a1a" stroke="#f5f5f5" stroke-width="3"/>
  <circle cx="195" cy="138" r="6" fill="#f5f5f5"/>

  <!-- lock plate with keyhole on the bottom edge of the door -->
  <rect x="166" y="190" width="58" height="64" rx="8" fill="#1a1a1a" stroke="#f5f5f5" stroke-width="3"/>
  <circle cx="195" cy="214" r="11" fill="#f5f5f5"/>
  <rect x="189" y="220" width="12" height="26" rx="3" fill="#f5f5f5"/>

  <!-- RED KEY inserted upward into the keyhole -->
  <rect x="187" y="250" width="15" height="150" rx="3" fill="#8b0000" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- key bow gripped by the hand -->
  <circle cx="194" cy="412" r="26" fill="#8b0000" stroke="#1a1a1a" stroke-width="4"/>
  <circle cx="194" cy="412" r="10" fill="#f5f5f5"/>

  <!-- STRANGER'S HAND gripping and turning the key, danger red -->
  <!-- wrist coming up from below -->
  <rect x="166" y="470" width="58" height="70" rx="26" fill="#8b0000" stroke="#1a1a1a" stroke-width="3"/>
  <!-- palm -->
  <rect x="158" y="418" width="78" height="78" rx="20" fill="#8b0000" stroke="#1a1a1a" stroke-width="3"/>
  <!-- four fingers curling across the key -->
  <rect x="150" y="420" width="70" height="16" rx="8" fill="#8b0000" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="146" y="440" width="74" height="16" rx="8" fill="#8b0000" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="146" y="460" width="74" height="16" rx="8" fill="#8b0000" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="150" y="480" width="70" height="16" rx="8" fill="#8b0000" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- thumb -->
  <rect x="222" y="418" width="20" height="56" rx="10" fill="#8b0000" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- label: their key (beside the key, clear of shapes) -->
  <text x="300" y="330" text-anchor="middle" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="22" font-weight="bold" fill="#8b0000">Their key</text>

  <!-- bottom message, clear of every object -->
  <text x="195" y="578" text-anchor="middle" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">They can open it</text>
</svg>
