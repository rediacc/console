<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 600" width="390" height="600" role="img" aria-label="A rented cloud has gone dark and broken at the top, the store below it has lost all power, and a person stands waiting with empty hands at the bottom." font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif">
  <title>A rented cloud has gone dark and broken at the top, the store below it has lost all power, and a person stands waiting with empty hands at the bottom.</title>

  <rect x="0" y="0" width="390" height="600" fill="#f5f5f5" />

  
  <g>
    <path d="M120 150 a44 44 0 0 1 84 -16 a40 40 0 0 1 70 18 a40 40 0 0 1 -4 80 l-150 0 a40 40 0 0 1 0 -80 z" fill="#8b0000" />
    
    <path d="M202 96 l-14 38 l22 18 l-20 44" fill="none" stroke="#f5f5f5" stroke-width="5" stroke-linejoin="round" stroke-linecap="round" />
    
    <path d="M120 150 l24 -42 l24 42 z" fill="#8b0000" stroke="#f5f5f5" stroke-width="3" stroke-linejoin="round" />
    <rect x="141" y="120" width="6" height="16" fill="#f5f5f5" />
    <rect x="141" y="140" width="6" height="6" fill="#f5f5f5" />
  </g>

  <text x="195" y="276" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="24" font-weight="bold" fill="#8b0000">Cloud hors ligne</text>

  
  <g>
    <path d="M120 360 l75 -40 l75 40 z" fill="#8b0000" />
    <rect x="132" y="360" width="126" height="92" fill="#8b0000" />
    <rect x="172" y="394" width="46" height="58" fill="#1a1a1a" />
    <rect x="144" y="376" width="22" height="18" fill="#1a1a1a" />
    <rect x="224" y="376" width="22" height="18" fill="#1a1a1a" />
  </g>

  <text x="195" y="486" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="24" font-weight="bold" fill="#8b0000">Votre activité aussi</text>

  
  <g>
    <circle cx="100" cy="520" r="20" fill="#2d2d2d" />
    <rect x="84" y="542" width="32" height="50" rx="8" fill="#2d2d2d" />
    <rect x="70" y="548" width="13" height="40" rx="6" fill="#2d2d2d" />
    <rect x="117" y="548" width="13" height="40" rx="6" fill="#2d2d2d" />
  </g>

  <text x="382" y="556" text-anchor="end" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="20" fill="#1a1a1a">Nothing you can</text>
  <text x="382" y="582" text-anchor="end" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="20" fill="#1a1a1a">do but wait</text>
</svg>
