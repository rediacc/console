<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-label="À 3h du matin, votre boîte de sauvegarde est verrouillée par le cadenas-crâne d'un hacker et une main qui tente de l'atteindre est bloquée, ne laissant plus rien à utiliser." font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif">
  <title>À 3h du matin, votre boîte de sauvegarde est verrouillée par le cadenas-crâne d'un hacker et une main qui tente de l'atteindre est bloquée, ne laissant plus rien à utiliser.</title>

  <rect x="0" y="0" width="800" height="450" fill="#f5f5f5" />

  
  <circle cx="95" cy="80" r="40" fill="#f5f5f5" stroke="#2d2d2d" stroke-width="3" />
  <line x1="95" y1="80" x2="95" y2="52" stroke="#2d2d2d" stroke-width="3.5" stroke-linecap="round" />
  <line x1="95" y1="80" x2="120" y2="80" stroke="#2d2d2d" stroke-width="3.5" stroke-linecap="round" />
  <text x="95" y="150" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="28" font-weight="bold" fill="#1a1a1a">3h du matin</text>

  
  <rect x="230" y="150" width="210" height="200" rx="8" fill="#8b0000" stroke="#1a1a1a" stroke-width="3" />
  <line x1="230" y1="210" x2="440" y2="210" stroke="#1a1a1a" stroke-width="3" />
  <line x1="335" y1="150" x2="335" y2="210" stroke="#1a1a1a" stroke-width="3" />

  
  <path d="M310 240 v-14 a25 25 0 0 1 50 0 v14" fill="none" stroke="#1a1a1a" stroke-width="9" />
  <rect x="298" y="238" width="74" height="78" rx="10" fill="#8b0000" stroke="#1a1a1a" stroke-width="3" />
  
  <circle cx="335" cy="270" r="20" fill="#f5f5f5" />
  <circle cx="328" cy="268" r="5" fill="#1a1a1a" />
  <circle cx="342" cy="268" r="5" fill="#1a1a1a" />
  <path d="M330 282 h10" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" />
  <rect x="326" y="290" width="18" height="14" rx="3" fill="#f5f5f5" />

  
  <g fill="#2d2d2d">
    <rect x="588" y="216" width="74" height="92" rx="14" />
    <rect x="498" y="220" width="100" height="17" rx="8.5" />
    <rect x="492" y="242" width="106" height="17" rx="8.5" />
    <rect x="496" y="264" width="102" height="17" rx="8.5" />
    <rect x="506" y="286" width="92" height="17" rx="8.5" />
    <rect x="600" y="296" width="60" height="18" rx="9" transform="rotate(28 600 296)" />
  </g>

  
  <text x="335" y="135" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="28" font-weight="bold" fill="#8b0000">Verrouillé par hackers</text>
  <text x="335" y="392" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="30" font-weight="bold" fill="#1a1a1a">Vos sauvegardes</text>
  <text x="778" y="378" text-anchor="end" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="28" font-weight="bold" fill="#1a1a1a">Plus rien disponible</text>
</svg>
