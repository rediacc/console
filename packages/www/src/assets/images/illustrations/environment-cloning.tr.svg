<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-label="A dark live system is copied by a green arrow into an identical green exact copy, ready in 60 seconds with no waiting." font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif">
  <title>A dark live system is copied by a green arrow into an identical green exact copy, ready in 60 seconds with no waiting.</title>

  <rect x="0" y="0" width="800" height="450" fill="#f5f5f5" />

  
  <g>
    <rect x="70" y="150" width="180" height="150" rx="10" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="3" />
    <rect x="92" y="172" width="136" height="26" rx="4" fill="#f5f5f5" />
    <rect x="92" y="210" width="136" height="26" rx="4" fill="#f5f5f5" />
    <rect x="92" y="248" width="136" height="26" rx="4" fill="#f5f5f5" />
  </g>
  <text x="165" y="340" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="28" font-weight="bold" fill="#1a1a1a">Canlı sisteminiz</text>

  
  <g>
    <path d="M 280 200 L 470 200 L 470 175 L 530 215 L 470 255 L 470 230 L 280 230 Z" fill="#4a7c3f" stroke="#2d5227" stroke-width="3" />
  </g>

  
  <g>
    <circle cx="400" cy="95" r="40" fill="#4a7c3f" stroke="#2d5227" stroke-width="3" />
    <rect x="388" y="48" width="24" height="9" rx="3" fill="#2d5227" />
    <line x1="400" y1="95" x2="400" y2="68" stroke="#f5f5f5" stroke-width="4" stroke-linecap="round" />
    <line x1="400" y1="95" x2="422" y2="95" stroke="#f5f5f5" stroke-width="4" stroke-linecap="round" />
  </g>
  <text x="400" y="172" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="28" font-weight="bold" fill="#2d5227">60 sn'de hazır</text>

  
  <text x="400" y="300" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="28" font-weight="bold" fill="#4a7c3f">Bekleme yok</text>

  
  <g>
    <rect x="550" y="150" width="180" height="150" rx="10" fill="#2d5227" stroke="#1a1a1a" stroke-width="3" />
    <rect x="572" y="172" width="136" height="26" rx="4" fill="#f5f5f5" />
    <rect x="572" y="210" width="136" height="26" rx="4" fill="#f5f5f5" />
    <rect x="572" y="248" width="136" height="26" rx="4" fill="#f5f5f5" />
  </g>
  <text x="640" y="340" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="28" font-weight="bold" fill="#2d5227">Birebir kopya</text>
</svg>
