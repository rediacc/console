<svg xmlns="http://www.w3.org/2000/svg" width="390" height="600" viewBox="0 0 390 600" role="img" aria-label="One green active server is on the bill while three dark servers are turned off, so you keep a stack of money." font-family="'Segoe UI', Tahoma, 'Geeza Pro', 'Noto Naskh Arabic', sans-serif" direction="rtl">
  <title>One green active server is on the bill while three dark servers are turned off, so you keep a stack of money.</title>
  <rect x="0" y="0" width="390" height="600" fill="#f5f5f5" />

  
  <g>
    <rect x="55" y="30" width="115" height="120" rx="10" fill="#4a7c3f" stroke="#1a1a1a" stroke-width="3" />
    <rect x="72" y="50" width="81" height="14" rx="4" fill="#f5f5f5" />
    <rect x="72" y="74" width="81" height="14" rx="4" fill="#f5f5f5" />
    <rect x="72" y="98" width="81" height="14" rx="4" fill="#f5f5f5" />
    <circle cx="140" cy="130" r="8" fill="#f5f5f5" />
    <text x="195" y="100" font-family="'Segoe UI', Tahoma, 'Geeza Pro', 'Noto Naskh Arabic', sans-serif" font-size="28" font-weight="bold" fill="#1a1a1a" text-anchor="start" direction="rtl">قيد الاستخدام</text>
  </g>

  
  <g>
    <rect x="90" y="210" width="60" height="120" rx="8" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="3" />
    <rect x="165" y="210" width="60" height="120" rx="8" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="3" />
    <rect x="240" y="210" width="60" height="120" rx="8" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="3" />
    <circle cx="120" cy="300" r="7" fill="#8b0000" />
    <circle cx="195" cy="300" r="7" fill="#8b0000" />
    <circle cx="270" cy="300" r="7" fill="#8b0000" />
    <text x="195" y="372" font-family="'Segoe UI', Tahoma, 'Geeza Pro', 'Noto Naskh Arabic', sans-serif" font-size="28" font-weight="bold" fill="#1a1a1a" text-anchor="middle" direction="rtl">موقوف</text>
    <text x="195" y="406" font-family="'Segoe UI', Tahoma, 'Geeza Pro', 'Noto Naskh Arabic', sans-serif" font-size="24" fill="#4a7c3f" text-anchor="middle" direction="rtl">بلا تكلفة</text>
  </g>

  
  <g>
    <ellipse cx="195" cy="510" rx="58" ry="16" fill="#2d5227" stroke="#1a1a1a" stroke-width="3" />
    <ellipse cx="195" cy="486" rx="58" ry="16" fill="#4a7c3f" stroke="#1a1a1a" stroke-width="3" />
    <ellipse cx="195" cy="462" rx="58" ry="16" fill="#556b2f" stroke="#1a1a1a" stroke-width="3" />
    <ellipse cx="195" cy="438" rx="58" ry="16" fill="#4a7c3f" stroke="#1a1a1a" stroke-width="3" />
    <text x="195" y="565" font-family="'Segoe UI', Tahoma, 'Geeza Pro', 'Noto Naskh Arabic', sans-serif" font-size="26" font-weight="bold" fill="#1a1a1a" text-anchor="middle" direction="rtl">ما توفره</text>
  </g>
</svg>
