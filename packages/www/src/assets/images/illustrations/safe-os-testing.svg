<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="A new update dropped onto your real server has crashed it at 2 a.m., shown with red cracks and sparks.">
  <title>A new update dropped onto your real server has crashed it at 2 a.m., shown with red cracks and sparks.</title>

  <rect x="0" y="0" width="800" height="450" fill="#f5f5f5"/>

  <!-- New update box, upper left -->
  <rect x="60" y="60" width="150" height="90" rx="8" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="82" y="86" width="106" height="12" rx="3" fill="#f5f5f5"/>
  <rect x="82" y="108" width="74" height="12" rx="3" fill="#f5f5f5"/>
  <text x="135" y="42" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="30" font-weight="bold" fill="#1a1a1a" text-anchor="middle">New update</text>

  <!-- Bold arrow pointing down-right into server -->
  <g stroke="#1a1a1a" stroke-width="11" fill="none" stroke-linecap="round">
    <path d="M210 150 L320 240"/>
  </g>
  <path d="M345 261 L300 232 L322 274 Z" fill="#1a1a1a"/>

  <!-- Real server (large, red, broken) -->
  <rect x="330" y="230" width="220" height="180" rx="10" fill="#8b0000" stroke="#1a1a1a" stroke-width="3"/>
  <!-- crack -->
  <polyline points="440,230 415,300 460,330 425,410" fill="none" stroke="#1a1a1a" stroke-width="6" stroke-linejoin="round"/>
  <polyline points="440,230 415,300 460,330 425,410" fill="none" stroke="#f5f5f5" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- server slots suggestion -->
  <rect x="352" y="252" width="60" height="14" rx="3" fill="#1a1a1a"/>
  <rect x="478" y="252" width="50" height="14" rx="3" fill="#1a1a1a"/>

  <!-- Sparks -->
  <g stroke="#8b0000" stroke-width="5" stroke-linecap="round">
    <path d="M540 220 L565 195"/>
    <path d="M555 240 L588 232"/>
    <path d="M335 215 L312 192"/>
  </g>
  <path d="M520 200 l10 -22 6 18 18 -4 -14 16 16 12 -22 -2 -4 20 -12 -16 -18 6 z" fill="#8b0000"/>

  <text x="440" y="200" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="32" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Your real server</text>
  <text x="440" y="385" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="40" font-weight="bold" fill="#f5f5f5" text-anchor="middle">CRASHED</text>

  <!-- Clock at 2 a.m., upper right -->
  <circle cx="680" cy="150" r="68" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="3"/>
  <circle cx="680" cy="150" r="58" fill="none" stroke="#f5f5f5" stroke-width="2.5"/>
  <line x1="680" y1="150" x2="680" y2="108" stroke="#f5f5f5" stroke-width="5" stroke-linecap="round"/>
  <line x1="680" y1="150" x2="710" y2="165" stroke="#f5f5f5" stroke-width="5" stroke-linecap="round"/>
  <circle cx="680" cy="150" r="5" fill="#f5f5f5"/>
  <text x="680" y="258" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="34" font-weight="bold" fill="#1a1a1a" text-anchor="middle">2 a.m.</text>
</svg>
