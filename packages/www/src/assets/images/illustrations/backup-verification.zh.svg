<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-label="A saved backup copy is automatically checked and earns a big green check mark proving it works." font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <title>A saved backup copy is automatically checked and earns a big green check mark proving it works.</title>
  <rect x="0" y="0" width="800" height="450" fill="#f5f5f5" />

  
  <g>
    <rect x="80" y="150" width="150" height="170" rx="10" fill="#2d5227" />
    <rect x="65" y="135" width="150" height="170" rx="10" fill="#4a7c3f" stroke="#1a1a1a" stroke-width="2.5" />
    <line x1="90" y1="175" x2="190" y2="175" stroke="#f5f5f5" stroke-width="2.5" />
    <line x1="90" y1="205" x2="190" y2="205" stroke="#f5f5f5" stroke-width="2.5" />
    <line x1="90" y1="235" x2="160" y2="235" stroke="#f5f5f5" stroke-width="2.5" />
  </g>
  <text x="140" y="360" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif" font-size="30" font-weight="bold" fill="#1a1a1a">备份副本</text>

  
  <g>
    <circle cx="400" cy="200" r="62" fill="none" stroke="#2d2d2d" stroke-width="9" />
    <circle cx="400" cy="200" r="62" fill="#f5f5f5" fill-opacity="1" />
    <circle cx="400" cy="200" r="62" fill="none" stroke="#2d2d2d" stroke-width="9" />
    <line x1="400" y1="172" x2="400" y2="228" stroke="#2d5227" stroke-width="8" stroke-linecap="round" />
    <line x1="372" y1="200" x2="428" y2="200" stroke="#2d5227" stroke-width="8" stroke-linecap="round" />
    <line x1="444" y1="244" x2="492" y2="292" stroke="#2d2d2d" stroke-width="14" stroke-linecap="round" />
  </g>
  <text x="400" y="360" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif" font-size="30" font-weight="bold" fill="#1a1a1a">已为你检查</text>

  
  <g>
    <circle cx="660" cy="200" r="80" fill="#4a7c3f" stroke="#2d5227" stroke-width="2.5" />
    <path d="M620 202 L650 234 L702 168" fill="none" stroke="#f5f5f5" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  <text x="660" y="360" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif" font-size="30" font-weight="bold" fill="#1a1a1a">已验证可用</text>
</svg>
