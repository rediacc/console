  <polygon points="320,421 344,430 320,439" fill="#1a1a1a" />
  <text x="195" y="478" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="22" fill="#1a1a1a">Puhastatud</text>

  
  <circle cx="195" cy="528" r="38" fill="#4a7c3f" stroke="#2d5227" stroke-width="3" />
  <polyline points="177,528 190,542 214,514" fill="none" stroke="#f5f5f5" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />
  <text x="195" y="590" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#1a1a1a">Auditiks valmis</text>
</svg>
