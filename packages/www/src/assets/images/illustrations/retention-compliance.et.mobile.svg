<svg xmlns="http://www.w3.org/2000/svg" width="390" height="600" viewBox="0 0 390 600" role="img" aria-label="A dial set once keeps a stack of backups safe, sweeps out an old copy, and a green check shows the proof is ready for the auditor." font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif">
  <title>A dial set once keeps a stack of backups safe, sweeps out an old copy, and a green check shows the proof is ready for the auditor.</title>

  <rect x="0" y="0" width="390" height="600" fill="#f5f5f5" />

  
  <circle cx="195" cy="88" r="62" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="3" />
  <circle cx="195" cy="88" r="40" fill="none" stroke="#f5f5f5" stroke-width="3" />
  <line x1="195" y1="88" x2="225" y2="58" stroke="#4a7c3f" stroke-width="7" stroke-linecap="round" />
  <circle cx="195" cy="88" r="8" fill="#f5f5f5" />
  <line x1="195" y1="30" x2="195" y2="40" stroke="#f5f5f5" stroke-width="3" />
  <text x="195" y="180" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="26" font-weight="bold" fill="#1a1a1a">Määra kestus</text>

  
  <line x1="195" y1="192" x2="195" y2="208" stroke="#4a7c3f" stroke-width="8" stroke-linecap="round" />
  <polygon points="181,206 195,232 209,206" fill="#4a7c3f" />

  
  <rect x="95" y="240" width="200" height="38" rx="6" fill="#4a7c3f" stroke="#2d5227" stroke-width="3" />
  <rect x="95" y="284" width="200" height="38" rx="6" fill="#4a7c3f" stroke="#2d5227" stroke-width="3" />
  <rect x="95" y="328" width="200" height="38" rx="6" fill="#4a7c3f" stroke="#2d5227" stroke-width="3" />
  <text x="195" y="398" text-anchor="middle" font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Kaitstud</text>

  
  <g transform="rotate(8 195 425)">
    <rect x="110" y="408" width="170" height="34" rx="6" fill="#f5f5f5" stroke="#1a1a1a" stroke-width="3" stroke-dasharray="9 8" />
  </g>
