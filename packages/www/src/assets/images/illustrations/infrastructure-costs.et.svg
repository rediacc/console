<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-label="Arvel on üks roheline aktiivne server, kolm tumedat serverit on välja lülitatud – nii hoiate raha kokku." font-family="Arial, 'Helvetica Neue', 'Segoe UI', sans-serif">
