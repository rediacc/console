name: Cleanup PR Channel

# Delete R2 channel artifacts when a PR is closed (merged or abandoned)

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  cleanup:
    name: Delete PR Channel
    runs-on: ubuntu-latest
    steps:
      - name: Delete channel artifacts
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          CHANNEL="pr-${PR_NUM}"
          echo "Cleaning up R2 channel: ${CHANNEL}..."

          for dir in cli desktop apt rpm apk archlinux; do
            aws s3 rm "s3://${RELEASES_BUCKET}/${dir}/${CHANNEL}/" \
              --recursive \
              --endpoint-url "$R2_ENDPOINT" 2>/dev/null || true
          done

          echo "Channel '${CHANNEL}' deleted from R2"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          RELEASES_BUCKET: rediacc-releases
