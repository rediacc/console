name: Console CI - Build (Docker)

on:
  workflow_call:
    inputs:
      next_version:
        type: string
        required: false
      api_tag:
        type: string
        required: false
      api_exists:
        type: string
        required: false
      bridge_tag:
        type: string
        required: false
      bridge_exists:
        type: string
        required: false
      plugins_tag:
        type: string
        required: false
      plugins_exists:
        type: string
        required: false
      web_tag:
        type: string
        required: false
      web_exists:
        type: string
        required: false
      cli_tag:
        type: string
        required: false
      cli_exists:
        type: string
        required: false
      test_images_only:
        type: boolean
        required: false
        default: false
    secrets:
      APP_PRIVATE_KEY:
        required: false
      ACCOUNT_ED25519_PUBLIC_KEY:
        required: false

permissions:
  contents: read
  packages: write   # GHCR push

jobs:
  build-cli:
    name: CLI
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Apply version bump
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: .ci/scripts/version/bump.sh --version ${{ inputs.next_version }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: .ci/scripts/setup/install-deps.sh
      - run: .ci/scripts/setup/build-packages.sh
      - run: .ci/scripts/build/build-cli.sh
        env:
          # OTLP credentials are fetched at runtime after `rdc subscription
          # login` — no longer baked into the bundle (renet#51).
          CLI_VERSION: ${{ inputs.next_version || '0.0.0-dev' }}

      - name: Prepare CLI bundle artifact
        run: |
          mkdir -p bundle
          cp packages/cli/dist/cli-bundle.cjs bundle/
          cp packages/cli/package.json bundle/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: cli-bundle${{ inputs.test_images_only && '-fast' || '' }}-${{ github.sha }}
          path: bundle/
          retention-days: 3

      - name: Create CLI npm package
        working-directory: packages/cli
        run: |
          # Inject version for correct tarball naming
          VERSION="${{ inputs.next_version || '0.0.0-dev' }}"
          if [[ "$VERSION" != "0.0.0-dev" ]]; then
            jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          fi
          mkdir -p /tmp/cli-npm
          npm pack --pack-destination /tmp/cli-npm
          cd /tmp/cli-npm
          CLI_PKG=$(ls rediacc-cli-*.tgz 2>/dev/null | head -1)
          [ -n "$CLI_PKG" ] && cp "$CLI_PKG" rediacc-cli-latest.tgz

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: cli-npm${{ inputs.test_images_only && '-fast' || '' }}-${{ github.sha }}
          path: /tmp/cli-npm/
          retention-days: 3

  build-web:
    name: Web
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: .ci/scripts/setup/install-deps.sh
      - run: .ci/scripts/setup/build-packages.sh
      - run: .ci/scripts/build/build-web.sh --type RELEASE
        env:
          VITE_APP_VERSION: ${{ inputs.web_tag || 'dev' }}
          VITE_BASE_PATH: /console/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: build-web${{ inputs.test_images_only && '-fast' || '' }}-${{ github.sha }}
          path: packages/web/dist/
          retention-days: 3

  build-www:
    name: WWW
    # Standard runner (not ubuntu-slim): the committed solution+tutorial videos make
    # the dist/ artifact ~5.6GB, and the slim runner was cancelled mid-upload. A
    # standard runner has the disk/network headroom to build and upload it reliably.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: .ci/scripts/setup/install-deps.sh
      - run: .ci/scripts/setup/build-packages.sh
      - run: .ci/scripts/build/build-www.sh
        env:
          APP_VERSION: ${{ inputs.next_version || 'dev' }}
      - name: Free source video media (dist/ already holds the copy that is uploaded)
        shell: bash
        run: |
          rm -rf packages/www/public/assets/videos packages/www/public/assets/tutorials || true
          df -h . 2>/dev/null || true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: build-www${{ inputs.test_images_only && '-fast' || '' }}-${{ github.sha }}
          path: packages/www/dist/
          retention-days: 3

  build-json:
    name: JSON
    runs-on: ubuntu-slim
    if: "!inputs.test_images_only"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Apply version bump
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: .ci/scripts/version/bump.sh --version ${{ inputs.next_version }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: .ci/scripts/setup/install-deps.sh
      - run: .ci/scripts/build/build-json.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: build-json${{ inputs.test_images_only && '-fast' || '' }}-${{ github.sha }}
          path: packages/json/dist/
          retention-days: 3

  build-plugins:
    name: Plugins & Docker
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: "!inputs.test_images_only"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Apply version bump
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: .ci/scripts/version/bump.sh --version ${{ inputs.next_version }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      # Build validation (dry-run)
      - name: Validate plugin images
        run: .ci/scripts/build/build-plugins.sh --dry-run

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Determine version
        id: version
        run: |
          echo "version=${{ inputs.next_version }}" >> $GITHUB_OUTPUT

      - name: Build & Push Plugin Docker images
        if: inputs.plugins_exists != 'true'
        run: |
          .ci/scripts/docker/build-image.sh --image plugin-terminal --ci-tag ${{ inputs.plugins_tag }} --version ${{ steps.version.outputs.version }} --push
          .ci/scripts/docker/build-image.sh --image plugin-browser --ci-tag ${{ inputs.plugins_tag }} --version ${{ steps.version.outputs.version }} --push

      - name: Skip Docker build (cached)
        if: inputs.plugins_exists == 'true'
        run: echo "::notice::Skipping Docker build - plugins:${{ inputs.plugins_tag }} already exists in registry"

  # Server Docker: builds the consolidated Dockerfile in two variants from
  # one source. The cloud variant publishes to the existing internal
  # ghcr.io/rediacc/elite/web path; the onprem variant publishes to the
  # customer-facing ghcr.io/rediacc/server path.
  #
  # Both consume the same pre-built artifacts: build-web (console SPA),
  # build-www (marketing site), cli-npm (CLI tarball), and the renet-binaries
  # artifact from ci-build-renet.yml (which embeds CRIU/rsync/rclone and
  # bakes ACCOUNT_ED25519_PUBLIC_KEY into the binary). The account server
  # bundle is built inside the Dockerfile via esbuild --bundle, with the
  # entry point parameterized by ACCOUNT_ENTRY (node | on-premise).
  #
  # Builds are split per-arch onto NATIVE runners (ubuntu-latest for amd64,
  # ubuntu-24.04-arm for arm64). Earlier revisions ran both archs in a single
  # job with QEMU emulation for arm64; the cloud arm64 build (npm install +
  # esbuild bundling under qemu) consistently exceeded the 30 minute timeout
  # and got watchdog-cancelled. Native runners eliminate the emulation tax.
  # Per-arch tags are pushed by these jobs; build-server-docker-manifest
  # stitches them into a single multi-arch tag.
  #
  # The amd64 and arm64 jobs are duplicated rather than expressed as a matrix
  # because GitHub Actions does not allow `matrix` context inside a job-level
  # `if`, so we cannot conditionally skip arm64 in test_images_only mode from
  # within a unified matrix. Two jobs is the simplest way to gate arm64 on
  # `!inputs.test_images_only` while keeping amd64 unconditional.
  build-server-docker-amd64:
    name: Server Docker (${{ matrix.variant }} amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [build-web, build-www, build-cli]
    if: inputs.web_exists != 'true'
    strategy:
      fail-fast: false
      matrix:
        variant: [cloud, onprem]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,middleware,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-web${{ inputs.test_images_only && '-fast' || '' }}-${{ github.sha }}
          path: web-assets/

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-www${{ inputs.test_images_only && '-fast' || '' }}-${{ github.sha }}
          path: www-assets/

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: cli-npm${{ inputs.test_images_only && '-fast' || '' }}-${{ github.sha }}
          path: cli-npm/

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: renet-binaries-${{ github.sha }}
          path: binaries/

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Build account portal SPA
        run: |
          npm ci
          npm run install:natives
          npm run build:packages
          # The account portal SPA build runs entirely in private/account/web (a
          # Next/Vite tree). The nested installs here are SPA-only — they don't
          # need root install:natives to be re-run because the SPA pipeline uses
          # esbuild/tailwind via per-platform optional deps (no install scripts
          # needed) and never imports better-sqlite3 / node-pty / ssh2.
          cd private/account && npm install
          cd web && npm install && npx vite build --outDir ../../../account-web-assets

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Resolve variant-specific values
        id: resolve
        run: |
          case "${{ matrix.variant }}" in
            cloud)
              echo "image_path=ghcr.io/rediacc/elite/web" >> "$GITHUB_OUTPUT"
              echo "account_entry=node" >> "$GITHUB_OUTPUT"
              ;;
            onprem)
              echo "image_path=ghcr.io/rediacc/server" >> "$GITHUB_OUTPUT"
              echo "account_entry=on-premise" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Build & push (amd64)
        env:
          ACCOUNT_ED25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_ED25519_PUBLIC_KEY }}
        run: |
          docker buildx build \
            --file Dockerfile \
            --target ${{ matrix.variant }} \
            --platform linux/amd64 \
            --build-arg VITE_APP_VERSION=${{ inputs.web_tag }} \
            --build-arg ACCOUNT_ENTRY=${{ steps.resolve.outputs.account_entry }} \
            --build-arg "ACCOUNT_ED25519_PUBLIC_KEY=$ACCOUNT_ED25519_PUBLIC_KEY" \
            --tag ${{ steps.resolve.outputs.image_path }}:${{ inputs.web_tag }}-amd64 \
            --push \
            .

  build-server-docker-arm64:
    name: Server Docker (${{ matrix.variant }} arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    needs: [build-web, build-www, build-cli]
    if: "inputs.web_exists != 'true' && !inputs.test_images_only"
    strategy:
      fail-fast: false
      matrix:
        variant: [cloud, onprem]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,middleware,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-web${{ inputs.test_images_only && '-fast' || '' }}-${{ github.sha }}
          path: web-assets/

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-www${{ inputs.test_images_only && '-fast' || '' }}-${{ github.sha }}
          path: www-assets/

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: cli-npm${{ inputs.test_images_only && '-fast' || '' }}-${{ github.sha }}
          path: cli-npm/

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: renet-binaries-${{ github.sha }}
          path: binaries/

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Build account portal SPA
        run: |
          npm ci
          npm run install:natives
          npm run build:packages
          # The account portal SPA build runs entirely in private/account/web (a
          # Next/Vite tree). The nested installs here are SPA-only — they don't
          # need root install:natives to be re-run because the SPA pipeline uses
          # esbuild/tailwind via per-platform optional deps (no install scripts
          # needed) and never imports better-sqlite3 / node-pty / ssh2.
          cd private/account && npm install
          cd web && npm install && npx vite build --outDir ../../../account-web-assets

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Resolve variant-specific values
        id: resolve
        run: |
          case "${{ matrix.variant }}" in
            cloud)
              echo "image_path=ghcr.io/rediacc/elite/web" >> "$GITHUB_OUTPUT"
              echo "account_entry=node" >> "$GITHUB_OUTPUT"
              ;;
            onprem)
              echo "image_path=ghcr.io/rediacc/server" >> "$GITHUB_OUTPUT"
              echo "account_entry=on-premise" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Build & push (arm64)
        env:
          ACCOUNT_ED25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_ED25519_PUBLIC_KEY }}
        run: |
          docker buildx build \
            --file Dockerfile \
            --target ${{ matrix.variant }} \
            --platform linux/arm64 \
            --build-arg VITE_APP_VERSION=${{ inputs.web_tag }} \
            --build-arg ACCOUNT_ENTRY=${{ steps.resolve.outputs.account_entry }} \
            --build-arg "ACCOUNT_ED25519_PUBLIC_KEY=$ACCOUNT_ED25519_PUBLIC_KEY" \
            --tag ${{ steps.resolve.outputs.image_path }}:${{ inputs.web_tag }}-arm64 \
            --push \
            .

  # Combine the per-arch tags pushed by build-server-docker-{amd64,arm64} into
  # a single multi-arch manifest tag. Skipped in test_images_only mode (only
  # amd64 is built in fast mode, no manifest needed).
  build-server-docker-manifest:
    name: Server Docker Manifest (${{ matrix.variant }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-server-docker-amd64, build-server-docker-arm64]
    if: "inputs.web_exists != 'true' && !inputs.test_images_only"
    strategy:
      fail-fast: false
      matrix:
        variant: [cloud, onprem]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Resolve image path
        id: resolve
        run: |
          case "${{ matrix.variant }}" in
            cloud)
              echo "image_path=ghcr.io/rediacc/elite/web" >> "$GITHUB_OUTPUT"
              ;;
            onprem)
              echo "image_path=ghcr.io/rediacc/server" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Create multi-arch manifest
        run: |
          .ci/scripts/docker/create-manifest.sh \
            --image-path ${{ steps.resolve.outputs.image_path }} \
            --tag "${{ inputs.web_tag }}"

  build-server-docker-skip:
    name: Server Docker (cached)
    runs-on: ubuntu-latest
    if: inputs.web_exists == 'true'
    steps:
      - run: echo "::notice::Skipping Docker build - server image at tag ${{ inputs.web_tag }} already exists in registry"

  # CLI Docker: Build images from pre-built bundle on a single runner
  # CLI bundle is JavaScript (platform-independent), so no per-arch compilation needed
  build-cli-docker:
    name: CLI Docker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-cli]
    if: "!inputs.test_images_only && inputs.cli_exists != 'true'"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: cli-bundle${{ inputs.test_images_only && '-fast' || '' }}-${{ github.sha }}
          path: bundle/

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build & push CLI image (amd64)
        run: |
          docker buildx build \
            --file packages/cli/Dockerfile.native \
            --platform linux/amd64 \
            --tag ghcr.io/rediacc/elite/cli:${{ inputs.cli_tag }}-amd64 \
            --push \
            .

      - name: Build & push CLI image (arm64)
        run: |
          docker buildx build \
            --file packages/cli/Dockerfile.native \
            --platform linux/arm64 \
            --tag ghcr.io/rediacc/elite/cli:${{ inputs.cli_tag }}-arm64 \
            --push \
            .

      - name: Create multi-arch manifest
        run: |
          .ci/scripts/docker/create-manifest.sh \
            --image cli \
            --tag "${{ inputs.cli_tag }}"

  build-cli-docker-skip:
    name: CLI Docker (cached)
    runs-on: ubuntu-latest
    if: "!inputs.test_images_only && inputs.cli_exists == 'true'"
    steps:
      - run: echo "::notice::Skipping Docker build - cli:${{ inputs.cli_tag }} already exists in registry"

  # ============================================================
  # MIDDLEWARE/API: Native Architecture Builds
  # ============================================================

  # Middleware (amd64): Build, test, and Docker image
  # Tests run on amd64 only (SQL Server 2022 available)
  build-middleware-amd64:
    name: Middleware (amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-CU21-ubuntu-22.04
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: TestPassword123!
          MSSQL_PID: Express
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P TestPassword123! -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 60s
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,middleware,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Apply version bump
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: .ci/scripts/version/bump.sh --version ${{ inputs.next_version }}

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: 9.0.x

      # Build
      - name: Run middleware build
        run: .ci/scripts/private/run-middleware.sh build

      # Test
      - name: Install sqlcmd
        run: sudo private/middleware/scripts/install-sqlcmd.sh

      - name: Run middleware tests
        run: .ci/scripts/private/run-middleware.sh test

      - name: Check API types freshness
        run: .ci/scripts/quality/check-api-types.sh
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: build-middleware-coverage-amd64${{ inputs.test_images_only && '-fast' || '' }}-${{ github.sha }}
          path: private/middleware/coverage/
          retention-days: 3
          if-no-files-found: ignore

      # Publish and obfuscate for Docker (only when image not cached)
      - name: Publish self-contained (linux-x64)
        if: inputs.api_exists != 'true'
        working-directory: private/middleware
        run: |
          dotnet publish middleware.csproj -c Release -o ./publish \
            --self-contained=true \
            --runtime linux-x64 \
            -p:PublishSingleFile=false \
            -p:PublishTrimmed=false \
            -p:UseAppHost=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ inputs.next_version }} \
            -p:REDIACC_BUILD_TYPE=RELEASE

      - name: Obfuscate assemblies (amd64)
        if: inputs.api_exists != 'true'
        working-directory: private/middleware
        run: |
          dotnet tool install --global Obfuscar.GlobalTool
          export PATH="$PATH:$HOME/.dotnet/tools"
          mkdir -p publish-final
          cd publish
          if obfuscar.console ../obfuscar.xml && [ -d "Obfuscated" ] && [ "$(ls -A Obfuscated)" ]; then
            cp -r Obfuscated/* ../publish-final/
            rm -f ../publish-final/Mapping.txt
            # Copy non-assembly files that obfuscar doesn't process
            for f in *.json *.so *.pdb middleware *.deps.json *.runtimeconfig.json; do
              [ -f "$f" ] && [ ! -f "../publish-final/$f" ] && cp "$f" ../publish-final/
            done
            # Copy remaining .dll files that Obfuscar didn't include (runtime assemblies
            # like System.Private.CoreLib.dll). Use -n to preserve obfuscated versions.
            find . -maxdepth 1 -name "*.dll" -exec cp -n {} ../publish-final/ \; 2>/dev/null || true
            find . -maxdepth 1 -type d -name "runtimes" -exec cp -r {} ../publish-final/ \; 2>/dev/null || true
            find . -maxdepth 1 -type d -regex '\./[a-z][a-z]-[A-Z][A-Z]' -exec cp -r {} ../publish-final/ \; 2>/dev/null || true
            [ -d "translations" ] && cp -r translations ../publish-final/
            [ -d "AppData" ] && cp -r AppData ../publish-final/
            find . -maxdepth 1 -name "*.so" -exec cp -n {} ../publish-final/ \; 2>/dev/null || true
          else
            echo "::warning::Obfuscation skipped or failed, using unobfuscated build"
            cp -r ./* ../publish-final/
          fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: inputs.api_exists != 'true'
        with:
          name: middleware-publish-amd64${{ inputs.test_images_only && '-fast' || '' }}-${{ github.sha }}
          path: private/middleware/publish-final/
          retention-days: 3

  # Middleware (arm64): Build, publish, and obfuscate (no tests)
  # Azure SQL Edge on arm64 has TLS certificate issues - tests run on amd64 cover code behavior
  build-middleware-arm64:
    name: Middleware (arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 25
    if: "!inputs.test_images_only"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,middleware,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Apply version bump
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: .ci/scripts/version/bump.sh --version ${{ inputs.next_version }}

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: 9.0.x

      # Build only (no tests - SQL Server unavailable on arm64 runners)
      - name: Run middleware build
        run: .ci/scripts/private/run-middleware.sh build

      # Publish and obfuscate for Docker (only when image not cached)
      - name: Publish self-contained (linux-arm64)
        if: inputs.api_exists != 'true'
        working-directory: private/middleware
        run: |
          dotnet publish middleware.csproj -c Release -o ./publish \
            --self-contained=true \
            --runtime linux-arm64 \
            -p:PublishSingleFile=false \
            -p:PublishTrimmed=false \
            -p:UseAppHost=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ inputs.next_version }} \
            -p:REDIACC_BUILD_TYPE=RELEASE

      - name: Obfuscate assemblies (arm64)
        if: inputs.api_exists != 'true'
        working-directory: private/middleware
        run: |
          dotnet tool install --global Obfuscar.GlobalTool
          export PATH="$PATH:$HOME/.dotnet/tools"
          mkdir -p publish-final
          cd publish
          if obfuscar.console ../obfuscar.xml && [ -d "Obfuscated" ] && [ "$(ls -A Obfuscated)" ]; then
            cp -r Obfuscated/* ../publish-final/
            rm -f ../publish-final/Mapping.txt
            # Copy non-assembly files that obfuscar doesn't process
            for f in *.json *.so *.pdb middleware *.deps.json *.runtimeconfig.json; do
              [ -f "$f" ] && [ ! -f "../publish-final/$f" ] && cp "$f" ../publish-final/
            done
            # Copy remaining .dll files that Obfuscar didn't include (runtime assemblies
            # like System.Private.CoreLib.dll). Use -n to preserve obfuscated versions.
            find . -maxdepth 1 -name "*.dll" -exec cp -n {} ../publish-final/ \; 2>/dev/null || true
            find . -maxdepth 1 -type d -name "runtimes" -exec cp -r {} ../publish-final/ \; 2>/dev/null || true
            find . -maxdepth 1 -type d -regex '\./[a-z][a-z]-[A-Z][A-Z]' -exec cp -r {} ../publish-final/ \; 2>/dev/null || true
            [ -d "translations" ] && cp -r translations ../publish-final/
            [ -d "AppData" ] && cp -r AppData ../publish-final/
            find . -maxdepth 1 -name "*.so" -exec cp -n {} ../publish-final/ \; 2>/dev/null || true
          else
            echo "::warning::Obfuscation skipped or failed, using unobfuscated build"
            cp -r ./* ../publish-final/
          fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: inputs.api_exists != 'true'
        with:
          name: middleware-publish-arm64${{ inputs.test_images_only && '-fast' || '' }}-${{ github.sha }}
          path: private/middleware/publish-final/
          retention-days: 3

  # API Docker: Build images from pre-built binaries on a single runner
  # Follows the same pattern as build-renet-docker (bridge)
  build-middleware-docker:
    name: API Docker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-middleware-amd64, build-middleware-arm64]
    if: >-
      always() && inputs.api_exists != 'true' &&
      needs.build-middleware-amd64.result == 'success' &&
      (inputs.test_images_only || needs.build-middleware-arm64.result == 'success')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,middleware,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: middleware-publish-amd64${{ inputs.test_images_only && '-fast' || '' }}-${{ github.sha }}
          path: publish/amd64/

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        if: "!inputs.test_images_only"
        with:
          name: middleware-publish-arm64${{ inputs.test_images_only && '-fast' || '' }}-${{ github.sha }}
          path: publish/arm64/

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build & push API image (amd64)
        run: |
          docker buildx build \
            --file private/middleware/Dockerfile.native \
            --platform linux/amd64 \
            --build-arg TARGETARCH=amd64 \
            --build-arg VERSION=${{ inputs.next_version }} \
            --tag ghcr.io/rediacc/elite/api:${{ inputs.api_tag }}-amd64 \
            --push \
            .

      - name: Build & push API image (arm64)
        if: "!inputs.test_images_only"
        run: |
          docker buildx build \
            --file private/middleware/Dockerfile.native \
            --platform linux/arm64 \
            --build-arg TARGETARCH=arm64 \
            --build-arg VERSION=${{ inputs.next_version }} \
            --tag ghcr.io/rediacc/elite/api:${{ inputs.api_tag }}-arm64 \
            --push \
            .

      - name: Create multi-arch manifest
        if: "!inputs.test_images_only"
        run: |
          .ci/scripts/docker/create-manifest.sh \
            --image api \
            --tag "${{ inputs.api_tag }}"

  build-middleware-docker-skip:
    name: API Docker (cached)
    runs-on: ubuntu-latest
    if: "!inputs.test_images_only && inputs.api_exists == 'true'"
    steps:
      - run: echo "::notice::Skipping Docker build - api:${{ inputs.api_tag }} already exists in registry"

  # ============================================================
  # RENET/BRIDGE: Docker Images
  # Note: Renet binaries (with embedded CRIU/rsync) are built by ci-build-renet.yml
  # This workflow downloads the unified artifact and builds Docker images only
  # ============================================================

  # Build Docker images from unified renet binaries
  build-renet-docker:
    name: Renet Docker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: inputs.bridge_exists != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,middleware,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}

      # Download full renet binaries (with embedded CRIU/rsync) from unified build
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: renet-binaries-${{ github.sha }}
          path: binaries/

      # Download native CRIU/rsync binaries (also from unified build)
      # These are copied to /opt/ in Docker image for remote machine distribution
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: native-amd64-${{ github.sha }}
          path: binaries/

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: native-arm64-${{ github.sha }}
          path: binaries/
          merge-multiple: true

      - name: List binaries
        run: ls -la binaries/

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build & push amd64 bridge image
        run: |
          docker buildx build \
            --file private/renet/Dockerfile.native \
            --platform linux/amd64 \
            --build-arg TARGETARCH=amd64 \
            --tag ghcr.io/rediacc/elite/bridge:${{ inputs.bridge_tag }}-amd64 \
            --push \
            .

      - name: Build & push arm64 bridge image
        if: "!inputs.test_images_only"
        run: |
          docker buildx build \
            --file private/renet/Dockerfile.native \
            --platform linux/arm64 \
            --build-arg TARGETARCH=arm64 \
            --tag ghcr.io/rediacc/elite/bridge:${{ inputs.bridge_tag }}-arm64 \
            --push \
            .

      - name: Create multi-arch manifest
        if: "!inputs.test_images_only"
        run: |
          .ci/scripts/docker/create-manifest.sh \
            --image bridge \
            --tag "${{ inputs.bridge_tag }}"

  build-renet-skip:
    name: Renet (cached)
    runs-on: ubuntu-latest
    if: inputs.bridge_exists == 'true'
    steps:
      - run: echo "::notice::Skipping Docker build - bridge:${{ inputs.bridge_tag }} already exists in registry"

  # ============================================================
  # DEVCONTAINER: Development Environment Image
  # ============================================================

  build-devcontainer-amd64:
    name: Devcontainer (amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: "!inputs.test_images_only"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Generate tags
        id: tags
        run: |
          DATE_TAG=$(date -u +%Y%m%d)
          echo "date_tag=${DATE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .devcontainer/
          file: .devcontainer/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/rediacc/devcontainer:${{ steps.tags.outputs.date_tag }}-amd64
            ghcr.io/rediacc/devcontainer:latest-amd64

  build-devcontainer-arm64:
    name: Devcontainer (arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    if: "!inputs.test_images_only"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Generate tags
        id: tags
        run: |
          DATE_TAG=$(date -u +%Y%m%d)
          echo "date_tag=${DATE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .devcontainer/
          file: .devcontainer/Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/rediacc/devcontainer:${{ steps.tags.outputs.date_tag }}-arm64
            ghcr.io/rediacc/devcontainer:latest-arm64

  build-devcontainer-manifest:
    name: Devcontainer Manifest
    runs-on: ubuntu-latest
    needs: [build-devcontainer-amd64, build-devcontainer-arm64]
    if: "!inputs.test_images_only && github.event_name == 'push'"
    steps:
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Generate tags
        id: tags
        run: |
          DATE_TAG=$(date -u +%Y%m%d)
          echo "date_tag=${DATE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create manifest (dated)
        run: |
          docker buildx imagetools create \
            -t ghcr.io/rediacc/devcontainer:${{ steps.tags.outputs.date_tag }} \
            ghcr.io/rediacc/devcontainer:${{ steps.tags.outputs.date_tag }}-amd64 \
            ghcr.io/rediacc/devcontainer:${{ steps.tags.outputs.date_tag }}-arm64

      - name: Create manifest (latest)
        run: |
          docker buildx imagetools create \
            -t ghcr.io/rediacc/devcontainer:latest \
            ghcr.io/rediacc/devcontainer:latest-amd64 \
            ghcr.io/rediacc/devcontainer:latest-arm64

      - name: Verify
        run: |
          docker buildx imagetools inspect ghcr.io/rediacc/devcontainer:latest
          echo "## Devcontainer Image Published" >> "$GITHUB_STEP_SUMMARY"
          echo "- **latest:** \`ghcr.io/rediacc/devcontainer:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **dated:** \`ghcr.io/rediacc/devcontainer:${{ steps.tags.outputs.date_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
