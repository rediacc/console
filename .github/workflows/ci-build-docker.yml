name: Console CI - Build (Docker)

on:
  workflow_call:
    inputs:
      next_version:
        type: string
        required: false
      renet_tag:
        type: string
        required: false
      renet_exists:
        type: string
        required: false
      plugins_tag:
        type: string
        required: false
      plugins_exists:
        type: string
        required: false
      web_tag:
        type: string
        required: false
      web_exists:
        type: string
        required: false
      cli_tag:
        type: string
        required: false
      cli_exists:
        type: string
        required: false
      test_images_only:
        type: boolean
        required: false
        default: false
    secrets:
      APP_PRIVATE_KEY:
        required: false
      ACCOUNT_ED25519_PUBLIC_KEY:
        required: false

permissions:
  contents: read
  packages: write   # GHCR push

jobs:
  build-cli:
    name: CLI
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Apply version bump
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: .ci/scripts/version/bump.sh --version ${{ inputs.next_version }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: .ci/scripts/setup/install-deps.sh
      - run: .ci/scripts/setup/build-packages.sh
      - run: .ci/scripts/build/build-cli.sh
        env:
          # OTLP credentials are fetched at runtime after `rdc subscription
          # login` — no longer baked into the bundle (renet#51).
          CLI_VERSION: ${{ inputs.next_version || '0.0.0-dev' }}

      - name: Prepare CLI bundle artifact
        run: |
          mkdir -p bundle
          cp packages/cli/dist/cli-bundle.cjs bundle/
          cp packages/cli/package.json bundle/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: cli-bundle${{ inputs.test_images_only && '-fast' || '' }}-${{ github.sha }}
          path: bundle/
          retention-days: 3

      - name: Create CLI npm package
        working-directory: packages/cli
        run: |
          # Inject version for correct tarball naming
          VERSION="${{ inputs.next_version || '0.0.0-dev' }}"
          if [[ "$VERSION" != "0.0.0-dev" ]]; then
            jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          fi
          mkdir -p /tmp/cli-npm
          npm pack --pack-destination /tmp/cli-npm
          cd /tmp/cli-npm
          CLI_PKG=$(ls rediacc-cli-*.tgz 2>/dev/null | head -1)
          [ -n "$CLI_PKG" ] && cp "$CLI_PKG" rediacc-cli-latest.tgz

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: cli-npm${{ inputs.test_images_only && '-fast' || '' }}-${{ github.sha }}
          path: /tmp/cli-npm/
          retention-days: 3

  build-www:
    name: WWW
    # Standard runner (not ubuntu-slim): the committed solution+tutorial videos make
    # the dist/ artifact ~5.6GB, and the slim runner was cancelled mid-upload. A
    # standard runner has the disk/network headroom to build and upload it reliably.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: .ci/scripts/setup/install-deps.sh
      - run: .ci/scripts/setup/build-packages.sh
      - run: .ci/scripts/build/build-www.sh
        env:
          APP_VERSION: ${{ inputs.next_version || 'dev' }}
      - name: Free source video media (dist/ already holds the copy that is uploaded)
        shell: bash
        run: |
          rm -rf packages/www/public/assets/videos packages/www/public/assets/tutorials || true
          df -h . 2>/dev/null || true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: build-www${{ inputs.test_images_only && '-fast' || '' }}-${{ github.sha }}
          path: packages/www/dist/
          retention-days: 3

  build-json:
    name: JSON
    runs-on: ubuntu-slim
    if: "!inputs.test_images_only"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Apply version bump
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: .ci/scripts/version/bump.sh --version ${{ inputs.next_version }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: .ci/scripts/setup/install-deps.sh
      - run: .ci/scripts/build/build-json.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: build-json${{ inputs.test_images_only && '-fast' || '' }}-${{ github.sha }}
          path: packages/json/dist/
          retention-days: 3

  build-plugins:
    name: Plugins & Docker
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: "!inputs.test_images_only"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Apply version bump
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: .ci/scripts/version/bump.sh --version ${{ inputs.next_version }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      # Build validation (dry-run)
      - name: Validate plugin images
        run: .ci/scripts/build/build-plugins.sh --dry-run

      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Determine version
        id: version
        run: |
          echo "version=${{ inputs.next_version }}" >> $GITHUB_OUTPUT

      - name: Build & Push Plugin Docker images
        if: inputs.plugins_exists != 'true'
        run: |
          .ci/scripts/docker/build-image.sh --image plugin-terminal --ci-tag ${{ inputs.plugins_tag }} --version ${{ steps.version.outputs.version }} --push
          .ci/scripts/docker/build-image.sh --image plugin-browser --ci-tag ${{ inputs.plugins_tag }} --version ${{ steps.version.outputs.version }} --push

      - name: Skip Docker build (cached)
        if: inputs.plugins_exists == 'true'
        run: echo "::notice::Skipping Docker build - plugins:${{ inputs.plugins_tag }} already exists in registry"

  # Server Docker: builds the consolidated Dockerfile in two variants from
  # one source. The cloud variant publishes to the existing internal
  # ghcr.io/rediacc/elite/web path; the onprem variant publishes to the
  # customer-facing ghcr.io/rediacc/server path.
  #
  # Both consume the same pre-built artifacts: build-www (marketing site),
  # cli-npm (CLI tarball), and the renet-binaries
  # artifact from ci-build-renet.yml (which embeds CRIU/rsync/rclone and
  # bakes ACCOUNT_ED25519_PUBLIC_KEY into the binary). The account server
  # bundle is built inside the Dockerfile via esbuild --bundle, with the
  # entry point parameterized by ACCOUNT_ENTRY (node | on-premise).
  #
  # Builds are split per-arch onto NATIVE runners (ubuntu-latest for amd64,
  # ubuntu-24.04-arm for arm64). Earlier revisions ran both archs in a single
  # job with QEMU emulation for arm64; the cloud arm64 build (npm install +
  # esbuild bundling under qemu) consistently exceeded the 30 minute timeout
  # and got watchdog-cancelled. Native runners eliminate the emulation tax.
  # Per-arch tags are pushed by these jobs; build-server-docker-manifest
  # stitches them into a single multi-arch tag.
  #
  # The amd64 and arm64 jobs are duplicated rather than expressed as a matrix
  # because GitHub Actions does not allow `matrix` context inside a job-level
  # `if`, so we cannot conditionally skip arm64 in test_images_only mode from
  # within a unified matrix. Two jobs is the simplest way to gate arm64 on
  # `!inputs.test_images_only` while keeping amd64 unconditional.
  build-server-docker-amd64:
    name: Server Docker (${{ matrix.variant }} amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [build-www, build-cli]
    if: inputs.web_exists != 'true'
    strategy:
      fail-fast: false
      matrix:
        variant: [cloud, onprem]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-www${{ inputs.test_images_only && '-fast' || '' }}-${{ github.sha }}
          path: www-assets/

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: cli-npm${{ inputs.test_images_only && '-fast' || '' }}-${{ github.sha }}
          path: cli-npm/

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: renet-binaries-${{ github.sha }}
          path: binaries/

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Build account portal SPA
        run: |
          npm ci
          npm run install:natives
          npm run build:packages
          # The account portal SPA build runs entirely in private/account/web (a
          # Next/Vite tree). The nested installs here are SPA-only — they don't
          # need root install:natives to be re-run because the SPA pipeline uses
          # esbuild/tailwind via per-platform optional deps (no install scripts
          # needed) and never imports better-sqlite3 / node-pty / ssh2.
          cd private/account && npm install
          cd web && npm install && npx vite build --outDir ../../../account-web-assets

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Resolve variant-specific values
        id: resolve
        run: |
          case "${{ matrix.variant }}" in
            cloud)
              echo "image_path=ghcr.io/rediacc/elite/web" >> "$GITHUB_OUTPUT"
              echo "account_entry=node" >> "$GITHUB_OUTPUT"
              ;;
            onprem)
              echo "image_path=ghcr.io/rediacc/server" >> "$GITHUB_OUTPUT"
              echo "account_entry=on-premise" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Build & push (amd64)
        env:
          ACCOUNT_ED25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_ED25519_PUBLIC_KEY }}
        run: |
          docker buildx build \
            --file Dockerfile \
            --target ${{ matrix.variant }} \
            --platform linux/amd64 \
            --build-arg VITE_APP_VERSION=${{ inputs.web_tag }} \
            --build-arg ACCOUNT_ENTRY=${{ steps.resolve.outputs.account_entry }} \
            --build-arg "ACCOUNT_ED25519_PUBLIC_KEY=$ACCOUNT_ED25519_PUBLIC_KEY" \
            --tag ${{ steps.resolve.outputs.image_path }}:${{ inputs.web_tag }}-amd64 \
            --push \
            .

  build-server-docker-arm64:
    name: Server Docker (${{ matrix.variant }} arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    needs: [build-www, build-cli]
    if: "inputs.web_exists != 'true' && !inputs.test_images_only"
    strategy:
      fail-fast: false
      matrix:
        variant: [cloud, onprem]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-www${{ inputs.test_images_only && '-fast' || '' }}-${{ github.sha }}
          path: www-assets/

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: cli-npm${{ inputs.test_images_only && '-fast' || '' }}-${{ github.sha }}
          path: cli-npm/

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: renet-binaries-${{ github.sha }}
          path: binaries/

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Build account portal SPA
        run: |
          npm ci
          npm run install:natives
          npm run build:packages
          # The account portal SPA build runs entirely in private/account/web (a
          # Next/Vite tree). The nested installs here are SPA-only — they don't
          # need root install:natives to be re-run because the SPA pipeline uses
          # esbuild/tailwind via per-platform optional deps (no install scripts
          # needed) and never imports better-sqlite3 / node-pty / ssh2.
          cd private/account && npm install
          cd web && npm install && npx vite build --outDir ../../../account-web-assets

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Resolve variant-specific values
        id: resolve
        run: |
          case "${{ matrix.variant }}" in
            cloud)
              echo "image_path=ghcr.io/rediacc/elite/web" >> "$GITHUB_OUTPUT"
              echo "account_entry=node" >> "$GITHUB_OUTPUT"
              ;;
            onprem)
              echo "image_path=ghcr.io/rediacc/server" >> "$GITHUB_OUTPUT"
              echo "account_entry=on-premise" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Build & push (arm64)
        env:
          ACCOUNT_ED25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_ED25519_PUBLIC_KEY }}
        run: |
          docker buildx build \
            --file Dockerfile \
            --target ${{ matrix.variant }} \
            --platform linux/arm64 \
            --build-arg VITE_APP_VERSION=${{ inputs.web_tag }} \
            --build-arg ACCOUNT_ENTRY=${{ steps.resolve.outputs.account_entry }} \
            --build-arg "ACCOUNT_ED25519_PUBLIC_KEY=$ACCOUNT_ED25519_PUBLIC_KEY" \
            --tag ${{ steps.resolve.outputs.image_path }}:${{ inputs.web_tag }}-arm64 \
            --push \
            .

  # Combine the per-arch tags pushed by build-server-docker-{amd64,arm64} into
  # a single multi-arch manifest tag. Skipped in test_images_only mode (only
  # amd64 is built in fast mode, no manifest needed).
  build-server-docker-manifest:
    name: Server Docker Manifest (${{ matrix.variant }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-server-docker-amd64, build-server-docker-arm64]
    if: "inputs.web_exists != 'true' && !inputs.test_images_only"
    strategy:
      fail-fast: false
      matrix:
        variant: [cloud, onprem]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Resolve image path
        id: resolve
        run: |
          case "${{ matrix.variant }}" in
            cloud)
              echo "image_path=ghcr.io/rediacc/elite/web" >> "$GITHUB_OUTPUT"
              ;;
            onprem)
              echo "image_path=ghcr.io/rediacc/server" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Create multi-arch manifest
        run: |
          .ci/scripts/docker/create-manifest.sh \
            --image-path ${{ steps.resolve.outputs.image_path }} \
            --tag "${{ inputs.web_tag }}"

  build-server-docker-skip:
    name: Server Docker (cached)
    runs-on: ubuntu-latest
    if: inputs.web_exists == 'true'
    steps:
      - run: echo "::notice::Skipping Docker build - server image at tag ${{ inputs.web_tag }} already exists in registry"

  # CLI Docker: Build images from pre-built bundle on a single runner
  # CLI bundle is JavaScript (platform-independent), so no per-arch compilation needed
  build-cli-docker:
    name: CLI Docker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-cli]
    if: "!inputs.test_images_only && inputs.cli_exists != 'true'"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: cli-bundle${{ inputs.test_images_only && '-fast' || '' }}-${{ github.sha }}
          path: bundle/

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build & push CLI image (amd64)
        run: |
          docker buildx build \
            --file packages/cli/Dockerfile.native \
            --platform linux/amd64 \
            --tag ghcr.io/rediacc/elite/cli:${{ inputs.cli_tag }}-amd64 \
            --push \
            .

      - name: Build & push CLI image (arm64)
        run: |
          docker buildx build \
            --file packages/cli/Dockerfile.native \
            --platform linux/arm64 \
            --tag ghcr.io/rediacc/elite/cli:${{ inputs.cli_tag }}-arm64 \
            --push \
            .

      - name: Create multi-arch manifest
        run: |
          .ci/scripts/docker/create-manifest.sh \
            --image cli \
            --tag "${{ inputs.cli_tag }}"

  build-cli-docker-skip:
    name: CLI Docker (cached)
    runs-on: ubuntu-latest
    if: "!inputs.test_images_only && inputs.cli_exists == 'true'"
    steps:
      - run: echo "::notice::Skipping Docker build - cli:${{ inputs.cli_tag }} already exists in registry"

  # ============================================================
  # RENET: Docker Images
  # Note: Renet binaries (with embedded CRIU/rsync) are built by ci-build-renet.yml
  # This workflow downloads the unified artifact and builds Docker images only
  # ============================================================

  # Build Docker images from unified renet binaries
  build-renet-docker:
    name: Renet Docker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: inputs.renet_exists != 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}

      # Download full renet binaries (with embedded CRIU/rsync) from unified build
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: renet-binaries-${{ github.sha }}
          path: binaries/

      # Download native CRIU/rsync binaries (also from unified build)
      # These are copied to /opt/ in Docker image for remote machine distribution
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: native-amd64-${{ github.sha }}
          path: binaries/

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: native-arm64-${{ github.sha }}
          path: binaries/
          merge-multiple: true

      - name: List binaries
        run: ls -la binaries/

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build & push amd64 renet image
        run: |
          docker buildx build \
            --file private/renet/Dockerfile.native \
            --platform linux/amd64 \
            --build-arg TARGETARCH=amd64 \
            --tag ghcr.io/rediacc/elite/renet:${{ inputs.renet_tag }}-amd64 \
            --push \
            .

      - name: Build & push arm64 renet image
        if: "!inputs.test_images_only"
        run: |
          docker buildx build \
            --file private/renet/Dockerfile.native \
            --platform linux/arm64 \
            --build-arg TARGETARCH=arm64 \
            --tag ghcr.io/rediacc/elite/renet:${{ inputs.renet_tag }}-arm64 \
            --push \
            .

      - name: Create multi-arch manifest
        if: "!inputs.test_images_only"
        run: |
          .ci/scripts/docker/create-manifest.sh \
            --image renet \
            --tag "${{ inputs.renet_tag }}"

  build-renet-skip:
    name: Renet (cached)
    runs-on: ubuntu-latest
    if: inputs.renet_exists == 'true'
    steps:
      - run: echo "::notice::Skipping Docker build - renet:${{ inputs.renet_tag }} already exists in registry"

  # ============================================================
  # DEVCONTAINER: Development Environment Image
  # ============================================================

  build-devcontainer-amd64:
    name: Devcontainer (amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: "!inputs.test_images_only"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Generate tags
        id: tags
        run: |
          DATE_TAG=$(date -u +%Y%m%d)
          echo "date_tag=${DATE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .devcontainer/
          file: .devcontainer/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/rediacc/devcontainer:${{ steps.tags.outputs.date_tag }}-amd64
            ghcr.io/rediacc/devcontainer:latest-amd64

  build-devcontainer-arm64:
    name: Devcontainer (arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    if: "!inputs.test_images_only"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Generate tags
        id: tags
        run: |
          DATE_TAG=$(date -u +%Y%m%d)
          echo "date_tag=${DATE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .devcontainer/
          file: .devcontainer/Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/rediacc/devcontainer:${{ steps.tags.outputs.date_tag }}-arm64
            ghcr.io/rediacc/devcontainer:latest-arm64

  build-devcontainer-manifest:
    name: Devcontainer Manifest
    runs-on: ubuntu-latest
    needs: [build-devcontainer-amd64, build-devcontainer-arm64]
    if: "!inputs.test_images_only && github.event_name == 'push'"
    steps:
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Generate tags
        id: tags
        run: |
          DATE_TAG=$(date -u +%Y%m%d)
          echo "date_tag=${DATE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create manifest (dated)
        run: |
          docker buildx imagetools create \
            -t ghcr.io/rediacc/devcontainer:${{ steps.tags.outputs.date_tag }} \
            ghcr.io/rediacc/devcontainer:${{ steps.tags.outputs.date_tag }}-amd64 \
            ghcr.io/rediacc/devcontainer:${{ steps.tags.outputs.date_tag }}-arm64

      - name: Create manifest (latest)
        run: |
          docker buildx imagetools create \
            -t ghcr.io/rediacc/devcontainer:latest \
            ghcr.io/rediacc/devcontainer:latest-amd64 \
            ghcr.io/rediacc/devcontainer:latest-arm64

      - name: Verify
        run: |
          docker buildx imagetools inspect ghcr.io/rediacc/devcontainer:latest
          echo "## Devcontainer Image Published" >> "$GITHUB_STEP_SUMMARY"
          echo "- **latest:** \`ghcr.io/rediacc/devcontainer:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **dated:** \`ghcr.io/rediacc/devcontainer:${{ steps.tags.outputs.date_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
