name: Console CI - Build (CLI Executables)

on:
  workflow_call:
    inputs:
      next_version:
        type: string
        required: false
      skip_win_arm64:
        type: boolean
        required: false
        default: false
    secrets:
      APP_PRIVATE_KEY:
        required: false

permissions:
  contents: read

# Note: Renet binaries are built by ci-build-renet.yml and downloaded as artifact
# This workflow depends on build-renet completing first (configured in ci.yml)

jobs:
  build-cli-executables:
    name: CLI (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            timeout: 15
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            timeout: 15
          - os: macos-latest
            platform: mac
            arch: arm64
            timeout: 15
          - os: macos-15-intel
            platform: mac
            arch: x64
            timeout: 15
          - os: windows-latest
            platform: win
            arch: x64
            timeout: 20
          - os: windows-11-arm
            platform: win
            arch: arm64
            timeout: 30
          # Musl-linked Linux binaries (for Alpine/musl distros)
          # Built inside node:22-alpine Docker container on Ubuntu runners
          - os: ubuntu-latest
            platform: linux-musl
            arch: x64
            timeout: 20
          - os: ubuntu-24.04-arm
            platform: linux-musl
            arch: arm64
            timeout: 20
    env:
      SKIP_THIS: ${{ inputs.skip_win_arm64 && matrix.platform == 'win' && matrix.arch == 'arm64' }}
    steps:
      - name: Skip win-arm64 on PR
        if: env.SKIP_THIS == 'true'
        shell: bash
        run: |
          echo "::notice::Skipping win-arm64 CLI build (PR mode)"
          exit 0

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        if: env.SKIP_THIS != 'true'

      # Download full renet binaries (with embedded CRIU/rsync) from unified build
      - name: Download renet binaries
        if: env.SKIP_THIS != 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: renet-binaries-${{ github.sha }}
          path: private/bin/

      # Native build steps (skip for musl — handled inside Docker)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        if: env.SKIP_THIS != 'true' && matrix.platform != 'linux-musl'
        with:
          node-version: '22'
          cache: 'npm'

      - run: .ci/scripts/setup/install-deps.sh ${{ runner.os == 'Windows' && '--ignore-scripts' || '' }}
        if: env.SKIP_THIS != 'true' && matrix.platform != 'linux-musl'
        shell: bash
      - run: .ci/scripts/setup/build-packages.sh
        if: env.SKIP_THIS != 'true' && matrix.platform != 'linux-musl'
        shell: bash

      - name: Build CLI SEA executable
        if: env.SKIP_THIS != 'true' && matrix.platform != 'linux-musl'
        shell: bash
        run: .ci/scripts/build/build-cli-executables.sh --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}
        env:
          CLI_VERSION: ${{ inputs.next_version || '0.0.0-dev' }}

      # Musl build (runs entire build inside Alpine Docker container)
      - name: Build CLI SEA executable (musl)
        if: env.SKIP_THIS != 'true' && matrix.platform == 'linux-musl'
        shell: bash
        run: .ci/scripts/build/build-cli-musl.sh --arch ${{ matrix.arch }}
        env:
          CLI_VERSION: ${{ inputs.next_version || '0.0.0-dev' }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: env.SKIP_THIS != 'true'
        with:
          name: build-cli-${{ matrix.platform }}-${{ matrix.arch }}-${{ github.sha }}
          path: dist/cli/
          retention-days: 3
          if-no-files-found: error
