name: Console CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]
  merge_group:
    types: [checks_requested]
  schedule:
    - cron: '0 1 * * *'  # Nightly at 1:00 UTC (2:00 CET)
  # workflow_dispatch removed: manual triggers don't satisfy PR checks and waste CI budget.
  # Use empty commits (git commit --allow-empty) to retrigger PR CI instead.

# Minimal default permissions — jobs that need more declare their own
permissions:
  contents: read
  statuses: write
  packages: read    # Most jobs pull from GHCR

# E2E Browser Configuration
# Default: chromium only. Use workflow_dispatch with "all-browsers" to test all.
# To permanently enable all browsers, change the fallback value below.
env:
  E2E_BROWSERS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.browsers == 'all-browsers' && 'chromium firefox webkit msedge' || 'chromium' }}

concurrency:
  group: ${{ github.event_name == 'push' && 'ci-main' || format('ci-{0}', github.run_id) }}
  cancel-in-progress: false

jobs:
  # ============================================================================
  # COLUMN 1: INITIALIZE
  # Jobs: initialize, ci-watchdog
  # No dependencies - starts immediately for fast feedback on Quality checks
  # ============================================================================
  initialize:
    name: Initialize
    runs-on: ubuntu-latest  # Needs Docker for registry cache check
    if: github.event_name != 'push' || (github.actor != 'github-actions[bot]' && github.actor != 'dependabot[bot]' && !contains(github.event.head_commit.message, '[skip ci]'))
    outputs:
      is_fork: ${{ steps.fork-check.outputs.is_fork }}
      is_bot: ${{ steps.init.outputs.is_bot }}
      next_version: ${{ steps.init.outputs.next_version }}
      bump_type: ${{ steps.init.outputs.bump_type }}
      channel: ${{ steps.staging.outputs.channel }}
      api_tag: ${{ steps.init.outputs.api_tag }}
      api_exists: ${{ steps.init.outputs.api_exists }}
      bridge_tag: ${{ steps.init.outputs.bridge_tag }}
      bridge_exists: ${{ steps.init.outputs.bridge_exists }}
      plugins_tag: ${{ steps.init.outputs.plugins_tag }}
      plugins_exists: ${{ steps.init.outputs.plugins_exists }}
      web_tag: ${{ steps.init.outputs.web_tag }}
      web_exists: ${{ steps.init.outputs.web_exists }}
      cli_tag: ${{ steps.init.outputs.cli_tag }}
      cli_exists: ${{ steps.init.outputs.cli_exists }}
      image_tag: ${{ steps.init.outputs.image_tag }}
      # full_suite: run all jobs on PR, merge queue, and nightly. Skip expensive
      # jobs (quality, standalone, elite) on push-to-main since PR already validated.
      full_suite: ${{ github.event_name != 'push' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-tags: true

      - name: Detect fork PR
        id: fork-check
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && \
                "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
            echo "is_fork=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_fork=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          preset: ci
          repositories: console,middleware,renet,account,sql,elite,homebrew-tap

      # PR Validation (PR events only)
      - name: Validate PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: return await require('./.ci/scripts/ci/validate-pr.cjs')({github, context, core})

      # Login to GHCR for registry cache check
      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      # Run consolidated initialization script
      - name: Initialize CI
        id: init
        env:
          GITHUB_PAT: ${{ steps.app-token.outputs.token }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_ACTOR: ${{ github.actor }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          .ci/scripts/ci/initialize.sh --output "$GITHUB_OUTPUT"

      - name: Generate channel context
        id: staging
        run: |
          # Only push and pull_request events write to R2. merge_group (merge
          # queue) and schedule (nightly) get empty channel -> stage-artifacts
          # still runs for validation but every R2/GHCR upload step self-gates
          # on channel != ''. Prior design set dryrun-<sha> here and produced
          # ~5 GB of orphan R2 bytes per merge-queue check and per nightly run.
          if [[ "${{ github.event_name }}" == "push" ]]; then
            CHANNEL="edge"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CHANNEL="pr-${{ github.event.pull_request.number }}"
          else
            CHANNEL=""
          fi
          echo "channel=${CHANNEL}" >> $GITHUB_OUTPUT

      - name: Assert channel matches event
        # Guard against someone reintroducing a dryrun-<sha> fallthrough
        # for merge_group/schedule events.
        run: .ci/scripts/ci/assert-channel-for-event.sh "${{ github.event_name }}" "${{ steps.staging.outputs.channel }}"

      # Upload CI tags as artifact for debugging
      - name: Upload CI Tags
        if: steps.init.outputs.is_bot != 'true'
        run: |
          cat > ci-tags.txt << EOF
          api_tag=${{ steps.init.outputs.api_tag }}
          bridge_tag=${{ steps.init.outputs.bridge_tag }}
          plugins_tag=${{ steps.init.outputs.plugins_tag }}
          web_tag=${{ steps.init.outputs.web_tag }}
          EOF
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: steps.init.outputs.is_bot != 'true'
        with:
          name: ci-tags-${{ github.sha }}
          path: ci-tags.txt
          retention-days: 1

  # ============================================================================
  # MIGRATION TEST
  # Validates that D1 migrations apply cleanly against a production data clone.
  # Creates an ephemeral D1 database, clones production, runs migrations, then
  # deletes the database. No worker is deployed -- CI-only, no public URL.
  # ============================================================================
  migration-test:
    name: Migration Test
    needs: [initialize]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      always() &&
      needs.initialize.outputs.is_fork != 'true' &&
      needs.initialize.result == 'success'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          sparse-checkout: .github/actions

      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          preset: ci
          repositories: console,account

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Init account submodule
        run: git submodule update --init --depth 1 private/account

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Reap stale migration-test D1 databases
        run: .ci/scripts/housekeeping/cleanup-stale-d1.sh --max-age 60
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Test migrations against all regional clones (edge first, then stable)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          # Collect every regional DB: edges first (they are the release
          # soak environment -- catch migration regressions there before
          # they can propagate to stable on the next promotion), then
          # the stable clones.
          mapfile -t EDGE_DBS < <(jq -r '.regions[].edgeD1.name' regions.json)
          mapfile -t STABLE_DBS < <(jq -r '.regions[].d1.name' regions.json)
          ALL_DBS=("${EDGE_DBS[@]}" "${STABLE_DBS[@]}")
          CLEANUP_DBS=()

          cleanup() {
            echo "::group::Cleanup: deleting test databases"
            for db in "${CLEANUP_DBS[@]}"; do
              npx wrangler d1 delete "$db" --skip-confirmation 2>/dev/null || true
              echo "  Deleted $db"
            done
            echo "::endgroup::"
          }
          trap cleanup EXIT

          for SOURCE_DB in "${ALL_DBS[@]}"; do
            # REGION_ID strips either account-db- or edge-account-db- prefix.
            REGION_ID="${SOURCE_DB#account-db-}"
            REGION_ID="${REGION_ID#edge-account-db-}"
            # Tag the test DB name so edge vs stable clones are visible in logs
            # and any leaked test DB is trivially attributable to its source.
            if [[ "$SOURCE_DB" == edge-account-db-* ]]; then
              CHANNEL_TAG="edge"
            else
              CHANNEL_TAG="stable"
            fi
            DB_NAME="migration-test-${CHANNEL_TAG}-${REGION_ID}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
            CLEANUP_DBS+=("$DB_NAME")

            echo "::group::Test migrations against $SOURCE_DB (${CHANNEL_TAG}/${REGION_ID})"

            npx wrangler d1 create "$DB_NAME" --location eeur
            DB_UUID="$(npx wrangler d1 info "$DB_NAME" --json 2>/dev/null \
              | sed -n '/^[[:space:]]*[{[]/,$p' \
              | jq -r '.uuid // empty')"

            if [[ -z "$DB_UUID" ]]; then
              echo "::error::Failed to get UUID for $DB_NAME"
              exit 1
            fi

            .ci/scripts/deploy/clone-d1.sh --source "$SOURCE_DB" --target "$DB_NAME"

            TMPCONFIG="workers/www/wrangler-migration-test.toml"
            cat > "$TMPCONFIG" <<TOML
          name = "migration-test"
          main = "src/index.ts"
          compatibility_date = "2026-01-20"

          [[d1_databases]]
          binding = "DB"
          database_name = "$DB_NAME"
          database_id = "$DB_UUID"
          migrations_dir = "../../private/account/drizzle"
          TOML

            cd workers/www
            npx wrangler d1 migrations apply "$DB_NAME" --remote --config wrangler-migration-test.toml
            rm -f wrangler-migration-test.toml
            cd "$GITHUB_WORKSPACE"

            echo "  $SOURCE_DB (${CHANNEL_TAG}/${REGION_ID}): migrations applied successfully"
            echo "::endgroup::"
          done

          echo "All ${#ALL_DBS[@]} regional migration tests passed (${#EDGE_DBS[@]} edge + ${#STABLE_DBS[@]} stable)"

  cancel-watchdog:
    name: CI Watchdog
    needs: [initialize]
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    timeout-minutes: 180  # 3 hours max
    # Use !cancelled() so force-cancel from newer runs can stop this job
    if: ${{ !cancelled() && needs.initialize.result == 'success' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          sparse-checkout: |
            .ci/scripts
            .ci/prompts

      - name: Cancel older runs
        if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'no-cancel-push')
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: .ci/scripts/ci/cancel-older-runs.sh --timeout 60 --poll-interval 10

      - name: Monitor all jobs and cancel on failure
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          WATCHDOG_EXCLUDE_PATTERNS: 'Watchdog,CI Complete'
          WATCHDOG_NO_RETRY_PATTERNS: 'Quality,Review Gate'
          WATCHDOG_WAIT_PATTERNS: 'Migration Test'
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        with:
          script: return await require('./.ci/scripts/ci/watchdog-monitor.cjs')({github, context, core})

  # ============================================================================
  # COLUMN 2: QUALITY
  # Jobs: quality (reusable workflow)
  # Dependencies: [initialize]
  # ============================================================================
  quality:
    name: Quality
    needs: [initialize]
    if: needs.initialize.outputs.is_bot != 'true' && needs.initialize.outputs.full_suite == 'true'
    uses: ./.github/workflows/ci-quality.yml
    with:
      is_bot: ${{ needs.initialize.outputs.is_bot }}
      next_version: ${{ needs.initialize.outputs.next_version }}
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # ============================================================================
  # REVIEW GATE: Trigger Gemini review, wait for it, check threads & comments
  # Dependencies: [initialize, quality]
  # Must pass before Build jobs can start
  #
  # Flow: Quality passes → Trigger Gemini → Wait for response →
  #        Check resolved threads → Check unreplied comments
  # ============================================================================
  review-gate:
    name: Review Gate
    needs: [initialize, quality]
    runs-on: ubuntu-slim
    if: needs.initialize.outputs.is_bot != 'true' && github.event_name == 'pull_request' && needs.initialize.outputs.is_fork != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          sparse-checkout: |
            .ci/scripts
            .github/actions
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          preset: cd
          repositories: console
      - name: Trigger Gemini review
        run: .ci/scripts/quality/trigger-gemini-review.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
      - name: Wait for Gemini review
        run: .ci/scripts/quality/wait-gemini-review.sh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
      - name: Check resolved threads
        run: .ci/scripts/quality/check-resolved-threads.sh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
      - name: Check unreplied review comments
        run: .ci/scripts/quality/check-review-comments.sh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}

  # ============================================================================
  # STRIPE SANDBOX: Deploy per-PR account server with sandbox Stripe keys
  # Seeds products/prices, creates webhook endpoint, deploys Cloudflare Worker
  # Only runs on pull_request events
  # ============================================================================
  stripe-sandbox:
    name: Stripe Sandbox
    needs: [initialize, quality, review-gate]
    runs-on: ubuntu-latest  # Needs Docker for account server
    if: >-
      always() &&
      needs.initialize.outputs.is_fork != 'true' &&
      github.event_name == 'pull_request' &&
      needs.initialize.result == 'success' &&
      needs.quality.result == 'success' &&
      needs.review-gate.result == 'success'
    outputs:
      account_server_url: ${{ steps.deploy.outputs.account_server_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          sparse-checkout: .github/actions

      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          preset: ci
          repositories: console,account

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Initialize account submodule
        run: git submodule update --init --depth 1 private/account

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npm run build:packages

      - name: Install account dependencies
        run: npm install
        working-directory: private/account

      - name: Setup Stripe sandbox
        run: npx tsx scripts/setup-sandbox.ts --pr-number ${{ github.event.pull_request.number }} --skip-webhook
        working-directory: private/account
        env:
          STRIPE_SANDBOX_SECRET_KEY: ${{ secrets.STRIPE_SANDBOX_SECRET_KEY }}

      - name: Start account server
        id: deploy
        run: bash .ci/scripts/infra/ci-start-account.sh
        env:
          ED25519_PRIVATE_KEY: ${{ secrets.ACCOUNT_ED25519_PRIVATE_KEY }}
          ED25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_ED25519_PUBLIC_KEY }}
          ACCOUNT_SERVER_API_KEY: ${{ secrets.ACCOUNT_SERVER_API_KEY }}
          JWT_SECRET: ${{ secrets.ACCOUNT_JWT_SECRET }}

      - name: Verify account server health
        run: curl -sf http://localhost:3000/health

      - name: Cleanup
        if: always()
        run: bash .ci/scripts/infra/ci-stop.sh


  # ============================================================================
  # COLUMN 3: BUILD & DOCKER
  # Jobs: build-renet (unified), build-docker, build-desktop (parallel reusable workflows)
  # Fast path (tests): initialize -> build-renet -> build-docker-fast -> tests
  # Publish path: quality + review-gate -> build-docker (full) -> stage-artifacts
  # ============================================================================

  # Unified renet build - produces full binaries with embedded CRIU/rsync
  # Used by BOTH CLI (SEA embedding) and Docker (bridge images)
  build-renet:
    name: Build (Renet)
    needs: [initialize]
    permissions:
      contents: read
      packages: write   # GHCR push
    if: always() && needs.initialize.result == 'success'
    uses: ./.github/workflows/ci-build-renet.yml
    with:
      next_version: ${{ needs.initialize.outputs.next_version }}
      skip_build: ${{ needs.initialize.outputs.bridge_exists == 'true' }}
      bridge_tag: ${{ needs.initialize.outputs.bridge_tag }}
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
      ACCOUNT_ED25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_ED25519_PUBLIC_KEY }}
      # OTLP_AUTH_TOKEN removed: credentials are resolved at runtime (renet#51).

  build-docker:
    name: Build (Docker)
    needs: [initialize, quality, review-gate, build-renet]
    permissions:
      contents: read
      packages: write   # GHCR push
    if: always() && needs.initialize.result == 'success' && (needs.quality.result == 'success' || needs.quality.result == 'skipped') && (needs.review-gate.result == 'success' || needs.review-gate.result == 'skipped')
    uses: ./.github/workflows/ci-build-docker.yml
    with:
      next_version: ${{ needs.initialize.outputs.next_version }}
      api_tag: ${{ needs.initialize.outputs.api_tag }}
      api_exists: ${{ needs.initialize.outputs.api_exists }}
      bridge_tag: ${{ needs.initialize.outputs.bridge_tag }}
      bridge_exists: ${{ needs.initialize.outputs.bridge_exists }}
      plugins_tag: ${{ needs.initialize.outputs.plugins_tag }}
      plugins_exists: ${{ needs.initialize.outputs.plugins_exists }}
      web_tag: ${{ needs.initialize.outputs.web_tag }}
      web_exists: ${{ needs.initialize.outputs.web_exists }}
      cli_tag: ${{ needs.initialize.outputs.cli_tag }}
      cli_exists: ${{ needs.initialize.outputs.cli_exists }}
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
      ACCOUNT_ED25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_ED25519_PUBLIC_KEY }}

  build-docker-fast:
    name: Build (Docker Fast)
    needs: [initialize, build-renet]
    permissions:
      contents: read
      packages: write   # GHCR push
    if: always() && needs.initialize.result == 'success' && needs.build-renet.result == 'success'
    uses: ./.github/workflows/ci-build-docker.yml
    with:
      next_version: ${{ needs.initialize.outputs.next_version }}
      api_tag: ${{ needs.initialize.outputs.api_tag }}
      api_exists: ${{ needs.initialize.outputs.api_exists }}
      bridge_tag: ${{ needs.initialize.outputs.bridge_tag }}
      bridge_exists: ${{ needs.initialize.outputs.bridge_exists }}
      plugins_tag: ${{ needs.initialize.outputs.plugins_tag }}
      plugins_exists: ${{ needs.initialize.outputs.plugins_exists }}
      web_tag: ${{ needs.initialize.outputs.web_tag }}
      web_exists: ${{ needs.initialize.outputs.web_exists }}
      cli_tag: ${{ needs.initialize.outputs.cli_tag }}
      cli_exists: ${{ needs.initialize.outputs.cli_exists }}
      test_images_only: true
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
      ACCOUNT_ED25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_ED25519_PUBLIC_KEY }}

  build-desktop:
    name: Build (Desktop)
    needs: [initialize]
    permissions:
      contents: read
      packages: write   # GHCR push
    if: always() && needs.initialize.result == 'success'
    uses: ./.github/workflows/ci-build-desktop.yml
    with:
      next_version: ${{ needs.initialize.outputs.next_version }}
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}

  build-cli:
    name: Build (CLI)
    needs: [initialize, build-renet]
    permissions:
      contents: read
      packages: write   # GHCR push
    if: always() && needs.initialize.result == 'success' && needs.build-renet.result == 'success'
    uses: ./.github/workflows/ci-build-cli.yml
    with:
      next_version: ${{ needs.initialize.outputs.next_version }}
      skip_win_arm64: false
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}

  # ============================================================================
  # UPDATE FLOW E2E
  # Validates install.sh + `rdc update` lifecycle (findings B, C, D, E, F).
  # Consumes the rdc-linux-x64 artifact built by build-cli; runs a local
  # Python fixture server that impersonates releases.rediacc.com and drives
  # install/update/rollback scenarios.
  # ============================================================================
  update-flow-test:
    name: Tests + Infra / Update Flow
    needs: [initialize, build-cli]
    if: always() && needs.initialize.outputs.full_suite == 'true' && needs.initialize.result == 'success' && needs.build-cli.result == 'success' && needs.initialize.outputs.is_fork != 'true'
    uses: ./.github/workflows/ct-update-flow.yml
    with:
      cli_artifact_name: build-cli-linux-x64-${{ github.sha }}
      cli_artifact_binary: rdc-linux-x64

  # ============================================================================
  # COLUMN 3A: LINUX PACKAGE TESTS
  # Uses dummy binary — validates packaging scripts, Docker install tests
  # Dependencies: quality (lightweight, runs in parallel with builds)
  # ============================================================================
  package-tests:
    name: Tests + Infra / Linux Packages
    needs: [initialize, quality]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: always() && needs.initialize.outputs.full_suite == 'true' && needs.initialize.result == 'success' && (needs.quality.result == 'success' || needs.quality.result == 'skipped') && needs.initialize.outputs.is_fork != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install packaging tools
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq createrepo-c
          source .ci/config/constants.sh
          curl -sfL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar xz -C /usr/local/bin nfpm

      - name: Run Linux package tests
        run: .ci/scripts/test/test-linux-packages.sh

  # ============================================================================
  # COLUMN 3B: DEPLOY DRY-RUN
  # Jobs: stage-artifacts (reusable workflow)
  # Dependencies: build-docker, build-desktop, build-cli
  # ============================================================================
  stage-artifacts:
    name: Stage Artifacts
    needs: [initialize, build-docker, build-desktop, build-cli, stripe-sandbox]
    permissions:
      contents: read
      packages: write      # GHCR pull for validation
      id-token: write      # OIDC token for Sigstore signing
      attestations: write  # Store attestations on GitHub
    if: always() && needs.initialize.outputs.is_fork != 'true' && needs.initialize.outputs.is_bot != 'true' && needs.initialize.result == 'success' && needs.build-docker.result == 'success' && needs.build-desktop.result == 'success' && needs.build-cli.result == 'success' && (needs.stripe-sandbox.result == 'success' || needs.stripe-sandbox.result == 'skipped')
    uses: ./.github/workflows/cd-stage.yml
    with:
      upload_pages: ${{ github.event_name == 'pull_request' }}
      channel: ${{ needs.initialize.outputs.channel }}
      next_version: ${{ needs.initialize.outputs.next_version }}
      api_tag: ${{ needs.initialize.outputs.api_tag }}
      bridge_tag: ${{ needs.initialize.outputs.bridge_tag }}
      plugins_tag: ${{ needs.initialize.outputs.plugins_tag }}
      web_tag: ${{ needs.initialize.outputs.web_tag }}
      cli_tag: ${{ needs.initialize.outputs.cli_tag }}
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ============================================================================
  # COLUMN 4: TESTS + INFRA
  # Jobs: tests (reusable workflow)
  # Dependencies: build-docker (tests can start without waiting for desktop builds)
  # ============================================================================
  tests:
    name: Tests + Infra
    needs: [initialize, build-docker-fast]
    if: always() && needs.initialize.outputs.is_fork != 'true' && needs.initialize.outputs.full_suite == 'true' && needs.initialize.result == 'success' && needs.build-docker-fast.result == 'success'
    uses: ./.github/workflows/ct-tests.yml
    with:
      api_tag: ${{ needs.initialize.outputs.api_tag }}-amd64
      bridge_tag: ${{ needs.initialize.outputs.bridge_tag }}-amd64
      web_tag: ${{ needs.initialize.outputs.web_tag }}-amd64
      e2e_browsers: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.browsers == 'all-browsers' && 'chromium firefox webkit msedge' || 'chromium' }}
      provision_vms: true
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      ACCOUNT_ED25519_PRIVATE_KEY: ${{ secrets.ACCOUNT_ED25519_PRIVATE_KEY }}
      ACCOUNT_ED25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_ED25519_PUBLIC_KEY }}
      ACCOUNT_SERVER_API_KEY: ${{ secrets.ACCOUNT_SERVER_API_KEY }}
      ACCOUNT_JWT_SECRET: ${{ secrets.ACCOUNT_JWT_SECRET }}
      STRIPE_SANDBOX_SECRET_KEY: ${{ secrets.STRIPE_SANDBOX_SECRET_KEY }}
      STRIPE_SANDBOX_WEBHOOK_SECRET: ${{ secrets.STRIPE_SANDBOX_WEBHOOK_SECRET }}

  # ============================================================================
  # COLUMN 4B: STANDALONE RUN TEST
  # Validates the standalone-run workflow works correctly with all VM OS variants
  # Dependencies: build-docker (needs Docker images)
  # ============================================================================
  standalone-run-test:
    name: Standalone Run
    needs: [initialize, build-docker-fast]
    if: >-
      always() &&
      needs.initialize.outputs.is_fork != 'true' &&
      needs.initialize.outputs.full_suite == 'true' &&
      needs.initialize.result == 'success' &&
      needs.build-docker-fast.result == 'success'
    uses: ./.github/workflows/standalone-run.yml
    with:
      run-name: 'CI Validation'
      duration: '5'
      version: ${{ needs.initialize.outputs.bridge_tag }}
      api-tag: ${{ needs.initialize.outputs.api_tag }}-amd64
      web-tag: ${{ needs.initialize.outputs.web_tag }}-amd64
      bridge-tag: ${{ needs.initialize.outputs.bridge_tag }}-amd64
      ci-mode: true
      vm-os-list: '["none", "ubuntu-24.04", "debian-13"]'
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
      AWS_SES_ACCESS_KEY_ID_EU: ${{ secrets.AWS_SES_ACCESS_KEY_ID_EU }}
      AWS_SES_SECRET_ACCESS_KEY_EU: ${{ secrets.AWS_SES_SECRET_ACCESS_KEY_EU }}
      AWS_SES_REGION_EU: ${{ vars.AWS_SES_REGION_EU }}

  # ============================================================================
  # COLUMN 4D: OPS VM TESTS
  # Validates rdc ops provisioning commands across platforms
  # Dependencies: build-renet (needs renet binary)
  # ============================================================================
  ops-tests:
    name: OPS Tests
    needs: [initialize, quality, review-gate, build-renet]
    if: >-
      always() &&
      needs.initialize.outputs.full_suite == 'true' &&
      needs.initialize.result == 'success' &&
      (needs.quality.result == 'success' || needs.quality.result == 'skipped') &&
      (needs.review-gate.result == 'success' || needs.review-gate.result == 'skipped')
    uses: ./.github/workflows/ci-ops-test.yml
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # ============================================================================
  # COLUMN 4C: ELITE RUN TEST
  # Validates the elite on-premise docker-compose stack starts correctly
  # Tests the same setup customers use before changes affect them
  # Dependencies: build-docker (needs Docker images)
  # ============================================================================
  elite-run-test:
    name: Elite Run
    needs: [initialize, build-docker-fast]
    if: >-
      always() &&
      needs.initialize.outputs.is_fork != 'true' &&
      needs.initialize.outputs.full_suite == 'true' &&
      needs.initialize.result == 'success' &&
      needs.build-docker-fast.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          preset: ci
          repositories: console,middleware,renet,account,sql,elite,homebrew-tap

      - name: Checkout with Submodules
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      - name: Set Image Tags
        run: |
          .ci/scripts/ci/derive-image-tag.sh \
            ${{ needs.initialize.outputs.image_tag && format('--version "{0}"', needs.initialize.outputs.image_tag) || '' }} \
            --env-file

          # Override individual tags from initialize job (use -amd64 suffix for fast builds)
          if [[ -n "${{ needs.initialize.outputs.api_tag }}" ]]; then
            echo "API_TAG=${{ needs.initialize.outputs.api_tag }}-amd64" >> $GITHUB_ENV
          fi
          if [[ -n "${{ needs.initialize.outputs.web_tag }}" ]]; then
            echo "WEB_TAG=${{ needs.initialize.outputs.web_tag }}-amd64" >> $GITHUB_ENV
          fi
          if [[ -n "${{ needs.initialize.outputs.bridge_tag }}" ]]; then
            echo "BRIDGE_TAG=${{ needs.initialize.outputs.bridge_tag }}-amd64" >> $GITHUB_ENV
          fi

      - name: Pre-pull Docker Images
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          TAG: ${{ env.TAG }}
        run: .ci/scripts/infra/ci-pull-images.sh

      - name: Install sqlcmd (go-sqlcmd)
        run: sudo private/middleware/scripts/install-sqlcmd.sh

      - name: Start Elite Services
        env:
          TAG: ${{ env.TAG }}
          CI_MODE: 'true'
          ED25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_ED25519_PUBLIC_KEY }}
        run: .ci/scripts/infra/ci-start-elite.sh

      - name: Run Health Check
        run: ./private/elite/scripts/healthcheck.sh

      - name: Final Service Status
        if: always()
        run: |
          echo "Final Container Status:"
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep -E "(NAME|rediacc)" || true
          echo ""
          echo "Recent API Logs (last 50 lines):"
          docker logs rediacc-api --tail=50 2>&1 || true

      - name: Cleanup
        if: always()
        run: .ci/scripts/infra/ci-stop-elite.sh

  # ============================================================================
  # COLUMN 5: DEPLOY PREVIEW
  # Deploys pages preview to Cloudflare Pages for PR validation
  # Dependencies: stage-artifacts, tests, standalone-run-test (ALL must pass)
  # Only runs on pull_request events
  # ============================================================================
  deploy-preview:
    name: Deploy Preview
    needs: [initialize, stage-artifacts, tests, standalone-run-test, migration-test]
    runs-on: ubuntu-latest
    if: >-
      always() &&
      needs.initialize.outputs.is_fork != 'true' &&
      github.event_name == 'pull_request' &&
      needs.initialize.result == 'success' &&
      needs.stage-artifacts.result == 'success' &&
      needs.tests.result == 'success' &&
      needs.standalone-run-test.result == 'success' &&
      needs.migration-test.result == 'success'
    environment:
      name: pr-${{ github.event.pull_request.number }}
      url: https://pr-${{ github.event.pull_request.number }}.rediacc.workers.dev
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          sparse-checkout: .github/actions

      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          preset: ci
          repositories: console,account

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: false

      - name: Initialize account submodule
        run: git submodule update --init --depth 1 private/account

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npm run build:packages

      - name: Install account dependencies
        run: npm install
        working-directory: private/account

      - name: Install www worker dependencies
        run: npm install
        working-directory: workers/www

      - name: Download preview pages artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: preview-pages-${{ github.sha }}
          path: workers/www/dist/

      # Mint a per-PR Turnstile widget so the preview hostname
      # `pr-N.rediacc.workers.dev` is on its own widget allowlist.
      # Cloudflare Turnstile does not support wildcards or parent-domain
      # inheritance, so each PR needs its own widget.
      # See private/account/docs/infra/cloudflare.md and
      # private/account/scripts/preview-turnstile.ts.
      - name: Create PR Turnstile widget
        id: create-widget
        working-directory: private/account
        run: npx tsx scripts/preview-turnstile.ts create "${PR_NUMBER}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build account portal
        run: npm install && npx vite build --outDir ../../../workers/www/dist/account
        working-directory: private/account/web
        env:
          # PR previews use the per-PR widget minted above, NOT vars.TURNSTILE_SITE_KEY.
          # The prod sitekey's widget is hostname-locked to apex/regional domains
          # and cannot include workers.dev subdomains without burning hostname slots.
          VITE_TURNSTILE_SITE_KEY: ${{ steps.create-widget.outputs.sitekey }}
          VITE_CI_MODE: 'false'

      # Inject e2e test videos into pages for documentation embedding
      - name: Inject E2E videos
        env:
          GH_TOKEN: ${{ github.token }}
        run: .ci/scripts/docs/inject-e2e-videos.sh --run-id "${{ github.run_id }}" --artifact-name "e2e-videos-${{ github.sha }}" --output workers/www/dist/assets/videos/user-guide/ || true

      # Inject tutorial recordings into pages for interactive player
      - name: Inject tutorials
        env:
          GH_TOKEN: ${{ github.token }}
        run: .ci/scripts/docs/inject-tutorials.sh --run-id "${{ github.run_id }}" --artifact-name "tutorial-recordings-${{ github.sha }}" --output workers/www/dist/assets/tutorials/ || true

      # Create Stripe webhook pointing to pr-N
      - name: Setup Stripe webhook
        id: stripe-webhook
        run: npx tsx scripts/setup-sandbox.ts --pr-number ${PR_NUMBER}
        working-directory: private/account
        env:
          STRIPE_SANDBOX_SECRET_KEY: ${{ secrets.STRIPE_SANDBOX_SECRET_KEY }}

      # Deploy single combined pr-N Worker (static assets + embedded account server)
      - name: Deploy preview worker
        run: .ci/scripts/deploy/deploy-www.sh --name "pr-${PR_NUMBER}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set preview worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          SECRET_ED25519_PRIVATE_KEY: ${{ secrets.ACCOUNT_ED25519_PRIVATE_KEY }}
          SECRET_ED25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_ED25519_PUBLIC_KEY }}
          SECRET_X25519_PRIVATE_KEY: ${{ secrets.ACCOUNT_X25519_PRIVATE_KEY }}
          SECRET_X25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_X25519_PUBLIC_KEY }}
          SECRET_API_KEY: ${{ secrets.ACCOUNT_SERVER_API_KEY }}
          SECRET_JWT_SECRET: ${{ secrets.ACCOUNT_JWT_SECRET }}
          SECRET_STRIPE_KEY: ${{ secrets.STRIPE_SANDBOX_SECRET_KEY }}
          SECRET_STRIPE_WEBHOOK: ${{ steps.stripe-webhook.outputs.stripe_webhook_secret }}
          SECRET_ROOT_EMAIL: ${{ vars.ROOT_EMAIL }}
          SECRET_SES_ACCESS_KEY_ID: ${{ secrets.AWS_SES_ACCESS_KEY_ID_EU }}
          SECRET_SES_SECRET_ACCESS_KEY: ${{ secrets.AWS_SES_SECRET_ACCESS_KEY_EU }}
          SECRET_SES_REGION: ${{ vars.AWS_SES_REGION_EU }}
          # Per-PR Turnstile secret comes from the create-widget step above,
          # paired with the per-PR sitekey baked into the Vite build.
          SECRET_TURNSTILE_KEY: ${{ steps.create-widget.outputs.secret }}
          VAR_SES_FROM: ${{ vars.AWS_SES_FROM }}
          VAR_SES_CONFIGURATION_SET: ${{ vars.AWS_SES_CONFIGURATION_SET }}
        run: |
          # Use secret:bulk to set all secrets in a single API call.
          # Individual secret put commands each trigger a new worker version,
          # which disassociates static assets on assets-bound workers.
          WORKER="pr-${PR_NUMBER}"
          jq -n \
            --arg ed25519_priv "$SECRET_ED25519_PRIVATE_KEY" \
            --arg ed25519_pub "$SECRET_ED25519_PUBLIC_KEY" \
            --arg x25519_priv "$SECRET_X25519_PRIVATE_KEY" \
            --arg x25519_pub "$SECRET_X25519_PUBLIC_KEY" \
            --arg api_key "$SECRET_API_KEY" \
            --arg jwt "$SECRET_JWT_SECRET" \
            --arg stripe "$SECRET_STRIPE_KEY" \
            --arg stripe_wh "$SECRET_STRIPE_WEBHOOK" \
            --arg admin "$SECRET_ROOT_EMAIL" \
            --arg ses_key "$SECRET_SES_ACCESS_KEY_ID" \
            --arg ses_secret "$SECRET_SES_SECRET_ACCESS_KEY" \
            --arg ses_region "$SECRET_SES_REGION" \
            --arg ses_from "$VAR_SES_FROM" \
            --arg ses_cs "$VAR_SES_CONFIGURATION_SET" \
            --arg turnstile "$SECRET_TURNSTILE_KEY" \
            '{
              ED25519_PRIVATE_KEY: $ed25519_priv,
              ED25519_PUBLIC_KEY: $ed25519_pub,
              X25519_PRIVATE_KEY: $x25519_priv,
              X25519_PUBLIC_KEY: $x25519_pub,
              API_KEY: $api_key,
              JWT_SECRET: $jwt,
              STRIPE_SECRET_KEY: $stripe,
              STRIPE_WEBHOOK_SECRET: $stripe_wh,
              ROOT_EMAIL: $admin,
              AWS_SES_ACCESS_KEY_ID: $ses_key,
              AWS_SES_SECRET_ACCESS_KEY: $ses_secret,
              AWS_SES_REGION: $ses_region,
              AWS_SES_FROM: $ses_from,
              AWS_SES_CONFIGURATION_SET: $ses_cs,
              TURNSTILE_SECRET_KEY: $turnstile
            }' | npx wrangler secret bulk --name "$WORKER"

      - name: Deployment summary
        run: |
          echo "## Preview Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://pr-${PR_NUMBER}.rediacc.workers.dev" >> $GITHUB_STEP_SUMMARY
          echo "**Console:** https://pr-${PR_NUMBER}.rediacc.workers.dev/console/" >> $GITHUB_STEP_SUMMARY
          echo "**Account API:** https://pr-${PR_NUMBER}.rediacc.workers.dev/account/api/v1/health" >> $GITHUB_STEP_SUMMARY
          echo "**PR:** #${PR_NUMBER}" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # COLUMN 5b: SMOKE TEST PREVIEW
  # Validates the licensing chain end-to-end against the live preview Worker.
  # Seeds test data into preview D1, then issues a repo license via the E2E
  # encrypted tunnel and verifies the Ed25519 signature.
  # ============================================================================
  smoke-test-preview:
    name: Smoke Test Preview
    needs: [initialize, deploy-preview]
    runs-on: ubuntu-latest
    if: >-
      always() &&
      needs.initialize.outputs.is_fork != 'true' &&
      github.event_name == 'pull_request' &&
      needs.deploy-preview.result == 'success'
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          sparse-checkout: |
            .github/actions
            .ci/scripts
            packages/shared
            packages/shared-desktop
            packages/provisioning
            workers/www
            package.json
            package-lock.json
            tsconfig.json

      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          preset: ci
          repositories: console

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npm run build:packages

      - name: Seed test data into preview D1
        id: seed
        run: .ci/scripts/test/seed-smoke-test.sh
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          ACCOUNT_JWT_SECRET: ${{ secrets.ACCOUNT_JWT_SECRET }}

      - name: Wait for preview worker
        run: |
          PREVIEW_URL="https://pr-${PR_NUMBER}.rediacc.workers.dev"
          for i in $(seq 1 30); do
            if curl -fsSL "${PREVIEW_URL}/account/api/v1/health" -o /dev/null 2>/dev/null; then
              echo "Preview worker is ready"
              exit 0
            fi
            echo "Waiting for preview worker... (attempt $i/30)"
            sleep 2
          done
          echo "Preview worker did not become ready"
          exit 1

      - name: Run license smoke test
        run: npx tsx .ci/scripts/test/smoke-test-preview.ts
        env:
          PREVIEW_URL: https://pr-${{ env.PR_NUMBER }}.rediacc.workers.dev
          SMOKE_TEST_TOKEN: ${{ steps.seed.outputs.SMOKE_TEST_TOKEN }}
          ACCOUNT_ED25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_ED25519_PUBLIC_KEY }}

  # ============================================================================
  # VALIDATE INSTALL METHODS - Full pre-publish validation on all 6 platforms
  # Tests ALL methods against staging worker + R2 staging artifacts.
  # Catches broken packages/Docker/install BEFORE they reach production.
  # ============================================================================
  validate-install:
    name: Validate Install Methods
    needs: [initialize, stage-artifacts]
    if: >-
      always() &&
      needs.initialize.outputs.is_fork != 'true' &&
      needs.stage-artifacts.result == 'success'
    uses: ./.github/workflows/ct-install-methods.yml
    with:
      version: ${{ needs.initialize.outputs.next_version }}
      docker_tag: ${{ needs.initialize.outputs.channel }}
      repo_channel: ${{ needs.initialize.outputs.channel }}
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}

  # ============================================================================
  # VALIDATE PROMOTION - Simulates edge-to-stable promotion
  # Copies PR channel repos to a temp promoted channel, sed-fixes configs,
  # then tests APT/DNF/APK/Pacman install against the promoted channel.
  # ============================================================================
  validate-promote:
    name: Validate Promotion
    needs: [initialize, stage-artifacts]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      always() &&
      needs.initialize.outputs.is_fork != 'true' &&
      needs.stage-artifacts.result == 'success'
    env:
      CHANNEL: ${{ needs.initialize.outputs.channel }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Simulate promotion (copy + sed-fix)
        run: |
          set -ex
          PROMOTED="${CHANNEL}-promoted"
          echo "PROMOTED=${PROMOTED}" >> "$GITHUB_ENV"
          BUCKET="rediacc-releases"
          EP="--endpoint-url $R2_ENDPOINT"

          # Verify credentials are set
          [[ -n "$AWS_ACCESS_KEY_ID" ]] || { echo "::error::R2_ACCESS_KEY_ID not set"; exit 1; }
          [[ -n "$R2_ENDPOINT" ]] || { echo "::error::R2_ENDPOINT not set"; exit 1; }

          # Wrap `aws s3 cp` in a retry loop. R2 over the public network has
          # been observed to drop multi-MB downloads with
          # IncompleteRead(N bytes read, M more expected). AWS_MAX_ATTEMPTS=10
          # + AWS_RETRY_MODE=adaptive layers retries inside the SDK, and the
          # outer loop covers the case where the SDK exhausts its budget.
          aws_s3_cp_retry() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if aws s3 cp "$@"; then
                return 0
              fi
              if [[ $attempt -eq 5 ]]; then
                echo "::error::aws s3 cp $* failed after 5 attempts" >&2
                return 1
              fi
              echo "aws s3 cp attempt $attempt failed, retrying in $((attempt * 15))s..." >&2
              sleep $((attempt * 15))
            done
          }

          # Cache-Control policy: channel paths reuse filenames per release,
          # so nothing under <fmt>/<promoted>/ is safe to cache. All upload
          # go no-cache; CF will not cache, so the subsequent
          # test_apt_install / test_apk_install cannot hit a stale POP.
          CC_MUTABLE="no-cache"

          PURGE_URLS=()
          # Copy all repo formats from PR channel to promoted channel
          # R2 doesn't support GetObjectTagging, so download+reupload via local tmp
          for dir in apt rpm apk archlinux; do
            echo "Copying ${dir}/${CHANNEL}/ -> ${dir}/${PROMOTED}/"
            TMP="/tmp/promote-${dir}"
            aws_s3_cp_retry "s3://${BUCKET}/${dir}/${CHANNEL}/" "$TMP/" $EP --recursive
            aws_s3_cp_retry "$TMP/" "s3://${BUCKET}/${dir}/${PROMOTED}/" $EP --recursive \
              --cache-control "$CC_MUTABLE"
            # Purge every uploaded URL to flush any previously-cached body
            # under the same filename.
            while IFS= read -r f; do
              PURGE_URLS+=("https://releases.rediacc.com/${dir}/${PROMOTED}/${f#$TMP/}")
            done < <(find "$TMP" -type f)
            rm -rf "$TMP"
          done

          # Sed-fix config files (replace channel in URLs). Mutable.
          for file in "rpm/${PROMOTED}/rediacc.repo" "archlinux/${PROMOTED}/rediacc.conf"; do
            if aws s3 cp "s3://${BUCKET}/${file}" /tmp/config $EP 2>/dev/null; then
              sed -i "s|/${CHANNEL}/|/${PROMOTED}/|g" /tmp/config
              aws_s3_cp_retry /tmp/config "s3://${BUCKET}/${file}" $EP \
                --cache-control "$CC_MUTABLE"
              PURGE_URLS+=("https://releases.rediacc.com/${file}")
              echo "Fixed channel in ${file}"
            fi
          done

          echo "Promotion simulated: ${CHANNEL} -> ${PROMOTED}"

          # Purge CF cache for the just-uploaded mutable URLs. Without this
          # the test_apt_install step that runs next can hit a CF edge POP
          # holding a stale Packages.gz from a previous CI run, even though
          # we just uploaded fresh content with Cache-Control: no-cache.
          if [[ ${#PURGE_URLS[@]} -gt 0 ]]; then
            printf '%s\n' "${PURGE_URLS[@]}" \
              | .ci/scripts/deploy/cf-purge-urls.sh --zone "$CLOUDFLARE_ZONE_ID"
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          AWS_MAX_ATTEMPTS: 10
          AWS_RETRY_MODE: adaptive
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}

      - name: Test APT install from promoted channel
        run: |
          .ci/scripts/test/test-install-methods.sh \
            --method apt --version ${{ needs.initialize.outputs.next_version }}
        env:
          REPO_CHANNEL: ${{ env.PROMOTED }}

      - name: Test DNF install from promoted channel
        run: |
          .ci/scripts/test/test-install-methods.sh \
            --method dnf --version ${{ needs.initialize.outputs.next_version }}
        env:
          REPO_CHANNEL: ${{ env.PROMOTED }}

      - name: Test APK install from promoted channel
        run: |
          .ci/scripts/test/test-install-methods.sh \
            --method apk --version ${{ needs.initialize.outputs.next_version }}
        env:
          REPO_CHANNEL: ${{ env.PROMOTED }}

      - name: Test Pacman install from promoted channel
        run: |
          .ci/scripts/test/test-install-methods.sh \
            --method pacman --version ${{ needs.initialize.outputs.next_version }}
        env:
          REPO_CHANNEL: ${{ env.PROMOTED }}

      - name: Cleanup promoted channel
        if: always()
        run: |
          PROMOTED="${CHANNEL}-promoted"
          BUCKET="rediacc-releases"
          for dir in apt rpm apk archlinux; do
            aws s3 rm "s3://${BUCKET}/${dir}/${PROMOTED}/" --recursive \
              --endpoint-url "$R2_ENDPOINT" --quiet 2>/dev/null || true
          done
          echo "Cleaned up promoted channel: ${PROMOTED}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}

  # ============================================================================
  # CI COMPLETE - Gate for merge queue
  # This job only succeeds if ALL CI jobs pass
  # ============================================================================
  ci-complete:
    name: CI Complete
    runs-on: ubuntu-slim
    needs: [initialize, quality, review-gate, stripe-sandbox, build-docker, build-docker-fast, build-desktop, build-cli, package-tests, stage-artifacts, validate-install, validate-promote, tests, standalone-run-test, elite-run-test, ops-tests, migration-test, update-flow-test, deploy-preview, smoke-test-preview]
    if: always() && !cancelled()
    steps:
      - name: Check all jobs passed
        run: |
          FAILED=false

          # Hard-required jobs (must succeed, never skipped)
          for job in initialize build-docker build-docker-fast build-desktop build-cli; do
            result="${{ needs[job].result }}" 2>/dev/null || result="unknown"
          done
          [[ "${{ needs.initialize.result }}" != "success" ]] && FAILED=true
          [[ "${{ needs.build-docker.result }}" != "success" ]] && FAILED=true
          [[ "${{ needs.build-docker-fast.result }}" != "success" ]] && FAILED=true
          [[ "${{ needs.build-desktop.result }}" != "success" ]] && FAILED=true
          [[ "${{ needs.build-cli.result }}" != "success" ]] && FAILED=true

          # Soft-required jobs (success or skipped both OK, only failure blocks)
          [[ "${{ needs.quality.result }}" == "failure" ]] && FAILED=true
          [[ "${{ needs.review-gate.result }}" == "failure" ]] && FAILED=true
          [[ "${{ needs.stripe-sandbox.result }}" == "failure" ]] && FAILED=true
          [[ "${{ needs.package-tests.result }}" == "failure" ]] && FAILED=true
          [[ "${{ needs.stage-artifacts.result }}" == "failure" ]] && FAILED=true
          [[ "${{ needs.validate-install.result }}" == "failure" ]] && FAILED=true
          [[ "${{ needs.validate-promote.result }}" == "failure" ]] && FAILED=true
          [[ "${{ needs.tests.result }}" == "failure" ]] && FAILED=true
          [[ "${{ needs.standalone-run-test.result }}" == "failure" ]] && FAILED=true
          [[ "${{ needs.elite-run-test.result }}" == "failure" ]] && FAILED=true
          [[ "${{ needs.ops-tests.result }}" == "failure" ]] && FAILED=true
          [[ "${{ needs.migration-test.result }}" == "failure" ]] && FAILED=true
          [[ "${{ needs.update-flow-test.result }}" == "failure" ]] && FAILED=true
          [[ "${{ needs.deploy-preview.result }}" == "failure" ]] && FAILED=true
          [[ "${{ needs.smoke-test-preview.result }}" == "failure" ]] && FAILED=true

          if [[ "$FAILED" == "true" ]]; then
            echo "One or more jobs failed:"
            echo "  initialize: ${{ needs.initialize.result }}"
            echo "  quality: ${{ needs.quality.result }}"
            echo "  review-gate: ${{ needs.review-gate.result }}"
            echo "  stripe-sandbox: ${{ needs.stripe-sandbox.result }}"
            echo "  build-docker: ${{ needs.build-docker.result }}"
            echo "  build-docker-fast: ${{ needs.build-docker-fast.result }}"
            echo "  build-desktop: ${{ needs.build-desktop.result }}"
            echo "  build-cli: ${{ needs.build-cli.result }}"
            echo "  package-tests: ${{ needs.package-tests.result }}"
            echo "  stage-artifacts: ${{ needs.stage-artifacts.result }}"
            echo "  validate-install: ${{ needs.validate-install.result }}"
            echo "  validate-promote: ${{ needs.validate-promote.result }}"
            echo "  tests: ${{ needs.tests.result }}"
            echo "  standalone-run-test: ${{ needs.standalone-run-test.result }}"
            echo "  elite-run-test: ${{ needs.elite-run-test.result }}"
            echo "  ops-tests: ${{ needs.ops-tests.result }}"
            echo "  migration-test: ${{ needs.migration-test.result }}"
            echo "  update-flow-test: ${{ needs.update-flow-test.result }}"
            echo "  deploy-preview: ${{ needs.deploy-preview.result }}"
            echo "  smoke-test-preview: ${{ needs.smoke-test-preview.result }}"
            exit 1
          fi
          echo "All CI jobs passed successfully!"

  # ============================================================================
  # HOUSEKEEPING
  # Cleanup old releases, tags, GHCR packages, deployments, CF Pages,
  # preview environments, D1 dbs, Turnstile widgets, R2 orphans, stale branches,
  # and Stripe sandbox orphans. Runs on every successful push to main so
  # retention never blocks on a release actually shipping.
  # ============================================================================
  housekeeping:
    name: Housekeeping
    runs-on: ubuntu-slim
    needs: [ci-complete]
    # always() prefix is load-bearing. ci-complete transitively needs
    # deploy-preview + smoke-test-preview, which are pull_request-only
    # and skip on push-to-main. GHA propagates the skip through the
    # needs chain to any downstream job that omits always(), so without
    # it this job silently skips on every push regardless of the
    # needs.ci-complete.result check.
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.ci-complete.result == 'success'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          preset: housekeeping
          repositories: console,renet,middleware,elite,account

      - name: Cleanup old releases, tags, packages, previews, R2 orphans, branches
        run: .ci/scripts/housekeeping/cleanup-versions.sh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npm run build:packages

      - uses: ./.github/actions/app-token
        id: app-token-stripe
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          preset: ci
          repositories: console,account

      - name: Initialize account submodule
        run: git submodule update --init private/account

      - name: Install account dependencies
        run: npm install
        working-directory: private/account

      - name: Cleanup orphaned Stripe sandbox resources
        run: npx tsx scripts/cleanup-orphans.ts
        working-directory: private/account
        env:
          STRIPE_SANDBOX_SECRET_KEY: ${{ secrets.STRIPE_SANDBOX_SECRET_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          GH_TOKEN: ${{ github.token }}

      - name: Verify Stripe sandbox webhook endpoints (per-region)
        run: |
          jq -r '.regions[] | .edgeDomain' regions.json | while read domain; do
            echo "Verifying sandbox webhook for ${domain}..."
            npx tsx private/account/scripts/verify-webhook.ts --sandbox --expected-url "https://${domain}/account/api/v1/webhooks/stripe"
          done
        env:
          STRIPE_SANDBOX_SECRET_KEY: ${{ secrets.STRIPE_SANDBOX_SECRET_KEY }}

  # ============================================================================
  # ASSERT HOUSEKEEPING RAN
  # Sentinel that fails loudly if the housekeeping job silently SKIPPED on
  # push-to-main. Guards against the GHA transitive-skip propagation bug:
  # deploy-preview/smoke-test-preview are pull_request-only, so a missing
  # always() on housekeeping's if: used to let every push-to-main skip it.
  # Only 'skipped' trips this sentinel. 'cancelled' (watchdog force-cancel,
  # concurrent-push supersession, manual cancel) and 'failure' (housekeeping
  # already surfaced its own failure) are passed through; see
  # .ci/scripts/ci/assert-job-succeeded.sh for the full state table.
  # ============================================================================
  assert-housekeeping-ran:
    name: Assert Housekeeping Ran
    runs-on: ubuntu-slim
    needs: [housekeeping]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Check housekeeping conclusion
        run: .ci/scripts/ci/assert-job-succeeded.sh housekeeping "${{ needs.housekeeping.result }}"
