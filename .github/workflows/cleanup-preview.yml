name: Cleanup PR Preview

on:
  pull_request_target: # security: approved — protected by fork guard in job condition
    types: [closed]

permissions:
  contents: read
  actions: read
  deployments: write

jobs:
  cleanup:
    name: Cleanup Preview
    runs-on: ubuntu-slim
    # Skip fork PRs (no access to secrets)
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      # Initial checkout uses the default GITHUB_TOKEN. We need this to land
      # before the local `./.github/actions/app-token` reference because
      # local composite actions are loaded from the workspace — without the
      # repo on disk first, the runner can't resolve them.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Mint a GitHub App token scoped to console + account. The composite's
      # last step is `git config --global
      # url."https://x-access-token:$TOKEN@github.com/".insteadOf
      # "https://github.com/"`, which is what makes the later
      # `git submodule update --init private/account` authenticate.
      # actions/checkout's own token writes credentials at parent-repo local
      # scope via includeIf.gitdir, which doesn't apply to submodule gitdirs —
      # hence the "could not read Username for 'https://github.com'" failure
      # this PR is fixing.
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          preset: readonly
          repositories: console,account

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci && npm run install:natives

      - name: Build shared packages
        run: npm run build:packages

      - name: Cleanup preview deployments
        run: .ci/scripts/housekeeping/cleanup-cf-preview.sh --branch "pr-${{ github.event.pull_request.number }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Cleanup preview Worker
        run: npx wrangler delete --name pr-${{ github.event.pull_request.number }} --force 2>/dev/null || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Cleanup preview D1 database
        run: |
          DB_NAME="account-db-pr-${{ github.event.pull_request.number }}"
          npx wrangler d1 delete "$DB_NAME" --skip-confirmation 2>/dev/null \
            && echo "Deleted D1 database: $DB_NAME" \
            || echo "D1 database $DB_NAME not found (already deleted or never created)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Initialize account submodule
        run: git submodule update --init --depth 1 private/account

      - name: Install account dependencies
        run: npm install --prefix private/account

      - name: Cleanup Stripe sandbox
        run: npx tsx scripts/cleanup-sandbox.ts --pr-number ${{ github.event.pull_request.number }}
        working-directory: private/account
        env:
          STRIPE_SANDBOX_SECRET_KEY: ${{ secrets.STRIPE_SANDBOX_SECRET_KEY }}

      # Delete the per-PR Turnstile widget minted during deploy. The script
      # itself treats a missing widget (already deleted by the housekeeping
      # sweep, or never created) as a no-op, so this step is safe to hard-fail
      # on anything else. See deploy-preview side at ci.yml's
      # `Create PR Turnstile widget` step.
      - name: Cleanup PR Turnstile widget
        working-directory: private/account
        run: npx tsx scripts/preview-turnstile.ts delete "${{ github.event.pull_request.number }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Delete GitHub environment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X DELETE "repos/${{ github.repository }}/environments/pr-${{ github.event.pull_request.number }}" 2>/dev/null \
            && echo "Deleted environment pr-${{ github.event.pull_request.number }}" \
            || echo "Environment pr-${{ github.event.pull_request.number }} not found (already deleted)"
