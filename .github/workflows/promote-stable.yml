name: Promote Edge to Stable

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 6:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: 'Force promotion (skip 7-day soak period)'
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  pull-requests: read

env:
  SOAK_DAYS: 7

jobs:
  promote:
    name: Promote Edge to Stable
    runs-on: ubuntu-latest
    outputs:
      promoted: ${{ steps.result.outputs.promoted }}
      version: ${{ steps.edge.outputs.version }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Check edge manifest
        id: edge
        run: |
          EDGE_MANIFEST=$(curl -sf "https://releases.rediacc.com/cli/edge/manifest.json" || echo "")
          if [[ -z "$EDGE_MANIFEST" ]]; then
            echo "No edge manifest found, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          EDGE_VERSION=$(echo "$EDGE_MANIFEST" | jq -r '.version')
          EDGE_DATE=$(echo "$EDGE_MANIFEST" | jq -r '.releaseDate')
          echo "version=$EDGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "date=$EDGE_DATE" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

          echo "Edge version: $EDGE_VERSION (released: $EDGE_DATE)"

      - name: Check stable manifest
        if: steps.edge.outputs.skip != 'true'
        id: stable
        run: |
          STABLE_MANIFEST=$(curl -sf "https://releases.rediacc.com/cli/stable/manifest.json" || echo "")
          STABLE_VERSION=""
          if [[ -n "$STABLE_MANIFEST" ]]; then
            STABLE_VERSION=$(echo "$STABLE_MANIFEST" | jq -r '.version')
          fi
          echo "version=$STABLE_VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$STABLE_VERSION" == "${{ steps.edge.outputs.version }}" ]]; then
            echo "Edge and stable are the same version ($STABLE_VERSION), skipping"
            echo "same=true" >> "$GITHUB_OUTPUT"
          else
            echo "same=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check soak period
        if: steps.edge.outputs.skip != 'true' && steps.stable.outputs.same != 'true'
        id: soak
        run: |
          EDGE_DATE="${{ steps.edge.outputs.date }}"
          EDGE_EPOCH=$(date -d "$EDGE_DATE" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%S" "$EDGE_DATE" +%s 2>/dev/null)
          NOW_EPOCH=$(date +%s)
          AGE_DAYS=$(( (NOW_EPOCH - EDGE_EPOCH) / 86400 ))

          echo "Edge release age: ${AGE_DAYS} days (soak: ${SOAK_DAYS} days)"

          if [[ "${{ inputs.force }}" == "true" ]]; then
            echo "Force promotion requested, skipping soak check"
            echo "ready=true" >> "$GITHUB_OUTPUT"
          elif [[ $AGE_DAYS -lt $SOAK_DAYS ]]; then
            echo "Edge needs $((SOAK_DAYS - AGE_DAYS)) more day(s) of soak"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "Soak period complete"
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for rollback labels
        if: steps.edge.outputs.skip != 'true' && steps.stable.outputs.same != 'true' && steps.soak.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EDGE_DATE="${{ steps.edge.outputs.date }}"
          ROLLBACKS=$(gh pr list --repo "$GITHUB_REPOSITORY" --state merged \
            --search "merged:>=${EDGE_DATE} label:rollback" --json number --jq 'length')

          if [[ "$ROLLBACKS" -gt 0 ]]; then
            echo "::error::Found $ROLLBACKS PR(s) with rollback label since edge release. Promotion blocked."
            exit 1
          fi
          echo "No rollback labels found"

      # =====================================================================
      # Promote ALL artifacts from edge to stable
      # =====================================================================

      - name: Promote R2 artifacts (CLI, Desktop, Repos)
        if: steps.edge.outputs.skip != 'true' && steps.stable.outputs.same != 'true' && steps.soak.outputs.ready == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          BUCKET="rediacc-releases"

          # Copy all channel artifacts from edge to stable
          # R2 doesn't support GetObjectTagging, so download+reupload via local tmp
          EP="--endpoint-url $R2_ENDPOINT"
          for dir in cli desktop apt rpm apk archlinux; do
            echo "Promoting ${dir}/edge/ -> ${dir}/stable/"
            TMP="/tmp/promote-${dir}"
            aws s3 cp "s3://${BUCKET}/${dir}/edge/" "$TMP/" $EP --recursive --quiet
            aws s3 cp "$TMP/" "s3://${BUCKET}/${dir}/stable/" $EP --recursive --quiet
            rm -rf "$TMP"
          done

          # Fix channel-specific config files (they reference 'edge' in URLs)
          for file in rpm/stable/rediacc.repo archlinux/stable/rediacc.conf; do
            echo "Fixing channel in ${file}..."
            aws s3 cp "s3://${BUCKET}/${file}" /tmp/config \
              --endpoint-url "$R2_ENDPOINT" --quiet
            sed -i 's|/edge/|/stable/|g' /tmp/config
            aws s3 cp /tmp/config "s3://${BUCKET}/${file}" \
              --endpoint-url "$R2_ENDPOINT" --quiet
          done

          echo "R2 promotion complete: edge v${{ steps.edge.outputs.version }} -> stable"

      - name: Login to GHCR
        if: steps.edge.outputs.skip != 'true' && steps.stable.outputs.same != 'true' && steps.soak.outputs.ready == 'true'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Promote Docker images (:edge -> :stable)
        if: steps.edge.outputs.skip != 'true' && steps.stable.outputs.same != 'true' && steps.soak.outputs.ready == 'true'
        run: |
          for image in api bridge plugin-terminal plugin-browser web cli; do
            SRC="ghcr.io/rediacc/elite/${image}:edge"
            DST="ghcr.io/rediacc/elite/${image}:stable"
            echo "Promoting ${image}: edge -> stable"
            docker buildx imagetools create -t "$DST" "$SRC"
          done

          echo "Docker promotion complete"

      - name: Set promotion result
        id: result
        run: |
          if [[ "${{ steps.edge.outputs.skip }}" == "true" ]] || \
             [[ "${{ steps.stable.outputs.same }}" == "true" ]] || \
             [[ "${{ steps.soak.outputs.ready }}" != "true" ]]; then
            echo "promoted=false" >> "$GITHUB_OUTPUT"
          else
            echo "promoted=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Summary
        if: steps.result.outputs.promoted == 'true'
        run: |
          echo "## Stable Promotion" >> $GITHUB_STEP_SUMMARY
          echo "- Edge version: ${{ steps.edge.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Previous stable: ${{ steps.stable.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Soak days: ${{ env.SOAK_DAYS }}" >> $GITHUB_STEP_SUMMARY
          echo "- R2: CLI, Desktop, APT, RPM, APK, Archlinux promoted" >> $GITHUB_STEP_SUMMARY
          echo "- Docker: all images retagged :edge -> :stable" >> $GITHUB_STEP_SUMMARY

  # Deploy production Workers from the exact tagged version
  deploy-marketing-production:
    name: Deploy production Marketing
    needs: [promote]
    if: needs.promote.outputs.promoted == 'true'
    uses: ./.github/workflows/cd-deploy-marketing.yml
    with:
      target: production
      ref: v${{ needs.promote.outputs.version }}
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      ACCOUNT_ED25519_PRIVATE_KEY: ${{ secrets.ACCOUNT_ED25519_PRIVATE_KEY }}

  deploy-account-production:
    name: Deploy production Account (all regions)
    needs: [promote]
    if: needs.promote.outputs.promoted == 'true'
    uses: ./.github/workflows/cd-deploy-account.yml
    with:
      target: production
      ref: v${{ needs.promote.outputs.version }}
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      ACCOUNT_ED25519_PRIVATE_KEY: ${{ secrets.ACCOUNT_ED25519_PRIVATE_KEY }}
      ACCOUNT_ED25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_ED25519_PUBLIC_KEY }}
      ACCOUNT_X25519_PRIVATE_KEY: ${{ secrets.ACCOUNT_X25519_PRIVATE_KEY }}
      ACCOUNT_X25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_X25519_PUBLIC_KEY }}
      ACCOUNT_SERVER_API_KEY: ${{ secrets.ACCOUNT_SERVER_API_KEY }}
      ACCOUNT_JWT_SECRET: ${{ secrets.ACCOUNT_JWT_SECRET }}
      STRIPE_SECRET_KEY_EU: ${{ secrets.STRIPE_SECRET_KEY_EU }}
      STRIPE_SECRET_KEY_US: ${{ secrets.STRIPE_SECRET_KEY_US }}
      STRIPE_SANDBOX_SECRET_KEY: ${{ secrets.STRIPE_SANDBOX_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET_EU: ${{ secrets.STRIPE_WEBHOOK_SECRET_EU }}
      STRIPE_WEBHOOK_SECRET_US: ${{ secrets.STRIPE_WEBHOOK_SECRET_US }}
      STRIPE_SANDBOX_WEBHOOK_SECRET: ${{ secrets.STRIPE_SANDBOX_WEBHOOK_SECRET }}
      AWS_SES_ACCESS_KEY_ID_EU: ${{ secrets.AWS_SES_ACCESS_KEY_ID_EU }}
      AWS_SES_SECRET_ACCESS_KEY_EU: ${{ secrets.AWS_SES_SECRET_ACCESS_KEY_EU }}
      AWS_SES_ACCESS_KEY_ID_US: ${{ secrets.AWS_SES_ACCESS_KEY_ID_US }}
      AWS_SES_SECRET_ACCESS_KEY_US: ${{ secrets.AWS_SES_SECRET_ACCESS_KEY_US }}
      STRIPE_SECRET_KEY_ASIA: ${{ secrets.STRIPE_SECRET_KEY_ASIA }}
      STRIPE_WEBHOOK_SECRET_ASIA: ${{ secrets.STRIPE_WEBHOOK_SECRET_ASIA }}
      AWS_SES_ACCESS_KEY_ID_ASIA: ${{ secrets.AWS_SES_ACCESS_KEY_ID_ASIA }}
      AWS_SES_SECRET_ACCESS_KEY_ASIA: ${{ secrets.AWS_SES_SECRET_ACCESS_KEY_ASIA }}
      TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}

  # Verify production endpoints after deployment
  verify-production:
    name: Verify production
    needs: [promote, deploy-marketing-production, deploy-account-production]
    if: needs.promote.outputs.promoted == 'true'
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6
        with:
          sparse-checkout: regions.json
          sparse-checkout-cone-mode: false

      - name: Verify production endpoints
        run: |
          echo "Verifying production deployment..."

          curl -fsSL https://www.rediacc.com/install.sh -o /dev/null
          echo "  marketing (install.sh): OK"

          while read -r domain; do
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "https://${domain}/account/api/v1/health" 2>/dev/null || echo "000")
            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "  ${domain} health: OK"
            else
              echo "::warning::${domain} health check returned HTTP ${HTTP_CODE}"
            fi
          done < <(jq -r '.regions[] | .domain' regions.json)

          echo "Production verification complete"
