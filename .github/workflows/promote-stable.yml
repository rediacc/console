name: Promote Edge to Stable

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 6:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: 'Force promotion (skip 7-day soak period)'
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  pull-requests: read

env:
  SOAK_DAYS: 7

jobs:
  promote:
    name: Promote Edge to Stable
    runs-on: ubuntu-latest
    outputs:
      promoted: ${{ steps.result.outputs.promoted }}
      version: ${{ steps.edge.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Check edge manifest
        id: edge
        run: |
          EDGE_MANIFEST=$(curl -sf "https://releases.rediacc.com/cli/edge/manifest.json" || echo "")
          if [[ -z "$EDGE_MANIFEST" ]]; then
            echo "No edge manifest found, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          EDGE_VERSION=$(echo "$EDGE_MANIFEST" | jq -r '.version')
          EDGE_DATE=$(echo "$EDGE_MANIFEST" | jq -r '.releaseDate')
          echo "version=$EDGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "date=$EDGE_DATE" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

          echo "Edge version: $EDGE_VERSION (released: $EDGE_DATE)"

      - name: Check stable manifest
        if: steps.edge.outputs.skip != 'true'
        id: stable
        run: |
          STABLE_MANIFEST=$(curl -sf "https://releases.rediacc.com/cli/stable/manifest.json" || echo "")
          STABLE_VERSION=""
          if [[ -n "$STABLE_MANIFEST" ]]; then
            STABLE_VERSION=$(echo "$STABLE_MANIFEST" | jq -r '.version')
          fi
          echo "version=$STABLE_VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$STABLE_VERSION" == "${{ steps.edge.outputs.version }}" ]]; then
            echo "Edge and stable are the same version ($STABLE_VERSION), skipping"
            echo "same=true" >> "$GITHUB_OUTPUT"
          else
            echo "same=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check soak period
        if: steps.edge.outputs.skip != 'true' && steps.stable.outputs.same != 'true'
        id: soak
        run: |
          EDGE_DATE="${{ steps.edge.outputs.date }}"
          EDGE_EPOCH=$(date -d "$EDGE_DATE" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%S" "$EDGE_DATE" +%s 2>/dev/null)
          NOW_EPOCH=$(date +%s)
          AGE_DAYS=$(( (NOW_EPOCH - EDGE_EPOCH) / 86400 ))

          echo "Edge release age: ${AGE_DAYS} days (soak: ${SOAK_DAYS} days)"

          if [[ "${{ inputs.force }}" == "true" ]]; then
            echo "Force promotion requested, skipping soak check"
            echo "ready=true" >> "$GITHUB_OUTPUT"
          elif [[ $AGE_DAYS -lt $SOAK_DAYS ]]; then
            echo "Edge needs $((SOAK_DAYS - AGE_DAYS)) more day(s) of soak"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "Soak period complete"
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for rollback labels
        if: steps.edge.outputs.skip != 'true' && steps.stable.outputs.same != 'true' && steps.soak.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EDGE_DATE="${{ steps.edge.outputs.date }}"
          ROLLBACKS=$(gh pr list --repo "$GITHUB_REPOSITORY" --state merged \
            --search "merged:>=${EDGE_DATE} label:rollback" --json number --jq 'length')

          if [[ "$ROLLBACKS" -gt 0 ]]; then
            echo "::error::Found $ROLLBACKS PR(s) with rollback label since edge release. Promotion blocked."
            exit 1
          fi
          echo "No rollback labels found"

      # =====================================================================
      # Promote ALL artifacts from edge to stable
      # =====================================================================

      - name: Promote R2 artifacts (CLI, Desktop, Repos)
        if: steps.edge.outputs.skip != 'true' && steps.stable.outputs.same != 'true' && steps.soak.outputs.ready == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
        run: |
          BUCKET="rediacc-releases"
          EP="--endpoint-url $R2_ENDPOINT"

          # Cache-Control policy: channel paths reuse filenames across
          # releases, so nothing under <fmt>/<channel>/ is safe to cache.
          # All channel uploads go no-cache; CF never caches, no stale body
          # possible. Versioned paths (cli/v<semver>/, desktop/v<semver>/)
          # keep their immutable cache via upload-to-r2.sh.
          CC_MUTABLE="no-cache"

          PURGE_URLS=()
          # Promote edge -> stable with two-phase upload to prevent clients
          # from seeing a "new version" signal (metadata) before the binaries
          # it references finish uploading.
          #
          # Phase 1: upload bytes (binaries, packages) -- slow, minutes.
          #   Client-visible metadata at stable/ still points at the OLD version.
          # Phase 2: upload metadata (Packages.gz, Release, latest-*.yml,
          #   manifest.json, APKINDEX.tar.gz, *.db.tar.gz, install scripts, ...).
          #   Advancement becomes visible at this boundary -- seconds, not minutes.
          # Within phase 2, split signed/hashed-of metadata from inner metadata
          # so the Release/InRelease hash of Packages.gz never disagrees with
          # the bytes on R2.
          #
          # Channel-specific rewrites (install.sh / .repo / .conf) happen on
          # the local tmp copy BEFORE phase 2 upload, eliminating a second
          # re-upload race that the old sequential version had.
          for dir in cli desktop apt rpm apk archlinux; do
            echo "Promoting ${dir}/edge/ -> ${dir}/stable/ (2-phase)"
            TMP="/tmp/promote-${dir}"
            aws s3 cp "s3://${BUCKET}/${dir}/edge/" "$TMP/" $EP --recursive --quiet

            # Per-dir channel rewrites -- apply to local copy, uploaded in phase 2.
            case "$dir" in
              cli)
                for f in "$TMP/install.sh" "$TMP/install.ps1"; do
                  [[ -f "$f" ]] || continue
                  sed -i \
                    -e 's|REDIACC_CHANNEL:-edge|REDIACC_CHANNEL:-stable|g' \
                    -e 's|} else { "edge" }|} else { "stable" }|g' \
                    "$f"
                done
                ;;
              rpm)
                [[ -f "$TMP/rediacc.repo" ]] && sed -i 's|/edge/|/stable/|g' "$TMP/rediacc.repo"
                ;;
              archlinux)
                [[ -f "$TMP/rediacc.conf" ]] && sed -i 's|/edge/|/stable/|g' "$TMP/rediacc.conf"
                ;;
            esac

            META_EXCLUDES=(
              --exclude 'Packages*' --exclude 'Release*' --exclude 'InRelease'
              --exclude 'repodata/*'
              --exclude 'APKINDEX.tar.gz'
              --exclude '*.db.tar.gz' --exclude '*.files.tar.gz'
              --exclude 'rediacc.db' --exclude 'rediacc.files'
              --exclude 'latest*.yml' --exclude 'latest.json' --exclude 'manifest.json'
              --exclude 'install.sh' --exclude 'install.ps1'
              --exclude '*.repo' --exclude '*.conf'
              --exclude 'rediacc-cli-latest.tgz'
              --exclude 'versions.json'
            )

            # ----- Phase 1: binaries / packages (slow, no metadata) -----
            aws s3 sync "$TMP/" "s3://${BUCKET}/${dir}/stable/" $EP --quiet \
              --cache-control "$CC_MUTABLE" "${META_EXCLUDES[@]}"

            # ----- Phase 2: metadata (fast, flips client view to new version) -----
            case "$dir" in
              apt)
                # 2a: Packages / Packages.gz (hashes of .deb files in phase 1).
                aws s3 sync "$TMP/" "s3://${BUCKET}/${dir}/stable/" $EP --quiet \
                  --cache-control "$CC_MUTABLE" \
                  --exclude '*' --include 'Packages*'
                # 2b: Release / InRelease / Release.gpg (hash of phase 2a).
                aws s3 sync "$TMP/" "s3://${BUCKET}/${dir}/stable/" $EP --quiet \
                  --cache-control "$CC_MUTABLE" \
                  --exclude '*' --include 'Release*' --include 'InRelease'
                ;;
              rpm)
                # 2a: primary / filelists / other (hashed in 2b repomd).
                aws s3 sync "$TMP/" "s3://${BUCKET}/${dir}/stable/" $EP --quiet \
                  --cache-control "$CC_MUTABLE" \
                  --exclude '*' --include 'repodata/primary*' \
                  --include 'repodata/filelists*' --include 'repodata/other*'
                # 2b: repomd.xml + signatures + rediacc.repo (config).
                aws s3 sync "$TMP/" "s3://${BUCKET}/${dir}/stable/" $EP --quiet \
                  --cache-control "$CC_MUTABLE" \
                  --exclude '*' --include 'repodata/repomd.xml*' \
                  --include '*.repo'
                ;;
              apk)
                # APKINDEX references .apk files in same dir (phase 1).
                aws s3 sync "$TMP/" "s3://${BUCKET}/${dir}/stable/" $EP --quiet \
                  --cache-control "$CC_MUTABLE" \
                  --exclude '*' --include 'APKINDEX.tar.gz'
                ;;
              archlinux)
                # .db/.files reference .pkg.tar.zst in same dir (phase 1).
                aws s3 sync "$TMP/" "s3://${BUCKET}/${dir}/stable/" $EP --quiet \
                  --cache-control "$CC_MUTABLE" \
                  --exclude '*' --include '*.db.tar.gz' --include '*.files.tar.gz' \
                  --include 'rediacc.db' --include 'rediacc.files' \
                  --include '*.conf'
                ;;
              cli)
                # manifest + latest.json + rebaked install scripts.
                aws s3 sync "$TMP/" "s3://${BUCKET}/${dir}/stable/" $EP --quiet \
                  --cache-control "$CC_MUTABLE" \
                  --exclude '*' --include 'manifest.json' --include 'latest.json' \
                  --include 'install.sh' --include 'install.ps1' \
                  --include 'versions.json'
                ;;
              desktop)
                # latest-*.yml references rediacc-desktop-* by name (phase 1).
                aws s3 sync "$TMP/" "s3://${BUCKET}/${dir}/stable/" $EP --quiet \
                  --cache-control "$CC_MUTABLE" \
                  --exclude '*' --include 'latest*.yml' --include 'versions.json'
                ;;
            esac

            while IFS= read -r f; do
              PURGE_URLS+=("https://releases.rediacc.com/${dir}/stable/${f#$TMP/}")
            done < <(find "$TMP" -type f)
            rm -rf "$TMP"
          done

          echo "R2 promotion complete: edge v${{ steps.edge.outputs.version }} -> stable"

          # Purge CF cache for the mutable URLs we just (re)uploaded.
          if [[ ${#PURGE_URLS[@]} -gt 0 ]]; then
            printf '%s\n' "${PURGE_URLS[@]}" \
              | .ci/scripts/deploy/cf-purge-urls.sh --zone "$CLOUDFLARE_ZONE_ID"
          fi

      - name: Login to GHCR
        if: steps.edge.outputs.skip != 'true' && steps.stable.outputs.same != 'true' && steps.soak.outputs.ready == 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Promote Docker images (:edge -> :stable)
        if: steps.edge.outputs.skip != 'true' && steps.stable.outputs.same != 'true' && steps.soak.outputs.ready == 'true'
        run: |
          for image in api bridge plugin-terminal plugin-browser web cli; do
            SRC="ghcr.io/rediacc/elite/${image}:edge"
            DST="ghcr.io/rediacc/elite/${image}:stable"
            echo "Promoting ${image}: edge -> stable"
            docker buildx imagetools create -t "$DST" "$SRC"
          done

          echo "Docker promotion complete"

      - name: Set promotion result
        id: result
        run: |
          if [[ "${{ steps.edge.outputs.skip }}" == "true" ]] || \
             [[ "${{ steps.stable.outputs.same }}" == "true" ]] || \
             [[ "${{ steps.soak.outputs.ready }}" != "true" ]]; then
            echo "promoted=false" >> "$GITHUB_OUTPUT"
          else
            echo "promoted=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Summary
        if: steps.result.outputs.promoted == 'true'
        run: |
          echo "## Stable Promotion" >> $GITHUB_STEP_SUMMARY
          echo "- Edge version: ${{ steps.edge.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Previous stable: ${{ steps.stable.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Soak days: ${{ env.SOAK_DAYS }}" >> $GITHUB_STEP_SUMMARY
          echo "- R2: CLI, Desktop, APT, RPM, APK, Archlinux promoted" >> $GITHUB_STEP_SUMMARY
          echo "- Docker: all images retagged :edge -> :stable" >> $GITHUB_STEP_SUMMARY

  # Deploy stable Workers from the exact tagged version
  deploy-marketing-stable:
    name: Deploy stable Marketing
    needs: [promote]
    if: needs.promote.outputs.promoted == 'true'
    uses: ./.github/workflows/cd-deploy-worker.yml
    with:
      target: stable
      ref: v${{ needs.promote.outputs.version }}
      version: ${{ needs.promote.outputs.version }}
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      ACCOUNT_ED25519_PRIVATE_KEY: ${{ secrets.ACCOUNT_ED25519_PRIVATE_KEY }}
      ACCOUNT_ED25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_ED25519_PUBLIC_KEY }}
      ACCOUNT_X25519_PRIVATE_KEY: ${{ secrets.ACCOUNT_X25519_PRIVATE_KEY }}
      ACCOUNT_X25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_X25519_PUBLIC_KEY }}
      ACCOUNT_SERVER_API_KEY: ${{ secrets.ACCOUNT_SERVER_API_KEY }}
      ACCOUNT_JWT_SECRET: ${{ secrets.ACCOUNT_JWT_SECRET }}
      STRIPE_SECRET_KEY_EU: ${{ secrets.STRIPE_SECRET_KEY_EU }}
      STRIPE_SANDBOX_SECRET_KEY: ${{ secrets.STRIPE_SANDBOX_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET_EU: ${{ secrets.STRIPE_WEBHOOK_SECRET_EU }}
      STRIPE_SANDBOX_WEBHOOK_SECRET: ${{ secrets.STRIPE_SANDBOX_WEBHOOK_SECRET }}
      AWS_SES_ACCESS_KEY_ID_EU: ${{ secrets.AWS_SES_ACCESS_KEY_ID_EU }}
      AWS_SES_SECRET_ACCESS_KEY_EU: ${{ secrets.AWS_SES_SECRET_ACCESS_KEY_EU }}
      TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}

  deploy-account-stable:
    name: Deploy stable Account (all regions)
    needs: [promote]
    if: needs.promote.outputs.promoted == 'true'
    uses: ./.github/workflows/cd-deploy-account.yml
    with:
      target: stable
      ref: v${{ needs.promote.outputs.version }}
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      ACCOUNT_ED25519_PRIVATE_KEY: ${{ secrets.ACCOUNT_ED25519_PRIVATE_KEY }}
      ACCOUNT_ED25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_ED25519_PUBLIC_KEY }}
      ACCOUNT_X25519_PRIVATE_KEY: ${{ secrets.ACCOUNT_X25519_PRIVATE_KEY }}
      ACCOUNT_X25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_X25519_PUBLIC_KEY }}
      ACCOUNT_SERVER_API_KEY: ${{ secrets.ACCOUNT_SERVER_API_KEY }}
      ACCOUNT_JWT_SECRET: ${{ secrets.ACCOUNT_JWT_SECRET }}
      STRIPE_SECRET_KEY_EU: ${{ secrets.STRIPE_SECRET_KEY_EU }}
      STRIPE_SECRET_KEY_US: ${{ secrets.STRIPE_SECRET_KEY_US }}
      STRIPE_SANDBOX_SECRET_KEY: ${{ secrets.STRIPE_SANDBOX_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET_EU: ${{ secrets.STRIPE_WEBHOOK_SECRET_EU }}
      STRIPE_WEBHOOK_SECRET_US: ${{ secrets.STRIPE_WEBHOOK_SECRET_US }}
      STRIPE_SANDBOX_WEBHOOK_SECRET: ${{ secrets.STRIPE_SANDBOX_WEBHOOK_SECRET }}
      AWS_SES_ACCESS_KEY_ID_EU: ${{ secrets.AWS_SES_ACCESS_KEY_ID_EU }}
      AWS_SES_SECRET_ACCESS_KEY_EU: ${{ secrets.AWS_SES_SECRET_ACCESS_KEY_EU }}
      AWS_SES_ACCESS_KEY_ID_US: ${{ secrets.AWS_SES_ACCESS_KEY_ID_US }}
      AWS_SES_SECRET_ACCESS_KEY_US: ${{ secrets.AWS_SES_SECRET_ACCESS_KEY_US }}
      STRIPE_SECRET_KEY_ASIA: ${{ secrets.STRIPE_SECRET_KEY_ASIA }}
      STRIPE_WEBHOOK_SECRET_ASIA: ${{ secrets.STRIPE_WEBHOOK_SECRET_ASIA }}
      AWS_SES_ACCESS_KEY_ID_ASIA: ${{ secrets.AWS_SES_ACCESS_KEY_ID_ASIA }}
      AWS_SES_SECRET_ACCESS_KEY_ASIA: ${{ secrets.AWS_SES_SECRET_ACCESS_KEY_ASIA }}
      TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}

  # Verify stable endpoints after deployment
  verify-stable:
    name: Verify stable
    needs: [promote, deploy-marketing-stable, deploy-account-stable]
    if: needs.promote.outputs.promoted == 'true'
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          sparse-checkout: regions.json
          sparse-checkout-cone-mode: false

      - name: Verify stable endpoints
        run: |
          echo "Verifying stable deployment..."

          INSTALL_SH=$(curl -fsSL https://www.rediacc.com/install.sh)
          if ! echo "$INSTALL_SH" | grep -q 'REDIACC_CHANNEL:-stable'; then
            echo "::error::www.rediacc.com/install.sh is not baked to channel=stable"
            echo "$INSTALL_SH" | grep -E 'REDIACC_CHANNEL' || true
            exit 1
          fi
          echo "  marketing (install.sh): OK (channel=stable)"

          INSTALL_PS1=$(curl -fsSL https://www.rediacc.com/install.ps1)
          if ! echo "$INSTALL_PS1" | grep -qF '} else { "stable" }'; then
            echo "::error::www.rediacc.com/install.ps1 is not baked to channel=stable"
            echo "$INSTALL_PS1" | grep -F '$Channel' || true
            exit 1
          fi
          echo "  marketing (install.ps1): OK (channel=stable)"

          # Worker-fingerprint checks. These assert that the NEW Worker bundle
          # from workers/www/ is actually serving — not a stale deploy of the
          # old workers/marketing/ code (which has no redirect table, no
          # html_handling=drop-trailing-slash, and no asset-path guard).
          # Cache-busting query strings ensure we hit the Worker, not a cached
          # response.
          RNDA=$RANDOM$RANDOM; RNDB=$RANDOM$RANDOM; RNDC=$RANDOM$RANDOM
          S=$(curl -sI -o /dev/null -w '%{http_code}' "https://www.rediacc.com/about?cb=$RNDA")
          [[ "$S" == "410" ]] || { echo "::error::www /about expected 410 (curated redirect table), got $S — old worker bundle likely live"; exit 1; }
          echo "  worker fingerprint (redirect table): OK (/about=410)"

          S=$(curl -sI -o /dev/null -w '%{http_code}' "https://www.rediacc.com/en?cb=$RNDB")
          [[ "$S" == "200" ]] || { echo "::error::www /en expected 200 (html_handling=drop-trailing-slash), got $S"; exit 1; }
          echo "  worker fingerprint (html_handling): OK (/en=200, no 307)"

          S=$(curl -sI -o /dev/null -w '%{http_code}' "https://www.rediacc.com/fonts/inter/Inter-Regular.woff2?cb=$RNDC")
          [[ "$S" == "200" ]] || { echo "::error::www mixed-case font expected 200 (asset-path guard), got $S"; exit 1; }
          echo "  worker fingerprint (asset-path guard): OK (Inter-Regular.woff2=200)"

          # R2 backstop: per-channel copy at releases.rediacc.com/cli/stable/
          # must also be channel-baked. The re-bake step in the promote job
          # (above) rewrites REDIACC_CHANNEL:-edge → :-stable; this asserts it
          # worked and the upload actually landed.
          R2_SH=$(curl -fsSL https://releases.rediacc.com/cli/stable/install.sh)
          if ! echo "$R2_SH" | grep -q 'REDIACC_CHANNEL:-stable'; then
            echo "::error::releases.rediacc.com/cli/stable/install.sh not baked to channel=stable"
            echo "$R2_SH" | grep -E 'REDIACC_CHANNEL' || true
            exit 1
          fi
          echo "  R2 cli/stable/install.sh: OK (channel=stable)"

          R2_PS1=$(curl -fsSL https://releases.rediacc.com/cli/stable/install.ps1)
          if ! echo "$R2_PS1" | grep -qF '} else { "stable" }'; then
            echo "::error::releases.rediacc.com/cli/stable/install.ps1 not baked to channel=stable"
            exit 1
          fi
          echo "  R2 cli/stable/install.ps1: OK (channel=stable)"

          while read -r domain; do
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "https://${domain}/account/api/v1/.well-known/server-info" 2>/dev/null || echo "000")
            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "  ${domain} health: OK"
            else
              echo "::warning::${domain} health check returned HTTP ${HTTP_CODE}"
            fi
          done < <(jq -r '.regions[] | .domain' regions.json)

          echo "Stable verification complete"
