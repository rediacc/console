name: Console CI - Quality

on:
  workflow_call:
    inputs:
      is_bot:
        type: string
        required: false
        default: 'false'
      next_version:
        type: string
        required: false
    secrets:
      APP_PRIVATE_KEY:
        required: false
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false

permissions:
  contents: read
  statuses: write   # Commit status updates

jobs:
  quality-branch:
    name: Branch
    runs-on: ubuntu-slim
    if: inputs.is_bot != 'true' && github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          preset: ci
          repositories: console
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}
      - name: Check branch status and auto-rebase if needed
        run: .ci/scripts/quality/check-branch.sh
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}

  # NOTE: Gemini Review is now triggered by review-gate job in ci.yml
  # after all quality jobs pass, to avoid triggering reviews on code
  # that has lint/type errors

  quality-versions:
    name: Versions
    runs-on: ubuntu-slim
    if: inputs.is_bot != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Block legacy-peer-deps workarounds
        run: .ci/scripts/quality/check-npmrc.sh
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: .ci/scripts/setup/install-deps.sh
      - name: Verify no peer dependency conflicts
        run: .ci/scripts/quality/check-peer-deps.sh
      - run: npm run version:check

  quality-deps:
    name: Deps
    runs-on: ubuntu-slim
    if: inputs.is_bot != 'true' && github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'no-external-quality')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          preset: ci
          repositories: console,middleware,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: .ci/scripts/setup/install-deps.sh
      - run: .ci/scripts/quality/check-deps.sh

  quality-lint:
    name: Lint
    runs-on: ubuntu-latest
    if: inputs.is_bot != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,middleware,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}
      - name: Apply version bump
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: .ci/scripts/version/bump.sh --version ${{ inputs.next_version }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: .ci/scripts/setup/install-deps.sh
      - run: npm run check:lint
      - run: npm run lint:unused
      - name: Check account route layer isolation
        run: npm run check:ci-account-layer-isolation

  quality-format:
    name: Format
    runs-on: ubuntu-slim
    if: inputs.is_bot != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Apply version bump
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: .ci/scripts/version/bump.sh --version ${{ inputs.next_version }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: .ci/scripts/setup/install-deps.sh
      - run: npm run check:format

  quality-i18n:
    name: i18n
    runs-on: ubuntu-slim
    if: inputs.is_bot != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,account
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          # validate:translation-freshness computes `git diff origin/main...HEAD`
          # to detect which English docs changed in this PR. A shallow clone
          # with a branch that's many commits ahead of main silently produces
          # an empty diff, so the script becomes a no-op. Full history is
          # required for the freshness gate to actually fire.
          fetch-depth: 0
      - name: Initialize account submodule
        run: git submodule update --init --depth 1 private/account
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: .ci/scripts/setup/install-deps.sh
      - run: npm run check:i18n
      - run: npm run check:ci-search-index

  quality-types:
    name: TypeScript
    runs-on: ubuntu-slim
    if: inputs.is_bot != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,middleware,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: .ci/scripts/setup/install-deps.sh
      - run: npm run typecheck

  quality-security:
    name: Security
    runs-on: ubuntu-slim
    if: inputs.is_bot != 'true' && !(github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'no-external-quality'))
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: .ci/scripts/setup/install-deps.sh
      - run: .ci/scripts/security/audit.sh
        env:
          # Authenticates `gh api /advisories/...` calls inside audit.sh so the
          # GHSA detail fetch uses the 1000/hr github.token limit instead of
          # the 60/hr anonymous limit.
          GH_TOKEN: ${{ github.token }}
      - name: BLOCKER validator — package.json overrides
        run: npm run check:ci-overrides-reasons
      - name: BLOCKER validator — syncpack versionGroups
        run: npm run check:ci-syncpack-reasons
      - name: Quality-gate unit tests
        run: npm run check:ci-quality-gates
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: quality-security-${{ github.sha }}
          path: audit-report.json
          retention-days: 3

  quality-external-links:
    name: External Links
    runs-on: ubuntu-slim
    if: inputs.is_bot != 'true' && !(github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'no-external-quality'))
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: .ci/scripts/setup/install-deps.sh
      - run: npm run check:ci-external-links
        env:
          GITHUB_TOKEN: ${{ github.token }}

  quality-dkim-notify:
    name: DKIM Notify DNS
    runs-on: ubuntu-slim
    # Same opt-out label as external-links: both do live public-network
    # lookups, and both should respect `no-external-quality` on PRs that
    # intentionally bypass external checks (e.g., offline branch work).
    if: inputs.is_bot != 'true' && !(github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'no-external-quality'))
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          preset: ci
          repositories: console,middleware,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: .ci/scripts/setup/install-deps.sh
      - run: npm run check:ci-dkim-notify

  quality-shell:
    name: Shell
    runs-on: ubuntu-slim
    if: inputs.is_bot != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install shfmt
        run: |
          curl -sS https://webi.sh/shfmt | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - run: .ci/scripts/security/shellcheck.sh
      - run: .ci/scripts/security/shfmt.sh
      - run: .ci/scripts/security/check-commands.sh
      # Unit tests for shell helpers. Deterministic, no network.
      - run: .ci/scripts/test/test-write-once-guard.sh
      - run: .ci/scripts/test/test-install-script.sh

  quality-workflows:
    name: Workflows
    runs-on: ubuntu-slim
    if: inputs.is_bot != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - run: .ci/scripts/quality/check-workflows.sh
      # Prevent GHA transitive-skip propagation (finding J) from
      # silently disabling downstream jobs on future changes.
      - run: .ci/scripts/security/check-workflow-gates.sh

  quality-compose-env:
    name: Compose Env
    runs-on: ubuntu-slim
    if: inputs.is_bot != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - run: .ci/scripts/quality/check-compose-env.sh

  quality-e2e-coverage:
    name: E2E Coverage
    runs-on: ubuntu-slim
    if: inputs.is_bot != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Check E2E test coverage for all renet functions
        run: .ci/scripts/quality/check-e2e-coverage.sh

  quality-audit-coverage:
    name: Audit Coverage
    runs-on: ubuntu-slim
    if: inputs.is_bot != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Check audit logging coverage for CLI operations
        run: .ci/scripts/quality/check-audit-coverage.sh

  quality-editorconfig:
    name: EditorConfig
    runs-on: ubuntu-slim
    if: inputs.is_bot != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - run: .ci/scripts/quality/check-editorconfig.sh

  quality-content:
    name: Content Quality
    runs-on: ubuntu-slim
    if: inputs.is_bot != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Check content for AI slop patterns
        run: .ci/scripts/quality/check-content-quality.sh

  quality-cli-examples:
    name: CLI Examples
    runs-on: ubuntu-slim
    if: inputs.is_bot != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          preset: ci
          repositories: console,renet,account,middleware,elite,sql,homebrew-tap
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: .ci/scripts/setup/install-deps.sh
      - run: npm run check:cli-examples

  quality-middleware:
    name: Middleware
    runs-on: ubuntu-latest
    if: inputs.is_bot != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,middleware,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}
      - name: Apply version bump
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: .ci/scripts/version/bump.sh --version ${{ inputs.next_version }}

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: 9.0.x

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - name: Run middleware quality
        run: .ci/scripts/private/run-middleware.sh quality

  quality-ebpf:
    name: eBPF Objects
    runs-on: ubuntu-latest
    if: inputs.is_bot != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          preset: ci
          repositories: console,middleware,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: 'stable'
          cache: true
          cache-dependency-path: private/renet/go.sum
      - name: Install clang
        # `apt-get update` is mandatory before install: the Azure runner image
        # ships with stale apt metadata referencing a kernel ABI that may have
        # already rotated out of the Ubuntu pool, causing
        # `linux-headers-generic` to 404 on the matching versioned headers
        # package. Refresh metadata first, then install.
        run: sudo apt-get update -qq && sudo apt-get install -y -qq clang llvm libbpf-dev linux-headers-generic
      - name: Verify BPF objects are up-to-date
        run: |
          cd private/renet
          go generate ./pkg/ebpf/...
          git diff --exit-code pkg/ebpf/
      - name: Verify BPF verifier accepts program
        run: |
          cd private/renet
          go test ./pkg/ebpf/ -run TestBPFVerifier -v
      - name: Run eBPF unit tests
        run: |
          cd private/renet
          go test ./pkg/ebpf/ -v

  quality-renet:
    name: Renet
    runs-on: ubuntu-latest
    if: inputs.is_bot != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          preset: ci
          repositories: console,middleware,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: 'stable'
          cache: true
          cache-dependency-path: private/renet/go.sum

      - name: Run renet quality
        run: .ci/scripts/private/run-renet.sh quality

      - name: Check Go dependency freshness
        if: "!(github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'no-external-quality'))"
        run: .ci/scripts/quality/check-go-deps.sh

      - name: Check renet types freshness
        run: .ci/scripts/quality/check-renet-types.sh

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - run: .ci/scripts/setup/install-deps.sh

      - name: Check subscription schema consistency
        run: .ci/scripts/quality/check-subscription-schema.sh

  quality-account:
    name: Account Server
    runs-on: ubuntu-latest
    if: inputs.is_bot != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,middleware,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: 'stable'
          cache: true
          cache-dependency-path: private/renet/go.sum

      - name: Build shared package (required for subscription types)
        run: |
          npm ci --workspace=@rediacc/shared
          npm run build --workspace=@rediacc/shared

      - name: Install account dependencies
        working-directory: private/account
        run: npm ci

      - name: Check config token auth requires org membership
        run: npm run check:ci-account-config-auth

      - name: Check no admin user role (must be root)
        run: npm run check:ci-account-no-admin-role

      - name: Check scope registry audit
        run: npm run check:ci-account-scope-audit

      - name: Run account integration tests
        run: .ci/scripts/private/run-account.sh test

      - name: Run Go cross-language signature tests
        working-directory: private/renet
        run: go test -v ./pkg/subscription/... -run TestCrossLanguage

  quality-account-portal:
    name: Account Portal
    runs-on: ubuntu-latest
    if: inputs.is_bot != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,middleware,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: .ci/scripts/setup/install-deps.sh
      - run: npm run build:packages
      - name: Install account dependencies
        run: npm install
        working-directory: private/account
      - name: Check account portal (typecheck + build)
        run: .ci/scripts/quality/check-account-portal.sh

  quality-shared-tests:
    name: Shared Package Tests
    runs-on: ubuntu-latest
    if: inputs.is_bot != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: .ci/scripts/setup/install-deps.sh
      - name: Build shared package
        run: npm run build --workspace=@rediacc/shared
      - name: Run shared package tests
        run: npm run test --workspace=@rediacc/shared

  quality-cli-unit-tests:
    name: CLI Unit Tests
    runs-on: ubuntu-latest
    if: inputs.is_bot != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: .ci/scripts/setup/install-deps.sh
      - name: Build shared packages
        run: |
          npm run build --workspace=@rediacc/shared
          npm run build --workspace=@rediacc/shared-desktop
      - name: Run CLI unit tests
        run: npm run test:unit --workspace=@rediacc/cli

  quality-sql:
    name: SQL Coordinator
    runs-on: ubuntu-latest
    if: inputs.is_bot != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,middleware,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - name: Run SQL coordinator quality
        run: .ci/scripts/private/run-sql.sh quality

  # ==============================================================================
  # SUBMODULE BRANCH VALIDATION
  # ==============================================================================
  # PURPOSE: Ensures submodule branches match console branch when coordinated
  #          changes are expected (submodule pointer differs from origin/main),
  #          and verifies submodule PRs are linked.
  #
  # AI TROUBLESHOOTING:
  #   If this job fails, check the error message for specific fix commands.
  #
  #   Branch errors:
  #   - Create missing branch: cd private/<sm> && git checkout -b <branch>
  #   - Push branch: git push -u origin <branch>
  #   - Checkout existing: cd private/<sm> && git checkout <branch>
  #
  #   PR linking errors:
  #   - No open PR: cd private/<sm> && gh pr create --title "..." --body "..."
  #   - PR not linked: Edit console PR description to include submodule PR URL
  #
  # WHEN SUBMODULES STAY ON MAIN:
  #   If submodule pointer matches origin/main, no branch coordination needed.
  #   The submodule will stay on main and this check passes.
  # ==============================================================================
  quality-submodule-branches:
    name: Submodule Branches
    runs-on: ubuntu-slim
    if: inputs.is_bot != 'true' && github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          preset: ci  # Needs pull-requests:read for gh pr list
          repositories: console,middleware,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          submodules: true
          token: ${{ steps.app-token.outputs.token }}
      - name: Validate submodule branches
        run: .ci/scripts/quality/check-submodule-branches.sh
        env:
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

  # NOTE: Review checks (resolved threads + unreplied comments) are in
  # review-gate job in ci.yml. They run AFTER Gemini posts its review.

  quality-attribution:
    name: Attribution
    runs-on: ubuntu-slim
    if: inputs.is_bot != 'true' && github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Check for Claude attribution
        run: .ci/scripts/quality/check-claude-attribution.sh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

  quality-pr-description:
    name: PR Description
    runs-on: ubuntu-slim
    if: inputs.is_bot != 'true' && github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          preset: ci
          repositories: console
      - name: Check PR description freshness
        run: .ci/scripts/quality/check-pr-description.sh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
