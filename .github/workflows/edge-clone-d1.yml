# Edge D1 databases are now persistent for the beta channel.
# Daily cloning from production is disabled; use workflow_dispatch for manual runs.
name: Edge D1 Clone

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # Read regions.json to build the clone matrix
  read-regions:
    name: Read regions
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.regions.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          sparse-checkout: regions.json
          sparse-checkout-cone-mode: false

      - id: regions
        run: |
          echo "matrix=$(jq -c '{include: [.regions[] | {source: .d1.name, target: .edgeD1.name, id}]}' regions.json)" >> "$GITHUB_OUTPUT"

  clone:
    name: Clone ${{ matrix.id }} D1
    needs: read-regions
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.read-regions.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          sparse-checkout: |
            .ci/scripts
            workers/account
            private/account/drizzle

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Clone ${{ matrix.source }} to ${{ matrix.target }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: .ci/scripts/deploy/clone-d1.sh --source ${{ matrix.source }} --target ${{ matrix.target }} --sanitize
