          cp ~/.ssh/id_ed25519.pub ~/.ssh/id_rsa.pub
      - name: Provision VM
        run: sudo -E $RENET_BINARY ops up --force --parallel
        env:
          VM_NET_BASE: ${{ env.VM_NET_BASE }}
          VM_WORKERS: '11'
          VM_CEPH_NODES: ''
          VM_BRIDGE: '1'
      - name: Fix renet data dir ownership
        run: sudo chown -R $USER:$USER $RUNNER_TEMP/renet
      - name: Wait for VM SSH readiness
        run: |
          for vm in ${VM_NET_BASE}.1 ${VM_NET_BASE}.11; do
            echo "Waiting for $vm as $USER..."
            for i in {1..30}; do
              if ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=5 $USER@$vm echo ready 2>/dev/null; then
                echo "VM $vm is SSH-ready"
                ssh-keyscan $vm >> ~/.ssh/known_hosts 2>/dev/null
                break
              fi
              echo "Waiting for VM $vm SSH... ($i/30)"
              sleep 5
              if [[ $i -eq 30 ]]; then
                echo "VM $vm SSH not ready after 150s"
                exit 1
              fi
            done
          done

      - name: Run concurrent-fork isolation test
        run: .ci/scripts/private/concurrent-fork-isolation-test.sh
        env:
          VM_NET_BASE: ${{ env.VM_NET_BASE }}
          VM_WORKERS: '11'
          SSH_USER: ${{ env.USER }}

      # Curated-repo healthcheck convergence smoke test. Deploys
      # app-postgres on the worker and asserts the db container's
      # pg_isready healthcheck (probing localhost) reaches `healthy`.
      # Catches integration regressions that pure unit-level eBPF
      # tests can miss — the class of bug that hid nextcloud-talk's
      # 3-day silent failure.
      - name: Run compose healthcheck smoke test
        run: .ci/scripts/private/compose-healthcheck-smoke-test.sh
        env:
          VM_NET_BASE: ${{ env.VM_NET_BASE }}
          VM_WORKERS: '11'
          SSH_USER: ${{ env.USER }}

      - if: always()
        run: .ci/scripts/signal/create-complete.sh --name "fork-isolation" --status ${{ job.status }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-fork-isolation-${{ github.sha }}
          path: |
            ${{ runner.temp }}/complete.txt
          retention-days: 3
          if-no-files-found: ignore

  test-cli-local-ceph:
    name: CLI Local Ceph
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CI: 'true'
      VM_NET_BASE: '192.168.111'
      VM_WORKERS: ''
      VM_CEPH_NODES: '21 22 23'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,middleware,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}
      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: 'stable'
          cache: true
          cache-dependency-path: private/renet/go.sum
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: .ci/scripts/setup/install-deps.sh
      - run: .ci/scripts/setup/build-packages.sh

      # Renet setup
      - name: Install clang for BPF compilation
        run: sudo apt-get update -qq && sudo apt-get install -y -qq clang llvm libbpf-dev linux-headers-generic
      - name: Pre-pull Docker base images (avoid buildx auth issues)
        run: |
          pull_with_retry() {
            local image="$1"
            local platform="${2:-}"
            local args=""
            [ -n "$platform" ] && args="--platform $platform"
            for i in 1 2 3; do
              if docker pull $args "$image"; then
                return 0
              fi
              echo "Pull failed for $image $platform, retrying in $((i * 30))s..."
              sleep $((i * 30))
            done
            echo "Failed to pull $image $platform after 3 attempts"
            return 1
          }
          pull_with_retry debian:bookworm linux/amd64
          pull_with_retry debian:bookworm-slim linux/arm64
          pull_with_retry ubuntu:24.04 linux/amd64
          pull_with_retry ubuntu:24.04 linux/arm64
      - name: Build renet
        run: .ci/scripts/infra/build-renet.sh --nolicense
      - name: Add renet to PATH
        run: sudo cp $RENET_BINARY /usr/bin/renet && sudo chmod +x /usr/bin/renet

      # VM + Ceph provisioning (bridge + 3 Ceph nodes = ~13.3 GB, fits 14 GB runner)
      - name: Setup KVM Host
        run: sudo $RENET_BINARY ops host setup
      - name: Generate SSH keypair
        run: |
          ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N "" -q
          cp ~/.ssh/id_ed25519 ~/.ssh/id_rsa
          cp ~/.ssh/id_ed25519.pub ~/.ssh/id_rsa.pub
      - name: Provision VMs
        run: sudo -E $RENET_BINARY ops up --force --parallel
      - name: Fix renet data dir ownership
        run: sudo chown -R $USER:$USER $RUNNER_TEMP/renet
      - name: Wait for VM SSH readiness
        run: |
          for vm in ${VM_NET_BASE}.21 ${VM_NET_BASE}.22 ${VM_NET_BASE}.23; do
            echo "Waiting for $vm as $USER..."
            for i in {1..30}; do
              if ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=5 $USER@$vm echo ready 2>/dev/null; then
                echo "VM $vm is SSH-ready"
                ssh-keyscan $vm >> ~/.ssh/known_hosts 2>/dev/null
                break
              fi
              echo "Waiting for VM $vm SSH... ($i/30)"
              sleep 5
              if [[ $i -eq 30 ]]; then
                echo "VM $vm SSH not ready after 150s"
                exit 1
              fi
            done
          done

      # Prepare Ceph VM: install renet and run setup to create rediacc user, directories, etc.
      - name: Setup Ceph VM
        run: |
          CEPH_IP="${VM_NET_BASE}.21"
          scp /usr/bin/renet $USER@$CEPH_IP:/tmp/renet
          ssh $USER@$CEPH_IP "sudo mv /tmp/renet /usr/bin/renet && sudo chmod 755 /usr/bin/renet"
          ssh $USER@$CEPH_IP "sudo renet setup"

      # Post-Ceph setup (ops up already provisions Ceph when VM_CEPH_NODES is set)
      - name: Post-Ceph setup
        run: |
          CEPH_IP="${VM_NET_BASE}.21"
          # Create 'rbd' pool used by CLI local tests (provisioner creates 'rediacc_rbd_pool')
          ssh $USER@$CEPH_IP "sudo ceph osd pool create rbd 32"
          ssh $USER@$CEPH_IP "sudo ceph osd pool application enable rbd rbd"
          # Create cluster name symlinks (bridge uses --cluster rediacc, config files are ceph.*)
          ssh $USER@$CEPH_IP "sudo ln -sf /etc/ceph/ceph.conf /etc/ceph/rediacc.conf"
          ssh $USER@$CEPH_IP "sudo ln -sf /etc/ceph/ceph.client.admin.keyring /etc/ceph/rediacc.client.admin.keyring"

      # Run Ceph E2E tests
      - name: Create CLI local Ceph E2E env
        run: .ci/scripts/env/create-cli-local-env.sh --output packages/cli/tests/.env --ssh-user "$USER" --vm-net-base "$VM_NET_BASE" --vm-workers "21"
      - name: Run CLI local Ceph E2E tests
        run: .ci/scripts/test/run-cli-local.sh -- tests/tests/08-e2e/09-ceph-operations.test.ts

      # Artifacts
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-cli-local-ceph-${{ github.sha }}
          path: packages/cli/tests/reports/
          retention-days: 3
          if-no-files-found: ignore

  test-renet:
    name: Renet
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,middleware,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: 'stable'
          cache: true
          cache-dependency-path: private/renet/go.sum

      # Login to Docker Hub to avoid rate limiting
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Propagate Docker Hub credentials to root
        run: sudo mkdir -p /root/.docker && sudo cp ~/.docker/config.json /root/.docker/config.json

      # Unit tests
      - name: Run renet tests
        run: .ci/scripts/private/run-renet.sh test

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-renet-coverage-${{ github.sha }}
          path: private/renet/coverage.out
          retention-days: 3
          if-no-files-found: ignore

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-renet-results-${{ github.sha }}
          path: private/renet/test-results.xml
          retention-days: 3
          if-no-files-found: ignore

      # eBPF isolation tests
      - name: Test eBPF
        run: |
          cd private/renet
          sudo go test ./pkg/ebpf/ -v -timeout 60s

      # Integration tests (needs sudo for KVM)
      - name: Run integration tests
        run: sudo .ci/scripts/private/renet-integration.sh --no-cleanup

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-renet-integration-${{ github.sha }}
          path: private/renet/test-results.xml
          retention-days: 3
          if-no-files-found: ignore

  # ============================================================================
