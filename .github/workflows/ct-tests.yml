  test-e2e-electron:
    name: E2E Electron (${{ matrix.project }})
    needs: [wait-for-tunnel]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            project: electron-linux-x64
            install: npx playwright install --with-deps chromium
          - os: ubuntu-24.04-arm
            project: electron-linux-arm64
            install: npx playwright install --with-deps chromium
          - os: macos-15-intel
            project: electron-macos-x64
            install: npx playwright install chromium
          - os: macos-latest
            project: electron-macos-arm64
            install: npx playwright install chromium
          - os: windows-latest
            project: electron-windows-x64
            install: npx playwright install chromium
          - os: windows-11-arm
            project: electron-windows-arm64
            install: npx playwright install chromium
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: .ci/scripts/setup/install-deps.sh ${{ runner.os == 'Windows' && '--ignore-scripts' || '' }}
        shell: bash
      - name: Rebuild native modules (electron, node-pty, ssh2, cpu-features, esbuild)
        if: runner.os != 'Windows'
        run: npm run install:natives
        shell: bash
      - run: .ci/scripts/setup/build-packages.sh
        shell: bash
      - if: runner.os == 'Windows'
        name: Install Electron binary
        working-directory: packages/desktop
        shell: bash
        run: |
          echo "Installing Electron binary (skipped during --ignore-scripts)..."
          # --ignore-scripts=false is load-bearing here: the root .npmrc sets
          # ignore-scripts=true so the install-deps.sh --ignore-scripts flag is
          # redundant, and a bare `npm rebuild` would silently honor the global
          # flag and never actually download/extract the electron binary.
          npm rebuild electron --ignore-scripts=false --foreground-scripts
      - name: Build desktop
        working-directory: packages/desktop
        run: npm run build
      - name: Install Playwright
        working-directory: packages/e2e
        run: ${{ matrix.install }}
      - if: runner.os == 'Linux'
        run: .ci/scripts/setup/setup-display.sh
      - name: Download Cloudflare Tunnel URL
        id: cf-tunnel
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TUNNEL_URL=$(.ci/scripts/tunnel/download-url.sh --run-id ${{ github.run_id }} --artifact-name tunnel-url-attempt-${{ github.run_attempt }} --max-wait 300) || true
          echo "tunnel-url=${TUNNEL_URL}" >> $GITHUB_OUTPUT
      - name: Download Pinggy Tunnel URL
        id: pinggy-tunnel
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TUNNEL_URL=$(.ci/scripts/tunnel/download-url.sh --run-id ${{ github.run_id }} --artifact-name tunnel-url-pinggy-attempt-${{ github.run_attempt }} --max-wait 300) || true
          echo "tunnel-url=${TUNNEL_URL}" >> $GITHUB_OUTPUT
      - name: Select Working Tunnel
        id: tunnel
        shell: bash
        run: |
          TUNNEL_URL=$(.ci/scripts/tunnel/select-tunnel.sh \
            --url "${{ steps.cf-tunnel.outputs.tunnel-url }}" \
            --url "${{ steps.pinggy-tunnel.outputs.tunnel-url }}")
          echo "tunnel-url=$TUNNEL_URL" >> $GITHUB_OUTPUT
      - run: .ci/scripts/env/create-e2e-env.sh --api-url ${{ steps.tunnel.outputs.tunnel-url }} --output packages/e2e/.env
        shell: bash
      - name: Run Electron E2E Tests
        working-directory: packages/e2e
        run: npx playwright test --project=${{ matrix.project }}
        env:
          DISPLAY: ${{ env.DISPLAY }}
      - if: always()
        run: .ci/scripts/signal/create-complete.sh --name "e2e-${{ matrix.project }}" --status ${{ job.status }}
        shell: bash
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-complete-e2e-${{ matrix.project }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/complete.txt
          retention-days: 3
          overwrite: true

  test-bridge-workers:
    name: Bridge Workers (${{ matrix.os-image }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os-image:
          - ubuntu-24.04
          - debian-13
          - fedora-43
          - opensuse-16.0
          - oracle-10
          # NOTE: rocky-10 intentionally excluded. RHEL 10's stock kernel
          # ships without the btrfs module and Rediacc's storage backend
          # requires btrfs; Oracle Linux 10 works because UEK retains btrfs.
          # Full explanation and operator guidance:
          #   packages/www/src/content/docs/en/requirements.md (Why UEK?)
          #   packages/www/src/content/docs/en/limits.md (Why not Rocky 10?)
          #   packages/www/src/content/docs/en/troubleshooting.md (btrfs module missing)
    env:
      CI: 'true'
      BRIDGE_TIMEOUT: 120000
      VM_BRIDGE: '1'
      VM_WORKERS: '11 12'
      VM_CEPH_NODES: ''
      VM_IMAGE: ${{ matrix.os-image }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,middleware,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}
      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Propagate Docker Hub credentials to root
        run: sudo mkdir -p /root/.docker && sudo cp ~/.docker/config.json /root/.docker/config.json
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: 'stable'
          cache: true
          cache-dependency-path: private/renet/go.sum
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: .ci/scripts/setup/install-deps.sh
      - run: .ci/scripts/setup/build-packages.sh
      - run: .ci/scripts/build/build-cli.sh
      - name: Install CLI Globally
        run: .ci/scripts/setup/install-cli-global.sh

      - name: Install clang for BPF compilation
        run: sudo apt-get update -qq && sudo apt-get install -y -qq clang llvm libbpf-dev linux-headers-generic
      - name: Pre-pull Docker base images (avoid buildx auth issues)
        run: |
          pull_with_retry() {
            local image="$1"
            local platform="${2:-}"
            local args=""
            [ -n "$platform" ] && args="--platform $platform"
            for i in 1 2 3; do
              if docker pull $args "$image"; then
                return 0
              fi
              echo "Pull failed for $image $platform, retrying in $((i * 30))s..."
              sleep $((i * 30))
            done
            echo "Failed to pull $image $platform after 3 attempts"
            return 1
          }
          pull_with_retry debian:bookworm linux/amd64
          pull_with_retry debian:bookworm-slim linux/arm64
          pull_with_retry ubuntu:24.04 linux/amd64
          pull_with_retry ubuntu:24.04 linux/arm64
      - name: Build renet
        run: .ci/scripts/infra/build-renet.sh --nolicense
      - name: Install renet
        run: sudo cp $RENET_BINARY /usr/bin/renet && sudo chmod +x /usr/bin/renet

      - name: Free Disk Space
        run: |
          echo "=== Disk usage before cleanup ==="
          df -h / || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift 2>/dev/null || true
          docker system prune -af 2>/dev/null || true
          echo "=== Disk usage after cleanup ==="
          df -h / || true

      - name: Setup KVM Host
        run: sudo $RENET_BINARY ops host setup

      - name: Create Bridge Test Environment
        run: .ci/scripts/env/create-bridge-env.sh --renet-path /usr/bin/renet --output packages/bridge-tests/.env

      - name: Run Bridge Tests (Workers)
        run: .ci/scripts/test/run-bridge.sh --workers 1

      - if: always()
        run: .ci/scripts/signal/create-complete.sh --name "bridge-workers-${{ matrix.os-image }}" --status ${{ job.status }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-bridge-workers-${{ matrix.os-image }}-${{ github.sha }}
          path: |
            ${{ runner.temp }}/complete.txt
            packages/bridge-tests/reports/bridge/
            packages/bridge-tests/reports/bridge-logs/
          retention-days: 3
          if-no-files-found: ignore

