name: Console CT - Tests

on:
  workflow_call:
    inputs:
      renet_tag:
        type: string
        required: false
      web_tag:
        type: string
        required: false
      e2e_browsers:
        type: string
        required: false
        default: 'chromium'
      provision_vms:
        type: boolean
        required: false
        default: true
    secrets:
      APP_PRIVATE_KEY:
        required: false
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      ACCOUNT_ED25519_PRIVATE_KEY:
        required: false
      ACCOUNT_ED25519_PUBLIC_KEY:
        required: false
      ACCOUNT_SERVER_API_KEY:
        required: false
      ACCOUNT_JWT_SECRET:
        required: false
      STRIPE_SANDBOX_SECRET_KEY:
        required: false
      STRIPE_SANDBOX_WEBHOOK_SECRET:
        required: false

permissions:
  contents: read
  packages: read    # GHCR pull for test images

env:
  E2E_BROWSERS: ${{ inputs.e2e_browsers }}

jobs:
  # ============================================================================
  # COLUMN 4: TESTS + INFRA
  # Jobs: test-unit, test-bridge-workers, test-bridge-ceph,
  #       test-fork-isolation, test-renet, test-sql-standalone, test-sql-ha,
  #       test-account-e2e
  # ============================================================================
  test-unit:
    name: Unit
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: .ci/scripts/setup/install-deps.sh
      - run: .ci/scripts/setup/build-packages.sh
      - run: .ci/scripts/test/run-unit.sh --coverage

  test-bridge-workers:
    name: Bridge Workers (${{ matrix.os-image }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os-image:
          - ubuntu-24.04
          - debian-13
          - fedora-43
          - opensuse-16.0
          - oracle-10
          # NOTE: rocky-10 intentionally excluded. RHEL 10's stock kernel
          # ships without the btrfs module and Rediacc's storage backend
          # requires btrfs; Oracle Linux 10 works because UEK retains btrfs.
          # Full explanation and operator guidance:
          #   packages/www/src/content/docs/en/requirements.md (Why UEK?)
          #   packages/www/src/content/docs/en/limits.md (Why not Rocky 10?)
          #   packages/www/src/content/docs/en/troubleshooting.md (btrfs module missing)
    env:
      CI: 'true'
      BRIDGE_TIMEOUT: 240000
      VM_BRIDGE: '1'
      VM_WORKERS: '11 12'
      VM_CEPH_NODES: ''
      VM_IMAGE: ${{ matrix.os-image }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}
      - name: Login to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Login to Docker Hub
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Propagate Docker Hub credentials to root
        run: sudo mkdir -p /root/.docker && sudo cp ~/.docker/config.json /root/.docker/config.json
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 'stable'
          cache: true
          cache-dependency-path: private/renet/go.sum
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - name: Free Disk Space
        run: |
          echo "=== Disk usage before cleanup ==="
          df -h / || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift 2>/dev/null || true
          docker system prune -af 2>/dev/null || true
          npm cache clean --force 2>/dev/null || true
          echo "=== Disk usage after cleanup ==="
          df -h / || true
      - run: .ci/scripts/setup/install-deps.sh
      - run: .ci/scripts/setup/build-packages.sh
      - run: .ci/scripts/build/build-cli.sh
      - name: Install CLI Globally
        run: .ci/scripts/setup/install-cli-global.sh

      - name: Install clang for BPF compilation
        run: sudo apt-get update -qq && sudo apt-get install -y -qq clang llvm libbpf-dev linux-headers-generic
      - name: Pre-pull Docker base images (avoid buildx auth issues)
        run: |
          pull_with_retry() {
            local image="$1"
            local platform="${2:-}"
            local args=""
            [ -n "$platform" ] && args="--platform $platform"
            for i in 1 2 3; do
              if docker pull $args "$image"; then
                return 0
              fi
              echo "Pull failed for $image $platform, retrying in $((i * 30))s..."
              sleep $((i * 30))
            done
            echo "Failed to pull $image $platform after 3 attempts"
            return 1
          }
          pull_with_retry debian:bookworm linux/amd64
          pull_with_retry debian:bookworm-slim linux/arm64
          pull_with_retry ubuntu:24.04 linux/amd64
          pull_with_retry ubuntu:24.04 linux/arm64
      - name: Build renet
        run: .ci/scripts/infra/build-renet.sh --nolicense
      - name: Install renet
        run: sudo cp $RENET_BINARY /usr/bin/renet && sudo chmod +x /usr/bin/renet

      - name: Free Disk Space
        run: |
          echo "=== Disk usage before cleanup ==="
          df -h / || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift 2>/dev/null || true
          docker system prune -af 2>/dev/null || true
          echo "=== Disk usage after cleanup ==="
          df -h / || true

      - name: Setup KVM Host
        run: sudo $RENET_BINARY ops host setup

      - name: Create Bridge Test Environment
        run: .ci/scripts/env/create-bridge-env.sh --renet-path /usr/bin/renet --output packages/bridge-tests/.env

      - name: Run Bridge Tests (Workers)
        run: .ci/scripts/test/run-bridge.sh --workers 1

      - if: always()
        run: .ci/scripts/signal/create-complete.sh --name "bridge-workers-${{ matrix.os-image }}" --status ${{ job.status }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-bridge-workers-${{ matrix.os-image }}-${{ github.sha }}
          path: |
            ${{ runner.temp }}/complete.txt
            packages/bridge-tests/reports/bridge/
            packages/bridge-tests/reports/bridge-logs/
          retention-days: 3
          if-no-files-found: ignore

  test-bridge-ceph:
    name: Bridge Ceph
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: 'true'
      BRIDGE_TIMEOUT: 240000
      VM_BRIDGE: '1'
      VM_WORKERS: ''
      VM_CEPH_NODES: '21 22 23'
      CEPH_MODE: 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}
      - name: Login to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Login to Docker Hub
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Propagate Docker Hub credentials to root
        run: sudo mkdir -p /root/.docker && sudo cp ~/.docker/config.json /root/.docker/config.json
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 'stable'
          cache: true
          cache-dependency-path: private/renet/go.sum
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - name: Free Disk Space
        run: |
          echo "=== Disk usage before cleanup ==="
          df -h / || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift 2>/dev/null || true
          docker system prune -af 2>/dev/null || true
          npm cache clean --force 2>/dev/null || true
          echo "=== Disk usage after cleanup ==="
          df -h / || true
      - run: .ci/scripts/setup/install-deps.sh
      - run: .ci/scripts/setup/build-packages.sh
      - run: .ci/scripts/build/build-cli.sh
      - name: Install CLI Globally
        run: .ci/scripts/setup/install-cli-global.sh

      - name: Install clang for BPF compilation
        run: sudo apt-get update -qq && sudo apt-get install -y -qq clang llvm libbpf-dev linux-headers-generic
      - name: Pre-pull Docker base images (avoid buildx auth issues)
        run: |
          pull_with_retry() {
            local image="$1"
            local platform="${2:-}"
            local args=""
            [ -n "$platform" ] && args="--platform $platform"
            for i in 1 2 3; do
              if docker pull $args "$image"; then
                return 0
              fi
              echo "Pull failed for $image $platform, retrying in $((i * 30))s..."
              sleep $((i * 30))
            done
            echo "Failed to pull $image $platform after 3 attempts"
            return 1
          }
          pull_with_retry debian:bookworm linux/amd64
          pull_with_retry debian:bookworm-slim linux/arm64
          pull_with_retry ubuntu:24.04 linux/amd64
          pull_with_retry ubuntu:24.04 linux/arm64
      - name: Build renet
        run: .ci/scripts/infra/build-renet.sh --nolicense
      - name: Install renet
        run: sudo cp $RENET_BINARY /usr/bin/renet && sudo chmod +x /usr/bin/renet

      - name: Setup KVM Host
        run: sudo $RENET_BINARY ops host setup

      - name: Create Bridge Test Environment
        run: .ci/scripts/env/create-bridge-env.sh --ceph --renet-path /usr/bin/renet --output packages/bridge-tests/.env

      - name: Run Bridge Tests (Ceph)
        run: .ci/scripts/test/run-bridge.sh --workers 1 --config playwright.ceph.config.ts

      - if: always()
        run: .ci/scripts/signal/create-complete.sh --name "bridge-ceph" --status ${{ job.status }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-bridge-ceph-${{ github.sha }}
          path: |
            ${{ runner.temp }}/complete.txt
            packages/bridge-tests/reports/bridge-ceph/
            packages/bridge-tests/reports/bridge-logs/
          retention-days: 3
          if-no-files-found: ignore

  test-fork-isolation:
    name: Concurrent Fork Isolation
    runs-on: ubuntu-latest
    # 30 min covered the bind-isolation phases; the console#440 checkpoint
    # phase (counter warm-up + fork --checkpoint + restore) adds ~3 min.
    timeout-minutes: 35
    env:
      CI: 'true'
      VM_NET_BASE: '192.168.111'
      VM_BRIDGE: '1'
      VM_WORKERS: '11'
      VM_CEPH_NODES: ''
      REDIACC_SKIP_MACHINE_ACTIVATION: '1'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}
      - name: Login to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Login to Docker Hub
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Propagate Docker Hub credentials to root
        run: sudo mkdir -p /root/.docker && sudo cp ~/.docker/config.json /root/.docker/config.json
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 'stable'
          cache: true
          cache-dependency-path: private/renet/go.sum
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - name: Free Disk Space
        run: |
          echo "=== Disk usage before cleanup ==="
          df -h / || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift 2>/dev/null || true
          docker system prune -af 2>/dev/null || true
          npm cache clean --force 2>/dev/null || true
          echo "=== Disk usage after cleanup ==="
          df -h / || true
      - run: .ci/scripts/setup/install-deps.sh
      - run: .ci/scripts/setup/build-packages.sh
      - run: .ci/scripts/build/build-cli.sh
      - name: Install CLI Globally
        run: .ci/scripts/setup/install-cli-global.sh

      - name: Install clang for BPF compilation
        run: sudo apt-get update -qq && sudo apt-get install -y -qq clang llvm libbpf-dev linux-headers-generic
      - name: Pre-pull Docker base images (avoid buildx auth issues)
        run: |
          pull_with_retry() {
            local image="$1"
            local platform="${2:-}"
            local args=""
            [ -n "$platform" ] && args="--platform $platform"
            for i in 1 2 3; do
              if docker pull $args "$image"; then
                return 0
              fi
              echo "Pull failed for $image $platform, retrying in $((i * 30))s..."
              sleep $((i * 30))
            done
            echo "Failed to pull $image $platform after 3 attempts"
            return 1
          }
          pull_with_retry debian:bookworm linux/amd64
          pull_with_retry debian:bookworm-slim linux/arm64
          pull_with_retry ubuntu:24.04 linux/amd64
          pull_with_retry ubuntu:24.04 linux/arm64
      - name: Build renet
        run: .ci/scripts/infra/build-renet.sh --nolicense
      - name: Add renet to PATH
        run: sudo cp $RENET_BINARY /usr/bin/renet && sudo chmod +x /usr/bin/renet

      - name: Setup KVM Host
        run: sudo $RENET_BINARY ops host setup
      - name: Generate SSH keypair
        run: |
          ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N "" -q
          cp ~/.ssh/id_ed25519 ~/.ssh/id_rsa
          cp ~/.ssh/id_ed25519.pub ~/.ssh/id_rsa.pub
      - name: Provision VM
        run: sudo -E $RENET_BINARY ops up --force --parallel
        env:
          VM_NET_BASE: ${{ env.VM_NET_BASE }}
          VM_WORKERS: '11'
          VM_CEPH_NODES: ''
          VM_BRIDGE: '1'
      - name: Fix renet data dir ownership
        run: sudo chown -R $USER:$USER $RUNNER_TEMP/renet
      - name: Wait for VM SSH readiness
        run: |
          for vm in ${VM_NET_BASE}.1 ${VM_NET_BASE}.11; do
            echo "Waiting for $vm as $USER..."
            for i in {1..30}; do
              if ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=5 $USER@$vm echo ready 2>/dev/null; then
                echo "VM $vm is SSH-ready"
                ssh-keyscan $vm >> ~/.ssh/known_hosts 2>/dev/null
                break
              fi
              echo "Waiting for VM $vm SSH... ($i/30)"
              sleep 5
              if [[ $i -eq 30 ]]; then
                echo "VM $vm SSH not ready after 150s"
                exit 1
              fi
            done
          done

      - name: Run concurrent-fork isolation test
        run: .ci/scripts/private/concurrent-fork-isolation-test.sh
        env:
          VM_NET_BASE: ${{ env.VM_NET_BASE }}
          VM_WORKERS: '11'
          SSH_USER: ${{ env.USER }}

      # Curated-repo healthcheck convergence smoke test. Deploys
      # app-postgres on the worker and asserts the db container's
      # pg_isready healthcheck (probing localhost) reaches `healthy`.
      # Catches integration regressions that pure unit-level eBPF
      # tests can miss — the class of bug that hid nextcloud-talk's
      # 3-day silent failure.
      - name: Run compose healthcheck smoke test
        run: .ci/scripts/private/compose-healthcheck-smoke-test.sh
        env:
          VM_NET_BASE: ${{ env.VM_NET_BASE }}
          VM_WORKERS: '11'
          SSH_USER: ${{ env.USER }}

      - if: always()
        run: .ci/scripts/signal/create-complete.sh --name "fork-isolation" --status ${{ job.status }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-fork-isolation-${{ github.sha }}
          path: |
            ${{ runner.temp }}/complete.txt
          retention-days: 3
          if-no-files-found: ignore

  test-renet:
    name: Renet
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 'stable'
          cache: true
          cache-dependency-path: private/renet/go.sum

      # Login to Docker Hub to avoid rate limiting
      - name: Login to Docker Hub
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Propagate Docker Hub credentials to root
        run: sudo mkdir -p /root/.docker && sudo cp ~/.docker/config.json /root/.docker/config.json

      # Unit tests
      - name: Run renet tests
        run: .ci/scripts/private/run-renet.sh test

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-renet-coverage-${{ github.sha }}
          path: private/renet/coverage.out
          retention-days: 3
          if-no-files-found: ignore

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-renet-results-${{ github.sha }}
          path: private/renet/test-results.xml
          retention-days: 3
          if-no-files-found: ignore

      # eBPF isolation tests
      - name: Test eBPF
        run: |
          cd private/renet
          sudo go test ./pkg/ebpf/ -v -timeout 60s

      # Integration tests (needs sudo for KVM)
      - name: Run integration tests
        run: sudo .ci/scripts/private/renet-integration.sh --no-cleanup

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-renet-integration-${{ github.sha }}
          path: private/renet/test-results.xml
          retention-days: 3
          if-no-files-found: ignore

  # ============================================================================
  # SQL STANDALONE: Single-instance SQL Server + HAProxy
  # Validates standalone deployment, hardening, and TLS connectivity.
  # ============================================================================
  test-sql-standalone:
    name: SQL Standalone
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}
      # Login to Docker Hub to avoid rate limiting
      - name: Login to Docker Hub
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Propagate Docker Hub credentials to root
        run: sudo mkdir -p /root/.docker && sudo cp ~/.docker/config.json /root/.docker/config.json

      - name: Run SQL standalone test
        run: .ci/scripts/private/run-sql.sh test-standalone

  # ============================================================================
  # SQL HA: Multi-machine Always On Availability Group via renet VMs
  # Provisions 3 KVM VMs, deploys SQL Server HA cluster, and runs failover
  # test scenarios (planned failover, kill primary, recovery, data integrity).
  # ============================================================================
  test-sql-ha:
    name: SQL HA
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      CI: 'true'
      VM_NET: 'renet12'
      VM_NET_BASE: '192.168.112'
      VM_WORKERS: '11 12 13'
      VM_CEPH_NODES: ''
      VM_BRIDGE: ''
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}
      - name: Login to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      # Login to Docker Hub to avoid rate limiting
      - name: Login to Docker Hub
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Propagate Docker Hub credentials to root
        run: sudo mkdir -p /root/.docker && sudo cp ~/.docker/config.json /root/.docker/config.json

      # Build renet for VM provisioning
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 'stable'
          cache: true
          cache-dependency-path: private/renet/go.sum
      - name: Install clang for BPF compilation
        run: sudo apt-get update -qq && sudo apt-get install -y -qq clang llvm libbpf-dev linux-headers-generic
      - name: Pre-pull Docker base images (avoid buildx auth issues)
        run: |
          pull_with_retry() {
            local image="$1"
            local platform="${2:-}"
            local args=""
            [ -n "$platform" ] && args="--platform $platform"
            for i in 1 2 3; do
              if docker pull $args "$image"; then
                return 0
              fi
              echo "Pull failed for $image $platform, retrying in $((i * 30))s..."
              sleep $((i * 30))
            done
            echo "Failed to pull $image $platform after 3 attempts"
            return 1
          }
          pull_with_retry debian:bookworm linux/amd64
          pull_with_retry debian:bookworm-slim linux/arm64
          pull_with_retry ubuntu:24.04 linux/amd64
          pull_with_retry ubuntu:24.04 linux/arm64
      - name: Build renet
        run: .ci/scripts/infra/build-renet.sh
      - name: Install renet
        run: sudo cp $RENET_BINARY /usr/bin/renet && sudo chmod +x /usr/bin/renet

      # Provision 3 VMs
      - name: Setup KVM Host
        run: sudo $RENET_BINARY ops host setup
      - name: Generate SSH keypair
        run: |
          ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N "" -q
          cp ~/.ssh/id_ed25519 ~/.ssh/id_rsa
          cp ~/.ssh/id_ed25519.pub ~/.ssh/id_rsa.pub
      - name: Provision VMs
        run: sudo -E $RENET_BINARY ops up --force --parallel --skip-orchestration
      - name: Fix renet data dir ownership
        run: sudo chown -R $USER:$USER $RUNNER_TEMP/renet
      - name: Wait for VM SSH readiness
        run: |
          for id in 11 12 13; do
            vm="${VM_NET_BASE}.${id}"
            echo "Waiting for $vm as $USER..."
            for i in {1..30}; do
              if ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=5 $USER@$vm echo ready 2>/dev/null; then
                echo "VM $vm is SSH-ready"
                ssh-keyscan $vm >> ~/.ssh/known_hosts 2>/dev/null
                break
              fi
              echo "Waiting for VM $vm SSH... ($i/30)"
              sleep 5
              if [[ $i -eq 30 ]]; then
                echo "VM $vm SSH not ready after 150s"
                exit 1
              fi
            done
          done

      # Deploy SQL HA and run tests
      - name: Run SQL HA tests
        run: .ci/scripts/private/sql-ha-test.sh --scenarios "planned coordinator-kill kill recovery integrity"
        env:
          VM_NET_BASE: ${{ env.VM_NET_BASE }}
          SSH_USER: ${{ env.USER }}

      # Cleanup
      - name: Cleanup VMs
        if: always()
        run: sudo -E $RENET_BINARY ops down || true

  # ============================================================================
  # ACCOUNT E2E: Full Playwright E2E tests for the account portal
  # Spins up account server + RustFS via Docker, runs Playwright tests
  # ============================================================================
  test-account-e2e:
    name: Account E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: .ci/scripts/setup/install-deps.sh
      - run: npm run build:packages
      - name: Install Stripe CLI
        if: env.STRIPE_SANDBOX_SECRET_KEY != ''
        run: |
          curl -s https://packages.stripe.dev/api/security/keypair/stripe-cli-gpg/public | gpg --dearmor | sudo tee /usr/share/keyrings/stripe.gpg >/dev/null
          echo "deb [signed-by=/usr/share/keyrings/stripe.gpg] https://packages.stripe.dev/stripe-cli-debian-local stable main" | sudo tee /etc/apt/sources.list.d/stripe.list
          sudo apt-get update -qq && sudo apt-get install -y -qq stripe
        env:
          STRIPE_SANDBOX_SECRET_KEY: ${{ secrets.STRIPE_SANDBOX_SECRET_KEY }}
      - name: Run Account Portal E2E tests
        run: .ci/scripts/test/run-account-e2e.sh
        env:
          ED25519_PRIVATE_KEY: ${{ secrets.ACCOUNT_ED25519_PRIVATE_KEY }}
          ED25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_ED25519_PUBLIC_KEY }}
          API_KEY: ${{ secrets.ACCOUNT_SERVER_API_KEY }}
          JWT_SECRET: ${{ secrets.ACCOUNT_JWT_SECRET }}
          ROOT_EMAIL: ${{ vars.ROOT_EMAIL }}
          STRIPE_SANDBOX_SECRET_KEY: ${{ secrets.STRIPE_SANDBOX_SECRET_KEY }}
          STRIPE_SANDBOX_WEBHOOK_SECRET: ${{ secrets.STRIPE_SANDBOX_WEBHOOK_SECRET }}
      - name: Upload E2E report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: failure()
        with:
          name: account-e2e-report-${{ github.sha }}
          path: |
            private/account/e2e/reports/e2e/
            private/account/e2e/test-results/
          retention-days: 3
