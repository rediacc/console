name: Standalone Run
run-name: "${{ inputs.run-name || 'Manual Service Run' }}"

# Standalone workflow to run backend services for a specified duration
# Supports optional desktop environment (noVNC) for browser-based access
# Can be triggered manually (workflow_dispatch) or called from CI (workflow_call)
on:
  workflow_call:
    inputs:
      run-name:
        type: string
        default: 'CI Validation'
      duration:
        type: string
        default: '5'
      version:
        description: 'Docker image version tag (required for workflow_call)'
        type: string
        required: true
      api-tag:
        description: 'API image tag (overrides version for API)'
        type: string
        default: ''
      web-tag:
        description: 'Web image tag (overrides version for Web)'
        type: string
        default: ''
      bridge-tag:
        description: 'Bridge image tag (overrides version for Bridge)'
        type: string
        default: ''
      ci-mode:
        type: boolean
        default: true
      desktop-environment:
        type: string
        default: 'none'
      desktop-resolution:
        type: string
        default: '1600x900'
      enable-debug:
        type: boolean
        default: false
      vm-os:
        description: 'VM OS (none = disabled)'
        type: string
        default: 'ubuntu-24.04'
      vm-os-list:
        description: 'JSON array of VM OS variants for matrix runs (overrides vm-os)'
        type: string
        default: ''
    secrets:
      APP_PRIVATE_KEY:
        required: false
      AWS_SES_ACCESS_KEY_ID_EU:
        required: false
      AWS_SES_SECRET_ACCESS_KEY_EU:
        required: false
      AWS_SES_REGION_EU:
        required: false
  workflow_dispatch:
    inputs:
      run-name:
        description: 'Custom name for this run'
        type: string
        default: 'Manual Service Run'
      duration:
        description: 'Duration (minutes)'
        type: choice
        default: '30'
        options:
          - '5'
          - '10'
          - '15'
          - '30'
          - '45'
          - '60'
          - '90'
          - '120'
          - '180'
          - '240'
          - '300'
      version:
        description: 'Docker image version tag (leave empty to auto-derive from branch/tag)'
        type: string
        default: ''
      ci-mode:
        description: 'Enable CI/TEST mode'
        type: boolean
        default: true
      desktop-environment:
        description: 'Desktop environment (none = disabled)'
        type: choice
        default: 'none'
        options:
          - 'none'
          - 'xfce'
          - 'gnome'
          - 'mate'
      desktop-resolution:
        description: 'Desktop resolution'
        type: choice
        default: '1600x900'
        options:
          - '1024x768'
          - '1280x720'
          - '1366x768'
          - '1600x900'
          - '1920x1080'
          - '2560x1440'
      enable-debug:
        description: 'Enable tmate SSH debugging'
        type: boolean
        default: false
      vm-os:
        description: 'VM OS (none = disabled, or select OS)'
        type: choice
        default: 'ubuntu-24.04'
        options:
          - 'none'
          - 'ubuntu-24.04'
          - 'debian-13'
          - 'fedora-43'
          - 'opensuse-16.0'

permissions:
  contents: read
  packages: read

# Cancel in-progress runs when a new run is triggered
# Each run (workflow_dispatch or workflow_call) gets its own concurrency group via run_id
concurrency:
  group: ${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: true

jobs:
  run-services:
    name: ${{ matrix.vm-os != 'none' && matrix.vm-os || 'Services' }}
    runs-on: ubuntu-latest
    timeout-minutes: 420  # 7 hours max
    strategy:
      matrix:
        # When vm-os-list is provided (CI), use it as matrix; otherwise wrap single vm-os input
        vm-os: ${{ fromJSON(inputs.vm-os-list || format('["{0}"]', inputs.vm-os || 'none')) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: ./.github/actions/app-token
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,middleware,renet,account,sql,elite,homebrew-tap

      - name: Checkout with Submodules
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      - name: Set Image Tags
        run: |
          # Use reusable script to derive/validate base image tag
          # --version: explicit override (empty = auto-derive)
          # --env-file: exports TAG, API_TAG, WEB_TAG, BRIDGE_TAG to GITHUB_ENV
          .ci/scripts/ci/derive-image-tag.sh \
            ${{ inputs.version && format('--version "{0}"', inputs.version) || '' }} \
            --env-file

          # Override individual tags if provided (CI passes separate tags)
          if [[ -n "${{ inputs.api-tag }}" ]]; then
            echo "API_TAG=${{ inputs.api-tag }}" >> $GITHUB_ENV
          fi
          if [[ -n "${{ inputs.web-tag }}" ]]; then
            echo "WEB_TAG=${{ inputs.web-tag }}" >> $GITHUB_ENV
          fi
          if [[ -n "${{ inputs.bridge-tag }}" ]]; then
            echo "BRIDGE_TAG=${{ inputs.bridge-tag }}" >> $GITHUB_ENV
          fi

      - name: Pre-pull Docker Images
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          TAG: ${{ env.TAG }}
        run: .ci/scripts/infra/ci-pull-images.sh

      - name: Install sqlcmd (go-sqlcmd)
        run: sudo private/middleware/scripts/install-sqlcmd.sh

      # When debug or desktop is enabled we will strip private/renet/ down to
      # just bin/renet so a tmate/vnc user cannot read the source. Provision
      # VMs (further down) only needs the compiled binary at
      # private/renet/bin/renet — see ci-provision-start.sh and build-renet.sh,
      # which both no-op cleanly once that file already exists. So compile
      # first, then in the next step wipe everything around it.
      - name: Pre-build renet (so harden can wipe source while keeping the binary)
        if: inputs.enable-debug || inputs.desktop-environment != 'none'
        run: .ci/scripts/infra/build-renet.sh

      - name: Harden runner for debug access
        if: inputs.enable-debug || inputs.desktop-environment != 'none'
        run: |
          # 1. Strip the app token from git config. The previous form
          #    `--unset-all 'url.https://x-access-token'` doesn't match because
          #    the actual key looks like
          #      url.https://x-access-token:<TOKEN>@github.com/.insteadOf
          #    so we list all keys under the url.https://x-access-token prefix
          #    and unset each. The `|| true` keeps a (legitimate) "no entries"
          #    case from failing the step.
          git config --global --get-regexp '^url\.https://x-access-token' \
            | awk '{print $1}' \
            | while read -r key; do
                git config --global --unset "$key" || true
              done
          git config --global --get-regexp '^url\.https://x-access-token' \
            && { echo "::error::Failed to remove app-token git config entries"; exit 1; } \
            || true

          # 2. Wipe renet source files but keep bin/renet so VM provisioning
          #    (which still runs after tmate) can exec the binary. -mindepth 1
          #    avoids deleting the directory itself; -maxdepth 1 keeps us from
          #    descending into bin/.
          find private/renet -mindepth 1 -maxdepth 1 ! -name 'bin' \
            -exec rm -rf {} +

          # 3. Wipe the submodule's git directory. Without this,
          #    .git/modules/private/renet/ holds the full source history of
          #    the private repo even though private/renet/.git was removed.
          rm -rf .git/modules/private/renet

          # 4. Strip the ELF symbol table from the binary. Best-effort scrub
          #    of source-hint metadata; Go's runtime keeps some package-name
          #    strings, so this is partial protection. Full opacity needs
          #    -ldflags='-s -w' -trimpath in renet's build.sh dev path.
          strip private/renet/bin/renet 2>/dev/null || true

      - name: Create Debug Session
        if: inputs.enable-debug
        id: tmate
        uses: ./.github/actions/tmate
        with:
          timeout: 60
          silent-mode: true

      # SECURITY NOTE: Debug sessions are hardened before tmate starts:
      # 1. App token removed from git config (no cloning private repos)
      # 2. private/renet source removed from disk; only bin/renet remains
      # 3. .git/modules/private/renet removed (no source via git history)
      # 4. ELF symbol table stripped from the renet binary
      # 5. GITHUB_TOKEN not present (images pre-pulled, no auth needed from here)

      - name: Start Backend Services
        id: backend
        uses: ./.github/actions/start-backend
        with:
          keep-alive: 'true'
          ci-mode: ${{ inputs.ci-mode && 'true' || 'false' }}
        env:
          TAG: ${{ env.TAG }}
          CI_MODE: ${{ inputs.ci-mode && 'true' || 'false' }}

      # VM Provisioning (optional - builds renet from source and image on-demand)
      - name: Provision VMs
        id: vms
        if: matrix.vm-os != 'none'
        uses: ./.github/actions/provision-vms
        with:
          vm-os: ${{ matrix.vm-os }}

      - name: Setup Desktop Environment
        if: inputs.desktop-environment != 'none'
        id: desktop
        env:
          DESKTOP_ENVIRONMENT: ${{ inputs.desktop-environment }}
          DESKTOP_RESOLUTION: ${{ inputs.desktop-resolution }}
        run: |
          chmod +x .ci/scripts/infra/ci-desktop.sh
          .ci/scripts/infra/ci-desktop.sh --keep-running

      - name: Start Caddy Gateway
        if: inputs.desktop-environment != 'none'
        run: |
          echo "Starting Caddy gateway for desktop routing..."
          cd .ci/docker/ci
          docker compose -f docker-compose.yml -f docker-compose.desktop.yml up -d --no-recreate gateway

          # Wait for gateway to be ready
          timeout 30 bash -c 'until curl -sf http://localhost:8080/health > /dev/null 2>&1; do sleep 1; done' || {
            echo "Gateway health check timed out, checking status..."
            docker logs rediacc-gateway --tail 20 || true
          }
          echo "Caddy gateway started"

      - name: Create Cloudflare Tunnel
        id: tunnel
        run: |
          LOCAL_URL="${{ inputs.desktop-environment != 'none' && 'http://localhost:8080' || 'http://localhost' }}"
          TUNNEL_URL=$(.ci/scripts/tunnel/start-cloudflare.sh --url "$LOCAL_URL" --timeout 60) || true
          if [[ -n "$TUNNEL_URL" ]]; then
            echo "::add-mask::$TUNNEL_URL"
          fi
          echo "tunnel-url=${TUNNEL_URL}" >> $GITHUB_OUTPUT
          if [[ -n "$TUNNEL_URL" ]]; then
            echo "Cloudflare tunnel created (URL sent via email)"
          else
            echo "::warning::Cloudflare tunnel failed — services available only via localhost"
          fi

      - name: Send Access Information Email
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_SES_ACCESS_KEY_ID_EU }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SES_SECRET_ACCESS_KEY_EU }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_SES_REGION_EU }}
          SES_FROM: ${{ vars.AWS_SES_FROM }}
        run: |
          .ci/scripts/infra/send-access-email.sh \
            --actor "${{ github.actor }}" \
            --tag "${{ env.TAG }}" \
            --duration "${{ inputs.duration }}" \
            --run-name "${{ inputs.run-name || 'Manual Service Run' }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --tunnel-url "${{ steps.tunnel.outputs.tunnel-url }}" \
            --desktop-env "${{ inputs.desktop-environment }}" \
            --desktop-res "${{ inputs.desktop-resolution }}" \
            --vm-os "${{ matrix.vm-os }}" \
            --vm-kvm "${{ steps.vms.outputs.kvm-available }}" \
            --vm-user "${{ steps.vms.outputs.machine-user }}" \
            --vm-pass "${{ steps.vms.outputs.machine-password }}" \
            --bridge-ip "${{ steps.vms.outputs.bridge-ip }}" \
            --worker-ips "${{ steps.vms.outputs.worker-ips }}" \
            --connection-string "${{ env.CONNECTION_STRING }}" \
            --debug-ssh "${{ steps.tmate.outputs.ssh-connection }}" \
            --debug-web "${{ steps.tmate.outputs.web-url }}"

      - name: Display Access Information and Keep Services Alive
        run: |
          # Display Access Information
          TUNNEL_URL="${{ steps.tunnel.outputs.tunnel-url }}"
          DURATION_MIN="${{ inputs.duration }}"

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🌍 ACCESS INFORMATION"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📦 DOCKER IMAGE VERSION: ${{ env.TAG }}"
          echo "⏱️  DURATION: ${DURATION_MIN} minutes"
          echo ""

          # Never log sensitive access info -- all credentials are sent via email
          echo "🌐 WEB ACCESS: [sent via email]"
          if [ "${{ inputs.desktop-environment }}" != "none" ]; then
            echo "   • Environment: ${{ inputs.desktop-environment }}"
            echo "   • Resolution: ${{ inputs.desktop-resolution }}"
          fi
          echo ""
          if [ "${{ matrix.vm-os }}" != "none" ] && [ "${{ steps.vms.outputs.kvm-available }}" == "true" ]; then
            echo "🖥️  VM INFRASTRUCTURE:"
            echo "   • Provider: KVM"
            echo "   • OS: ${{ matrix.vm-os }}"
            echo ""
            echo "🔐 VM CREDENTIALS: [sent via email]"
            echo "🔑 SSH ACCESS: [sent via email]"
            echo ""
          fi
          echo "🐳 LOCAL SERVICES:"
          echo "   • Web UI:  http://localhost"
          echo "   • API:     http://localhost/api"
          if [ "${{ inputs.desktop-environment }}" != "none" ]; then
            echo "   • Desktop: http://localhost:6080/vnc.html"
            echo "   • Gateway: http://localhost:8080"
          fi
          echo ""
          echo "🗄️  DATABASE: [sent via email]"
          echo ""
          if [ "${{ inputs.enable-debug }}" == "true" ]; then
            echo "🔧 DEBUG ACCESS: [sent via email]"
            echo ""
          fi
          if [ "${EMAIL_SENT}" == "true" ]; then
            echo "📧 Sensitive details have been sent to your email."
          else
            echo "⚠️  Email not sent -- access details are only available via masked step outputs."
          fi

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          # Keep Services Alive
          DURATION_SEC=$((DURATION_MIN * 60))
          END_TIME=$(($(date +%s) + DURATION_SEC))
          CHECK_INTERVAL=300  # Check every 5 minutes

          echo "⏳ Keeping services alive for ${DURATION_MIN} minutes..."
          echo "   Start time: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "   End time:   $(date -d @${END_TIME} '+%Y-%m-%d %H:%M:%S')"
          echo ""

          while [ $(date +%s) -lt ${END_TIME} ]; do
            REMAINING=$(( (END_TIME - $(date +%s)) / 60 ))

            # Run health check
            if curl -sf http://localhost/health > /dev/null 2>&1; then
              echo "⏱️  ${REMAINING} minutes remaining - services healthy"
            else
              echo "⏱️  ${REMAINING} minutes remaining - ⚠️  health check failed"
              echo ""
              echo "📋 Container Status:"
              docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep -E "(NAME|rediacc)" || true
              echo ""
            fi

            # Calculate next check or remaining time
            TIME_LEFT=$((END_TIME - $(date +%s)))
            if [ ${TIME_LEFT} -lt ${CHECK_INTERVAL} ]; then
              SLEEP_TIME=${TIME_LEFT}
            else
              SLEEP_TIME=${CHECK_INTERVAL}
            fi

            if [ ${SLEEP_TIME} -gt 0 ]; then
              sleep ${SLEEP_TIME}
            fi
          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⏰ Duration completed at $(date '+%Y-%m-%d %H:%M:%S')"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Final Service Status
        if: always()
        run: |
          echo ""
          echo "Final Container Status:"
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep -E "(NAME|rediacc)" || true
          echo ""
          echo "Recent Account Server Logs (last 50 lines):"
          docker logs rediacc-account --tail=50 2>&1 || true
          echo ""
          echo "Recent API Logs (last 30 lines):"
          docker logs rediacc-api --tail=30 2>&1 || true

      - name: Cleanup
        if: always()
        run: |
          echo ""
          echo "Cleaning up..."

          # Stop tmate session if enabled
          if [ "${{ inputs.enable-debug }}" == "true" ]; then
            TMATE_PID="${{ steps.tmate.outputs.session-pid }}"
            if [ -n "$TMATE_PID" ] && ps -p $TMATE_PID > /dev/null 2>&1; then
              echo "Stopping tmate session (PID: $TMATE_PID)..."
              kill $TMATE_PID || true
            fi
          fi

          # Stop cloudflared tunnel
          if [ -f "$RUNNER_TEMP/cloudflared.pid" ]; then
            TUNNEL_PID=$(cat "$RUNNER_TEMP/cloudflared.pid")
            if [ -n "$TUNNEL_PID" ] && ps -p $TUNNEL_PID > /dev/null 2>&1; then
              echo "Stopping Cloudflare Tunnel (PID: $TUNNEL_PID)..."
              kill $TUNNEL_PID || true
            fi
          fi

          # Cleanup desktop processes
          if [ "${{ inputs.desktop-environment }}" != "none" ]; then
            echo "Stopping desktop environment..."
            .ci/scripts/infra/ci-desktop-cleanup.sh || true
          fi

          # Stop VMs if enabled
          if [ "${{ matrix.vm-os }}" != "none" ]; then
            echo "Stopping VMs..."
            .ci/scripts/infra/ci-provision-stop.sh || true
          fi

          # Stop gateway if running (desktop overlay)
          if docker ps --format "{{.Names}}" | grep -q "^rediacc-gateway$"; then
            cd .ci/docker/ci
            docker compose -f docker-compose.yml -f docker-compose.desktop.yml down gateway || true
          fi

          # Stop all backend services
          .ci/scripts/infra/ci-stop.sh

          echo "Cleanup complete"

      - name: Summary
        if: always()
        run: |
          echo ""
          echo "================================================================"
          echo "  Run Summary"
          echo "================================================================"
          echo "  Duration: ${{ inputs.duration }} minutes"
          echo "  Status:   ${{ job.status }}"
          echo "  Version:  ${{ env.TAG }}"
          echo "  Desktop:  ${{ inputs.desktop-environment != 'none' && 'enabled' || 'disabled' }}"
          echo "  VMs:      ${{ matrix.vm-os != 'none' && matrix.vm-os || 'disabled' }}"
          echo "  Debug:    ${{ inputs.enable-debug && 'enabled' || 'disabled' }}"
          echo "  End time: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "================================================================"
