name: CD - Stage Artifacts (Reusable)

# Reusable workflow that stages release artifacts to production R2 + GHCR
# and validates them pre-publish. Called from ci.yml for every event that
# resolves to a non-empty channel (push -> edge, pull_request -> pr-N).
# merge_group and schedule events get an empty channel and skip all upload
# + GHCR retag steps; the builds + validation still run for merge-queue
# coverage.
# - Downloads all build artifacts
# - Builds Linux packages (DEB/RPM) ONCE
# - Generates CLI manifest ONCE
# - Builds Pages bundle (www + apt/rpm metadata)
# - Stages Docker images (skipped on empty channel)
# - Validates all artifacts
# - Uploads to R2 (skipped on empty channel)

on:
  workflow_call:
    inputs:
      next_version:
        type: string
        required: false
      channel:
        description: 'Release channel (e.g., pr-123, edge, stable)'
        type: string
        required: false
      api_tag:
        type: string
        required: false
      bridge_tag:
        type: string
        required: false
      plugins_tag:
        type: string
        required: false
      web_tag:
        type: string
        required: false
      cli_tag:
        type: string
        required: false
      upload_pages:
        required: false
        type: boolean
        default: false
    outputs:
      validation_passed:
        description: 'Whether all validation passed'
        value: ${{ jobs.stage.outputs.passed }}
    secrets:
      APP_PRIVATE_KEY:
        required: true
      GPG_PRIVATE_KEY:
        required: false
      GPG_PASSPHRASE:
        required: false
      R2_ACCESS_KEY_ID:
        required: false
      R2_SECRET_ACCESS_KEY:
        required: false
      R2_ENDPOINT:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false

permissions:
  contents: read
  packages: write   # GHCR pull + retag push when push-to-main
  id-token: write   # OIDC token for Sigstore signing
  attestations: write  # Store attestations on GitHub

jobs:
  stage:
    name: Stage Artifacts
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.validate.outputs.passed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      # -----------------------------------------------------------------------
      # Step 1: Download all build artifacts
      # -----------------------------------------------------------------------
      - name: Download desktop artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: build-desktop-*
          path: dist/desktop/
          merge-multiple: true

      - name: Download CLI executables
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: build-cli-*-${{ github.sha }}
          path: dist/cli/
          merge-multiple: true

      - name: Download CLI npm tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: cli-npm-${{ github.sha }}
          path: dist/npm/

      - name: Download www build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-www-${{ github.sha }}
          path: packages/www/dist/

      - name: Download json build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-json-${{ github.sha }}
          path: packages/json/dist/

      # -----------------------------------------------------------------------
      # Step 2: Build Linux packages (DEB/RPM) - ONCE
      # -----------------------------------------------------------------------
      - name: Install packaging tools
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq dpkg-dev createrepo-c gnupg
          # Install nfpm (unified Linux package builder — replaces dpkg-deb + rpmbuild)
          source .ci/config/constants.sh
          curl -sfL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar xz -C /usr/local/bin nfpm

      - name: Build Linux packages
        run: |
          VERSION="${{ inputs.next_version }}"
          mkdir -p dist/packages
          for format in deb rpm apk archlinux; do
            for pair in "dist/cli/rdc-linux-x64:amd64" "dist/cli/rdc-linux-arm64:arm64"; do
              binary="${pair%%:*}"; arch="${pair##*:}"
              # APK targets Alpine (musl) — use musl-linked binary if available
              if [[ "$format" == "apk" ]]; then
                musl_binary="${binary/rdc-linux-/rdc-linux-musl-}"
                [[ -f "$musl_binary" ]] && binary="$musl_binary"
              fi
              .ci/scripts/build/build-linux-pkg.sh \
                --binary "$binary" --version "$VERSION" \
                --arch "$arch" --format "$format" \
                --output dist/packages
            done
          done
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      # -----------------------------------------------------------------------
      # Step 3: Generate CLI manifest - ONCE
      # -----------------------------------------------------------------------
      - name: Generate CLI manifest
        run: |
          .ci/scripts/build/generate-cli-manifest.sh \
            --version ${{ inputs.next_version }} \
            --channel "${{ inputs.channel }}" \
            --input dist/cli/ \
            --output dist/cli/manifest.json

      # -----------------------------------------------------------------------
      # Step 4: Build Pages bundle (www + apt/rpm metadata)
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: .ci/scripts/setup/install-deps.sh

      - name: Build packages
        run: .ci/scripts/setup/build-packages.sh

      - name: Build web for Pages (with /console/ base path)
        run: .ci/scripts/build/build-web.sh --type RELEASE
        env:
          VITE_APP_VERSION: ${{ github.sha }}
          VITE_BASE_PATH: /console/

      - name: Assemble pages package
        run: .ci/scripts/build/build-pages.sh --output dist/pages

      - name: Copy CLI manifest to pages
        run: |
          mkdir -p dist/pages/cli
          cp dist/cli/manifest.json dist/pages/cli/

      - name: Build package repositories
        run: |
          VERSION="${{ inputs.next_version }}"

          # Build self-contained repos (packages alongside metadata)
          .ci/scripts/build/build-pkg-repo.sh \
            --version "$VERSION" \
            --local-pkgs dist/packages \
            --output dist/repos \
            --channel "${{ inputs.channel }}"
        env:
          GH_TOKEN: ${{ github.token }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      # -----------------------------------------------------------------------
      # Step 5: Stage Docker images (validates existence + retag to channel)
      # -----------------------------------------------------------------------
      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Stage Docker images
        # Skip on empty channel (merge_group / schedule events). retag-image.sh
        # uses `set -euo pipefail` and would fail loudly on an empty target
        # tag; gating here is cheaper than erroring the job for validation-
        # only runs that deliberately don't publish.
        if: inputs.channel != ''
        run: |
          CHANNEL="${{ inputs.channel }}"

          .ci/scripts/docker/retag-image.sh --image api --from "${{ inputs.api_tag }}" --to "$CHANNEL"
          .ci/scripts/docker/retag-image.sh --image bridge --from "${{ inputs.bridge_tag }}" --to "$CHANNEL"
          .ci/scripts/docker/retag-image.sh --image plugin-terminal --from "${{ inputs.plugins_tag }}" --to "$CHANNEL"
          .ci/scripts/docker/retag-image.sh --image plugin-browser --from "${{ inputs.plugins_tag }}" --to "$CHANNEL"
          .ci/scripts/docker/retag-image.sh --image web --from "${{ inputs.web_tag }}" --to "$CHANNEL"
          .ci/scripts/docker/retag-image.sh --image cli --from "${{ inputs.cli_tag }}" --to "$CHANNEL"
          # On-prem server image lives outside the elite/ namespace; use --image-path
          # so retag doesn't try to prepend PUBLISH_DOCKER_REGISTRY. Built by the same
          # build-server-docker-{amd64,arm64} jobs as elite/web, sharing the web_tag.
          .ci/scripts/docker/retag-image.sh --image-path ghcr.io/rediacc/server --from "${{ inputs.web_tag }}" --to "$CHANNEL"

      # -----------------------------------------------------------------------
      # Step 6: Clean up debug artifacts
      # -----------------------------------------------------------------------
      - name: Clean up debug artifacts
        run: rm -f dist/desktop/builder-debug.yml

      # -----------------------------------------------------------------------
      # Step 7: Validate all artifacts
      # -----------------------------------------------------------------------
      - name: Validate artifacts
        id: validate
        run: |
          MODE="${{ github.event_name != 'push' && '(no-publish) ' || '' }}"
          echo "## ${MODE}Stage Artifacts Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          DESKTOP_COUNT=$(find dist/desktop -type f 2>/dev/null | wc -l)
          CLI_COUNT=$(find dist/cli -type f 2>/dev/null | wc -l)
          PKG_COUNT=$(find dist/packages -type f 2>/dev/null | wc -l)
          DEB_COUNT=$(find dist/packages -name "*.deb" 2>/dev/null | wc -l)
          RPM_COUNT=$(find dist/packages -name "*.rpm" 2>/dev/null | wc -l)
          APK_COUNT=$(find dist/packages -name "*.apk" 2>/dev/null | wc -l)
          ARCH_COUNT=$(find dist/packages -name "*.pkg.tar.zst" 2>/dev/null | wc -l)
          PAGES_SIZE=$(du -sh dist/pages/ 2>/dev/null | cut -f1 || echo "N/A")
          APT_FILES=$(find dist/repos/apt/dists -type f 2>/dev/null | wc -l)
          RPM_FILES=$(find dist/repos/rpm/repodata -type f 2>/dev/null | wc -l)

          echo "| Artifact | Count/Size |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Desktop artifacts | $DESKTOP_COUNT files |" >> $GITHUB_STEP_SUMMARY
          echo "| CLI artifacts | $CLI_COUNT files |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux packages | $PKG_COUNT files (deb:$DEB_COUNT rpm:$RPM_COUNT apk:$APK_COUNT arch:$ARCH_COUNT) |" >> $GITHUB_STEP_SUMMARY
          echo "| Pages bundle | $PAGES_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| APT metadata | $APT_FILES files |" >> $GITHUB_STEP_SUMMARY
          echo "| RPM metadata | $RPM_FILES files |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ inputs.next_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Channel:** ${{ inputs.channel }}" >> $GITHUB_STEP_SUMMARY

          FAILED=false

          if [[ "$DESKTOP_COUNT" -eq 0 ]]; then
            echo "::error::No desktop artifacts found"
            FAILED=true
          fi
          if [[ "$CLI_COUNT" -eq 0 ]]; then
            echo "::error::No CLI artifacts found"
            FAILED=true
          fi
          if [[ "$PKG_COUNT" -eq 0 ]]; then
            echo "::error::No Linux packages found"
            FAILED=true
          fi
          if [[ "$DEB_COUNT" -lt 2 ]]; then
            echo "::error::Expected at least 2 DEB packages, found $DEB_COUNT"
            FAILED=true
          fi
          if [[ "$RPM_COUNT" -lt 2 ]]; then
            echo "::error::Expected at least 2 RPM packages, found $RPM_COUNT"
            FAILED=true
          fi
          if [[ "$APK_COUNT" -lt 2 ]]; then
            echo "::error::Expected at least 2 APK packages, found $APK_COUNT"
            FAILED=true
          fi
          if [[ "$ARCH_COUNT" -lt 2 ]]; then
            echo "::error::Expected at least 2 Archlinux packages, found $ARCH_COUNT"
            FAILED=true
          fi
          if [[ "$APT_FILES" -eq 0 ]]; then
            echo "::error::No APT metadata files found"
            FAILED=true
          fi
          if [[ "$RPM_FILES" -eq 0 ]]; then
            echo "::error::No RPM metadata files found"
            FAILED=true
          fi

          if [[ "$FAILED" == "true" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Status:** Validation FAILED" >> $GITHUB_STEP_SUMMARY
            echo "passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "**Status:** All validation passed. Ready for publish." >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** All validation passed." >> $GITHUB_STEP_SUMMARY
          fi
          echo "passed=true" >> $GITHUB_OUTPUT

      # Install validation handled by validate-install job in ci.yml (6 platforms).

      # -----------------------------------------------------------------------
      # Upload preview pages artifact (for PR preview deploys)
      # -----------------------------------------------------------------------
      - name: Upload preview pages artifact
        if: ${{ inputs.upload_pages && github.event_name != 'push' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: preview-pages-${{ github.sha }}
          path: dist/pages/
          retention-days: 1

      # -----------------------------------------------------------------------
      # Upload staging artifacts for publish job (only when push-to-main)
      # -----------------------------------------------------------------------
      - name: Upload staging release artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-artifacts-${{ github.sha }}
          path: |
            dist/desktop/
            dist/cli/
            dist/packages/
          retention-days: 1

      # Pages artifact no longer needed -- cd-deploy-worker.yml builds from source.

      # -----------------------------------------------------------------------
      # Upload to R2 staging (pre-publish validation needs ALL artifacts on R2)
      # -----------------------------------------------------------------------
      - name: Upload artifacts to R2 channel
        if: inputs.channel != ''
        run: |
          .ci/scripts/deploy/upload-to-r2.sh \
            --version "${{ inputs.next_version }}" \
            --channel "${{ inputs.channel }}"
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}

      - name: Upload repos to R2 channel
        if: inputs.channel != ''
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
        run: |
          CHANNEL="${{ inputs.channel }}"
          export AWS_ACCESS_KEY_ID="${R2_ACCESS_KEY_ID}"
          export AWS_SECRET_ACCESS_KEY="${R2_SECRET_ACCESS_KEY}"
          export AWS_DEFAULT_REGION="auto"

          # Cache-Control policy. Package-manager channel paths
          # (apt/<channel>/, rpm/<channel>/, apk/<channel>/, archlinux/<channel>/)
          # reuse filenames across releases -- the URL cli/edge/rdc-0.9.13.deb
          # can serve DIFFERENT bytes from one CI run to the next because
          # edge builds that happen to land on the same semver produce
          # slightly different archives. Marking them "immutable" let CF
          # cache a previous run's body under a URL the next run's APKINDEX
          # points at with a different sha256 -> "BAD signature" cascades.
          # no-cache means CF never caches (per developers.cloudflare.com/
          # cache/concepts/default-cache-behavior), so there is no stale
          # cached body to go stale. R2 origin is inside CF's network, so
          # end-user install cost is not materially different.
          # Truly-versioned paths (cli/v<semver>/, desktop/v<semver>/,
          # npm/<channel>/rediacc-cli-<semver>.tgz) keep their 1-year
          # immutable cache; those are handled by upload-to-r2.sh.
          CC_MUTABLE="no-cache"

          PURGE_URLS=()
          for dir in apt rpm apk archlinux; do
            [[ -d "dist/repos/$dir" ]] || continue
            aws s3 sync "dist/repos/$dir" "s3://rediacc-releases/${dir}/${CHANNEL}/" \
              --cache-control "$CC_MUTABLE" \
              --endpoint-url "$R2_ENDPOINT" --quiet
            # Purge every uploaded URL to evict entries cached under the
            # old immutable policy. Once every CI cycle has re-uploaded
            # with no-cache, CF won't cache anything and subsequent purges
            # are cheap no-ops.
            while IFS= read -r f; do
              PURGE_URLS+=("https://releases.rediacc.com/${dir}/${CHANNEL}/${f#dist/repos/$dir/}")
            done < <(find "dist/repos/$dir" -type f)
          done

          # Upload install scripts (rewrite default channel so R2 copies
          # under cli/${CHANNEL}/ install from ${CHANNEL} by default).
          # Channel-pointer scripts are mutable.
          for f in dist/pages/install.sh dist/pages/install.ps1; do
            [[ -f "$f" ]] || continue
            tmp="$(mktemp)"
            sed -e "s|REDIACC_CHANNEL:-stable|REDIACC_CHANNEL:-${CHANNEL}|g" \
                -e "s|} else { \"stable\" }|} else { \"${CHANNEL}\" }|g" \
                "$f" > "$tmp"
            aws s3 cp "$tmp" "s3://rediacc-releases/cli/${CHANNEL}/$(basename "$f")" \
              --cache-control "$CC_MUTABLE" \
              --endpoint-url "$R2_ENDPOINT" --quiet
            rm -f "$tmp"
            PURGE_URLS+=("https://releases.rediacc.com/cli/${CHANNEL}/$(basename "$f")")
          done
          echo "Repos uploaded to R2 channel: ${CHANNEL}"

          # Purge CF cache for the mutable URLs we just (re)uploaded. Existing
          # cached entries from before the no-cache fix would otherwise persist
          # with their original (default) TTL, breaking apt-get update with
          # "File has unexpected size".
          if [[ ${#PURGE_URLS[@]} -gt 0 ]]; then
            printf '%s\n' "${PURGE_URLS[@]}" \
              | .ci/scripts/deploy/cf-purge-urls.sh --zone "$CLOUDFLARE_ZONE_ID"
          fi

      # -----------------------------------------------------------------------
      # Assert the versioned-path sentinel is actually sealed after upload.
      # Replaces the dead key-based sentinel check in upload-to-r2.sh (which
      # looked for cli/v${V}/manifest.json -- a file nothing ever wrote).
      # If this step ever fails on a stable/edge push, it means the CLI loop
      # changed and the sentinel is silently absent again.
      # -----------------------------------------------------------------------
      - name: Assert R2 versioned sentinel exists
        if: inputs.channel == 'stable' || inputs.channel == 'edge'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: .ci/scripts/test/assert-r2-sentinel.sh "${{ inputs.channel }}" "${{ inputs.next_version }}"

      # -----------------------------------------------------------------------
      # Attest staging artifacts (Sigstore provenance for supply chain integrity)
      # -----------------------------------------------------------------------
      - name: Attest staging release artifact
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4
        with:
          subject-path: |
            dist/desktop/**/*
            dist/cli/**/*
            dist/packages/**/*

      - name: Attest staging repos artifact
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4
        with:
          subject-path: |
            dist/repos/apt/dists/**/*
            dist/repos/rpm/repodata/**/*
