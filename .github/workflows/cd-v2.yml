name: Release

# Publish workflow -- called from CI on push-to-main, or manually.
# Promotes Docker images, creates git tag + GitHub Release, deploys edge worker.
# Version comes from git tags (no version bump commits).

on:
  workflow_run:
    workflows: ["Console CI"]
    types: [completed]
    branches: [main]
  workflow_call:
    inputs:
      next_version:
        description: 'Version to publish (calculated from git tags)'
        required: true
        type: string
      bump_type:
        description: 'Bump type (patch, minor, major)'
        required: true
        type: string
      channel:
        description: 'Release channel (Docker tag + R2 channel path)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      ci_run_id:
        description: 'CI workflow run ID to publish from'
        required: true
        type: string
      release_mode:
        description: 'Release mode'
        required: true
        type: choice
        options:
          - retry
          - patch
          - minor
          - major
        default: retry
      publish_stable:
        description: 'Also publish to stable channel (hotfix deployment)'
        type: boolean
        default: false
      deploy_workers_only:
        description: 'Deploy Workers only (skip version bump, CLI, Docker, Desktop, GitHub Release)'
        type: boolean
        default: false

# Required for release publishing, Docker, and Cloudflare Pages deployment
permissions:
  actions: write
  contents: write
  packages: write       # For GHCR push
  attestations: write   # Verify artifact provenance

# Queue new releases instead of cancelling in-progress ones
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ============================================================================
  # INITIALIZE
  # Resolve CI run context, recalculate version, guard against duplicate publish
  # ============================================================================
  init:
    name: Initialize
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run'
        && github.event.workflow_run.conclusion == 'success'
        && github.event.workflow_run.event == 'push')
    outputs:
      ci_run_id: ${{ steps.resolve.outputs.ci_run_id }}
      ci_sha: ${{ steps.resolve.outputs.ci_sha }}
      next_version: ${{ steps.override.outputs.next_version || steps.version.outputs.next_version || steps.init.outputs.next_version }}
      bump_type: ${{ steps.override.outputs.bump_type || steps.version.outputs.bump_type || steps.init.outputs.bump_type }}
      channel: ${{ steps.channel.outputs.channel }}
      skip_release: ${{ steps.skip-check.outputs.skip_release }}
      retry_mode: ${{ steps.skip-check.outputs.retry_mode }}
      workers_only: ${{ steps.skip-check.outputs.workers_only }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/app-token
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          preset: cd
          repositories: console,middleware,renet,account,homebrew-tap,elite,sql

      # Re-checkout with submodules using app token (needed for submodule branch check)
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6
        with:
          fetch-depth: 0  # Full history needed for merge-base --is-ancestor in submodule divergence check
          submodules: true
          token: ${{ steps.app-token.outputs.token }}

      # Resolve CI run context from workflow_call inputs or workflow_dispatch input
      - name: Resolve CI run context
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "ci_run_id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
            echo "ci_sha=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          else
            CI_RUN_ID="${{ inputs.ci_run_id || github.run_id }}"
            CI_SHA=$(gh api "repos/${{ github.repository }}/actions/runs/${CI_RUN_ID}" --jq '.head_sha' 2>/dev/null || echo "${{ github.sha }}")
            echo "ci_run_id=${CI_RUN_ID}" >> $GITHUB_OUTPUT
            echo "ci_sha=${CI_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Stale ref check (workers-only)
        if: inputs.deploy_workers_only == true
        run: |
          CI_SHA="${{ steps.resolve.outputs.ci_sha }}"
          BEHIND=$(git rev-list --count "${CI_SHA}..HEAD" 2>/dev/null || echo "unknown")
          if [[ "$BEHIND" != "unknown" ]] && [[ "$BEHIND" -gt 10 ]]; then
            echo "::warning::CI ref is ${BEHIND} commits behind HEAD. Verify you are deploying the intended code."
          fi
          echo "::notice::Workers-only deploy from SHA: ${CI_SHA} (${BEHIND} commits behind HEAD)"

      # Check if the merged PR has the 'release' label (opt-in to CD pipeline)
      # Without the label, CD is skipped â€” prevents accidental releases from chore PRs.
      #
      # Manual workflow_dispatch: release_mode determines behavior
      #   - retry (default): re-deploy current version without bumping
      #   - patch/minor/major: create new version bump
      - name: Check for release label
        id: skip-check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Workers-only: skip version bump, release label check, just deploy Workers
          if [[ "${{ inputs.deploy_workers_only }}" == "true" ]]; then
            echo "skip_release=false" >> $GITHUB_OUTPUT
            echo "retry_mode=false" >> $GITHUB_OUTPUT
            echo "workers_only=true" >> $GITHUB_OUTPUT
            echo "::notice::Workers-only mode -- deploy Workers without version bump or publish"
            exit 0
          fi
          echo "workers_only=false" >> $GITHUB_OUTPUT

          if [[ "${{ github.event_name }}" != "workflow_run" ]]; then
            RELEASE_MODE="${{ inputs.release_mode }}"
            if [[ "$RELEASE_MODE" != "retry" ]]; then
              echo "skip_release=false" >> $GITHUB_OUTPUT
              echo "retry_mode=false" >> $GITHUB_OUTPUT
              echo "::notice::Release mode: ${RELEASE_MODE} bump â€” will create new release"
            else
              echo "skip_release=false" >> $GITHUB_OUTPUT
              echo "retry_mode=true" >> $GITHUB_OUTPUT
              echo "::notice::Retry mode â€” will re-deploy current version without bumping"
            fi
            exit 0
          fi

          echo "retry_mode=false" >> $GITHUB_OUTPUT

          CI_SHA="${{ steps.resolve.outputs.ci_sha }}"
          COMMIT_MSG=$(git log -1 --format="%B" "$CI_SHA" 2>/dev/null || true)
          PR_NUM=$(echo "$COMMIT_MSG" | grep -oE '\(#[0-9]+\)' | grep -oE '[0-9]+' | head -1 || true)

          # Fallback: if commit has no PR ref (hotfix, --admin merge), find the most
          # recent merged PR with 'release' label that was merged after the last tag.
          if [[ -z "$PR_NUM" ]]; then
            echo "No PR number in commit message, searching recent merged PRs..."
            LAST_TAG_DATE=$(git log -1 --format=%aI "$(git describe --tags --abbrev=0 2>/dev/null || echo HEAD~50)" 2>/dev/null || echo "2000-01-01T00:00:00+00:00")
            PR_NUM=$(gh pr list --repo "${{ github.repository }}" --state merged --base main \
              --label release --limit 5 --json number,mergedAt \
              --jq "[.[] | select(.mergedAt > \"${LAST_TAG_DATE}\")] | .[0].number // empty" 2>/dev/null || true)
            if [[ -n "$PR_NUM" ]]; then
              echo "Found release PR #$PR_NUM via label search"
            fi
          fi

          if [[ -z "$PR_NUM" ]]; then
            echo "No release PR found, skipping release"
            echo "skip_release=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          LABELS=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" --json labels --jq '.labels[].name' 2>/dev/null || true)
          if echo "$LABELS" | grep -qx "release"; then
            echo "skip_release=false" >> $GITHUB_OUTPUT
          else
            echo "::notice::Skipping release â€” PR #$PR_NUM does not have 'release' label"
            echo "skip_release=true" >> $GITHUB_OUTPUT
          fi

      # Retry/workers-only mode: use current version from latest tag without bumping
      - name: Resolve version (retry/workers-only mode)
        if: steps.skip-check.outputs.retry_mode == 'true' || steps.skip-check.outputs.workers_only == 'true'
        id: version
        run: |
          VERSION=$(.ci/scripts/version/resolve-version.sh --current)
          echo "next_version=$VERSION" >> $GITHUB_OUTPUT
          echo "bump_type=none" >> $GITHUB_OUTPUT
          echo "::notice::Using existing version $VERSION (from latest tag)"

      # Normal mode: recalculate version from git state
      - name: Initialize CI
        if: >-
          steps.skip-check.outputs.skip_release != 'true' &&
          steps.skip-check.outputs.retry_mode != 'true' &&
          steps.skip-check.outputs.workers_only != 'true'
        id: init
        env:
          GITHUB_PAT: ${{ steps.app-token.outputs.token }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_ACTOR: ${{ github.actor }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          .ci/scripts/ci/initialize.sh --output "$GITHUB_OUTPUT"

      # Manual dispatch: override the auto-detected bump type with release_mode
      - name: Override bump type (manual dispatch)
        id: override
        if: >-
          github.event_name == 'workflow_dispatch' &&
          inputs.release_mode != 'retry' &&
          inputs.release_mode != 'patch' &&
          inputs.deploy_workers_only != true
        run: |
          BUMP="${{ inputs.release_mode }}"
          NEXT=$(.ci/scripts/version/resolve-version.sh --bump-type "${BUMP}")
          echo "bump_type=${BUMP}" >> $GITHUB_OUTPUT
          echo "next_version=${NEXT}" >> $GITHUB_OUTPUT
          echo "::notice::Manual bump override: ${BUMP} -> v${NEXT}"

      - name: Generate channel
        if: steps.skip-check.outputs.skip_release != 'true'
        id: channel
        run: |
          echo "channel=edge" >> $GITHUB_OUTPUT

      # Version guard: fail early if this version was already published (skip in retry/workers-only mode)
      - name: Check for existing release
        if: >-
          steps.skip-check.outputs.skip_release != 'true' &&
          steps.skip-check.outputs.retry_mode != 'true' &&
          steps.skip-check.outputs.workers_only != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ steps.override.outputs.next_version || steps.init.outputs.next_version }}"
          git fetch --tags --quiet
          if git tag -l "v${VERSION}" | grep -q .; then
            echo "::error::Git tag v${VERSION} already exists. Aborting to prevent duplicate publish."
            exit 1
          fi
          if gh release view "v${VERSION}" --repo "${{ github.repository }}" &>/dev/null; then
            echo "::error::Release v${VERSION} already exists. Aborting to prevent duplicate publish."
            exit 1
          fi
          echo "Version v${VERSION} is available for publishing."

  # ============================================================================
  # PUBLISH
  # Actually publish to GitHub Release, Docker, Pages
  # Downloads artifacts cross-workflow from the CI run using --run-id
  # ============================================================================
  publish:
    name: Tag & Release
    runs-on: ubuntu-latest
    needs: [init]
    if: >-
      success() &&
      needs.init.outputs.skip_release != 'true'
    environment:
      name: edge
      url: https://edge.rediacc.com
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6
        if: needs.init.outputs.workers_only != 'true'

      - uses: ./.github/actions/app-token
        if: needs.init.outputs.workers_only != 'true'
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          preset: cd
          repositories: console,middleware,renet,account,homebrew-tap,elite,sql

      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6
        if: needs.init.outputs.workers_only != 'true'
        with:
          fetch-depth: 0
          submodules: true
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f  # v6
        if: needs.init.outputs.workers_only != 'true'
        with:
          node-version: '22'

      # -----------------------------------------------------------------------
      # Step 1: Promote Docker images (channel -> version + latest)
      # -----------------------------------------------------------------------
      - name: Login to GHCR
        if: needs.init.outputs.workers_only != 'true'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Promote Docker images
        if: needs.init.outputs.workers_only != 'true'
        run: |
          CHANNEL="${{ needs.init.outputs.channel }}"
          VERSION="${{ needs.init.outputs.next_version }}"

          .ci/scripts/docker/retag-image.sh --image api --from "$CHANNEL" --to "$VERSION" --push-latest --skip-if-exists
          .ci/scripts/docker/retag-image.sh --image bridge --from "$CHANNEL" --to "$VERSION" --push-latest --skip-if-exists
          .ci/scripts/docker/retag-image.sh --image plugin-terminal --from "$CHANNEL" --to "$VERSION" --push-latest --skip-if-exists
          .ci/scripts/docker/retag-image.sh --image plugin-browser --from "$CHANNEL" --to "$VERSION" --push-latest --skip-if-exists
          .ci/scripts/docker/retag-image.sh --image web --from "$CHANNEL" --to "$VERSION" --push-latest --skip-if-exists
          .ci/scripts/docker/retag-image.sh --image cli --from "$CHANNEL" --to "$VERSION" --push-latest --skip-if-exists
          # On-prem server image lives at ghcr.io/rediacc/server (outside elite/),
          # so PUBLISH_DOCKER_REGISTRY can't reach it. cd-dryrun stages :CHANNEL.
          .ci/scripts/docker/retag-image.sh --image-path ghcr.io/rediacc/server --from "$CHANNEL" --to "$VERSION" --push-latest --skip-if-exists

      # -----------------------------------------------------------------------
      # Step 1b: Install dependencies and build shared packages
      # (account code is embedded in the www worker via direct import)
      # -----------------------------------------------------------------------
      - name: Install dependencies
        if: needs.init.outputs.workers_only != 'true'
        run: npm ci

      - name: Build shared packages
        if: needs.init.outputs.workers_only != 'true'
        run: npm run build:packages

      - name: Install account dependencies
        if: needs.init.outputs.workers_only != 'true'
        run: npm install
        working-directory: private/account

      # Stripe sync is skipped in workers-only mode. Stripe product changes require a full release.
      - name: Sync Stripe products/prices
        if: needs.init.outputs.workers_only != 'true' && needs.init.outputs.retry_mode != 'true'
        run: npx tsx scripts/stripe-sync.ts
        working-directory: private/account
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY_EU }}

      - name: Verify Stripe webhook endpoints (per-region)
        if: needs.init.outputs.workers_only != 'true' && needs.init.outputs.retry_mode != 'true'
        run: |
          jq -r '.regions[] | .domain' regions.json | while read domain; do
            echo "Verifying webhook for ${domain}..."
            npx tsx private/account/scripts/verify-webhook.ts --expected-url "https://${domain}/account/api/v1/webhooks/stripe"
          done
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY_EU }}


      # -----------------------------------------------------------------------
      # Step 2: Bump version & commit (includes all submodules)
      # -----------------------------------------------------------------------
      - name: Download release artifacts
        if: needs.init.outputs.workers_only != 'true'
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8
        with:
          name: release-artifacts-${{ needs.init.outputs.ci_sha }}
          path: dist/
          run-id: ${{ needs.init.outputs.ci_run_id }}
          github-token: ${{ github.token }}

      - name: Verify release artifact attestation
        if: needs.init.outputs.workers_only != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Verifying artifact provenance..."
          FAILED=false
          for f in $(find dist/desktop dist/cli dist/packages -type f 2>/dev/null); do
            gh attestation verify "$f" --repo "${{ github.repository }}" 2>/dev/null || {
              echo "::warning::No attestation for $f (expected for first run after attestation is enabled)"
              FAILED=true
            }
          done
          if [[ "$FAILED" == "true" ]]; then
            echo "::warning::Some artifacts lack attestation â€” this is expected during the transition period"
          fi

      # Tag-based versioning: create git tag instead of version bump commit.
      # No file changes needed -- version is injected at build time.
      - name: Create version tag
        if: needs.init.outputs.workers_only != 'true' && needs.init.outputs.retry_mode != 'true'
        run: |
          VERSION="${{ needs.init.outputs.next_version }}"
          git config user.name "${{ vars.GIT_BOT_NAME }}"
          git config user.email "${{ vars.GIT_BOT_EMAIL }}"
          git tag -a "v${VERSION}" -m "v${VERSION}"
          git push origin "v${VERSION}"
          echo "::notice::Created tag v${VERSION}"

      - name: Tag submodules
        if: needs.init.outputs.workers_only != 'true' && needs.init.outputs.retry_mode != 'true'
        run: |
          set -euo pipefail
          VERSION="${{ needs.init.outputs.next_version }}"
          for sub in private/renet private/middleware; do
            if [[ ! -d "$sub/.git" ]] && [[ ! -f "$sub/.git" ]]; then
              echo "::notice::Skipping $sub (not initialized)"
              continue
            fi
            cd "$sub"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            head_sha="$(git rev-parse HEAD)"
            existing_sha="$(git rev-list -n1 "v${VERSION}" 2>/dev/null || true)"
            if [[ -n "$existing_sha" ]]; then
              if [[ "$existing_sha" != "$head_sha" ]]; then
                echo "::error::Submodule $sub tag v${VERSION} already points to $existing_sha but HEAD is $head_sha. Drift must be resolved manually before this release can proceed."
                exit 1
              fi
              echo "::notice::Submodule $sub tag v${VERSION} already at HEAD ($head_sha); reusing"
            else
              git tag -a "v${VERSION}" -m "v${VERSION}"
            fi
            # Push is idempotent for existing tags pointing at the same SHA.
            git push origin "v${VERSION}"
            cd "$GITHUB_WORKSPACE"
          done
        env:
          GITHUB_PAT: ${{ steps.app-token.outputs.token }}

      - name: Update Homebrew formula
        if: needs.init.outputs.workers_only != 'true' && needs.init.outputs.retry_mode != 'true'
        run: |
          .ci/scripts/release/update-homebrew-tap.sh \
            --version ${{ needs.init.outputs.next_version }} \
            --local-checksums dist/cli \
            --push
        env:
          GITHUB_PAT: ${{ steps.app-token.outputs.token }}
          GIT_BOT_NAME: ${{ vars.GIT_BOT_NAME }}
          GIT_BOT_EMAIL: ${{ vars.GIT_BOT_EMAIL }}

      # -----------------------------------------------------------------------
      # Step 3: Create GitHub Release (upload packages + binaries)
      # -----------------------------------------------------------------------
      - name: Create Release
        if: needs.init.outputs.workers_only != 'true' && needs.init.outputs.retry_mode != 'true'
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b  # v2
        with:
          tag_name: v${{ needs.init.outputs.next_version }}
          name: v${{ needs.init.outputs.next_version }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/desktop/**/*
            dist/cli/**/*
            dist/packages/**/*
          draft: false
          prerelease: false
          generate_release_notes: true

      # Package repos + R2 edge upload already handled by CI (cd-dryrun.yml).
      # CI builds self-contained repos and uploads to {format}/edge/ on push-to-main.
      # No rebuild or re-upload needed here -- one code path, tested in PR CI.

      # Pages + E2E videos are handled by cd-deploy-worker.yml (builds from source,
      # injects videos during deploy). No staging-pages download needed here.

      # -----------------------------------------------------------------------
      # Hotfix: also promote to stable channel (skips 7-day soak)
      # -----------------------------------------------------------------------
      - name: Promote R2 artifacts to stable (hotfix)
        if: needs.init.outputs.workers_only != 'true' && inputs.publish_stable == true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
        run: |
          export AWS_ACCESS_KEY_ID="${R2_ACCESS_KEY_ID}"
          export AWS_SECRET_ACCESS_KEY="${R2_SECRET_ACCESS_KEY}"
          export AWS_DEFAULT_REGION="auto"
          EP="--endpoint-url $R2_ENDPOINT"
          BUCKET="rediacc-releases"

          # Cache-Control policy: channel paths (apt/<channel>/, cli/<channel>/,
          # desktop/<channel>/, etc.) reuse filenames across releases, so we
          # cannot cache any of them -- a previous run's cached body under
          # the same URL breaks APKINDEX/Release signatures. Everything
          # goes no-cache; CF never caches, no stale body possible.
          # Truly-versioned (cli/v<semver>/, desktop/v<semver>/,
          # npm/<channel>/rediacc-cli-<semver>.tgz) keep immutable cache
          # via upload-to-r2.sh.
          CC_MUTABLE="no-cache"

          PURGE_URLS=()
          for dir in cli desktop apt rpm apk archlinux; do
            echo "Promoting ${dir}/edge/ -> ${dir}/stable/"
            TMP="/tmp/promote-${dir}"
            aws s3 cp "s3://${BUCKET}/${dir}/edge/" "$TMP/" $EP --recursive --quiet
            aws s3 cp "$TMP/" "s3://${BUCKET}/${dir}/stable/" $EP --recursive --quiet \
              --cache-control "$CC_MUTABLE"
            # Purge every uploaded URL to flush any previously-cached body
            # under the same filename; channel paths reuse filenames across
            # releases.
            while IFS= read -r f; do
              PURGE_URLS+=("https://releases.rediacc.com/${dir}/stable/${f#$TMP/}")
            done < <(find "$TMP" -type f)
            rm -rf "$TMP"
          done

          # Fix channel references in config files (mutable channel pointers).
          for file in rpm/stable/rediacc.repo archlinux/stable/rediacc.conf; do
            aws s3 cp "s3://${BUCKET}/${file}" /tmp/config $EP --quiet
            sed -i 's|/edge/|/stable/|g' /tmp/config
            aws s3 cp /tmp/config "s3://${BUCKET}/${file}" $EP --quiet \
              --cache-control "$CC_MUTABLE"
            PURGE_URLS+=("https://releases.rediacc.com/${file}")
          done

          # Re-bake install scripts: cd-dryrun.yml baked 'edge' into
          # cli/edge/install.{sh,ps1}; the raw copy above carried that into
          # cli/stable/. Rewrite back to stable. Channel-pointer scripts
          # are mutable.
          for file in cli/stable/install.sh cli/stable/install.ps1; do
            aws s3 cp "s3://${BUCKET}/${file}" /tmp/script $EP --quiet
            sed -i \
              -e 's|REDIACC_CHANNEL:-edge|REDIACC_CHANNEL:-stable|g' \
              -e 's|} else { "edge" }|} else { "stable" }|g' \
              /tmp/script
            aws s3 cp /tmp/script "s3://${BUCKET}/${file}" $EP --quiet \
              --cache-control "$CC_MUTABLE"
            PURGE_URLS+=("https://releases.rediacc.com/${file}")
          done

          echo "R2 promoted to stable"

          # Purge CF cache for the mutable URLs we just (re)uploaded.
          if [[ ${#PURGE_URLS[@]} -gt 0 ]]; then
            printf '%s\n' "${PURGE_URLS[@]}" \
              | .ci/scripts/deploy/cf-purge-urls.sh --zone "$CLOUDFLARE_ZONE_ID"
          fi

      - name: Promote Docker to stable (hotfix)
        if: needs.init.outputs.workers_only != 'true' && inputs.publish_stable == true
        run: |
          for image in api bridge plugin-terminal plugin-browser web cli; do
            echo "Promoting ${image}: edge -> stable"
            docker buildx imagetools create \
              -t "ghcr.io/rediacc/elite/${image}:stable" \
              "ghcr.io/rediacc/elite/${image}:edge"
          done
          # On-prem server image lives at ghcr.io/rediacc/server (outside elite/).
          echo "Promoting server: edge -> stable"
          docker buildx imagetools create \
            -t "ghcr.io/rediacc/server:stable" \
            "ghcr.io/rediacc/server:edge"
          echo "Docker promoted to stable"

      # -----------------------------------------------------------------------
      # Step 5: Cleanup channel Docker tags
      # -----------------------------------------------------------------------
      - name: Cleanup channel Docker tags
        if: needs.init.outputs.workers_only != 'true'
        run: |
          CHANNEL="${{ needs.init.outputs.channel }}"
          echo "## Cleanup Channel Tags" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Cleanup is non-critical (channel tags are harmless if they remain),
          # so we log failures to the step summary but don't fail the job.
          if .ci/scripts/docker/cleanup-staging.sh --tag "$CHANNEL"; then
            echo "**Channel tag cleaned up:** $CHANNEL" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Failed to clean up channel tag:** $CHANNEL" >> $GITHUB_STEP_SUMMARY
            echo "Channel tag cleanup requires \`delete:packages\` scope (non-critical)." >> $GITHUB_STEP_SUMMARY
          fi
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      # Stable promotion (CLI, desktop, repos, Docker :stable) is handled by
      # promote-stable.yml after 7-day soak. CD only publishes to edge.

      # -----------------------------------------------------------------------
      # Final summary
      # -----------------------------------------------------------------------
      - name: Deployment summary
        if: needs.init.outputs.workers_only != 'true'
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ needs.init.outputs.next_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Release SHA:** ${{ steps.commit.outputs.release_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**CI Run:** ${{ needs.init.outputs.ci_run_id }} (sha: ${{ needs.init.outputs.ci_sha }})" >> $GITHUB_STEP_SUMMARY
          echo "**Pages URL:** https://www.rediacc.com" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker images:**" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/rediacc/elite/api:${{ needs.init.outputs.next_version }} + :latest" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/rediacc/elite/bridge:${{ needs.init.outputs.next_version }} + :latest" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/rediacc/elite/plugin-terminal:${{ needs.init.outputs.next_version }} + :latest" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/rediacc/elite/plugin-browser:${{ needs.init.outputs.next_version }} + :latest" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/rediacc/elite/web:${{ needs.init.outputs.next_version }} + :latest" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/rediacc/elite/cli:${{ needs.init.outputs.next_version }} + :latest" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/rediacc/server:${{ needs.init.outputs.next_version }} + :latest (on-prem)" >> $GITHUB_STEP_SUMMARY

  # Install validation moved to CI (pre-publish). CI validates on all 6 platforms
  # BEFORE publish, so broken artifacts never reach the edge or stable channel.

  # ============================================================================
  # DEPLOY EDGE - Marketing + per-region account workers
  # ============================================================================
  deploy-marketing-edge:
    name: Deploy edge Marketing
    needs: [init, publish]
    if: >-
      success() &&
      needs.init.outputs.skip_release != 'true'
    uses: ./.github/workflows/cd-deploy-worker.yml
    with:
      target: edge
      ref: ${{ needs.init.outputs.ci_sha }}
      version: ${{ needs.init.outputs.next_version }}
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      ACCOUNT_ED25519_PRIVATE_KEY: ${{ secrets.ACCOUNT_ED25519_PRIVATE_KEY }}
      ACCOUNT_ED25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_ED25519_PUBLIC_KEY }}
      ACCOUNT_X25519_PRIVATE_KEY: ${{ secrets.ACCOUNT_X25519_PRIVATE_KEY }}
      ACCOUNT_X25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_X25519_PUBLIC_KEY }}
      ACCOUNT_SERVER_API_KEY: ${{ secrets.ACCOUNT_SERVER_API_KEY }}
      ACCOUNT_JWT_SECRET: ${{ secrets.ACCOUNT_JWT_SECRET }}
      STRIPE_SECRET_KEY_EU: ${{ secrets.STRIPE_SECRET_KEY_EU }}
      STRIPE_SANDBOX_SECRET_KEY: ${{ secrets.STRIPE_SANDBOX_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET_EU: ${{ secrets.STRIPE_WEBHOOK_SECRET_EU }}
      STRIPE_SANDBOX_WEBHOOK_SECRET: ${{ secrets.STRIPE_SANDBOX_WEBHOOK_SECRET }}
      AWS_SES_ACCESS_KEY_ID_EU: ${{ secrets.AWS_SES_ACCESS_KEY_ID_EU }}
      AWS_SES_SECRET_ACCESS_KEY_EU: ${{ secrets.AWS_SES_SECRET_ACCESS_KEY_EU }}
      TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}

  deploy-account-edge:
    name: Deploy edge Account (all regions)
    needs: [init, publish]
    if: >-
      success() &&
      needs.init.outputs.skip_release != 'true'
    uses: ./.github/workflows/cd-deploy-account.yml
    with:
      target: edge
      ref: ${{ needs.init.outputs.ci_sha }}
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      ACCOUNT_ED25519_PRIVATE_KEY: ${{ secrets.ACCOUNT_ED25519_PRIVATE_KEY }}
      ACCOUNT_ED25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_ED25519_PUBLIC_KEY }}
      ACCOUNT_X25519_PRIVATE_KEY: ${{ secrets.ACCOUNT_X25519_PRIVATE_KEY }}
      ACCOUNT_X25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_X25519_PUBLIC_KEY }}
      ACCOUNT_SERVER_API_KEY: ${{ secrets.ACCOUNT_SERVER_API_KEY }}
      ACCOUNT_JWT_SECRET: ${{ secrets.ACCOUNT_JWT_SECRET }}
      STRIPE_SECRET_KEY_EU: ${{ secrets.STRIPE_SECRET_KEY_EU }}
      STRIPE_SECRET_KEY_US: ${{ secrets.STRIPE_SECRET_KEY_US }}
      STRIPE_SANDBOX_SECRET_KEY: ${{ secrets.STRIPE_SANDBOX_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET_EU: ${{ secrets.STRIPE_WEBHOOK_SECRET_EU }}
      STRIPE_WEBHOOK_SECRET_US: ${{ secrets.STRIPE_WEBHOOK_SECRET_US }}
      STRIPE_SANDBOX_WEBHOOK_SECRET: ${{ secrets.STRIPE_SANDBOX_WEBHOOK_SECRET }}
      AWS_SES_ACCESS_KEY_ID_EU: ${{ secrets.AWS_SES_ACCESS_KEY_ID_EU }}
      AWS_SES_SECRET_ACCESS_KEY_EU: ${{ secrets.AWS_SES_SECRET_ACCESS_KEY_EU }}
      AWS_SES_ACCESS_KEY_ID_US: ${{ secrets.AWS_SES_ACCESS_KEY_ID_US }}
      AWS_SES_SECRET_ACCESS_KEY_US: ${{ secrets.AWS_SES_SECRET_ACCESS_KEY_US }}
      STRIPE_SECRET_KEY_ASIA: ${{ secrets.STRIPE_SECRET_KEY_ASIA }}
      STRIPE_WEBHOOK_SECRET_ASIA: ${{ secrets.STRIPE_WEBHOOK_SECRET_ASIA }}
      AWS_SES_ACCESS_KEY_ID_ASIA: ${{ secrets.AWS_SES_ACCESS_KEY_ID_ASIA }}
      AWS_SES_SECRET_ACCESS_KEY_ASIA: ${{ secrets.AWS_SES_SECRET_ACCESS_KEY_ASIA }}
      TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}

  # ============================================================================
  # DEPLOY STABLE (hotfix only) - Marketing + per-region account workers
  # ============================================================================
  deploy-marketing-stable:
    name: Deploy stable Marketing (hotfix)
    needs: [init, publish, smoke-test]
    if: >-
      success() &&
      needs.init.outputs.skip_release != 'true' &&
      inputs.publish_stable == true
    uses: ./.github/workflows/cd-deploy-worker.yml
    with:
      target: stable
      ref: ${{ needs.init.outputs.workers_only == 'true' && needs.init.outputs.ci_sha || format('v{0}', needs.init.outputs.next_version) }}
      version: ${{ needs.init.outputs.next_version }}
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      ACCOUNT_ED25519_PRIVATE_KEY: ${{ secrets.ACCOUNT_ED25519_PRIVATE_KEY }}
      ACCOUNT_ED25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_ED25519_PUBLIC_KEY }}
      ACCOUNT_X25519_PRIVATE_KEY: ${{ secrets.ACCOUNT_X25519_PRIVATE_KEY }}
      ACCOUNT_X25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_X25519_PUBLIC_KEY }}
      ACCOUNT_SERVER_API_KEY: ${{ secrets.ACCOUNT_SERVER_API_KEY }}
      ACCOUNT_JWT_SECRET: ${{ secrets.ACCOUNT_JWT_SECRET }}
      STRIPE_SECRET_KEY_EU: ${{ secrets.STRIPE_SECRET_KEY_EU }}
      STRIPE_SANDBOX_SECRET_KEY: ${{ secrets.STRIPE_SANDBOX_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET_EU: ${{ secrets.STRIPE_WEBHOOK_SECRET_EU }}
      STRIPE_SANDBOX_WEBHOOK_SECRET: ${{ secrets.STRIPE_SANDBOX_WEBHOOK_SECRET }}
      AWS_SES_ACCESS_KEY_ID_EU: ${{ secrets.AWS_SES_ACCESS_KEY_ID_EU }}
      AWS_SES_SECRET_ACCESS_KEY_EU: ${{ secrets.AWS_SES_SECRET_ACCESS_KEY_EU }}
      TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}

  deploy-account-stable:
    name: Deploy stable Account (hotfix, all regions)
    needs: [init, publish, smoke-test]
    if: >-
      success() &&
      needs.init.outputs.skip_release != 'true' &&
      inputs.publish_stable == true
    uses: ./.github/workflows/cd-deploy-account.yml
    with:
      target: stable
      ref: ${{ needs.init.outputs.workers_only == 'true' && needs.init.outputs.ci_sha || format('v{0}', needs.init.outputs.next_version) }}
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      ACCOUNT_ED25519_PRIVATE_KEY: ${{ secrets.ACCOUNT_ED25519_PRIVATE_KEY }}
      ACCOUNT_ED25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_ED25519_PUBLIC_KEY }}
      ACCOUNT_X25519_PRIVATE_KEY: ${{ secrets.ACCOUNT_X25519_PRIVATE_KEY }}
      ACCOUNT_X25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_X25519_PUBLIC_KEY }}
      ACCOUNT_SERVER_API_KEY: ${{ secrets.ACCOUNT_SERVER_API_KEY }}
      ACCOUNT_JWT_SECRET: ${{ secrets.ACCOUNT_JWT_SECRET }}
      STRIPE_SECRET_KEY_EU: ${{ secrets.STRIPE_SECRET_KEY_EU }}
      STRIPE_SECRET_KEY_US: ${{ secrets.STRIPE_SECRET_KEY_US }}
      STRIPE_SANDBOX_SECRET_KEY: ${{ secrets.STRIPE_SANDBOX_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET_EU: ${{ secrets.STRIPE_WEBHOOK_SECRET_EU }}
      STRIPE_WEBHOOK_SECRET_US: ${{ secrets.STRIPE_WEBHOOK_SECRET_US }}
      STRIPE_SANDBOX_WEBHOOK_SECRET: ${{ secrets.STRIPE_SANDBOX_WEBHOOK_SECRET }}
      AWS_SES_ACCESS_KEY_ID_EU: ${{ secrets.AWS_SES_ACCESS_KEY_ID_EU }}
      AWS_SES_SECRET_ACCESS_KEY_EU: ${{ secrets.AWS_SES_SECRET_ACCESS_KEY_EU }}
      AWS_SES_ACCESS_KEY_ID_US: ${{ secrets.AWS_SES_ACCESS_KEY_ID_US }}
      AWS_SES_SECRET_ACCESS_KEY_US: ${{ secrets.AWS_SES_SECRET_ACCESS_KEY_US }}
      STRIPE_SECRET_KEY_ASIA: ${{ secrets.STRIPE_SECRET_KEY_ASIA }}
      STRIPE_WEBHOOK_SECRET_ASIA: ${{ secrets.STRIPE_WEBHOOK_SECRET_ASIA }}
      AWS_SES_ACCESS_KEY_ID_ASIA: ${{ secrets.AWS_SES_ACCESS_KEY_ID_ASIA }}
      AWS_SES_SECRET_ACCESS_KEY_ASIA: ${{ secrets.AWS_SES_SECRET_ACCESS_KEY_ASIA }}
      TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}

  # ============================================================================
  # POST-PUBLISH SMOKE TEST - Verify endpoints respond after deployment
  # ============================================================================
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-slim
    needs: [init, publish, deploy-marketing-edge, deploy-account-edge]
    if: >-
      success() &&
      needs.init.outputs.skip_release != 'true'
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6
        with:
          sparse-checkout: regions.json
          sparse-checkout-cone-mode: false

      - name: Verify edge endpoints
        run: |
          VERSION="${{ needs.init.outputs.next_version }}"
          echo "Verifying edge deployment for v${VERSION}..."

          # Marketing worker â€” also verify the channel default was rewritten.
          INSTALL_SH=$(curl -fsSL https://edge.rediacc.com/install.sh)
          if ! echo "$INSTALL_SH" | grep -q 'REDIACC_CHANNEL:-edge'; then
            echo "::error::edge.rediacc.com/install.sh is not baked to channel=edge"
            echo "$INSTALL_SH" | grep -E 'REDIACC_CHANNEL' || true
            exit 1
          fi
          echo "  marketing (install.sh): OK (channel=edge)"

          INSTALL_PS1=$(curl -fsSL https://edge.rediacc.com/install.ps1)
          if ! echo "$INSTALL_PS1" | grep -qF '} else { "edge" }'; then
            echo "::error::edge.rediacc.com/install.ps1 is not baked to channel=edge"
            echo "$INSTALL_PS1" | grep -F '$Channel' || true
            exit 1
          fi
          echo "  marketing (install.ps1): OK (channel=edge)"

          # Worker-fingerprint checks. These assert that the NEW Worker bundle
          # from workers/www/ is actually serving â€” not a stale deploy of the
          # old workers/marketing/ code (which has no redirect table, no
          # html_handling=drop-trailing-slash, and no asset-path guard).
          # Cache-busting query strings ensure we hit the Worker, not a cached
          # response.
          RNDA=$RANDOM$RANDOM; RNDB=$RANDOM$RANDOM; RNDC=$RANDOM$RANDOM
          S=$(curl -sI -o /dev/null -w '%{http_code}' "https://edge.rediacc.com/about?cb=$RNDA")
          [[ "$S" == "410" ]] || { echo "::error::edge /about expected 410 (curated redirect table), got $S â€” old worker bundle likely live"; exit 1; }
          echo "  worker fingerprint (redirect table): OK (/about=410)"

          S=$(curl -sI -o /dev/null -w '%{http_code}' "https://edge.rediacc.com/en?cb=$RNDB")
          [[ "$S" == "200" ]] || { echo "::error::edge /en expected 200 (html_handling=drop-trailing-slash), got $S"; exit 1; }
          echo "  worker fingerprint (html_handling): OK (/en=200, no 307)"

          S=$(curl -sI -o /dev/null -w '%{http_code}' "https://edge.rediacc.com/fonts/inter/Inter-Regular.woff2?cb=$RNDC")
          [[ "$S" == "200" ]] || { echo "::error::edge mixed-case font expected 200 (asset-path guard), got $S"; exit 1; }
          echo "  worker fingerprint (asset-path guard): OK (Inter-Regular.woff2=200)"

          # Footer version assertion: confirm the Astro build baked the
          # expected semver into the rendered HTML. Catches regressions in
          # APP_VERSION propagation (cd-deploy-worker.yml -> astro.config.mjs).
          if [[ "${{ needs.init.outputs.workers_only }}" != "true" ]]; then
            FOOTER_HTML=$(curl -fsSL https://edge.rediacc.com/en/)
            if ! echo "$FOOTER_HTML" | grep -qE "footer-version[^<]*>v${VERSION}<"; then
              echo "::error::edge.rediacc.com footer does not render v${VERSION}"
              echo "$FOOTER_HTML" | grep -oE 'footer-version[^<]*>[^<]*<' | head -3 || true
              exit 1
            fi
            echo "  marketing (footer version): OK (v${VERSION})"
          fi

          # R2 backstop: the per-channel copy at releases.rediacc.com/cli/edge/
          # is the fallback serving path (not worker-rewritten). It must also
          # be channel-baked (done at upload time in cd-dryrun.yml). This
          # cross-check catches R2 upload regressions.
          if [[ "${{ needs.init.outputs.workers_only }}" != "true" ]]; then
            R2_SH=$(curl -fsSL https://releases.rediacc.com/cli/edge/install.sh)
            if ! echo "$R2_SH" | grep -q 'REDIACC_CHANNEL:-edge'; then
              echo "::error::releases.rediacc.com/cli/edge/install.sh not baked to channel=edge"
              echo "$R2_SH" | grep -E 'REDIACC_CHANNEL' || true
              exit 1
            fi
            echo "  R2 cli/edge/install.sh: OK (channel=edge)"

            R2_PS1=$(curl -fsSL https://releases.rediacc.com/cli/edge/install.ps1)
            if ! echo "$R2_PS1" | grep -qF '} else { "edge" }'; then
              echo "::error::releases.rediacc.com/cli/edge/install.ps1 not baked to channel=edge"
              exit 1
            fi
            echo "  R2 cli/edge/install.ps1: OK (channel=edge)"
          else
            echo "  R2 backstop: skipped (workers-only deployment)"
          fi

          # R2 releases (skip in workers-only mode -- no new version was published)
          if [[ "${{ needs.init.outputs.workers_only }}" != "true" ]]; then
            EDGE_VERSION=$(curl -fsSL https://releases.rediacc.com/cli/edge/latest.json | jq -re '.version')
            echo "  edge latest.json: v${EDGE_VERSION}"

            if [[ "$EDGE_VERSION" == "$VERSION" ]]; then
              echo "  version match: OK"
            else
              echo "  version mismatch: edge has v${EDGE_VERSION}, expected v${VERSION} (acceptable in retry mode)"
            fi
          else
            echo "  R2 version check: skipped (workers-only)"
          fi

          # Per-region account health checks (dynamic from regions.json)
          FAILED=0
          while read -r domain; do
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "https://${domain}/account/api/v1/.well-known/server-info" 2>/dev/null || echo "000")
            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "  ${domain} health: OK"
            else
              echo "::error::${domain} health check failed (HTTP ${HTTP_CODE})"
              FAILED=1
            fi
          done < <(jq -r '.regions[] | .edgeDomain' regions.json)

          if [[ "$FAILED" -eq 1 ]]; then
            exit 1
          fi
          echo "Smoke test passed"

  # ============================================================================
  # CLEANUP ON FAILURE - Remove channel artifacts if publish fails
  # ============================================================================
  cleanup-on-failure:
    name: Cleanup (on failure)
    runs-on: ubuntu-latest
    needs: [init, publish]
    if: |
      always() &&
      needs.init.outputs.skip_release != 'true' &&
      needs.publish.result == 'failure'
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6

      - uses: ./.github/actions/app-token
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          preset: cd
          repositories: console

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Cleanup channel Docker tags
        run: |
          CHANNEL="${{ needs.init.outputs.channel }}"
          echo "## Cleanup Channel Tags (Failure)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if .ci/scripts/docker/cleanup-staging.sh --tag "$CHANNEL"; then
            echo "**Channel tag cleaned up:** $CHANNEL" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Failed to clean up channel tag:** $CHANNEL" >> $GITHUB_STEP_SUMMARY
            echo "Channel tag cleanup requires \`delete:packages\` scope (non-critical)." >> $GITHUB_STEP_SUMMARY
          fi
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

  # ============================================================================
  # HOUSEKEEPING - Cleanup old releases, tags, packages, and Stripe orphans
  # Runs after each successful release instead of a nightly schedule.
  # ============================================================================
  housekeeping:
    name: Housekeeping
    runs-on: ubuntu-slim
    needs: [init, publish, deploy-marketing-edge, deploy-account-edge, deploy-marketing-stable, deploy-account-stable, smoke-test]
    if: >-
      success() &&
      needs.init.outputs.skip_release != 'true'
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6

      - uses: ./.github/actions/app-token
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          preset: housekeeping
          repositories: console,renet,middleware,elite,account

      - name: Cleanup old releases, tags, and packages
        run: .ci/scripts/housekeeping/cleanup-versions.sh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Cleanup R2 staging artifacts
        run: |
          # Keep last 3 staging snapshots, delete older ones
          STAGING_DIRS=$(aws s3 ls "s3://${RELEASES_BUCKET}/staging/" --endpoint-url "${R2_ENDPOINT}" 2>/dev/null \
            | awk '{print $2}' | sort -r | tail -n +4)
          for dir in $STAGING_DIRS; do
            echo "Deleting staging/${dir}..."
            aws s3 rm "s3://${RELEASES_BUCKET}/staging/${dir}" --endpoint-url "${R2_ENDPOINT}" --recursive --quiet || true
          done
          echo "R2 staging cleanup done"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          RELEASES_BUCKET: rediacc-releases

      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f  # v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npm run build:packages

      - uses: ./.github/actions/app-token
        id: app-token-stripe
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          preset: ci
          repositories: console,account

      - name: Initialize account submodule
        run: git submodule update --init private/account

      - name: Install account dependencies
        run: npm install
        working-directory: private/account

      - name: Cleanup orphaned Stripe sandbox resources
        run: npx tsx scripts/cleanup-orphans.ts
        working-directory: private/account
        env:
          STRIPE_SANDBOX_SECRET_KEY: ${{ secrets.STRIPE_SANDBOX_SECRET_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          GH_TOKEN: ${{ github.token }}

      - name: Verify Stripe sandbox webhook endpoints (per-region)
        if: needs.init.outputs.workers_only != 'true'
        run: |
          jq -r '.regions[] | .edgeDomain' regions.json | while read domain; do
            echo "Verifying sandbox webhook for ${domain}..."
            npx tsx private/account/scripts/verify-webhook.ts --sandbox --expected-url "https://${domain}/account/api/v1/webhooks/stripe"
          done
        env:
          STRIPE_SANDBOX_SECRET_KEY: ${{ secrets.STRIPE_SANDBOX_SECRET_KEY }}
