name: Console CI - Build (Renet)

on:
  workflow_call:
    inputs:
      next_version:
        required: true
        type: string
      skip_build:
        description: 'Skip build if renet already exists in registry'
        required: false
        type: boolean
        default: false
      bridge_tag:
        description: 'Existing bridge tag to extract renet from (when skip_build=true)'
        required: false
        type: string
        default: ''
    outputs:
      artifact_name:
        description: 'Name of the renet binaries artifact'
        value: ${{ jobs.build-renet.outputs.artifact_name || jobs.extract-renet.outputs.artifact_name }}
    secrets:
      APP_PRIVATE_KEY:
        required: false
      ACCOUNT_ED25519_PUBLIC_KEY:
        required: false
      # OTLP_AUTH_TOKEN is no longer needed: renet resolves credentials at
      # runtime via `REDIACC_OTLP_USER`/`REDIACC_OTLP_PASS` env vars
      # injected by the CLI after `rdc subscription login` (renet#51).

permissions:
  contents: read
  packages: write   # GHCR push

jobs:
  # Build native CRIU/rsync binaries (amd64) - cached
  build-native-amd64:
    name: Native (amd64)
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_build }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,middleware,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Restore native binary cache
        id: cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: binaries/
          key: native-amd64-${{ hashFiles('.ci/scripts/docker/build-native-binaries.sh') }}

      - name: Build native binaries
        if: steps.cache.outputs.cache-hit != 'true'
        run: .ci/scripts/docker/build-native-binaries.sh --output ./binaries --cross-rsync

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: native-amd64-${{ github.sha }}
          path: binaries/
          retention-days: 1

  # Build native CRIU binary (arm64) - requires native runner
  build-native-arm64:
    name: Native (arm64)
    runs-on: ubuntu-24.04-arm
    if: ${{ !inputs.skip_build }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,middleware,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Restore native binary cache
        id: cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: binaries/
          key: native-arm64-${{ hashFiles('.ci/scripts/docker/build-native-binaries.sh') }}

      - name: Build CRIU arm64
        if: steps.cache.outputs.cache-hit != 'true'
        run: .ci/scripts/docker/build-native-binaries.sh --output ./binaries --criu-only

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: native-arm64-${{ github.sha }}
          path: binaries/
          retention-days: 1

  # Build full renet binaries with embedded CRIU/rsync
  # These binaries are used by BOTH CLI and Docker
  build-renet:
    name: Renet (Full)
    runs-on: ubuntu-latest
    needs: [build-native-amd64, build-native-arm64]
    if: ${{ !inputs.skip_build }}
    timeout-minutes: 15
    outputs:
      artifact_name: renet-binaries-${{ github.sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/app-token
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,middleware,renet,account,sql,elite,homebrew-tap
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: 'stable'
          cache: true
          cache-dependency-path: private/renet/go.sum

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: native-amd64-${{ github.sha }}
          path: binaries/

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: native-arm64-${{ github.sha }}
          path: binaries/
          merge-multiple: true

      - name: List native binaries
        run: ls -la binaries/

      - name: Install clang for BPF compilation
        # `apt-get update` is mandatory before install: the Azure runner image
        # ships with stale apt metadata referencing a kernel ABI that may have
        # already rotated out of the Ubuntu pool, causing
        # `linux-headers-generic` to 404 on the matching versioned headers
        # package. Refresh metadata first, then install.
        run: sudo apt-get update -qq && sudo apt-get install -y -qq clang llvm libbpf-dev linux-headers-generic

      - name: Generate BPF bindings
        run: |
          cd private/renet
          go generate ./pkg/ebpf/...

      - name: Build full renet with embedded assets (release)
        env:
          ACCOUNT_ED25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_ED25519_PUBLIC_KEY }}
          # OTLP credentials are NOT baked at build time any more — renet
          # resolves them from env vars at runtime (renet#51).
        run: |
          .ci/scripts/build/build-renet.sh \
            --version "${{ inputs.next_version }}" \
            --assets-dir ./binaries \
            --output ./private/bin

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: renet-binaries-${{ github.sha }}
          path: |
            private/bin/renet-linux-*
            private/bin/renet-darwin-*
            private/bin/renet-windows-*
            private/bin/checksums.sha256
          retention-days: 1
          if-no-files-found: error

  # Extract renet binaries from existing bridge image when build is skipped.
  # Linux binaries come from the cached bridge image; Darwin and Windows binaries
  # are cross-compiled with embedded assets (CRIU/rsync/rclone) extracted from the image.
  extract-renet:
    name: Renet (cached)
    runs-on: ubuntu-latest
    if: ${{ inputs.skip_build && inputs.bridge_tag != '' }}
    outputs:
      artifact_name: renet-binaries-${{ github.sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/app-token
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: console,middleware,renet,account,sql,elite,homebrew-tap

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: 'stable'
          cache: true
          cache-dependency-path: private/renet/go.sum

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Linux binaries + cross-compile Darwin/Windows
        run: .ci/scripts/build/extract-renet-from-image.sh --tag "${{ inputs.bridge_tag }}" --output ./private/bin

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: renet-binaries-${{ github.sha }}
          path: |
            private/bin/renet-linux-*
            private/bin/renet-darwin-*
            private/bin/renet-windows-*
            private/bin/checksums.sha256
          retention-days: 1
          if-no-files-found: error
