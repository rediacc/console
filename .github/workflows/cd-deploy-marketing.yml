name: Deploy Marketing Worker

# Reusable workflow for deploying the marketing Worker (www.rediacc.com / edge.rediacc.com).
# Builds Astro pages from source at the specified git ref, then deploys.
# No account service, no D1, no R2, no secrets to set.

on:
  workflow_call:
    inputs:
      target:
        description: 'Deploy target: edge or production'
        required: true
        type: string
      ref:
        description: 'Git ref to checkout (SHA, tag, or branch)'
        required: true
        type: string
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      ACCOUNT_ED25519_PRIVATE_KEY:
        required: true

jobs:
  deploy:
    name: Deploy ${{ inputs.target }} Marketing
    runs-on: ubuntu-latest
    environment:
      name: marketing-${{ inputs.target }}
      url: ${{ inputs.target == 'production' && 'https://www.rediacc.com' || 'https://edge.rediacc.com' }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e  # v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npm run build:packages

      - name: Build pages
        run: npm run build -w @rediacc/www
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.TURNSTILE_SITE_KEY }}

      - name: Copy pages to marketing worker assets
        run: |
          rm -rf workers/marketing/dist
          mkdir -p workers/marketing/dist
          cp -r packages/www/dist/* workers/marketing/dist/

      - name: Inject E2E videos
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          .ci/scripts/docs/inject-e2e-videos.sh
          --search-latest
          --output workers/marketing/dist/assets/videos/user-guide/

      - name: Sign regions manifest
        run: npx tsx scripts/sign-regions.ts > workers/marketing/dist/regions.json
        env:
          ED25519_PRIVATE_KEY: ${{ secrets.ACCOUNT_ED25519_PRIVATE_KEY }}

      - name: Install marketing worker dependencies
        run: npm install
        working-directory: workers/marketing

      - name: Deploy Marketing Worker
        run: .ci/scripts/deploy/deploy-marketing.sh --target ${{ inputs.target }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
