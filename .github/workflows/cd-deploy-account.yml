name: Deploy Account Workers

# Reusable workflow for deploying per-region account Workers.
# Builds the account portal SPA once, then deploys to each region in parallel.
# Reads regions from regions.json for the deployment matrix.

on:
  workflow_call:
    inputs:
      target:
        description: 'Deploy channel: edge or stable'
        required: true
        type: string
      ref:
        description: 'Git ref to checkout (SHA, tag, or branch)'
        required: true
        type: string
    secrets:
      APP_PRIVATE_KEY:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: true
      ACCOUNT_ED25519_PRIVATE_KEY:
        required: true
      ACCOUNT_ED25519_PUBLIC_KEY:
        required: true
      ACCOUNT_X25519_PRIVATE_KEY:
        required: true
      ACCOUNT_X25519_PUBLIC_KEY:
        required: true
      ACCOUNT_SERVER_API_KEY:
        required: true
      ACCOUNT_JWT_SECRET:
        required: true
      STRIPE_SECRET_KEY_EU:
        required: true
      STRIPE_SECRET_KEY_US:
        required: true
      STRIPE_SANDBOX_SECRET_KEY:
        required: true
      STRIPE_WEBHOOK_SECRET_EU:
        required: true
      STRIPE_WEBHOOK_SECRET_US:
        required: true
      STRIPE_SANDBOX_WEBHOOK_SECRET:
        required: true
      AWS_SES_ACCESS_KEY_ID_EU:
        required: true
      AWS_SES_SECRET_ACCESS_KEY_EU:
        required: true
      AWS_SES_ACCESS_KEY_ID_US:
        required: true
      AWS_SES_SECRET_ACCESS_KEY_US:
        required: true
      STRIPE_SECRET_KEY_ASIA:
        required: true
      STRIPE_WEBHOOK_SECRET_ASIA:
        required: true
      AWS_SES_ACCESS_KEY_ID_ASIA:
        required: true
      AWS_SES_SECRET_ACCESS_KEY_ASIA:
        required: true
      TURNSTILE_SECRET_KEY:
        required: true

jobs:
  # Read regions.json to build the deployment matrix
  read-regions:
    name: Read regions
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.regions.outputs.matrix }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6
        with:
          ref: ${{ inputs.ref }}
          sparse-checkout: regions.json
          sparse-checkout-cone-mode: false

      - id: regions
        run: |
          echo "matrix=$(jq -c '{include: [.regions[] | {id, domain, edgeDomain, secretSuffix, sesRegion, workerName, edgeWorkerName}]}' regions.json)" >> "$GITHUB_OUTPUT"

  # Build SPA once (shared across all regions)
  build:
    name: Build account portal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6
        with:
          ref: ${{ inputs.ref }}

      - uses: ./.github/actions/app-token
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          preset: cd
          repositories: console,middleware,renet,account

      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6
        with:
          ref: ${{ inputs.ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Init account submodule
        run: git submodule update --init private/account

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e  # v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install account dependencies
        run: npm install
        working-directory: private/account

      - name: Build shared packages
        run: npm run build:packages

      - name: Build account portal
        run: npm install && npx vite build --outDir ../../../workers/account/dist/account
        working-directory: private/account/web
        env:
          VITE_TURNSTILE_SITE_KEY: ${{ vars.TURNSTILE_SITE_KEY }}
          VITE_CI_MODE: 'false'

      - name: Install account worker dependencies
        run: npm install
        working-directory: workers/account

      - name: Upload account worker artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: account-worker-${{ inputs.target }}
          path: workers/account/
          retention-days: 1

  # Deploy to each region in parallel
  deploy:
    name: Deploy ${{ inputs.target }} ${{ matrix.id }}
    needs: [read-regions, build]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.read-regions.outputs.matrix) }}
      fail-fast: false
    environment:
      name: ${{ inputs.target }}-${{ matrix.id }}
      url: ${{ inputs.target == 'stable' && format('https://{0}', matrix.domain) || format('https://{0}', matrix.edgeDomain) }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6
        with:
          ref: ${{ inputs.ref }}
          sparse-checkout: .github/actions

      - uses: ./.github/actions/app-token
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          preset: cd
          repositories: console,account

      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6
        with:
          ref: ${{ inputs.ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Init account submodule
        run: git submodule update --init --depth 1 private/account

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e  # v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install account dependencies
        run: npm install
        working-directory: private/account

      - name: Build shared packages
        run: npm run build:packages

      - name: Download account worker artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8
        with:
          name: account-worker-${{ inputs.target }}
          path: workers/account/

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Resolve deploy config
        id: config
        run: |
          REGION="${{ matrix.id }}"
          SUFFIX="${{ matrix.secretSuffix }}"
          if [[ "${{ inputs.target }}" == "stable" ]]; then
            WORKER="${{ matrix.workerName }}"
            DOMAIN="${{ matrix.domain }}"
            SANDBOX=""
          else
            WORKER="${{ matrix.edgeWorkerName }}"
            DOMAIN="${{ matrix.edgeDomain }}"
            SANDBOX="--sandbox"
          fi
          echo "region=$REGION" >> "$GITHUB_OUTPUT"
          echo "suffix=$SUFFIX" >> "$GITHUB_OUTPUT"
          echo "worker=$WORKER" >> "$GITHUB_OUTPUT"
          echo "domain=$DOMAIN" >> "$GITHUB_OUTPUT"
          echo "sandbox=$SANDBOX" >> "$GITHUB_OUTPUT"

      - name: Deploy account Worker (${{ matrix.id }})
        run: .ci/scripts/deploy/deploy-account.sh --region ${{ steps.config.outputs.region }} --target ${{ inputs.target }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Worker secrets (${{ matrix.id }})
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          SECRET_ED25519_PRIVATE_KEY: ${{ secrets.ACCOUNT_ED25519_PRIVATE_KEY }}
          SECRET_ED25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_ED25519_PUBLIC_KEY }}
          SECRET_X25519_PRIVATE_KEY: ${{ secrets.ACCOUNT_X25519_PRIVATE_KEY }}
          SECRET_X25519_PUBLIC_KEY: ${{ secrets.ACCOUNT_X25519_PUBLIC_KEY }}
          SECRET_API_KEY: ${{ secrets.ACCOUNT_SERVER_API_KEY }}
          SECRET_JWT_SECRET: ${{ secrets.ACCOUNT_JWT_SECRET }}
          # Region-aware secrets: resolved via bash indirection from SUFFIX
          STRIPE_KEY_EU: ${{ secrets.STRIPE_SECRET_KEY_EU }}
          STRIPE_KEY_US: ${{ secrets.STRIPE_SECRET_KEY_US }}
          STRIPE_KEY_ASIA: ${{ secrets.STRIPE_SECRET_KEY_ASIA }}
          STRIPE_WH_EU: ${{ secrets.STRIPE_WEBHOOK_SECRET_EU }}
          STRIPE_WH_US: ${{ secrets.STRIPE_WEBHOOK_SECRET_US }}
          STRIPE_WH_ASIA: ${{ secrets.STRIPE_WEBHOOK_SECRET_ASIA }}
          STRIPE_SANDBOX_KEY: ${{ secrets.STRIPE_SANDBOX_SECRET_KEY }}
          STRIPE_SANDBOX_WH: ${{ secrets.STRIPE_SANDBOX_WEBHOOK_SECRET }}
          SES_KEY_EU: ${{ secrets.AWS_SES_ACCESS_KEY_ID_EU }}
          SES_KEY_US: ${{ secrets.AWS_SES_ACCESS_KEY_ID_US }}
          SES_KEY_ASIA: ${{ secrets.AWS_SES_ACCESS_KEY_ID_ASIA }}
          SES_SECRET_EU: ${{ secrets.AWS_SES_SECRET_ACCESS_KEY_EU }}
          SES_SECRET_US: ${{ secrets.AWS_SES_SECRET_ACCESS_KEY_US }}
          SES_SECRET_ASIA: ${{ secrets.AWS_SES_SECRET_ACCESS_KEY_ASIA }}
          OTLP_CRED_EU: ${{ secrets.OTLP_CLIENT_CREDENTIALS_EU }}
          OTLP_CRED_US: ${{ secrets.OTLP_CLIENT_CREDENTIALS_US }}
          OTLP_CRED_ASIA: ${{ secrets.OTLP_CLIENT_CREDENTIALS_ASIA }}
          SUFFIX: ${{ matrix.secretSuffix }}
          TARGET: ${{ inputs.target }}
          SECRET_ROOT_EMAIL: ${{ vars.ROOT_EMAIL }}
          SECRET_SES_REGION: ${{ matrix.sesRegion }}
          SECRET_TURNSTILE_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          VAR_SES_FROM: ${{ vars.AWS_SES_FROM }}
          VAR_SES_CONFIGURATION_SET: ${{ vars.AWS_SES_CONFIGURATION_SET }}
          VAR_SELLER_NAME: ${{ vars.SELLER_NAME }}
          VAR_SELLER_VAT_NUMBER: ${{ vars.SELLER_VAT_NUMBER }}
          VAR_SELLER_REGISTRATION_NUMBER: ${{ vars.SELLER_REGISTRATION_NUMBER }}
          VAR_SELLER_ADDRESS_LINE1: ${{ vars.SELLER_ADDRESS_LINE1 }}
          VAR_SELLER_ADDRESS_LINE2: ${{ vars.SELLER_ADDRESS_LINE2 }}
          VAR_SELLER_CITY: ${{ vars.SELLER_CITY }}
          VAR_SELLER_POSTAL_CODE: ${{ vars.SELLER_POSTAL_CODE }}
          VAR_SELLER_COUNTRY: ${{ vars.SELLER_COUNTRY }}
          VAR_SELLER_EMAIL: ${{ vars.SELLER_EMAIL }}
        run: |
          # Resolve region-aware secrets via bash indirection
          if [[ "$TARGET" == "stable" ]]; then
            STRIPE_VAR="STRIPE_KEY_${SUFFIX}"; SECRET_STRIPE_KEY="${!STRIPE_VAR}"
            WH_VAR="STRIPE_WH_${SUFFIX}"; SECRET_STRIPE_WEBHOOK="${!WH_VAR}"
          else
            # Edge (beta channel): no Stripe -- billing disabled
            SECRET_STRIPE_KEY=""
            SECRET_STRIPE_WEBHOOK=""
          fi
          SES_K="SES_KEY_${SUFFIX}"; SECRET_SES_ACCESS_KEY_ID="${!SES_K}"
          SES_S="SES_SECRET_${SUFFIX}"; SECRET_SES_SECRET_ACCESS_KEY="${!SES_S}"
          # Asia uses EU SES while ap-northeast-1 production access is pending
          if [[ "$SUFFIX" == "ASIA" ]]; then
            SECRET_SES_ACCESS_KEY_ID="$SES_KEY_EU"
            SECRET_SES_SECRET_ACCESS_KEY="$SES_SECRET_EU"
          fi
          OTLP_VAR="OTLP_CRED_${SUFFIX}"; SECRET_OTLP_CREDS="${!OTLP_VAR}"

          jq -n \
            --arg ed25519_priv "$SECRET_ED25519_PRIVATE_KEY" \
            --arg ed25519_pub "$SECRET_ED25519_PUBLIC_KEY" \
            --arg x25519_priv "$SECRET_X25519_PRIVATE_KEY" \
            --arg x25519_pub "$SECRET_X25519_PUBLIC_KEY" \
            --arg api_key "$SECRET_API_KEY" \
            --arg jwt "$SECRET_JWT_SECRET" \
            --arg stripe "$SECRET_STRIPE_KEY" \
            --arg stripe_wh "$SECRET_STRIPE_WEBHOOK" \
            --arg admin "$SECRET_ROOT_EMAIL" \
            --arg ses_key "$SECRET_SES_ACCESS_KEY_ID" \
            --arg ses_secret "$SECRET_SES_SECRET_ACCESS_KEY" \
            --arg ses_region "$SECRET_SES_REGION" \
            --arg ses_from "$VAR_SES_FROM" \
            --arg ses_cs "$VAR_SES_CONFIGURATION_SET" \
            --arg turnstile "$SECRET_TURNSTILE_KEY" \
            --arg otlp_creds "$SECRET_OTLP_CREDS" \
            --arg seller_name "$VAR_SELLER_NAME" \
            --arg seller_vat "$VAR_SELLER_VAT_NUMBER" \
            --arg seller_reg "$VAR_SELLER_REGISTRATION_NUMBER" \
            --arg seller_addr1 "$VAR_SELLER_ADDRESS_LINE1" \
            --arg seller_addr2 "$VAR_SELLER_ADDRESS_LINE2" \
            --arg seller_city "$VAR_SELLER_CITY" \
            --arg seller_postal "$VAR_SELLER_POSTAL_CODE" \
            --arg seller_country "$VAR_SELLER_COUNTRY" \
            --arg seller_email "$VAR_SELLER_EMAIL" \
            '{
              ED25519_PRIVATE_KEY: $ed25519_priv,
              ED25519_PUBLIC_KEY: $ed25519_pub,
              X25519_PRIVATE_KEY: $x25519_priv,
              X25519_PUBLIC_KEY: $x25519_pub,
              API_KEY: $api_key,
              JWT_SECRET: $jwt,
              STRIPE_SECRET_KEY: $stripe,
              STRIPE_WEBHOOK_SECRET: $stripe_wh,
              ROOT_EMAIL: $admin,
              AWS_SES_ACCESS_KEY_ID: $ses_key,
              AWS_SES_SECRET_ACCESS_KEY: $ses_secret,
              AWS_SES_REGION: $ses_region,
              AWS_SES_FROM: $ses_from,
              AWS_SES_CONFIGURATION_SET: $ses_cs,
              TURNSTILE_SECRET_KEY: $turnstile,
              OTLP_CLIENT_CREDENTIALS: $otlp_creds,
              SELLER_NAME: $seller_name,
              SELLER_VAT_NUMBER: $seller_vat,
              SELLER_REGISTRATION_NUMBER: $seller_reg,
              SELLER_ADDRESS_LINE1: $seller_addr1,
              SELLER_ADDRESS_LINE2: $seller_addr2,
              SELLER_CITY: $seller_city,
              SELLER_POSTAL_CODE: $seller_postal,
              SELLER_COUNTRY: $seller_country,
              SELLER_EMAIL: $seller_email
            }' | npx wrangler secret bulk --name ${{ steps.config.outputs.worker }}
