name = "rediacc-www"
main = "src/index.ts"
compatibility_date = "2026-01-20"
compatibility_flags = ["nodejs_compat"]
upload_source_maps = true

routes = [
  { pattern = "www.rediacc.com", custom_domain = true }
]

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = false # Disabled to reduce high-volume per-request log noise/cost.

[observability.traces]
enabled = true
head_sampling_rate = 1

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"
# Serve /foo directly from /foo/index.html without a 307 to /foo/.
# Matches Astro's `trailingSlash: 'never'` config and our Worker-side
# normalizePath() which strips trailing slashes. Without this, ASSETS
# would 307 to the trailing-slash variant and the Worker would 301
# back, creating an infinite loop on every live page.
html_handling = "drop-trailing-slash"
run_worker_first = ["/*"]

# No D1 or R2 bindings. Account API + config storage on www.rediacc.com
# are served by the regional workers (eu/us/asia.rediacc.com ->
# rediacc-account-{eu,us,asia}); this worker serves marketing + static
# assets only. PR previews get their own DB via deploy-www.sh ->
# wrangler.preview.toml.

# Service binding to the EU regional account worker. The marketing site
# posts contact/newsletter submissions to /account/api/v1/{contact,newsletter}
# from the browser; without this binding those requests hit a DB-less worker
# and 410. Authenticated SPA traffic still 410s here so the region picker
# can route it to the user's nearest regional worker.
[[services]]
binding = "ACCOUNT"
service = "rediacc-account-eu"

# All account env vars set via `wrangler secret put` in CI.
# See org secrets: ACCOUNT_*, AWS_SES_*, STRIPE_*
# See org variables: AWS_SES_FROM, CLOUDFLARE_ACCOUNT_ID
# Turnstile: TURNSTILE_SECRET_KEY (secret) + TURNSTILE_* / CI_MODE (optional vars/secrets)
