name = "rediacc-www"
main = "src/index.ts"
compatibility_date = "2026-01-20"
compatibility_flags = ["nodejs_compat"]
upload_source_maps = true

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = false # Disabled to reduce high-volume per-request log noise/cost.

[observability.traces]
enabled = true
head_sampling_rate = 1

routes = [
  { pattern = "www.rediacc.com", custom_domain = true }
]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"
run_worker_first = ["/account", "/account/*"]

[[d1_databases]]
binding = "DB"
database_name = "account-db"
database_id = "198e819d-8dfe-4304-a6be-3e1ca1f2c22b"
migrations_dir = "../../private/account/drizzle"

# All account env vars set via `wrangler secret put` in CI.
# See org secrets: ACCOUNT_*, AWS_SES_*, STRIPE_*
# See org variables: AWS_SES_FROM, CLOUDFLARE_ACCOUNT_ID
# Turnstile: TURNSTILE_SECRET_KEY (secret) + TURNSTILE_* / CI_MODE (optional vars/secrets)
