name = "rediacc-www"
main = "src/index.ts"
compatibility_date = "2026-01-20"
compatibility_flags = ["nodejs_compat"]
upload_source_maps = true

routes = [
  { pattern = "www.rediacc.com", custom_domain = true }
]

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = false # Disabled to reduce high-volume per-request log noise/cost.

[observability.traces]
enabled = true
head_sampling_rate = 1

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"
# Serve /foo directly from /foo/index.html without a 307 to /foo/.
# Matches Astro's `trailingSlash: 'never'` config and our Worker-side
# normalizePath() which strips trailing slashes. Without this, ASSETS
# would 307 to the trailing-slash variant and the Worker would 301
# back, creating an infinite loop on every live page.
html_handling = "drop-trailing-slash"
run_worker_first = ["/*"]

# D1 binding removed post multi-region migration. The monolithic account-db
# (UUID 198e819d-...) was deleted from the CF account; account traffic now
# routes through the regional workers (eu/us/asia.rediacc.com ->
# rediacc-account-{eu,us,asia} bound to account-db-{eu,us,asia}). The
# marketing worker serves marketing + static assets only; /account/api/*
# on www.rediacc.com returns 410 and relies on the SPA region picker to
# direct real API traffic to a regional worker. Symmetric with
# wrangler.edge.toml. Per-PR preview deploys create their own DB via
# deploy-www.sh and bind it in wrangler.preview.toml at deploy time.

[[r2_buckets]]
binding = "CONFIG_BUCKET"
bucket_name = "rediacc-configs"

# All account env vars set via `wrangler secret put` in CI.
# See org secrets: ACCOUNT_*, AWS_SES_*, STRIPE_*
# See org variables: AWS_SES_FROM, CLOUDFLARE_ACCOUNT_ID
# Turnstile: TURNSTILE_SECRET_KEY (secret) + TURNSTILE_* / CI_MODE (optional vars/secrets)
