name = "edge-rediacc-www"
main = "src/index.ts"
compatibility_date = "2026-01-20"
compatibility_flags = ["nodejs_compat"]
upload_source_maps = true

routes = [
  { pattern = "edge.rediacc.com", custom_domain = true }
]

[vars]
ENVIRONMENT = "edge"

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = false

[observability.traces]
enabled = true
head_sampling_rate = 1

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"
html_handling = "drop-trailing-slash"
run_worker_first = ["/*"]

# No D1 or R2 bindings. Account API + config storage on edge.rediacc.com
# are served by the regional edge workers (edge-{eu,us,asia}.rediacc.com ->
# edge-rediacc-account-*); this worker serves marketing + static assets only.
