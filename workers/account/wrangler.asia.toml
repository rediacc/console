name = "rediacc-account-asia"
main = "src/index.ts"
compatibility_date = "2026-01-20"
compatibility_flags = ["nodejs_compat"]
upload_source_maps = true

routes = [
  { pattern = "asia.rediacc.com", custom_domain = true }
]

[vars]
REGION = "asia"
WEBAUTHN_RP_ID = "asia.rediacc.com"
WEBAUTHN_ORIGIN = "https://asia.rediacc.com"
# Auto-grant lifetime BUSINESS to every new signup. Flip to "false" (or remove
# this line) and redeploy to close intake. See src/types/env.ts for details.
DESIGN_PARTNER_PROGRAM_ENABLED = "false"

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = false

[observability.traces]
enabled = true
head_sampling_rate = 1

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"
run_worker_first = ["/*"]

[[d1_databases]]
binding = "DB"
database_name = "account-db-asia"
database_id = "83e9d63d-bc47-43fb-a32e-98a70351dcf8"
migrations_dir = "../../private/account/drizzle"

# APAC: location hint APAC (no APAC jurisdiction available in R2, data is zero-knowledge encrypted)
[[r2_buckets]]
binding = "CONFIG_BUCKET"
bucket_name = "rediacc-configs-asia"
