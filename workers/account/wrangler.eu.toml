name = "rediacc-account-eu"
main = "src/index.ts"
compatibility_date = "2026-01-20"
compatibility_flags = ["nodejs_compat"]
upload_source_maps = true

routes = [
  { pattern = "eu.rediacc.com", custom_domain = true }
]

[vars]
REGION = "eu"
WEBAUTHN_RP_ID = "eu.rediacc.com"
WEBAUTHN_ORIGIN = "https://eu.rediacc.com"
# Auto-grant lifetime BUSINESS to every new signup. Flip to "false" (or remove
# this line) and redeploy to close intake. See src/types/env.ts for details.
DESIGN_PARTNER_PROGRAM_ENABLED = "true"

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = false

[observability.traces]
enabled = true
head_sampling_rate = 1

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"
run_worker_first = ["/*"]

[[d1_databases]]
binding = "DB"
database_name = "account-db-eu"
database_id = "25c7d816-f2c6-49b0-9053-7ecab3dc14ed"
migrations_dir = "../../private/account/drizzle"

# EU jurisdiction: hard guarantee that data stays within the EU (GDPR compliant)
[[r2_buckets]]
binding = "CONFIG_BUCKET"
bucket_name = "rediacc-configs-eu"
jurisdiction = "eu"
