name = "rediacc-account-eu"
main = "src/index.ts"
compatibility_date = "2026-01-20"
compatibility_flags = ["nodejs_compat"]
upload_source_maps = true

routes = [
  { pattern = "eu.rediacc.com", custom_domain = true }
]

[vars]
REGION = "eu"
WEBAUTHN_RP_ID = "eu.rediacc.com"
WEBAUTHN_ORIGIN = "https://eu.rediacc.com"

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = false

[observability.traces]
enabled = true
head_sampling_rate = 1

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"
run_worker_first = ["/*"]

[[d1_databases]]
binding = "DB"
database_name = "account-db-eu"
database_id = "ecf574e2-8cc8-4eb0-a639-1eaffc844aca"
migrations_dir = "../../private/account/drizzle"

[[r2_buckets]]
binding = "CONFIG_BUCKET"
bucket_name = "rediacc-configs-eu"
